<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1200" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#09090b" />
        </linearGradient>
        <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#0f172a" stop-opacity="0.6" />
        </linearGradient>
        <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#06b6d4" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
        <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>
        <linearGradient id="accentRed" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ef4444" />
            <stop offset="100%" stop-color="#f97316" />
        </linearGradient>
        <filter id="glowCyan">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowPurple">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowRed">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="shadow">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1000" height="1200" fill="url(#bg)" />
    
    <!-- Header -->
    <rect x="100" y="60" width="800" height="120" rx="20" fill="url(#cardBg)" filter="url(#shadow)" stroke="#334155" stroke-width="2"/>
    <text x="500" y="115" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="38" font-weight="bold" fill="#f8fafc" text-anchor="middle">
        پراگماتیکس گفتمان سیاسی
    </text>
    <text x="500" y="155" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">
        تقابل بار منطقی و بار معنایی در شرایط انسداد سیاسی
    </text>

    <!-- Path Lines -->
    <path d="M 500 180 L 500 240" stroke="#334155" stroke-width="4" stroke-dasharray="8 8" />
    <path d="M 500 240 L 250 240 L 250 280" stroke="#06b6d4" stroke-width="4" fill="none" />
    <path d="M 500 240 L 750 240 L 750 280" stroke="#a855f7" stroke-width="4" fill="none" />

    <!-- Left Box: Logical Entailment -->
    <rect x="100" y="280" width="300" height="350" rx="16" fill="url(#cardBg)" filter="url(#shadow)" stroke="url(#accentCyan)" stroke-width="2"/>
    <circle cx="250" cy="280" r="30" fill="#0f172a" stroke="url(#accentCyan)" stroke-width="4" filter="url(#glowCyan)"/>
    <text x="250" y="290" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="24" font-weight="bold" fill="#22d3ee" text-anchor="middle">۱</text>
    <text x="250" y="350" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">استلزام منطقی</text>
    <text x="250" y="380" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#38bdf8" text-anchor="middle">(Logical Entailment)</text>
    
    <text x="250" y="430" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle">مفهوم‌سازی انتزاعی و تئوریک</text>
    <rect x="150" y="450" width="200" height="2" fill="#334155"/>
    <text x="250" y="480" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">توصیفِ صِرف حق و امکان •</text>
    <text x="250" y="520" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">فرضِ بی‌طرفی گوینده •</text>
    <text x="250" y="560" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">مصونیت از تبعات عملی •</text>

    <!-- Right Box: Pragmatic Implicature -->
    <rect x="600" y="280" width="300" height="350" rx="16" fill="url(#cardBg)" filter="url(#shadow)" stroke="url(#accentPurple)" stroke-width="2"/>
    <circle cx="750" cy="280" r="30" fill="#0f172a" stroke="url(#accentPurple)" stroke-width="4" filter="url(#glowPurple)"/>
    <text x="750" y="290" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="24" font-weight="bold" fill="#e879f9" text-anchor="middle">۲</text>
    <text x="750" y="350" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">دلالت معنایی</text>
    <text x="750" y="380" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#c084fc" text-anchor="middle">(Pragmatic Implicature)</text>

    <text x="750" y="430" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle">کنش گفتاری در عرصه عمومی</text>
    <rect x="650" y="450" width="200" height="2" fill="#334155"/>
    <text x="750" y="480" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">جهت‌دهی و ترجیح سیاسی •</text>
    <text x="750" y="520" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">کنش‌گری فعالانه (Performative) •</text>
    <text x="750" y="560" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">مسئولیت در قبال پیامدها •</text>

    <!-- Convergence Lines -->
    <path d="M 250 630 L 250 680 L 480 680 L 480 710" stroke="#06b6d4" stroke-width="4" fill="none" />
    <path d="M 750 630 L 750 680 L 520 680 L 520 710" stroke="#a855f7" stroke-width="4" fill="none" />
    <polygon points="500,740 470,700 530,700" fill="#f8fafc" />

    <!-- Core Concern -->
    <rect x="250" y="740" width="500" height="140" rx="16" fill="url(#cardBg)" filter="url(#shadow)" stroke="#475569" stroke-width="2"/>
    <text x="500" y="785" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="24" font-weight="bold" fill="#f1f5f9" text-anchor="middle">دغدغه محوری: خلط تحلیلی</text>
    <text x="500" y="825" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle">پنهان شدن پشت «بار منطقی» کلمات برای فرار از</text>
    <text x="500" y="855" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle">پذیرش مسئولیت «بار معنایی» در فضای قطبی شده</text>

    <!-- Down arrow to Alert -->
    <path d="M 500 880 L 500 930" stroke="#ef4444" stroke-width="4" stroke-dasharray="6 6" fill="none" />
    <polygon points="500,950 480,920 520,920" fill="#ef4444" />

    <!-- Alert / Caveat Box -->
    <rect x="150" y="950" width="700" height="180" rx="20" fill="#450a0a" filter="url(#shadow)" stroke="url(#accentRed)" stroke-width="4"/>
    <circle cx="500" cy="950" r="35" fill="#09090b" stroke="url(#accentRed)" stroke-width="4" filter="url(#glowRed)"/>
    <!-- Exclamation Mark -->
    <path d="M 500 930 L 500 960" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
    <circle cx="500" cy="972" r="4" fill="#ef4444" />
    
    <text x="500" y="1015" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="28" font-weight="bold" fill="#fca5a5" text-anchor="middle">تذکر راهبردی و خطر لغزش</text>
    
    <text x="500" y="1060" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="20" fill="#fecaca" text-anchor="middle">سیال‌سازی مفاهیمی چون «وطن»، «اجنبی» و مجاز دانستن مداخله،</text>
    <text x="500" y="1095" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="20" fill="#fecaca" text-anchor="middle">در نهایت به مشروعیت‌بخشی به نقض حاکمیت ملی و تجزیه‌طلبی می‌انجامد.</text>

</svg>
