<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
  </style>
  <linearGradient id="bg46" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0e27"/>
    <stop offset="50%" stop-color="#0d1333"/>
    <stop offset="100%" stop-color="#1a0a1e"/>
  </linearGradient>
  <filter id="sh46"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<rect width="1920" height="1080" fill="url(#bg46)"/>

<!-- Header -->
<text x="960" y="45" fill="#fff" font-size="32" font-weight="900" text-anchor="middle">💧 بحران آب و محیط زیست: بین‌النهرین در حال خشک شدن</text>
<text x="960" y="72" fill="#d4af37" font-size="15" font-weight="400" text-anchor="middle">سرزمین بین دو رود (دجله و فرات) تا ۲۰۴۰ ممکن است آب نداشته باشد</text>
<line x1="150" y1="88" x2="1770" y2="88" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ====== TOP LEFT: WATER FLOW DECLINE ====== -->
<rect x="60" y="105" width="600" height="400" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh46)"/>
<text x="360" y="135" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">📉 کاهش دبی آب دجله و فرات</text>

<!-- Y-axis -->
<text x="100" y="170" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end">100%</text>
<text x="100" y="230" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end">75%</text>
<text x="100" y="290" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end">50%</text>
<text x="100" y="350" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end">25%</text>
<text x="100" y="410" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end">0%</text>

<!-- Grid -->
<line x1="110" y1="168" x2="620" y2="168" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<line x1="110" y1="228" x2="620" y2="228" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<line x1="110" y1="288" x2="620" y2="288" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<line x1="110" y1="348" x2="620" y2="348" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
<line x1="110" y1="408" x2="620" y2="408" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

<!-- X-axis -->
<text x="140" y="435" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">۱۹۸۰</text>
<text x="250" y="435" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">۱۹۹۰</text>
<text x="360" y="435" fill="#e74c3c" font-size="9" font-weight="700" text-anchor="middle">۲۰۰۳</text>
<text x="470" y="435" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">۲۰۱۵</text>
<text x="580" y="435" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">۲۰۲۳</text>

<!-- Invasion marker -->
<line x1="360" y1="158" x2="360" y2="420" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

<!-- Euphrates line -->
<polyline points="140,175 250,200 360,240 470,310 580,350" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
<text x="590" y="345" fill="#3b82f6" font-size="9" font-weight="700">فرات: ↓۶۰%</text>

<!-- Tigris line -->
<polyline points="140,180 250,195 360,225 470,275 580,310" fill="none" stroke="#00b4d8" stroke-width="2.5"/>
<text x="590" y="305" fill="#00b4d8" font-size="9" font-weight="700">دجله: ↓۵۰%</text>

