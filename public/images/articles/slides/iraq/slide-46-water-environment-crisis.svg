  <text x="270" y="40" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">نفر بستری شدند — مسمومیت با آب لوله‌کشی</text>

  <rect x="0" y="65" width="260" height="50" rx="8" fill="rgba(255,152,0,0.08)" stroke="rgba(255,152,0,0.12)" stroke-width="1"/>
  <text x="130" y="87" fill="#ff9800" font-size="13" font-weight="900" text-anchor="middle">شوری آب: x۵</text>
  <text x="130" y="104" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">نفوذ آب شور خلیج فارس</text>

