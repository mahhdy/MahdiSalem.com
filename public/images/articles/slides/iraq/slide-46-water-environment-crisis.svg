<text x="1580" y="391" fill="rgba(255,255,255,0.35)" font-size="8" text-anchor="middle">مرگ ۵,۰۰۰ سال تمدن اهوار — بزرگ‌ترین فاجعه اکولوژیکی منطقه</text>

