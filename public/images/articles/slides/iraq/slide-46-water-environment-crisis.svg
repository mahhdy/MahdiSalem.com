<text x="520" y="362" fill="rgba(255,255,255,0.4)" font-size="8" text-anchor="middle">زیر حد بقای کشاورزی</text>

<!-- Causes -->
<rect x="80" y="450" width="560" height="40" rx="6" fill="rgba(255,152,0,0.06)" stroke="rgba(255,152,0,0.1)" stroke-width="1"/>
<text x="360" y="468" fill="#ff9800" font-size="10" font-weight="700" text-anchor="middle">دلایل: سدسازی ترکیه (GAP: ۲۲ سد) + ایران (انحراف رودها) + تغییر اقلیم</text>
<text x="360" y="483" fill="rgba(255,255,255,0.35)" font-size="8" text-anchor="middle">عراق ضعیف = ناتوان از مذاکره آبی | فاقد دیپلماسی آب مؤثر</text>

<!-- ====== TOP MIDDLE: BASRA WATER CRISIS ====== -->
<rect x="685" y="105" width="590" height="400" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh46)"/>
<text x="980" y="135" fill="#e74c3c" font-size="14" font-weight="900" text-anchor="middle">🚨 بحران بصره ۲۰۱۸ — نمونه‌ای از آینده عراق</text>

<g transform="translate(710,155)">
