  <text x="15" y="85" fill="rgba(255,255,255,0.4)" font-size="9">= ۳۰-۵۰% درآمد خانوار → مالیات پنهان بر فقرا</text>

  <rect x="0" y="100" width="530" height="42" rx="6" fill="rgba(0,180,216,0.06)" stroke="rgba(0,180,216,0.1)" stroke-width="1"/>
  <text x="15" y="118" fill="#00b4d8" font-size="11" font-weight="700">هزینه شده: $۵۰B+ برای بخش برق (۲۰۰۳–۲۰۲۳)</text>
  <text x="15" y="135" fill="rgba(255,255,255,0.4)" font-size="9">نتیجه: هنوز بدتر از ۲۰۰۲! → فساد سیستماتیک</text>

  <rect x="0" y="150" width="530" height="42" rx="6" fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.1)" stroke-width="1"/>
  <text x="15" y="168" fill="#9b59b6" font-size="11" font-weight="700">وابستگی به گاز ایران: ۳۰%+ برق از گاز ایران</text>
  <text x="15" y="185" fill="rgba(255,255,255,0.4)" font-size="9">ایران = قطع می‌کند وقتی بخواهد → ابزار فشار سیاسی</text>
</g>

