  <text x="407" y="87" fill="#00b4d8" font-size="13" font-weight="900" text-anchor="middle">فاضلاب در آب شرب</text>
  <text x="407" y="104" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">۸۰% فاضلاب بدون تصفیه</text>

  <rect x="0" y="125" width="540" height="48" rx="8" fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.1)" stroke-width="1"/>
  <text x="15" y="148" fill="#9b59b6" font-size="11" font-weight="700">🔥 تظاهرات بصره → سرکوب → ۱۵ کشته</text>
  <text x="15" y="165" fill="rgba(255,255,255,0.4)" font-size="9">مردم کنسولگری ایران را آتش زدند (اعتراض به نفوذ)</text>

  <rect x="0" y="182" width="540" height="42" rx="8" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.1)" stroke-width="1"/>
  <text x="270" y="205" fill="#e74c3c" font-size="10" font-weight="700" text-anchor="middle">⚡ پارادوکس: بصره = ۷۰% نفت عراق ← اما آب سالم ندارد!</text>
  <text x="270" y="218" fill="rgba(255,255,255,0.35)" font-size="8" text-anchor="middle">ثروتمندترین استان از نظر منابع = فقیرترین از نظر خدمات</text>
</g>

<!-- Environmental stats -->
<rect x="710" y="395" width="540" height="95" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
<text x="980" y="418" fill="#d4af37" font-size="11" font-weight="700" text-anchor="middle">📊 شاخص‌های زیست‌محیطی عراق ۲۰۲۳</text>
<text x="730" y="440" fill="rgba(255,255,255,0.5)" font-size="9">▸ بیابان‌زایی: ۳۹% خاک عراق → بیابان شده (۱۹۹۰: ۲۰%)</text>
<text x="730" y="458" fill="rgba(255,255,255,0.5)" font-size="9">▸ دمای تابستان: ۵۲°C+ (بغداد ۲۰۲۱ — رکورد جهانی)</text>
<text x="730" y="476" fill="rgba(255,255,255,0.5)" font-size="9">▸ طوفان شن: ۲۷۲ روز/سال (۲۰۲۲) — سابقاً ≈۲۰ روز</text>

