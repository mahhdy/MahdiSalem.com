<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .big-num { fill: #e74c3c; font-size: 52px; font-weight: 900; text-anchor: middle; }
    .big-label { fill: rgba(255,255,255,0.7); font-size: 16px; text-anchor: middle; }
    .cat-title { fill: #fff; font-size: 16px; font-weight: 700; }
    .cat-val { fill: #d4af37; font-size: 22px; font-weight: 900; }
    .cat-desc { fill: rgba(255,255,255,0.5); font-size: 11px; }
    .alt-title { fill: #2ecc71; font-size: 13px; font-weight: 700; }
    .alt-desc { fill: rgba(255,255,255,0.6); font-size: 11px; }
    .bar-us { fill: rgba(59,130,246,0.5); rx: 4; }
    .bar-iq { fill: rgba(231,76,60,0.5); rx: 4; }
    .bar-human { fill: rgba(147,51,234,0.4); rx: 4; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="glow-total">
    <feGaussianBlur stdDeviation="15" result="b"/>
    <feFlood flood-color="#e74c3c" flood-opacity="0.3"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">قیمت جنگ عراق: حساب نهایی</text>
<text x="960" y="68" class="subtitle">هزینه مالی + انسانی + فرصت از دست رفته — ۲۰ سال پس از حمله</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ══════════════════════════════════════ -->
<!-- TOP CENTER: TOTAL COST                 -->
<!-- ══════════════════════════════════════ -->
<rect x="560" y="95" width="800" height="120" rx="16" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.25)" stroke-width="2" filter="url(#glow-total)"/>
<text x="960" y="150" class="big-num">$۳ تریلیون+</text>
<text x="960" y="178" class="big-label">هزینه مستقیم + غیرمستقیم جنگ عراق</text>
<text x="960" y="200" fill="rgba(255,255,255,0.35)" font-size="12" text-anchor="middle">Brown University — Costs of War Project (۲۰۲۳)</text>

<!-- ══════════════════════════════════════════════════ -->
<!-- THREE COLUMNS: US Cost | Iraq Cost | Human Cost   -->
<!-- ══════════════════════════════════════════════════ -->

<!-- COLUMN 1: US Financial Cost -->
<rect x="60" y="230" width="580" height="420" class="glass" filter="url(#sh)"/>
<text x="350" y="265" fill="#3b82f6" font-size="20" font-weight="800" text-anchor="middle">🇺🇸 هزینه آمریکا</text>
<line x1="100" y1="280" x2="600" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Total US -->
<text x="350" y="315" fill="#3b82f6" font-size="36" font-weight="900" text-anchor="middle">$۲.۴ تریلیون</text>
<text x="350" y="338" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">هزینه مستقیم + بهره بدهی + مراقبت از کهنه‌سربازان</text>

<line x1="100" y1="355" x2="600" y2="355" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

<!-- Breakdown bars -->
<g transform="translate(100,370)">
  <text x="0" y="14" class="cat-desc">عملیات نظامی:</text>
  <rect x="140" y="2" width="420" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="140" y="2" width="330" height="18" class="bar-us"/>
  <text x="480" y="16" fill="#3b82f6" font-size="12" font-weight="700">$۸۱۵B</text>

  <text x="0" y="42" class="cat-desc">بازسازی عراق:</text>
  <rect x="140" y="30" width="420" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="140" y="30" width="60" height="18" class="bar-us" opacity="0.6"/>
  <text x="210" y="44" fill="#3b82f6" font-size="12" font-weight="700">$۱۴۶B</text>

  <text x="0" y="70" class="cat-desc">مراقبت کهنه‌سربازان:</text>
  <rect x="140" y="58" width="420" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="140" y="58" width="210" height="18" class="bar-us" opacity="0.5"/>
  <text x="360" y="72" fill="#3b82f6" font-size="12" font-weight="700">$۵۲۱B</text>

  <text x="0" y="98" class="cat-desc">بهره بدهی جنگ:</text>
  <rect x="140" y="86" width="420" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="140" y="86" width="280" height="18" class="bar-us" opacity="0.4"/>
  <text x="430" y="100" fill="#3b82f6" font-size="12" font-weight="700">$۷۰۰B+</text>

  <text x="0" y="126" class="cat-desc">هزینه‌های امنیت داخلی:</text>
  <rect x="140" y="114" width="420" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="140" y="114" width="88" height="18" class="bar-us" opacity="0.35"/>
  <text x="238" y="128" fill="#3b82f6" font-size="12" font-weight="700">$۲۲۰B</text>
</g>

<text x="350" y="525" fill="rgba(59,130,246,0.5)" font-size="11" text-anchor="middle">≈ $۷,۳۰۰ به ازای هر شهروند آمریکایی</text>
<text x="350" y="542" fill="rgba(59,130,246,0.4)" font-size="10" text-anchor="middle">یا ≈ $۵۷,۱۰۰ به ازای هر عراقی!</text>

<!-- COLUMN 2: Iraq Financial Damage -->
<rect x="670" y="230" width="580" height="420" class="glass" filter="url(#sh)"/>
<text x="960" y="265" fill="#e74c3c" font-size="20" font-weight="800" text-anchor="middle">🇮🇶 خسارت عراق</text>
<line x1="710" y1="280" x2="1210" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<text x="960" y="315" fill="#e74c3c" font-size="36" font-weight="900" text-anchor="middle">$۶۰۰+ میلیارد</text>
<text x="960" y="338" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">ویرانی زیرساخت + سرمایه انسانی + فرصت از دست رفته</text>

<line x1="710" y1="355" x2="1210" y2="355" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

<g transform="translate(710,370)">
  <text x="0" y="14" class="cat-desc">ویرانی زیرساخت‌ها:</text>
  <rect x="150" y="2" width="320" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="150" y="2" width="170" height="18" class="bar-iq"/>
  <text x="330" y="16" fill="#e74c3c" font-size="12" font-weight="700">$۸۸B</text>
  <text x="395" y="16" fill="rgba(255,255,255,0.3)" font-size="9">(بانک جهانی ۲۰۱۸)</text>

  <text x="0" y="42" class="cat-desc">فساد + سرقت:</text>
  <rect x="150" y="30" width="320" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="150" y="30" width="290" height="18" class="bar-iq"/>
  <text x="450" y="44" fill="#e74c3c" font-size="12" font-weight="700">$۱۵۰B+</text>

  <text x="0" y="70" class="cat-desc">فرار مغزها:</text>
  <rect x="150" y="58" width="320" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="150" y="58" width="95" height="18" class="bar-iq" opacity="0.6"/>
  <text x="255" y="72" fill="#e74c3c" font-size="12" font-weight="700">$۵۰B</text>

  <text x="0" y="98" class="cat-desc">GDP از دست رفته:</text>
  <rect x="150" y="86" width="320" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="150" y="86" width="320" height="18" class="bar-iq" opacity="0.4"/>
  <text x="480" y="100" fill="#e74c3c" font-size="12" font-weight="700">$۲۵۰B+</text>
  <text x="150" y="116" fill="rgba(255,255,255,0.3)" font-size="9">(فرصت رشد ۲۰ ساله از دست رفته — مقایسه با مسیر بدون جنگ)</text>

  <text x="0" y="138" class="cat-desc">بازسازی مناطق داعش:</text>
  <rect x="150" y="126" width="320" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="150" y="126" width="60" height="18" class="bar-iq" opacity="0.5"/>
  <text x="220" y="140" fill="#e74c3c" font-size="12" font-weight="700">$۳۵B</text>
</g>

<text x="960" y="530" fill="rgba(231,76,60,0.5)" font-size="11" text-anchor="middle">≈ $۱۴,۳۰۰ خسارت به ازای هر عراقی (شامل کودکان)</text>

<!-- COLUMN 3: Human Cost -->
<rect x="1280" y="230" width="580" height="420" class="glass" filter="url(#sh)"/>
<text x="1570" y="265" fill="#9333ea" font-size="20" font-weight="800" text-anchor="middle">💀 هزینه انسانی</text>
<line x1="1320" y1="280" x2="1820" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Human costs -->
<g transform="translate(1320,295)">
  <!-- Iraqi civilian dead -->
  <rect x="0" y="0" width="460" height="55" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>
  <text x="15" y="22" fill="#e74c3c" font-size="22" font-weight="900">≈۲۰۰,۰۰۰+</text>
  <text x="15" y="40" class="cat-desc" fill="#e74c3c">غیرنظامی عراقی کشته شده (مستند)</text>
  <text x="350" y="22" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="end">تخمین واقعی: ۵۰۰K–۱M</text>

  <!-- Iraqi displaced -->
  <rect x="0" y="65" width="460" height="45" rx="8" fill="rgba(255,152,0,0.06)" stroke="rgba(255,152,0,0.12)" stroke-width="1"/>
  <text x="15" y="87" fill="#ff9800" font-size="18" font-weight="900">۸.۵ میلیون</text>
  <text x="200" y="87" class="cat-desc" fill="#ff9800">آواره شدند (IDP + پناهنده)</text>

  <!-- Orphans -->
  <rect x="0" y="120" width="220" height="45" rx="8" fill="rgba(0,180,216,0.06)" stroke="rgba(0,180,216,0.12)" stroke-width="1"/>
  <text x="15" y="142" fill="#00b4d8" font-size="16" font-weight="800">۵ میلیون</text>
  <text x="15" y="156" class="cat-desc" fill="#00b4d8" font-size="10">کودک یتیم</text>

  <!-- Widows -->
  <rect x="230" y="120" width="230" height="45" rx="8" fill="rgba(147,51,234,0.06)" stroke="rgba(147,51,234,0.12)" stroke-width="1"/>
  <text x="245" y="142" fill="#9333ea" font-size="16" font-weight="800">۱–۲ میلیون</text>
  <text x="245" y="156" class="cat-desc" fill="#9333ea" font-size="10">زن بیوه</text>

  <!-- US soldiers -->
  <rect x="0" y="175" width="460" height="45" rx="8" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <text x="15" y="197" fill="#3b82f6" font-size="16" font-weight="800">۴,۵۹۹ سرباز آمریکایی</text>
  <text x="280" y="197" class="cat-desc" fill="#3b82f6">+ ۳۲,۰۰۰ زخمی + ۳۰,۱۷۷ خودکشی</text>

  <!-- PTSD -->
  <rect x="0" y="230" width="460" height="40" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="15" y="252" fill="rgba(255,255,255,0.6)" font-size="13" font-weight="700">۵۰۰,۰۰۰+ کهنه‌سرباز مبتلا به PTSD</text>

  <!-- Christians -->
  <rect x="0" y="280" width="460" height="40" rx="8" fill="rgba(212,175,55,0.06)" stroke="rgba(212,175,55,0.12)" stroke-width="1"/>
  <text x="15" y="302" fill="#d4af37" font-size="12" font-weight="700">مسیحیان عراق: ۱.۵M → ۲۰۰K (پاکسازی ۸۷%)</text>
</g>

<!-- ══════════════════════════════════════════ -->
<!-- WHAT ELSE COULD \$3T BUY? — Alternative   -->
<!-- ══════════════════════════════════════════ -->
<rect x="60" y="670" width="1800" height="140" class="glass" filter="url(#sh)"/>
<text x="960" y="700" fill="#2ecc71" font-size="17" font-weight="700" text-anchor="middle">💡 $۳ تریلیون چه چیزهایی می‌خرید؟</text>
<line x1="100" y1="712" x2="1820" y2="712" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

<g transform="translate(100,725)">
  <rect x="0" y="0" width="310" height="60" rx="8" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.12)" stroke-width="1"/>
  <text x="155" y="22" class="alt-title" text-anchor="middle">🎓 آموزش رایگان جهانی</text>
  <text x="155" y="40" class="alt-desc" text-anchor="middle">۱۵ سال آموزش رایگان برای</text>
  <text x="155" y="54" class="alt-desc" text-anchor="middle">تمام کودکان جهان</text>

  <rect x="330" y="0" width="310" height="60" rx="8" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.12)" stroke-width="1"/>
  <text x="485" y="22" class="alt-title" text-anchor="middle">🏥 سلامت جهانی</text>
  <text x="485" y="40" class="alt-desc" text-anchor="middle">ریشه‌کنی مالاریا + سل +</text>
  <text x="485" y="54" class="alt-desc" text-anchor="middle">واکسیناسیون کامل جهان</text>

  <rect x="660" y="0" width="310" height="60" rx="8" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.12)" stroke-width="1"/>
  <text x="815" y="22" class="alt-title" text-anchor="middle">☀️ انرژی تجدیدپذیر</text>
  <text x="815" y="40" class="alt-desc" text-anchor="middle">تأمین ۱۰۰% برق آفریقا</text>
  <text x="815" y="54" class="alt-desc" text-anchor="middle">با انرژی خورشیدی</text>

  <rect x="990" y="0" width="310" height="60" rx="8" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.12)" stroke-width="1"/>
  <text x="1145" y="22" class="alt-title" text-anchor="middle">🏗️ بازسازی ۱۰ عراق</text>
  <text x="1145" y="40" class="alt-desc" text-anchor="middle">هزینه جنگ = ۱۰ برابر</text>
  <text x="1145" y="54" class="alt-desc" text-anchor="middle">کل بازسازی واقعی عراق</text>

  <rect x="1320" y="0" width="310" height="60" rx="8" fill="rgba(212,175,55,0.06)" stroke="rgba(212,175,55,0.12)" stroke-width="1"/>
  <text x="1475" y="22" fill="#d4af37" font-size="13" font-weight="700" text-anchor="middle">💰 $۷۱,۰۰۰ نقد</text>
  <text x="1475" y="40" class="alt-desc" text-anchor="middle">برای هر عراقی (شامل نوزادان)</text>
  <text x="1475" y="54" class="alt-desc" text-anchor="middle">= ۷ سال حقوق کامل</text>
</g>

<!-- ══════════ -->
<!-- BOTTOM BAR -->
<!-- ══════════ -->
<rect x="60" y="828" width="1800" height="75" rx="10" class="note-box"/>
<text x="960" y="855" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">📌 جنگ عراق = پرهزینه‌ترین اشتباه استراتژیک آمریکا در قرن ۲۱: $۳T+ مالی + ۲۰۰K+ جان + بی‌ثباتی منطقه‌ای</text>
<text x="960" y="878" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">خودکشی کهنه‌سربازان آمریکایی (۳۰,۱۷۷) بیشتر از کشته‌شدگان جنگ (۴,۵۹۹) بود — ۶.۵ برابر! هزینه پنهان جنگ</text>
<text x="960" y="896" fill="rgba(255,255,255,0.35)" font-size="11" text-anchor="middle">آمریکا هنوز سالانه $۱۰B+ بابت مراقبت از کهنه‌سربازان عراق می‌پردازد — این هزینه تا ۲۰۵۰ ادامه خواهد داشت</text>

<!-- Footer -->
<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 24 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۶: هزینه جنگ</text>
<text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">منابع: Brown Univ. Costs of War (2023), CBO, DoD, VA, World Bank, SIGIR Final Report | ارقام تعدیل‌شده با تورم</text>
</svg>
