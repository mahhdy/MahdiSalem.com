<!-- Dec: PM resigns -->
<circle cx="1360" cy="230" r="7" fill="#d4af37"/>
<line x1="1360" y1="158" x2="1360" y2="223" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
