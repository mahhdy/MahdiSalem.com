<!-- Grade summary -->
<line x1="100" y1="645" x2="1820" y2="645" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="470" y="668" class="metric-label" font-weight="700">نمره کلی مدیریت نفت</text>
<rect x="500" y="656" width="160" height="22" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/>
<text x="580" y="672" fill="#2ecc71" font-size="14" font-weight="900" text-anchor="middle">A+ الگو</text>
<rect x="780" y="656" width="160" height="22" rx="6" fill="rgba(0,180,216,0.15)" stroke="#00b4d8" stroke-width="1"/>
<text x="860" y="672" fill="#00b4d8" font-size="14" font-weight="900" text-anchor="middle">B نسبتاً خوب</text>
<rect x="1060" y="656" width="160" height="22" rx="6" fill="rgba(231,76,60,0.2)" stroke="#e74c3c" stroke-width="1.5"/>
<text x="1140" y="672" fill="#e74c3c" font-size="14" font-weight="900" text-anchor="middle">F فاجعه</text>
<rect x="1340" y="656" width="160" height="22" rx="6" fill="rgba(255,152,0,0.15)" stroke="#ff9800" stroke-width="1"/>
<text x="1420" y="672" fill="#ff9800" font-size="14" font-weight="900" text-anchor="middle">D ضعیف</text>

<!-- ══════════════════════════════════════ -->
<!-- KEY LESSON BOX                         -->
<!-- ══════════════════════════════════════ -->
<rect x="60" y="810" width="880" height="110" rx="12" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.2)" stroke-width="1"/>
<text x="500" y="840" fill="#2ecc71" font-size="16" font-weight="700" text-anchor="middle">🇳🇴 رمز موفقیت نروژ:</text>
<text x="500" y="865" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">۱) صندوق ثروت \$1.4T (نسل آینده) | ۲) نفت فقط ۱۴% GDP (تنوع اقتصادی)</text>
<text x="500" y="888" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">۳) شفافیت مطلق (CPI: ۸۴) | ۴) مالیات بالا + خدمات عالی | ۵) نهادهای مستقل</text>
<text x="500" y="908" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">نروژ از ۱۹۹۰ صندوق را ساخت — عراق از ۲۰۰۳ می‌توانست همین کار را بکند</text>

<rect x="960" y="810" width="900" height="110" rx="12" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>
<text x="1410" y="840" fill="#e74c3c" font-size="16" font-weight="700" text-anchor="middle">🇮🇶 رمز شکست عراق:</text>
<text x="1410" y="865" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">۱) صندوق ثروت = صفر! | ۲) نفت ۹۳% بودجه (مونوکالچر مطلق)</text>
<text x="1410" y="888" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">۳) فساد سیستماتیک (CPI: ۱۸) | ۴) $۱۵۰B+ دزدیده شده | ۵) هیچ نهاد مستقلی</text>
<text x="1410" y="908" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">عراق ۲۰ سال درآمد نفتی داشت ($۱T+) — اثر = هیچ | همه چیز خرج محاصصه شد</text>

<!-- ══════════ -->
<!-- BOTTOM BAR -->
<!-- ══════════ -->
<rect x="60" y="935" width="1800" height="55" rx="10" class="note-box"/>
<text x="960" y="960" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">📌 عراق $۱ تریلیون+ درآمد نفتی داشت (۲۰۰۳–۲۰۲۳) — نه صندوق ثروت، نه زیرساخت، نه تنوع اقتصادی = نفرین منابع در خالص‌ترین شکل</text>
<text x="960" y="980" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">اگر عراق مثل نروژ عمل می‌کرد، امروز صندوقی ≈$۵۰۰B داشت و هر عراقی $۱۲,۰۰۰ سهم — به جای بیکاری ۳۶%</text>

