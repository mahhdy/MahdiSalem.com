<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .col-head { fill: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-anchor: middle; }
    .country-flag { font-size: 28px; text-anchor: middle; }
    .country-name { fill: #fff; font-size: 15px; font-weight: 700; text-anchor: middle; }
    .country-type { font-size: 10px; font-weight: 600; text-anchor: middle; }
    .metric-label { fill: rgba(255,255,255,0.5); font-size: 11px; text-anchor: end; }
    .metric-val { fill: #fff; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .bar-bg { fill: rgba(255,255,255,0.05); rx: 3; }
    .grade-a { fill: rgba(46,204,113,0.5); rx: 3; }
    .grade-b { fill: rgba(0,180,216,0.4); rx: 3; }
    .grade-c { fill: rgba(255,152,0,0.4); rx: 3; }
    .grade-f { fill: rgba(231,76,60,0.5); rx: 3; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">نفرین منابع: چرا نفت عراق را ثروتمند نکرد؟</text>
<text x="960" y="68" class="subtitle">مقایسه ۴ کشور نفت‌خیز — نروژ (الگوی موفق) vs عراق (الگوی شکست) + عربستان + نیجریه</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- Main container -->
<rect x="60" y="95" width="1800" height="700" class="glass" filter="url(#sh)"/>

<!-- ══════════════════════════════════════════════ -->
<!-- 4 COUNTRY COLUMNS + 10 METRIC ROWS             -->
<!-- Column positions: x = 580, 860, 1140, 1420     -->
<!-- Metric labels: right-aligned at x=480          -->
<!-- Bar area per column: 200px wide                -->
<!-- ══════════════════════════════════════════════ -->

<!-- Country Headers -->
<!-- Norway -->
<g transform="translate(580,110)">
  <text x="0" y="20" class="country-flag">🇳🇴</text>
  <text x="0" y="44" class="country-name" fill="#2ecc71">نروژ</text>
  <text x="0" y="60" class="country-type" fill="#2ecc71">✅ الگوی موفق</text>
</g>

<!-- Saudi -->
<g transform="translate(860,110)">
  <text x="0" y="20" class="country-flag">🇸🇦</text>
  <text x="0" y="44" class="country-name" fill="#00b4d8">عربستان</text>
  <text x="0" y="60" class="country-type" fill="#00b4d8">نیمه‌موفق</text>
</g>

<!-- Iraq -->
<g transform="translate(1140,110)">
  <text x="0" y="20" class="country-flag">🇮🇶</text>
  <text x="0" y="44" class="country-name" fill="#e74c3c">عراق</text>
  <text x="0" y="60" class="country-type" fill="#e74c3c">❌ نفرین منابع</text>
</g>

<!-- Nigeria -->
<g transform="translate(1420,110)">
  <text x="0" y="20" class="country-flag">🇳🇬</text>
  <text x="0" y="44" class="country-name" fill="#ff9800">نیجریه</text>
  <text x="0" y="60" class="country-type" fill="#ff9800">❌ نفرین منابع</text>
</g>

<!-- Divider -->
<line x1="100" y1="175" x2="1820" y2="175" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- ═══════════════════════════════════════════ -->
<!-- METRIC ROWS (y starts at 195, 55px spacing) -->
<!-- Bar max width: 180px                        -->
<!-- ═══════════════════════════════════════════ -->

<!-- Row 1: Oil Revenue ($B/year) -->
<text x="470" y="205" class="metric-label">درآمد نفتی سالانه ($B)</text>
<text x="580" y="205" class="metric-val" fill="#2ecc71">$۶۵B</text>
<text x="860" y="205" class="metric-val" fill="#00b4d8">$۲۵۰B</text>
<text x="1140" y="205" class="metric-val" fill="#e74c3c">$۸۰B</text>
<text x="1420" y="205" class="metric-val" fill="#ff9800">$۴۵B</text>

<!-- Row 2: Sovereign Wealth Fund -->
<text x="470" y="250" class="metric-label">صندوق ثروت ملی ($T)</text>
<rect x="490" y="238" width="180" height="16" class="bar-bg"/>
<rect x="490" y="238" width="180" height="16" class="grade-a"/>
<text x="580" y="251" class="metric-val" fill="#2ecc71">$۱.۴T ✓</text>
<rect x="770" y="238" width="180" height="16" class="bar-bg"/>
<rect x="770" y="238" width="120" height="16" class="grade-b"/>
<text x="860" y="251" class="metric-val" fill="#00b4d8">$۹۲۰B</text>
<rect x="1050" y="238" width="180" height="16" class="bar-bg"/>
<rect x="1050" y="238" width="5" height="16" class="grade-f"/>
<text x="1140" y="251" class="metric-val" fill="#e74c3c">$۰! ❌</text>
<rect x="1330" y="238" width="180" height="16" class="bar-bg"/>
<rect x="1330" y="238" width="8" height="16" class="grade-c"/>
<text x="1420" y="251" class="metric-val" fill="#ff9800">$۲B</text>

<!-- Row 3: HDI -->
<text x="470" y="298" class="metric-label">شاخص توسعه انسانی (HDI)</text>
<rect x="490" y="286" width="180" height="16" class="bar-bg"/>
<rect x="490" y="286" width="176" height="16" class="grade-a"/>
<text x="580" y="299" class="metric-val">۰.۹۶۱</text>
<rect x="770" y="286" width="180" height="16" class="bar-bg"/>
<rect x="770" y="286" width="143" height="16" class="grade-b"/>
<text x="860" y="299" class="metric-val">۰.۸۷۵</text>
<rect x="1050" y="286" width="180" height="16" class="bar-bg"/>
<rect x="1050" y="286" width="110" height="16" class="grade-f"/>
<text x="1140" y="299" class="metric-val" fill="#e74c3c">۰.۶۸۶</text>
<rect x="1330" y="286" width="180" height="16" class="bar-bg"/>
<rect x="1330" y="286" width="90" height="16" class="grade-c"/>
<text x="1420" y="299" class="metric-val">۰.۵۳۵</text>

<!-- Row 4: Corruption Index -->
<text x="470" y="345" class="metric-label">شاخص فساد (CPI — ۱۰۰=پاک)</text>
<rect x="490" y="333" width="180" height="16" class="bar-bg"/>
<rect x="490" y="333" width="152" height="16" class="grade-a"/>
<text x="580" y="346" class="metric-val">۸۴ 🥇</text>
<rect x="770" y="333" width="180" height="16" class="bar-bg"/>
<rect x="770" y="333" width="86" height="16" class="grade-c"/>
<text x="860" y="346" class="metric-val">۵۳</text>
<rect x="1050" y="333" width="180" height="16" class="bar-bg"/>
<rect x="1050" y="333" width="29" height="16" class="grade-f"/>
<text x="1140" y="346" class="metric-val" fill="#e74c3c">۱۸ ❌</text>
<rect x="1330" y="333" width="180" height="16" class="bar-bg"/>
<rect x="1330" y="333" width="41" height="16" class="grade-c"/>
<text x="1420" y="346" class="metric-val">۲۵</text>

<!-- Row 5: Youth Unemployment -->
<text x="470" y="392" class="metric-label">بیکاری جوانان (%)</text>
<rect x="490" y="380" width="180" height="16" class="bar-bg"/>
<rect x="490" y="380" width="20" height="16" class="grade-a"/>
<text x="580" y="393" class="metric-val" fill="#2ecc71">۸%</text>
<rect x="770" y="380" width="180" height="16" class="bar-bg"/>
<rect x="770" y="380" width="50" height="16" class="grade-c"/>
<text x="860" y="393" class="metric-val">۲۹%</text>
<rect x="1050" y="380" width="180" height="16" class="bar-bg"/>
<rect x="1050" y="380" width="65" height="16" class="grade-f"/>
<text x="1140" y="393" class="metric-val" fill="#e74c3c">۳۶% ❌</text>
<rect x="1330" y="380" width="180" height="16" class="bar-bg"/>
<rect x="1330" y="380" width="75" height="16" class="grade-c"/>
<text x="1420" y="393" class="metric-val">۴۲%</text>

<!-- Row 6: Oil % of GDP -->
<text x="470" y="438" class="metric-label">وابستگی به نفت (% GDP)</text>
<rect x="490" y="426" width="180" height="16" class="bar-bg"/>
<rect x="490" y="426" width="30" height="16" class="grade-a"/>
<text x="580" y="439" class="metric-val" fill="#2ecc71">۱۴%</text>
<rect x="770" y="426" width="180" height="16" class="bar-bg"/>
<rect x="770" y="426" width="75" height="16" class="grade-c"/>
<text x="860" y="439" class="metric-val">۴۰%</text>
<rect x="1050" y="426" width="180" height="16" class="bar-bg"/>
<rect x="1050" y="426" width="108" height="16" class="grade-f"/>
<text x="1140" y="439" class="metric-val" fill="#e74c3c">۶۰% ❌</text>
<rect x="1330" y="426" width="180" height="16" class="bar-bg"/>
<rect x="1330" y="426" width="18" height="16" class="grade-c"/>
<text x="1420" y="439" class="metric-val">۱۰%</text>

<!-- Row 7: Oil % of Budget -->
<text x="470" y="485" class="metric-label">نفت % بودجه دولت</text>
<rect x="490" y="473" width="180" height="16" class="bar-bg"/>
<rect x="490" y="473" width="45" height="16" class="grade-a"/>
<text x="580" y="486" class="metric-val" fill="#2ecc71">۲۵%</text>
<rect x="770" y="473" width="180" height="16" class="bar-bg"/>
<rect x="770" y="473" width="105" height="16" class="grade-c"/>
<text x="860" y="486" class="metric-val">۶۲%</text>
<rect x="1050" y="473" width="180" height="16" class="bar-bg"/>
<rect x="1050" y="473" width="162" height="16" class="grade-f"/>
<text x="1140" y="486" class="metric-val" fill="#e74c3c">۹۳% ❌</text>
<rect x="1330" y="473" width="180" height="16" class="bar-bg"/>
<rect x="1330" y="473" width="90" height="16" class="grade-c"/>
<text x="1420" y="486" class="metric-val">۵۰%</text>

<!-- Row 8: Electricity (hrs/day) -->
<text x="470" y="530" class="metric-label">برق (ساعت/روز)</text>
<text x="580" y="530" class="metric-val" fill="#2ecc71">۲۴ ✓</text>
<text x="860" y="530" class="metric-val" fill="#00b4d8">۲۴ ✓</text>
<text x="1140" y="530" class="metric-val" fill="#e74c3c">۸–۱۲ ❌</text>
<text x="1420" y="530" class="metric-val" fill="#ff9800">۶–۱۰</text>

<!-- Row 9: Press Freedom Rank -->
<text x="470" y="572" class="metric-label">آزادی مطبوعات (رتبه جهانی)</text>
<text x="580" y="572" class="metric-val" fill="#2ecc71">۳ 🥇</text>
<text x="860" y="572" class="metric-val" fill="#00b4d8">۱۶۶</text>
<text x="1140" y="572" class="metric-val" fill="#e74c3c">۱۶۷</text>
<text x="1420" y="572" class="metric-val" fill="#ff9800">۱۲۳</text>

<!-- Row 10: Diversification Score -->
<text x="470" y="618" class="metric-label">تنوع اقتصادی (۰–۱۰)</text>
<rect x="490" y="606" width="180" height="16" class="bar-bg"/>
<rect x="490" y="606" width="162" height="16" class="grade-a"/>
<text x="580" y="619" class="metric-val" fill="#2ecc71">۹/۱۰</text>
<rect x="770" y="606" width="180" height="16" class="bar-bg"/>
<rect x="770" y="606" width="72" height="16" class="grade-b"/>
<text x="860" y="619" class="metric-val">۴/۱۰</text>
<rect x="1050" y="606" width="180" height="16" class="bar-bg"/>
<rect x="1050" y="606" width="18" height="16" class="grade-f"/>
<text x="1140" y="619" class="metric-val" fill="#e74c3c">۱/۱۰ ❌</text>
<rect x="1330" y="606" width="180" height="16" class="bar-bg"/>
<rect x="1330" y="606" width="54" height="16" class="grade-c"/>
