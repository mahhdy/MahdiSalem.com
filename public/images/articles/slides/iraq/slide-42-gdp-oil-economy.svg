<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
  </style>
  <linearGradient id="bg42" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0e27"/>
    <stop offset="50%" stop-color="#0d1333"/>
    <stop offset="100%" stop-color="#1a0a1e"/>
  </linearGradient>
  <filter id="sh42"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<rect width="1920" height="1080" fill="url(#bg42)"/>

<!-- Header -->
<text x="960" y="45" fill="#fff" font-size="32" font-weight="900" text-anchor="middle">اقتصاد عراق: نفرین نفت و وعده توسعه‌ای که هرگز نیامد</text>
<text x="960" y="72" fill="#d4af37" font-size="15" font-weight="400" text-anchor="middle">$۶۰۰ میلیارد درآمد نفتی ۲۰۰۳–۲۰۲۳ — کجا رفت؟</text>
<line x1="150" y1="88" x2="1770" y2="88" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ====== TOP LEFT: GDP PER CAPITA COMPARISON ====== -->
<rect x="60" y="105" width="620" height="400" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh42)"/>
<text x="370" y="135" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">💵 تولید ناخالص سرانه (PPP) — مقایسه</text>

<!-- Bar chart: GDP per capita 2023 -->
<g transform="translate(90,155)">
  <!-- UAE -->
  <rect x="0" y="0" width="45" height="220" rx="3" fill="rgba(46,204,113,0.25)"/>
  <text x="22" y="-8" fill="#2ecc71" font-size="9" font-weight="700" text-anchor="middle">$۸۸K</text>
  <text x="22" y="235" fill="rgba(255,255,255,0.5)" font-size="8" text-anchor="middle">امارات</text>

  <!-- Saudi -->
  <rect x="60" y="60" width="45" height="160" rx="3" fill="rgba(59,130,246,0.25)"/>
  <text x="82" y="52" fill="#3b82f6" font-size="9" font-weight="700" text-anchor="middle">$۵۶K</text>
  <text x="82" y="235" fill="rgba(255,255,255,0.5)" font-size="8" text-anchor="middle">سعودی</text>

  <!-- Kuwait -->
  <rect x="120" y="80" width="45" height="140" rx="3" fill="rgba(0,180,216,0.25)"/>
  <text x="142" y="72" fill="#00b4d8" font-size="9" font-weight="700" text-anchor="middle">$۴۸K</text>
  <text x="142" y="235" fill="rgba(255,255,255,0.5)" font-size="8" text-anchor="middle">کویت</text>

  <!-- Turkey -->
  <rect x="180" y="125" width="45" height="95" rx="3" fill="rgba(155,89,182,0.25)"/>
  <text x="202" y="117" fill="#9b59b6" font-size="9" font-weight="700" text-anchor="middle">$۳۵K</text>
  <text x="202" y="235" fill="rgba(255,255,255,0.5)" font-size="8" text-anchor="middle">ترکیه</text>

  <!-- Iran -->
  <rect x="240" y="160" width="45" height="60" rx="3" fill="rgba(46,204,113,0.2)"/>
  <text x="262" y="152" fill="#2ecc71" font-size="9" font-weight="700" text-anchor="middle">$۱۵K</text>
  <text x="262" y="235" fill="rgba(255,255,255,0.5)" font-size="8" text-anchor="middle">ایران</text>

  <!-- IRAQ (highlighted) -->
  <rect x="300" y="175" width="55" height="45" rx="4" fill="rgba(231,76,60,0.35)" stroke="rgba(231,76,60,0.5)" stroke-width="2"/>
  <text x="327" y="167" fill="#e74c3c" font-size="11" font-weight="900" text-anchor="middle">$۱۱K</text>
  <text x="327" y="235" fill="#e74c3c" font-size="9" font-weight="700" text-anchor="middle">عراق</text>

  <!-- Jordan -->
  <rect x="370" y="180" width="45" height="40" rx="3" fill="rgba(255,152,0,0.2)"/>
  <text x="392" y="172" fill="#ff9800" font-size="9" font-weight="700" text-anchor="middle">$۱۰K</text>
  <text x="392" y="235" fill="rgba(255,255,255,0.5)" font-size="8" text-anchor="middle">اردن</text>

  <!-- Syria -->
  <rect x="430" y="200" width="45" height="20" rx="3" fill="rgba(155,89,182,0.15)"/>
  <text x="452" y="195" fill="#9b59b6" font-size="8" font-weight="700" text-anchor="middle">$۳K</text>
  <text x="452" y="235" fill="rgba(255,255,255,0.5)" font-size="8" text-anchor="middle">سوریه</text>
</g>

<!-- Context note -->
<rect x="90" y="420" width="560" height="65" rx="8" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.12)" stroke-width="1"/>
<text x="370" y="440" fill="#e74c3c" font-size="10" font-weight="700" text-anchor="middle">⚠️ عراق با ذخایر نفتی رتبه ۵ جهان</text>
<text x="370" y="458" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">GDP سرانه‌اش ۸ برابر کمتر از امارات و ۵ برابر کمتر از کویت</text>
<text x="370" y="474" fill="rgba(255,255,255,0.4)" font-size="8" text-anchor="middle">تنها دلیل: فساد ساختاری + جنگ + سوءمدیریت</text>

<!-- ====== TOP MIDDLE: OIL DEPENDENCY DONUT ====== -->
<rect x="705" y="105" width="500" height="400" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh42)"/>
<text x="955" y="135" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">🛢️ وابستگی به نفت — نفرین منابع</text>

<!-- Donut chart -->
<circle cx="955" cy="300" r="100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="35"/>
<circle cx="955" cy="300" r="100" fill="none" stroke="#e74c3c" stroke-width="35" stroke-dasharray="597 31" stroke-dashoffset="157" opacity="0.7"/>
<circle cx="955" cy="300" r="100" fill="none" stroke="#2ecc71" stroke-width="35" stroke-dasharray="31 597" stroke-dashoffset="157" opacity="0.6"/>

<text x="955" y="290" fill="#e74c3c" font-size="36" font-weight="900" text-anchor="middle">۹۵٪</text>
<text x="955" y="315" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">درآمد نفتی</text>

<rect x="730" y="425" width="15" height="15" rx="3" fill="#e74c3c" opacity="0.7"/>
<text x="750" y="437" fill="rgba(255,255,255,0.6)" font-size="10">نفت: ۹۵% بودجه</text>
<rect x="880" y="425" width="15" height="15" rx="3" fill="#2ecc71" opacity="0.6"/>
<text x="900" y="437" fill="rgba(255,255,255,0.6)" font-size="10">غیرنفتی: ۵%</text>
<text x="955" y="465" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="middle">مقایسه: نروژ ۲۰% | امارات ۳۰% | عربستان ۴۵%</text>
<text x="955" y="480" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="middle">وعده ۲۰۰۳: اقتصاد متنوع مانند دوبی!</text>

<!-- ====== TOP RIGHT: WHERE DID \$600B GO? ====== -->
<rect x="1230" y="105" width="630" height="400" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh42)"/>
<text x="1545" y="135" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">💸 $۶۰۰B درآمد نفتی — کجا رفت؟</text>

<g transform="translate(1260,155)">
