<rect x="965" y="525" width="890" height="260" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh42)"/>
<text x="1410" y="555" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">🏚️ فقر و نابرابری</text>

