<!-- Regional disparity -->
<rect x="990" y="655" width="840" height="110" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
<text x="1410" y="680" fill="rgba(255,255,255,0.6)" font-size="11" font-weight="700" text-anchor="middle">🗺️ نابرابری منطقه‌ای</text>
