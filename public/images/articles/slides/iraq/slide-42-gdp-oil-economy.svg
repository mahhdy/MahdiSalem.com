  <text x="405" y="150" fill="#d4af37" font-size="11" font-weight="700">۴۰%</text>
</g>

<rect x="90" y="752" width="820" height="22" rx="4" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.1)" stroke-width="1"/>
<text x="500" y="767" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">هر ساله ۷۰۰,۰۰۰ جوان وارد بازار کار — فقط ۱۰۰,۰۰۰ شغل جدید ایجاد</text>

