  <rect x="0" y="0" width="145" height="48" rx="6" fill="rgba(231,76,60,0.25)"/>
  <text x="72" y="22" fill="#fff" font-size="13" font-weight="900" text-anchor="middle">$۱۵۰B+</text>
  <text x="72" y="38" fill="rgba(255,255,255,0.6)" font-size="8" text-anchor="middle">فساد مستقیم</text>
  <text x="360" y="28" fill="#e74c3c" font-size="10" font-weight="700" text-anchor="middle">۲۵%+ — دزدیده شده (قراردادهای وهمی، ارواح حقوق‌بگیر)</text>

  <rect x="0" y="56" width="570" height="48" rx="6" fill="rgba(255,152,0,0.08)" stroke="rgba(255,152,0,0.15)" stroke-width="1"/>
  <rect x="0" y="56" width="115" height="48" rx="6" fill="rgba(255,152,0,0.2)"/>
  <text x="57" y="78" fill="#fff" font-size="13" font-weight="900" text-anchor="middle">$۱۲۰B</text>
  <text x="57" y="94" fill="rgba(255,255,255,0.6)" font-size="8" text-anchor="middle">امنیت</text>
  <text x="340" y="84" fill="#ff9800" font-size="10" font-weight="700" text-anchor="middle">۲۰% — نیروهای امنیتی (بیشتر شبه‌نظامی)</text>

  <rect x="0" y="112" width="570" height="48" rx="6" fill="rgba(0,180,216,0.08)" stroke="rgba(0,180,216,0.15)" stroke-width="1"/>
  <rect x="0" y="112" width="190" height="48" rx="6" fill="rgba(0,180,216,0.2)"/>
  <text x="95" y="134" fill="#fff" font-size="13" font-weight="900" text-anchor="middle">$۲۰۰B</text>
  <text x="95" y="150" fill="rgba(255,255,255,0.6)" font-size="8" text-anchor="middle">حقوق</text>
  <text x="385" y="140" fill="#00b4d8" font-size="10" font-weight="700" text-anchor="middle">۳۳% — حقوق ۴M+ کارمند (بوروکراسی متورم)</text>

  <rect x="0" y="168" width="570" height="48" rx="6" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.15)" stroke-width="1"/>
  <rect x="0" y="168" width="55" height="48" rx="6" fill="rgba(46,204,113,0.2)"/>
  <text x="27" y="190" fill="#fff" font-size="11" font-weight="900" text-anchor="middle">$۵۰B</text>
  <text x="27" y="206" fill="rgba(255,255,255,0.5)" font-size="7" text-anchor="middle">واقعی</text>
  <text x="310" y="196" fill="#2ecc71" font-size="10" font-weight="700" text-anchor="middle">≈۸% — زیرساخت واقعی (اغلب ناقص)</text>

  <rect x="0" y="224" width="570" height="42" rx="6" fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.1)" stroke-width="1"/>
  <rect x="0" y="224" width="85" height="42" rx="6" fill="rgba(155,89,182,0.15)"/>
  <text x="42" y="248" fill="#fff" font-size="11" font-weight="900" text-anchor="middle">$۸۰B</text>
  <text x="310" y="248" fill="#9b59b6" font-size="10" font-weight="700" text-anchor="middle">≈۱۴% — یارانه سوخت + سایر</text>
</g>

<rect x="1260" y="440" width="570" height="48" rx="8" fill="rgba(231,76,60,0.1)" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>
<text x="1545" y="460" fill="#e74c3c" font-size="12" font-weight="700" text-anchor="middle">⚡ هر خانوار عراقی سهمش $۱۵۰,۰۰۰ بود — دریافتی: ≈ $۰</text>
<text x="1545" y="478" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">(\$600B ÷ 4M خانوار = سهم هر خانوار اگر عادلانه تقسیم می‌شد)</text>

