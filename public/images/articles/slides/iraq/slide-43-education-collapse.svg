<!-- ====== BOTTOM NOTE ====== -->
<rect x="60" y="715" width="1800" height="60" rx="10" fill="rgba(212,175,55,0.06)" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
<text x="960" y="740" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">📌 ملتی که نخبگانش کشته یا فراری شدند، نمی‌تواند بازسازی کند — مغز ملت، بمباران شد</text>
<text x="960" y="760" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">از UNESCO Award 1982 تا «۳.۵ میلیون کودک بی‌مدرسه» ۲۰۲۳ — این فاصله نام‌اش «آزادسازی» بود</text>

