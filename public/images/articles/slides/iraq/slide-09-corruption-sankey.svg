<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .sub { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .col-title { fill: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600; text-anchor: middle; letter-spacing: 2px; }
    .node-label { fill: #fff; font-size: 12px; font-weight: 600; }
    .node-val { fill: rgba(255,255,255,0.5); font-size: 10px; }
    .flow { opacity: 0.35; }
    .flow:hover { opacity: 0.7; }
    .stat-big { font-size: 36px; font-weight: 900; text-anchor: middle; }
    .stat-sm { fill: rgba(255,255,255,0.6); font-size: 13px; text-anchor: middle; }
    @keyframes flowPulse { 0%,100%{opacity:0.3} 50%{opacity:0.55} }
    .fp { animation: flowPulse 3s ease-in-out infinite; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <linearGradient id="gOilRev" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.6"/>
    <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0.4"/>
  </linearGradient>
  <linearGradient id="gBudget" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.5"/>
    <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
  </linearGradient>
  <linearGradient id="gCorrupt" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
    <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.5"/>
  </linearGradient>
  <linearGradient id="gDest" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.4"/>
    <stop offset="100%" style="stop-color:#8b0000;stop-opacity:0.5"/>
  </linearGradient>
</defs>

<rect class="bg" width="1920" height="1080"/>

<text x="960" y="45" class="title">آناتومی فساد: مسیر ۶۰۰ میلیارد دلار گمشده</text>
<text x="960" y="72" class="sub">نمودار جریان (سانکی): از چاه نفت تا حساب‌های بانکی لندن و بیروت</text>
<line x1="250" y1="88" x2="1670" y2="88" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ستون‌ها -->
<text x="180" y="120" class="col-title">منبع درآمد</text>
<text x="580" y="120" class="col-title">بودجه‌ی دولت</text>
<text x="980" y="120" class="col-title">مکانیزم فساد</text>
<text x="1400" y="120" class="col-title">مقصد نهایی</text>
<text x="1750" y="120" class="col-title">اثر</text>

