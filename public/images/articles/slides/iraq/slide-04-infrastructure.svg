<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .section-title { fill: #fff; font-size: 34px; font-weight: 900; text-anchor: middle; }
    .section-sub { fill: #d4af37; font-size: 17px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .bar-before { fill: rgba(46,204,113,0.6); rx: 3; }
    .bar-during { fill: rgba(231,76,60,0.6); rx: 3; }
    .bar-after { fill: rgba(0,180,216,0.6); rx: 3; }
    .bar-2023 { fill: rgba(212,175,55,0.6); rx: 3; }
    .bar-bg { fill: rgba(255,255,255,0.05); rx: 3; }
    .label { fill: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; }
    .val { font-size: 13px; font-weight: 700; }
    .legend-dot { r: 6; }
    .legend-text { fill: rgba(255,255,255,0.7); font-size: 13px; }
    .pct-change { font-size: 12px; font-weight: 700; }
    .icon { font-size: 28px; }
    .divider { stroke: rgba(255,255,255,0.06); stroke-width: 1; }
    @keyframes growBar { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .grow { animation: growBar 1.2s ease-out both; transform-origin: right center; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- عنوان -->
<text x="960" y="50" class="section-title">تخریب زیرساخت‌ها: عراق قبل و بعد از حمله</text>
<text x="960" y="80" class="section-sub">مقایسه‌ی کمّی شش‌ حوزه‌ی کلیدی زیرساختی در چهار مقطع زمانی</text>
<line x1="250" y1="98" x2="1670" y2="98" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- راهنما -->
<g transform="translate(500,115)">
  <circle cx="0" cy="0" r="6" fill="rgba(46,204,113,0.8)"/>
  <text x="15" y="5" class="legend-text">۱۹۹۰ (قبل از تحریم)</text>
  <circle cx="220" cy="0" r="6" fill="rgba(231,76,60,0.8)"/>
  <text x="235" y="5" class="legend-text">۲۰۰۲ (قبل از حمله)</text>
  <circle cx="460" cy="0" r="6" fill="rgba(0,180,216,0.8)"/>
  <text x="475" y="5" class="legend-text">۲۰۰۷ (اوج بحران)</text>
  <circle cx="700" cy="0" r="6" fill="rgba(212,175,55,0.8)"/>
  <text x="715" y="5" class="legend-text">۲۰۲۳ (وضع فعلی)</text>
</g>

<!-- ===== نوار ۱: ظرفیت تولید برق ===== -->
<!-- FIXED: max = 28000 MW → 1540px. Scale = 1540/28000 = 0.055 px/MW -->
<!-- 9500 → 522px | 4400 → 242px | 3600 → 198px | 28000 → 1540px -->
<rect x="80" y="150" width="1760" height="120" class="glass" filter="url(#sh)"/>
<text x="1790" y="175" class="icon" text-anchor="end">⚡</text>
<text x="1740" y="175" fill="#fff" font-size="18" font-weight="700" text-anchor="end">ظرفیت تولید برق (MW)</text>
<text x="1740" y="195" fill="rgba(255,255,255,0.4)" font-size="12" text-anchor="end">قبل از ۱۹۹۱: ۲۴ ساعت برق — بعد از حمله: ۴–۸ ساعت</text>
<g transform="translate(140,210)">
  <rect x="0" y="0" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="0" width="522" height="12" class="bar-before" opacity="0.6"/>
  <text x="532" y="11" class="val" fill="#2ecc71">۹,۵۰۰</text>

  <rect x="0" y="18" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="18" width="242" height="12" class="bar-during"/>
  <text x="252" y="29" class="val" fill="#e74c3c">۴,۴۰۰</text>
  <text x="360" y="29" class="pct-change" fill="#e74c3c">▼ ۵۴%</text>

  <rect x="0" y="36" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="36" width="198" height="12" class="bar-after"/>
  <text x="208" y="47" class="val" fill="#00b4d8">۳,۶۰۰</text>
  <text x="316" y="47" class="pct-change" fill="#00b4d8">▼ ۶۲%</text>

  <rect x="0" y="54" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="54" width="1540" height="12" class="bar-2023" opacity="0.7"/>
  <text x="1550" y="65" class="val" fill="#d4af37">۲۸,۰۰۰</text>
  <text x="1340" y="65" class="pct-change" fill="#d4af37">▲ ۱۹۵% (اما هنوز کمبود)</text>
</g>

<!-- ===== نوار ۲: تولید نفت ===== -->
<rect x="80" y="290" width="1760" height="120" class="glass" filter="url(#sh)"/>
<text x="1790" y="315" class="icon" text-anchor="end">🛢️</text>
<text x="1740" y="315" fill="#fff" font-size="18" font-weight="700" text-anchor="end">تولید نفت (میلیون بشکه در روز)</text>
<g transform="translate(140,350)">
  <rect x="0" y="0" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="0" width="1197" height="12" class="bar-before" opacity="0.3"/>
  <text x="1207" y="11" class="val" fill="#2ecc71">۳.۵</text>

  <rect x="0" y="18" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="18" width="855" height="12" class="bar-during"/>
  <text x="865" y="29" class="val" fill="#e74c3c">۲.۵</text>
  <text x="950" y="29" class="pct-change" fill="#e74c3c">▼ ۲۹%</text>

  <rect x="0" y="36" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="36" width="684" height="12" class="bar-after"/>
  <text x="694" y="47" class="val" fill="#00b4d8">۲.۰</text>
  <text x="780" y="47" class="pct-change" fill="#00b4d8">▼ ۴۳%</text>

  <rect x="0" y="54" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="54" width="1540" height="12" class="bar-2023" opacity="0.7"/>
  <text x="1550" y="65" class="val" fill="#d4af37">۴.۵ (رکورد)</text>
</g>

<!-- ===== نوار ۳: دسترسی به آب سالم ===== -->
<rect x="80" y="430" width="1760" height="120" class="glass" filter="url(#sh)"/>
<text x="1790" y="455" class="icon" text-anchor="end">💧</text>
<text x="1740" y="455" fill="#fff" font-size="18" font-weight="700" text-anchor="end">دسترسی به آب آشامیدنی سالم (%)</text>
<g transform="translate(140,490)">
  <rect x="0" y="0" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="0" width="1463" height="12" class="bar-before" opacity="0.3"/>
  <text x="1473" y="11" class="val" fill="#2ecc71">۹۵%</text>

  <rect x="0" y="18" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="18" width="1078" height="12" class="bar-during"/>
  <text x="1088" y="29" class="val" fill="#e74c3c">۷۰%</text>
  <text x="1170" y="29" class="pct-change" fill="#e74c3c">▼ ۲۵ واحد</text>

  <rect x="0" y="36" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="36" width="924" height="12" class="bar-after"/>
  <text x="934" y="47" class="val" fill="#00b4d8">۶۰%</text>
  <text x="1020" y="47" class="pct-change" fill="#00b4d8">▼ ۳۵ واحد</text>

  <rect x="0" y="54" width="1540" height="12" class="bar-bg"/>
  <rect x="0" y="54" width="1324" height="12" class="bar-2023" opacity="0.7"/>
  <text x="1334" y="65" class="val" fill="#d4af37">۸۶%</text>
  <text x="1420" y="65" class="pct-change" fill="#d4af37">هنوز ۹ واحد کمتر از ۱۹۹۰</text>
</g>

<!-- ===== نوار ۴: بیمارستان‌های فعال ===== -->
<rect x="80" y="570" width="860" height="120" class="glass" filter="url(#sh)"/>
<text x="910" y="595" class="icon" text-anchor="end">🏥</text>
<text x="870" y="595" fill="#fff" font-size="18" font-weight="700" text-anchor="end">بیمارستان‌های عملیاتی</text>
<g transform="translate(120,630)">
  <rect x="0" y="0" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="0" width="760" height="12" class="bar-before" opacity="0.3"/>
  <text x="770" y="11" class="val" fill="#2ecc71">۲۴۰</text>

  <rect x="0" y="18" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="18" width="475" height="12" class="bar-during"/>
  <text x="485" y="29" class="val" fill="#e74c3c">۱۵۰</text>

  <rect x="0" y="36" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="36" width="348" height="12" class="bar-after"/>
  <text x="358" y="47" class="val" fill="#00b4d8">۱۱۰</text>

  <rect x="0" y="54" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="54" width="665" height="12" class="bar-2023" opacity="0.7"/>
  <text x="675" y="65" class="val" fill="#d4af37">۲۱۰</text>
</g>

<!-- ===== نوار ۵: مدارس ===== -->
<rect x="980" y="570" width="860" height="120" class="glass" filter="url(#sh)"/>
<text x="1810" y="595" class="icon" text-anchor="end">🏫</text>
<text x="1770" y="595" fill="#fff" font-size="18" font-weight="700" text-anchor="end">مدارس عملیاتی (هزار)</text>
<g transform="translate(1020,630)">
  <rect x="0" y="0" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="0" width="676" height="12" class="bar-before" opacity="0.3"/>
  <text x="686" y="11" class="val" fill="#2ecc71">۱۶,۰۰۰</text>

  <rect x="0" y="18" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="18" width="507" height="12" class="bar-during"/>
  <text x="517" y="29" class="val" fill="#e74c3c">۱۲,۰۰۰</text>

  <rect x="0" y="36" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="36" width="422" height="12" class="bar-after"/>
  <text x="432" y="47" class="val" fill="#00b4d8">۱۰,۰۰۰</text>

  <rect x="0" y="54" width="760" height="12" class="bar-bg"/>
  <rect x="0" y="54" width="760" height="12" class="bar-2023" opacity="0.7"/>
  <text x="770" y="65" class="val" fill="#d4af37">۱۸,۰۰۰+</text>
</g>

<!-- ===== ردیف ۶: اینترنت و ارتباطات ===== -->
<rect x="80" y="710" width="1760" height="130" class="glass" filter="url(#sh)"/>
<text x="1790" y="735" class="icon" text-anchor="end">📱</text>
<text x="1740" y="735" fill="#fff" font-size="18" font-weight="700" text-anchor="end">ارتباطات و فناوری اطلاعات</text>
<text x="1740" y="755" fill="rgba(46,204,113,0.6)" font-size="12" text-anchor="end">تنها بخشی که جهش واقعی داشت</text>

<g transform="translate(140,775)">
  <text x="0" y="12" fill="rgba(255,255,255,0.5)" font-size="13">اینترنت:</text>
  <rect x="100" y="0" width="600" height="16" class="bar-bg"/>
  <rect x="100" y="0" width="1" height="16" class="bar-before"/>
  <text x="108" y="13" class="val" fill="#2ecc71">≈۰</text>
  <rect x="260" y="0" width="1" height="16" class="bar-during"/>
  <text x="268" y="13" class="val" fill="#e74c3c">۲۰K</text>
  <rect x="420" y="0" width="60" height="16" class="bar-after"/>
  <text x="488" y="13" class="val" fill="#00b4d8">۱M</text>
  <rect x="580" y="0" width="600" height="16" class="bar-2023"/>
  <text x="1190" y="13" class="val" fill="#d4af37">۲۸ میلیون کاربر</text>

  <text x="0" y="42" fill="rgba(255,255,255,0.5)" font-size="13">موبایل:</text>
  <rect x="100" y="30" width="600" height="16" class="bar-bg"/>
  <rect x="100" y="30" width="1" height="16" class="bar-before"/>
  <text x="108" y="43" class="val" fill="#2ecc71">≈۰</text>
  <rect x="260" y="30" width="1" height="16" class="bar-during"/>
  <text x="268" y="43" class="val" fill="#e74c3c">۱۰K</text>
  <rect x="420" y="30" width="160" height="16" class="bar-after"/>
  <text x="588" y="43" class="val" fill="#00b4d8">۸M</text>
  <rect x="700" y="30" width="680" height="16" class="bar-2023"/>
  <text x="1390" y="43" class="val" fill="#d4af37">۴۲ میلیون مشترک</text>
</g>

<!-- جعبه‌ی نکته -->
<rect x="80" y="870" width="1760" height="80" rx="10" fill="rgba(212,175,55,0.06)" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
<text x="960" y="900" fill="#d4af37" font-size="16" font-weight="600" text-anchor="middle">📌 نکته‌ی کلیدی: عراق ۱۹۹۰ (قبل از تحریم) در بسیاری شاخص‌ها بهتر از عراق ۲۰۲۳ بود.</text>
<text x="960" y="925" fill="rgba(255,255,255,0.5)" font-size="13" text-anchor="middle">بازسازی ۲۰ ساله فقط توانسته بخشی از خسارات ۳ دهه جنگ + تحریم + اشغال را جبران کند. تنها استثنا: ارتباطات (روند جهانی).</text>

<!-- پانوشت -->
<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 04 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۱: تخریب زیرساخت‌ها</text>
<text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">منابع: SIGIR, World Bank WDI, IEA, WHO, UNICEF, ITU | تمام ارقام مستند</text>
</svg>
