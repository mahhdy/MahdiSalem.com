<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .sub { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:12; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .nd { stroke-width:2; filter:url(#sh); }
    .nt { fill:#fff; font-size:13px; font-weight:700; text-anchor:middle; }
    .ns { fill:rgba(255,255,255,0.5); font-size:10px; text-anchor:middle; }
    .link { fill:none; stroke-width:2; opacity:0.5; }
    .lk-evolve { stroke:#fff; stroke-width:2.5; opacity:0.7; }
    .lk-cmd { stroke:#e74c3c; stroke-dasharray:none; }
    .lk-fund { stroke:#d4af37; stroke-dasharray:6,3; }
    .lk-recruit { stroke:#ff9800; }
    .lk-react { stroke:#2ecc71; stroke-dasharray:4,4; }
    .legend-line { stroke-width:2; }
    .legend-text { fill:rgba(255,255,255,0.6); font-size:11px; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .f1{animation:fadeIn 0.6s ease 0.2s both}
    .f2{animation:fadeIn 0.6s ease 0.5s both}
    .f3{animation:fadeIn 0.6s ease 0.8s both}
    .f4{animation:fadeIn 0.6s ease 1.1s both}
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <marker id="aw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="rgba(255,255,255,0.5)"/></marker>
  <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="rgba(231,76,60,0.5)"/></marker>
  <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="rgba(255,152,0,0.5)"/></marker>
  <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="rgba(212,175,55,0.5)"/></marker>
</defs>

<rect class="bg" width="1920" height="1080"/>

<text x="960" y="45" class="title">شبکه‌ی تاریکی: از زرقاوی تا بغدادی</text>
<text x="960" y="72" class="sub">نقشه‌ی ارتباطی تحول القاعده‌ی عراق به داعش — نقش زندان بوکا و نظامیان بعثی</text>
<line x1="300" y1="88" x2="1620" y2="88" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ========== گره‌ها ========== -->

<!-- داعش (مرکز) -->
<g class="f4">
  <rect x="810" y="400" width="300" height="90" rx="14" fill="rgba(10,10,10,0.95)" stroke="#fff" stroke-width="2.5" filter="url(#glow)"/>
  <text x="960" y="438" fill="#fff" font-size="26" font-weight="900" text-anchor="middle">🏴 داعش</text>
  <text x="960" y="465" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">الدولة الإسلامیة • ۲۰۱۴ • خلافت موصل تا رقه</text>
  <text x="960" y="482" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">اوج: ۱۰M جمعیت تحت کنترل • ۶۰K جنگجو • درآمد /سال</text>
</g>

<!-- زرقاوی -->
<g class="f1">
  <rect x="80" y="120" width="240" height="80" rx="12" fill="rgba(20,20,20,0.9)" stroke="#e74c3c" stroke-width="2" filter="url(#sh)"/>
  <text x="200" y="152" class="nt">ابومصعب زرقاوی</text>
  <text x="200" y="170" class="ns">اردنی • ورود ۲۰۰۳ • †۲۰۰۶</text>
  <text x="200" y="188" class="ns">مؤسس القاعده‌ی عراق (AQI)</text>
</g>

<!-- القاعده مرکزی -->
<g class="f1">
  <rect x="80" y="260" width="240" height="70" rx="10" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="200" y="290" class="nt" fill="#3b82f6">القاعده‌ی مرکزی</text>
  <text x="200" y="310" class="ns">بن‌لادن → ظواهری • افغانستان</text>
</g>

<!-- بغدادی -->
<g class="f2">
  <rect x="450" y="230" width="240" height="80" rx="12" fill="rgba(20,20,20,0.9)" stroke="#e74c3c" stroke-width="2" filter="url(#sh)"/>
  <text x="570" y="262" class="nt">ابوبکر بغدادی</text>
  <text x="570" y="280" class="ns">«خلیفه» • دکترای اسلامی</text>
  <text x="570" y="298" class="ns">زندانی بوکا ۲۰۰۴ • †۲۰۱۹</text>
</g>

<!-- حاجی بکر -->
<g class="f2">
  <rect x="450" y="100" width="240" height="80" rx="10" fill="rgba(255,152,0,0.1)" stroke="#ff9800" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570" y="130" class="nt" fill="#ff9800">حاجی بکر</text>
  <text x="570" y="148" class="ns">سرهنگ اطلاعات نظامی بعث</text>
  <text x="570" y="166" class="ns">معمار واقعی داعش • †۲۰۱۴</text>
</g>

<!-- زندان بوکا -->
<g class="f3">
  <rect x="810" y="120" width="300" height="90" rx="12" fill="rgba(128,128,128,0.12)" stroke="#888" stroke-width="2" filter="url(#sh)"/>
  <text x="960" y="150" fill="#aaa" font-size="18" font-weight="700" text-anchor="middle">🔒 زندان کمپ بوکا</text>
  <text x="960" y="172" class="ns">۲۰۰۴–۲۰۰۹ • اوج: ۲۶,۰۰۰ زندانی</text>
  <text x="960" y="190" class="ns">بغدادی + حاجی بکر + صدها فرمانده آینده</text>
  <text x="960" y="203" fill="rgba(231,76,60,0.6)" font-size="10" text-anchor="middle">«دانشگاه جهاد — جایی که جهادی و بعثی هم‌اتاقی شدند»</text>
</g>

<!-- فرمان ۲ برمر -->
<g class="f2">
  <rect x="1250" y="100" width="220" height="70" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="2" filter="url(#sh)"/>
  <text x="1360" y="130" class="nt" fill="#e74c3c">فرمان ۲ برمر</text>
  <text x="1360" y="150" class="ns">انحلال ارتش • ۴۰۰K بیکار</text>
</g>

<!-- نظامیان بعثی -->
<g class="f3">
  <rect x="1250" y="230" width="220" height="80" rx="10" fill="rgba(255,152,0,0.1)" stroke="#ff9800" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1360" y="258" class="nt" fill="#ff9800">افسران ارشد بعث</text>
  <text x="1360" y="278" class="ns">اطلاعات، ارتش، حزب</text>
  <text x="1360" y="296" class="ns">۱۷/۲۵ فرمانده ارشد داعش</text>
</g>

<!-- شبه‌نظامیان شیعه -->
<g class="f3">
  <rect x="1250" y="430" width="220" height="70" rx="10" fill="rgba(46,204,113,0.1)" stroke="#2ecc71" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1360" y="458" class="nt" fill="#2ecc71">شبه‌نظامیان شیعه</text>
  <text x="1360" y="478" class="ns">بدر • عصائب • جیش المهدی</text>
</g>

<!-- ایران -->
<g class="f3">
  <rect x="1550" y="430" width="180" height="70" rx="10" fill="rgba(46,204,113,0.08)" stroke="#2ecc71" stroke-width="1" filter="url(#sh)"/>
  <text x="1640" y="458" class="nt" fill="#2ecc71">ایران</text>
  <text x="1640" y="478" class="ns">سپاه قدس (سلیمانی)</text>
</g>

<!-- عربستان -->
<g class="f3">
  <rect x="1550" y="320" width="180" height="60" rx="10" fill="rgba(241,196,15,0.08)" stroke="#f1c40f" stroke-width="1" filter="url(#sh)"/>
  <text x="1640" y="345" class="nt" fill="#f1c40f">عربستان/خلیج</text>
  <text x="1640" y="365" class="ns">تأمین مالی غیررسمی</text>
</g>

<!-- جنگ فرقه‌ای -->
<g class="f2">
  <rect x="80" y="420" width="240" height="70" rx="10" fill="rgba(231,76,60,0.1)" stroke="rgba(231,76,60,0.4)" stroke-width="1"/>
  <text x="200" y="450" class="nt" fill="#e74c3c">💥 جنگ فرقه‌ای</text>
  <text x="200" y="470" class="ns">۲۰۰۶–۲۰۰۸ • ۶۰K+ کشته</text>
</g>

<!-- دولت اسلامی عراق (واسط) -->
<g class="f3">
  <rect x="450" y="400" width="240" height="65" rx="10" fill="rgba(20,20,20,0.8)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570" y="428" class="nt">دولت اسلامی عراق</text>
  <text x="570" y="448" class="ns">ISI • ۲۰۰۶–۲۰۱۳ • ابوعمر → بغدادی</text>
</g>

<!-- ========== خطوط ارتباطی ========== -->

<!-- زرقاوی → بغدادی (تحول) -->
<line x1="320" y1="160" x2="450" y2="260" class="lk-evolve" marker-end="url(#aw)"/>
<text x="370" y="200" fill="rgba(255,255,255,0.4)" font-size="9" transform="rotate(-20,370,200)">تحول رهبری</text>

<!-- القاعده → زرقاوی -->
<line x1="200" y1="260" x2="200" y2="200" class="link lk-cmd" marker-end="url(#ar)"/>
<text x="160" y="235" fill="rgba(231,76,60,0.5)" font-size="9">بیعت ۲۰۰۴</text>

<!-- القاعده → داعش (قطع) -->
<line x1="320" y1="295" x2="810" y2="430" class="link" stroke="#3b82f6" stroke-dasharray="3,6" opacity="0.3"/>
<text x="550" y="375" fill="rgba(59,130,246,0.4)" font-size="9" transform="rotate(-10,550,375)">قطع رابطه ۲۰۱۴ ✕</text>

<!-- حاجی بکر → داعش -->
<line x1="690" y1="140" x2="810" y2="420" class="link lk-recruit" marker-end="url(#ao)"/>
<text x="735" y="280" fill="rgba(255,152,0,0.5)" font-size="9" transform="rotate(-65,735,280)">معمار ساختار</text>

<!-- بغدادی → داعش -->
<line x1="690" y1="280" x2="810" y2="430" class="lk-evolve" marker-end="url(#aw)"/>
<text x="740" y="360" fill="rgba(255,255,255,0.4)" font-size="9" transform="rotate(-50,740,360)">رهبری</text>

<!-- بوکا → بغدادی -->
<line x1="870" y1="210" x2="660" y2="250" class="link" stroke="#888" marker-end="url(#aw)" opacity="0.4"/>
<text x="770" y="222" fill="rgba(255,255,255,0.3)" font-size="9">آشنایی در زندان</text>

<!-- بوکا → حاجی بکر -->
<line x1="840" y1="165" x2="690" y2="140" class="link" stroke="#888" marker-end="url(#aw)" opacity="0.4"/>

<!-- فرمان ۲ → نظامیان -->
<line x1="1360" y1="170" x2="1360" y2="230" class="link lk-cmd" marker-end="url(#ar)"/>
<text x="1395" y="200" fill="rgba(231,76,60,0.5)" font-size="9">بیکاری</text>

<!-- نظامیان → بوکا -->
<line x1="1250" y1="270" x2="1110" y2="165" class="link lk-recruit" marker-end="url(#ao)"/>
<text x="1195" y="205" fill="rgba(255,152,0,0.4)" font-size="9" transform="rotate(35,1195,205)">بازداشت</text>

<!-- نظامیان → داعش -->
<line x1="1250" y1="290" x2="1110" y2="430" class="link lk-recruit" marker-end="url(#ao)"/>
<text x="1195" y="370" fill="rgba(255,152,0,0.4)" font-size="9" transform="rotate(-45,1195,370)">پیوستن</text>

<!-- عربستان → داعش (مالی) -->
<line x1="1550" y1="350" x2="1110" y2="430" class="link lk-fund" marker-end="url(#ag)"/>

<!-- ایران → شبه‌نظامیان شیعه -->
<line x1="1550" y1="465" x2="1470" y2="465" class="link lk-cmd" marker-end="url(#ar)"/>

<!-- شیعه → داعش (واکنش) -->
<line x1="1250" y1="465" x2="1110" y2="450" class="link lk-react"/>
<text x="1180" y="450" fill="rgba(46,204,113,0.4)" font-size="9">واکنش فرقه‌ای</text>

<!-- جنگ فرقه‌ای → ISI -->
<line x1="320" y1="455" x2="450" y2="430" class="link lk-cmd" marker-end="url(#ar)"/>

<!-- ISI → داعش -->
<line x1="690" y1="430" x2="810" y2="440" class="lk-evolve" marker-end="url(#aw)"/>
<text x="750" y="425" fill="rgba(255,255,255,0.4)" font-size="9">تحول ۲۰۱۳</text>

<!-- ========== راهنما ========== -->
<rect x="80" y="560" width="450" height="140" class="glass"/>
<text x="305" y="585" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="700" text-anchor="middle">راهنمای خطوط</text>
<line x1="100" y1="605" x2="160" y2="605" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
<text x="170" y="610" class="legend-text">تحول / جانشینی</text>
<line x1="100" y1="625" x2="160" y2="625" stroke="#e74c3c" stroke-width="2"/>
<text x="170" y="630" class="legend-text">فرماندهی / بیعت</text>
<line x1="100" y1="645" x2="160" y2="645" stroke="#ff9800" stroke-width="2"/>
<text x="170" y="650" class="legend-text">جذب نیرو / پیوستن</text>
<line x1="100" y1="665" x2="160" y2="665" stroke="#d4af37" stroke-width="2" stroke-dasharray="6,3"/>
<text x="170" y="670" class="legend-text">تأمین مالی</text>
<line x1="100" y1="685" x2="160" y2="685" stroke="#2ecc71" stroke-width="2" stroke-dasharray="4,4"/>
<text x="170" y="690" class="legend-text">واکنش فرقه‌ای</text>

<!-- ========== تحلیل کلیدی ========== -->
<rect x="600" y="560" width="1240" height="140" class="glass"/>
<text x="1220" y="585" fill="#d4af37" font-size="16" font-weight="700" text-anchor="middle">📊 یافته‌ی کلیدی: داعش محصول سه عامل همزمان بود</text>
<g transform="translate(640,600)">
  <rect x="0" y="0" width="370" height="80" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>
  <text x="185" y="22" fill="#e74c3c" font-size="13" font-weight="700" text-anchor="middle">۱. فرمان ۲ برمر</text>
  <text x="185" y="42" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۴۰۰K نظامی مسلح و خشمگین</text>
  <text x="185" y="58" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">→ ستون فقرات نظامی داعش</text>
  <text x="185" y="74" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">۱۷ از ۲۵ فرمانده = نظامی بعث</text>
  
  <rect x="400" y="0" width="370" height="80" rx="8" fill="rgba(128,128,128,0.08)" stroke="rgba(128,128,128,0.2)" stroke-width="1"/>
  <text x="585" y="22" fill="#aaa" font-size="13" font-weight="700" text-anchor="middle">۲. زندان بوکا</text>
  <text x="585" y="42" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">جهادی + بعثی = ترکیب مرگبار</text>
  <text x="585" y="58" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">بغدادی + صدها فرمانده هم‌بند</text>
  <text x="585" y="74" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">۹ از ۱۰ فرمانده داعش = زندانی سابق</text>
  
  <rect x="800" y="0" width="370" height="80" rx="8" fill="rgba(255,152,0,0.08)" stroke="rgba(255,152,0,0.2)" stroke-width="1"/>
  <text x="985" y="22" fill="#ff9800" font-size="13" font-weight="700" text-anchor="middle">۳. سرکوب سنی‌ها (مالکی)</text>
  <text x="985" y="42" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">به‌حاشیه‌رانی سیاسی و اقتصادی</text>
  <text x="985" y="58" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">→ خشم مردمی = حمایت از داعش</text>
  <text x="985" y="74" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">سنی‌ها: «داعش بد است، مالکی بدتر»</text>
</g>

<!-- نقل‌قول -->
<rect x="80" y="730" width="1760" height="50" rx="8" fill="rgba(231,76,60,0.05)" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>
<text x="960" y="760" fill="#e74c3c" font-size="15" font-weight="500" text-anchor="middle" font-style="italic">«اگر آمریکا نبود، داعشی وجود نداشت. ما این هیولا را ساختیم.» — باراک اوباما، ۲۰۱۵ (نقل از مشاوران)</text>

<!-- تایم‌لاین سریع -->
<rect x="80" y="800" width="1760" height="120" class="glass"/>
<text x="960" y="830" fill="rgba(255,255,255,0.5)" font-size="14" text-anchor="middle">📅 تایم‌لاین فشرده: از فرمان ۲ تا خلافت</text>
<line x1="180" y1="870" x2="1740" y2="870" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
<circle cx="250" cy="870" r="6" fill="#e74c3c"/><text x="250" y="860" fill="#d4af37" font-size="10" text-anchor="middle">مه ۲۰۰۳</text><text x="250" y="895" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">فرمان ۲</text>
<circle cx="470" cy="870" r="6" fill="#ff9800"/><text x="470" y="860" fill="#d4af37" font-size="10" text-anchor="middle">۲۰۰۴</text><text x="470" y="895" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">AQI + بوکا</text>
<circle cx="700" cy="870" r="6" fill="#e74c3c"/><text x="700" y="860" fill="#d4af37" font-size="10" text-anchor="middle">۲۰۰۶</text><text x="700" y="895" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">†زرقاوی→ISI</text>
<circle cx="1000" cy="870" r="6" fill="#ff9800"/><text x="1000" y="860" fill="#d4af37" font-size="10" text-anchor="middle">۲۰۱۰</text><text x="1000" y="895" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">بغدادی رهبر</text>
<circle cx="1300" cy="870" r="6" fill="#fff"/><text x="1300" y="860" fill="#d4af37" font-size="10" text-anchor="middle">۲۰۱۳</text><text x="1300" y="895" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">ISI→ISIS</text>
<circle cx="1560" cy="870" r="10" fill="rgba(10,10,10,1)" stroke="#fff" stroke-width="2"/><text x="1560" y="860" fill="#d4af37" font-size="10" text-anchor="middle">ژوئن ۲۰۱۴</text><text x="1560" y="895" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">🏴 سقوط موصل</text>

<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 07 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۲: زایش هیولاها</text>
<text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">منابع: Reuter/Spiegel 2015, Whiteside/West Point 2016, McCants 2015, Hashim 2018, Soufan Group</text>
</svg>
