<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="3200" viewBox="0 0 2200 3200">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="45%" stop-color="#172A3A"/>
      <stop offset="100%" stop-color="#2D1B3D"/>
    </linearGradient>

    <linearGradient id="cardWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF3FA"/>
    </linearGradient>

    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6FFFA"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>

    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE8EF"/>
      <stop offset="100%" stop-color="#FDA4AF"/>
    </linearGradient>

    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF3FA"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>

    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <filter id="softShadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <marker id="arrow3" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M 0 0 L 16 8 L 0 16 z" fill="#ffffff"/>
    </marker>

    <style>
      .fo {
        font-family: Vazirmatn, Tahoma, Arial, sans-serif;
        direction: rtl;
        unicode-bidi: plaintext;
        color: #172A3A;
        box-sizing: border-box;
      }
      .title {
        font-size: 58px;
        font-weight: 900;
        line-height: 1.25;
        text-align: center;
        color: #ffffff;
      }
      .subtitle {
        font-size: 30px;
        font-weight: 600;
        line-height: 1.7;
        text-align: center;
        color: rgba(255,255,255,0.88);
      }
      .sectionTitle {
        font-size: 34px;
        font-weight: 900;
        line-height: 1.35;
        color: #172A3A;
      }
      .body {
        font-size: 23px;
        line-height: 1.75;
        color: #263849;
      }
      .small {
        font-size: 18px;
        line-height: 1.6;
        color: #34495E;
      }
      .tiny {
        font-size: 15px;
        line-height: 1.5;
        color: #34495E;
      }
      .quadTitle {
        font-size: 23px;
        font-weight: 900;
        line-height: 1.35;
        text-align: center;
      }
      .quadText {
        font-size: 16px;
        line-height: 1.45;
        text-align: center;
      }
      .scenario {
        font-size: 18px;
        font-weight: 900;
        line-height: 1.35;
        text-align: center;
      }
      .tag {
        font-size: 14px;
        line-height: 1.35;
        text-align: center;
      }
      .whiteSmall {
        font-size: 20px;
        line-height: 1.6;
        color: rgba(255,255,255,0.85);
        text-align: center;
      }
    </style>
  </defs>

  <rect width="2200" height="3200" fill="url(#bg3)"/>

  <!-- Abstract bands -->
  <path d="M0,0 C520,120 960,250 2200,120 L2200,0 Z" fill="#1F4E79" opacity="0.82"/>
  <path d="M0,250 C680,430 1220,320 2200,520 L2200,780 C1420,610 720,760 0,520 Z" fill="#0F766E" opacity="0.36"/>
  <path d="M0,1900 C700,1650 1420,1850 2200,1620 L2200,3200 L0,3200 Z" fill="#5B2A86" opacity="0.32"/>

  <!-- Title -->
  <foreignObject x="160" y="80" width="1880" height="250">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">ماتریس عدم قطعیت در گذار سیاسی ایران</div>
      <div class="subtitle">هر سناریو را باید هم‌زمان بر اساس «امید به گشایش» و «خطر تمرکز قدرت» سنجید</div>
      <div class="subtitle" style="font-size:22px;">مهدی سالم</div>
    </div>
  </foreignObject>

  <!-- Intro card -->
  <rect x="160" y="370" width="1880" height="210" rx="30" fill="url(#cardWhite)" filter="url(#shadow3)"/>
  <foreignObject x="215" y="405" width="1770" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="sectionTitle">منطق این ماتریس</div>
      <div class="body">
        پرسش اصلی این نیست که یک سناریو ذاتاً خوب یا بد است؛ پرسش این است که آن سناریو در چه شرایطی به گشایش، آزادی و بازسازی می‌انجامد و در چه شرایطی به تمرکز قدرت، سرکوب، فروپاشی یا وابستگی ختم می‌شود.
      </div>
    </div>
  </foreignObject>

  <!-- Matrix card -->
  <rect x="160" y="650" width="1880" height="1330" rx="34" fill="#ffffff" opacity="0.97" filter="url(#shadow3)"/>

  <!-- Matrix area -->
  <g transform="translate(300,800)">
    <!-- Quadrants -->
    <rect x="0" y="0" width="760" height="470" fill="#F3E8FF" opacity="0.9"/>
    <rect x="760" y="0" width="760" height="470" fill="#FCE8EF" opacity="0.9"/>
    <rect x="0" y="470" width="760" height="470" fill="#E6FFFA" opacity="0.9"/>
    <rect x="760" y="470" width="760" height="470" fill="#FFF8E1" opacity="0.95"/>

    <!-- Axes -->
    <line x1="0" y1="470" x2="1550" y2="470" stroke="#4A5568" stroke-width="5"/>
    <line x1="760" y1="940" x2="760" y2="-30" stroke="#4A5568" stroke-width="5"/>
    <line x1="1550" y1="470" x2="1520" y2="455" stroke="#4A5568" stroke-width="5"/>
    <line x1="1550" y1="470" x2="1520" y2="485" stroke="#4A5568" stroke-width="5"/>
    <line x1="760" y1="-30" x2="745" y2="0" stroke="#4A5568" stroke-width="5"/>
    <line x1="760" y1="-30" x2="775" y2="0" stroke="#4A5568" stroke-width="5"/>

    <!-- Axis labels -->
    <foreignObject x="1120" y="490" width="430" height="60">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo small" style="text-align:center;font-weight:900;">امید به گشایش بیشتر</div>
    </foreignObject>
    <foreignObject x="350" y="-95" width="820" height="60">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo small" style="text-align:center;font-weight:900;">خطر تمرکز قدرت بیشتر</div>
    </foreignObject>

    <!-- Quadrant labels -->
    <rect x="70" y="55" width="540" height="135" rx="20" fill="#ffffff" stroke="#5B2A86" stroke-width="3"/>
    <foreignObject x="95" y="75" width="490" height="95">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
        <div class="quadTitle" style="color:#5B2A86;">انسداد با قدرت متمرکز</div>
        <div class="quadText">ثبات ظاهری، سرکوب پایدار، اصلاح‌پذیری پایین</div>
      </div>
    </foreignObject>

    <rect x="920" y="55" width="540" height="135" rx="20" fill="#ffffff" stroke="#8B1E3F" stroke-width="3"/>
    <foreignObject x="945" y="75" width="490" height="95">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
        <div class="quadTitle" style="color:#8B1E3F;">گشایش اجتماعی با استبداد جدید</div>
        <div class="quadText">آزادی سبک زندگی، اما تمرکز قدرت سیاسی</div>
      </div>
    </foreignObject>

    <rect x="70" y="730" width="540" height="135" rx="20" fill="#ffffff" stroke="#0F766E" stroke-width="3"/>
    <foreignObject x="95" y="750" width="490" height="95">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
        <div class="quadTitle" style="color:#0F766E;">ثبات محدود با خطر کمتر</div>
        <div class="quadText">گشایش کم، اما امکان پرهیز از آشوب گسترده</div>
      </div>
    </foreignObject>

    <rect x="920" y="730" width="540" height="135" rx="20" fill="#ffffff" stroke="#B7791F" stroke-width="3"/>
    <foreignObject x="945" y="750" width="490" height="95">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
        <div class="quadTitle" style="color:#B7791F;">گذار نهادمند و مهارشده</div>
        <div class="quadText">گشایش سیاسی و اجتماعی همراه با محدودیت قدرت</div>
      </div>
    </foreignObject>

    <!-- Scenario points -->
    <g>
      <circle cx="300" cy="280" r="18" fill="#8B1E3F"/>
      <rect x="175" y="305" width="250" height="75" rx="14" fill="#ffffff" stroke="#8B1E3F" stroke-width="2"/>
      <foreignObject x="185" y="315" width="230" height="55">
        <div xmlns="http://www.w3.org/1999/xhtml" class="fo scenario">بقای سخت جمهوری اسلامی</div>
      </foreignObject>

      <circle cx="1160" cy="285" r="18" fill="#B7791F"/>
      <rect x="1010" y="310" width="300" height="85" rx="14" fill="#ffffff" stroke="#B7791F" stroke-width="2"/>
      <foreignObject x="1025" y="320" width="270" height="65">
        <div xmlns="http://www.w3.org/1999/xhtml" class="fo scenario">پادشاهی اقتدارگرا یا نمادمحور</div>
      </foreignObject>

      <circle cx="1245" cy="625" r="18" fill="#0F766E"/>
      <rect x="1100" y="650" width="290" height="75" rx="14" fill="#ffffff" stroke="#0F766E" stroke-width="2"/>
      <foreignObject x="1115" y="660" width="260" height="55">
        <div xmlns="http://www.w3.org/1999/xhtml" class="fo scenario">جمهوری سکولار نهادمند</div>
      </foreignObject>

      <circle cx="520" cy="620" r="18" fill="#5B2A86"/>
      <rect x="385" y="645" width="270" height="75" rx="14" fill="#ffffff" stroke="#5B2A86" stroke-width="2"/>
      <foreignObject x="400" y="655" width="240" height="55">
        <div xmlns="http://www.w3.org/1999/xhtml" class="fo scenario">اصلاح محدود از درون</div>
      </foreignObject>

      <circle cx="740" cy="885" r="18" fill="#4A5568"/>
      <rect x="590" y="775" width="300" height="80" rx="14" fill="#ffffff" stroke="#4A5568" stroke-width="2"/>
      <foreignObject x="605" y="785" width="270" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" class="fo scenario">فروپاشی یا جنگ داخلی</div>
      </foreignObject>
    </g>
  </g>

  <!-- Method / Timeline -->
  <rect x="160" y="2050" width="1880" height="430" rx="32" fill="#ffffff" opacity="0.96" filter="url(#shadow3)"/>
  <foreignObject x="215" y="2088" width="1770" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo sectionTitle" style="text-align:center;">گذار را باید در سه زمان سنجید</div>
  </foreignObject>

  <g transform="translate(270,2185)">
    <line x1="130" y1="130" x2="1480" y2="130" stroke="#CBD5E0" stroke-width="8" stroke-linecap="round"/>
    
    <circle cx="130" cy="130" r="50" fill="#EAF3FA" stroke="#1F4E79" stroke-width="5"/>
    <circle cx="805" cy="130" r="50" fill="#FFF8E1" stroke="#B7791F" stroke-width="5"/>
    <circle cx="1480" cy="130" r="50" fill="#E6FFFA" stroke="#0F766E" stroke-width="5"/>

    <foreignObject x="0" y="200" width="260" height="130">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
        <div class="scenario">پیش از گذار</div>
        <div class="tag">زبان سیاسی، ائتلاف‌ها، تحمل نقد، تخیل آینده</div>
      </div>
    </foreignObject>

    <foreignObject x="675" y="200" width="260" height="130">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
        <div class="scenario">هنگام گذار</div>
        <div class="tag">کنترل خشونت، نهادهای موقت، قانون انتقالی</div>
      </div>
    </foreignObject>

    <foreignObject x="1350" y="200" width="260" height="130">
      <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
        <div class="scenario">پس از گذار</div>
        <div class="tag">قانون اساسی، انتخابات، تفکیک قوا، تضمین حقوق</div>
      </div>
    </foreignObject>
  </g>

  <!-- Bottom conclusion -->
  <rect x="160" y="2570" width="1880" height="410" rx="34" fill="#172A3A" filter="url(#shadow3)"/>
  <foreignObject x="230" y="2630" width="1740" height="270">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title" style="font-size:42px;">اصل راهنما</div>
      <div class="whiteSmall" style="font-size:28px;line-height:1.8;">
        بدیل سیاسی را نه فقط با نام، شعار یا نماد آن، بلکه با میزان تعهدش به مهار قدرت باید سنجید:
        انتخابات آزاد، حق نقد، استقلال قضایی، حقوق برابر، رسانه‌ی آزاد، و نظارت غیرنظامی بر نیروهای مسلح.
      </div>
    </div>
  </foreignObject>

  <foreignObject x="160" y="3060" width="1880" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo" style="text-align:center;font-size:20px;color:rgba(255,255,255,0.75);">
      اینفوگرافیک تحلیلی بر اساس مقاله‌ی «مقایسه‌ی دیکتاتوری مستقر با استبداد احتمالی پس از گذار»
    </div>
  </foreignObject>
</svg>