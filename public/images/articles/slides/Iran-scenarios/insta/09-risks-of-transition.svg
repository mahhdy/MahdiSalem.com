<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE8EF"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B1E3F"/>
      <stop offset="100%" stop-color="#172A3A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#8B1E3F"/>
    </marker>
    <style>
      .fo{font-family:Vazirmatn,Tahoma,Arial,sans-serif;direction:rtl;unicode-bidi:plaintext;box-sizing:border-box;color:#172A3A}
      .title{font-size:48px;font-weight:900;line-height:1.25;text-align:center;color:white}
      .sub{font-size:23px;font-weight:600;line-height:1.55;text-align:center;color:rgba(255,255,255,.86)}
      .center{font-size:28px;font-weight:900;line-height:1.3;text-align:center;color:#8B1E3F}
      .item{font-size:17px;font-weight:900;line-height:1.35;text-align:center;color:#8B1E3F}
      .small{font-size:18px;line-height:1.5;text-align:center;color:#4A5568}
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="250" fill="url(#header)"/>
  <path d="M0,190 C360,310 720,220 1080,350 L1080,430 L0,430 Z" fill="#5B2A86" opacity="0.18"/>

  <foreignObject x="70" y="55" width="940" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">چرا تغییر می‌تواند خطرناک شود؟</div>
      <div class="sub">بدترین حالت فقط دیکتاتوری جدید نیست؛ گاهی فروپاشی دولت و جامعه بدتر است.</div>
    </div>
  </foreignObject>

  <circle cx="540" cy="535" r="112" fill="#ffffff" stroke="#8B1E3F" stroke-width="5" filter="url(#shadow)"/>
  <foreignObject x="430" y="480" width="220" height="110">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo center">خطر بازتولید استبداد</div>
  </foreignObject>

  <!-- Items -->
  <rect x="110" y="340" width="285" height="78" rx="18" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="130" y="358" width="245" height="44"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">بی‌ثباتی و فروپاشی اداری</div></foreignObject>

  <rect x="685" y="340" width="285" height="78" rx="18" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="705" y="358" width="245" height="44"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">توسعه آمرانه به جای آزادی</div></foreignObject>

  <rect x="105" y="535" width="290" height="78" rx="18" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="125" y="553" width="250" height="44"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">سرکوب مطالبات قومی و محلی</div></foreignObject>

  <rect x="685" y="535" width="290" height="78" rx="18" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="705" y="553" width="250" height="44"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">اشرافیت و شکاف طبقاتی</div></foreignObject>

  <rect x="110" y="730" width="285" height="78" rx="18" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="130" y="748" width="245" height="44"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">تمرکز قدرت در نماد پادشاهی</div></foreignObject>

  <rect x="685" y="730" width="285" height="78" rx="18" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="705" y="748" width="245" height="44"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">مداخله نظامیان در سیاست</div></foreignObject>

  <!-- Arrows -->
  <line x1="455" y1="495" x2="395" y2="415" stroke="#8B1E3F" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="625" y1="495" x2="685" y2="415" stroke="#8B1E3F" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="428" y1="540" x2="395" y2="575" stroke="#8B1E3F" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="652" y1="540" x2="685" y2="575" stroke="#8B1E3F" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="455" y1="575" x2="395" y2="730" stroke="#8B1E3F" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="625" y1="575" x2="685" y2="730" stroke="#8B1E3F" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="120" y="895" width="840" height="75" rx="22" fill="#172A3A"/>
  <foreignObject x="150" y="912" width="780" height="44">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo small" style="color:white;font-weight:800;">
      گذار بدون نهادسازی می‌تواند به آشوب، تمرکز قدرت یا استبداد تازه ختم شود.
    </div>
  </foreignObject>
</svg>
