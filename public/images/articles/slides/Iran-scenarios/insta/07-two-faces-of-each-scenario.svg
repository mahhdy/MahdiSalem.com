<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#EAF3FA"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172A3A"/>
      <stop offset="100%" stop-color="#1F4E79"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <style>
      .fo{font-family:Vazirmatn,Tahoma,Arial,sans-serif;direction:rtl;unicode-bidi:plaintext;box-sizing:border-box;color:#172A3A}
      .title{font-size:44px;font-weight:900;line-height:1.25;text-align:center;color:white}
      .sub{font-size:21px;font-weight:600;line-height:1.5;text-align:center;color:rgba(255,255,255,.86)}
      .name{font-size:20px;font-weight:900;line-height:1.25;text-align:center;color:#172A3A}
      .plus{font-size:14px;line-height:1.35;text-align:center;color:#0F766E}
      .minus{font-size:14px;line-height:1.35;text-align:center;color:#8B1E3F}
      .badgeP{display:inline-block;background:#0F766E;color:#fff;border-radius:999px;padding:1px 8px;font-weight:900;margin-left:4px}
      .badgeM{display:inline-block;background:#8B1E3F;color:#fff;border-radius:999px;padding:1px 8px;font-weight:900;margin-left:4px}
      .small{font-size:18px;line-height:1.5;text-align:center;color:#4A5568}
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="210" fill="url(#header)"/>
  <path d="M0,165 C370,270 720,190 1080,295 L1080,380 L0,380 Z" fill="#0F766E" opacity="0.22"/>

  <foreignObject x="60" y="45" width="960" height="125">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">هیچ سناریویی یک‌دست خوب یا بد نیست</div>
      <div class="sub">هر مسیر دو چهره دارد: امکان گشایش و خطر بازگشت استبداد یا بی‌ثباتی</div>
    </div>
  </foreignObject>

  <!-- Card template positions -->
  <!-- 1 -->
  <rect x="70" y="270" width="450" height="155" rx="24" fill="#ffffff" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="95" y="288" width="400" height="35"><div xmlns="http://www.w3.org/1999/xhtml" class="fo name">جمهوری سکولار</div></foreignObject>
  <rect x="90" y="330" width="190" height="72" rx="14" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <foreignObject x="102" y="342" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo plus"><span class="badgeP">+</span> عاملیت مردم و احزاب</div></foreignObject>
  <rect x="310" y="330" width="190" height="72" rx="14" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="2"/>
  <foreignObject x="322" y="342" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo minus"><span class="badgeM">−</span> بی‌ثباتی و رقابت ناسالم</div></foreignObject>

  <!-- 2 -->
  <rect x="560" y="270" width="450" height="155" rx="24" fill="#ffffff" stroke="#B7791F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="585" y="288" width="400" height="35"><div xmlns="http://www.w3.org/1999/xhtml" class="fo name">پادشاهی مشروطه</div></foreignObject>
  <rect x="580" y="330" width="190" height="72" rx="14" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <foreignObject x="592" y="342" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo plus"><span class="badgeP">+</span> نماد وحدت و انسجام ملی</div></foreignObject>
  <rect x="800" y="330" width="190" height="72" rx="14" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="2"/>
  <foreignObject x="812" y="342" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo minus"><span class="badgeM">−</span> تمرکز اقتدار و تقدیس</div></foreignObject>

  <!-- 3 -->
  <rect x="70" y="475" width="450" height="155" rx="24" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="95" y="493" width="400" height="35"><div xmlns="http://www.w3.org/1999/xhtml" class="fo name">بقای جمهوری اسلامی</div></foreignObject>
  <rect x="90" y="535" width="190" height="72" rx="14" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <foreignObject x="102" y="547" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo plus"><span class="badgeP">+</span> امکان اصلاح از درون</div></foreignObject>
  <rect x="310" y="535" width="190" height="72" rx="14" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="2"/>
  <foreignObject x="322" y="547" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo minus"><span class="badgeM">−</span> تشدید انسداد و تمامیت‌خواهی</div></foreignObject>

  <!-- 4 -->
  <rect x="560" y="475" width="450" height="155" rx="24" fill="#ffffff" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="585" y="493" width="400" height="35"><div xmlns="http://www.w3.org/1999/xhtml" class="fo name">فروپاشی و کلنگی‌شدن</div></foreignObject>
  <rect x="580" y="535" width="190" height="72" rx="14" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <foreignObject x="592" y="547" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo plus"><span class="badgeP">+</span> امکان بازسازی پس از بحران</div></foreignObject>
  <rect x="800" y="535" width="190" height="72" rx="14" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="2"/>
  <foreignObject x="812" y="547" width="166" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo minus"><span class="badgeM">−</span> دولت فروپاشیده و خشونت</div></foreignObject>

  <!-- 5 -->
  <rect x="165" y="680" width="750" height="165" rx="26" fill="#ffffff" stroke="#5B2A86" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="190" y="700" width="700" height="35"><div xmlns="http://www.w3.org/1999/xhtml" class="fo name">جنگ و مداخله‌ی خارجی</div></foreignObject>
  <rect x="205" y="750" width="315" height="72" rx="14" fill="#E6FFFA" stroke="#0F766E" stroke-width="2"/>
  <foreignObject x="222" y="762" width="281" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo plus"><span class="badgeP">+</span> امید به آزادسازی سریع و کاهش توان سرکوب</div></foreignObject>
  <rect x="560" y="750" width="315" height="72" rx="14" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="2"/>
  <foreignObject x="577" y="762" width="281" height="50"><div xmlns="http://www.w3.org/1999/xhtml" class="fo minus"><span class="badgeM">−</span> جنگ پرهزینه، وابستگی و بی‌ثباتی</div></foreignObject>

  <rect x="105" y="910" width="870" height="78" rx="22" fill="#172A3A"/>
  <foreignObject x="135" y="925" width="810" height="48">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo small" style="color:white;font-weight:800;">
      تحلیل سیاسی یعنی ندیدنِ جهان در قالب «خوب مطلق» و «بد مطلق».
    </div>
  </foreignObject>
</svg>
