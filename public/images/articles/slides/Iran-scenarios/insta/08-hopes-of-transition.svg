<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6FFFA"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#172A3A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#0F766E"/>
    </marker>
    <style>
      .fo{font-family:Vazirmatn,Tahoma,Arial,sans-serif;direction:rtl;unicode-bidi:plaintext;box-sizing:border-box;color:#172A3A}
      .title{font-size:48px;font-weight:900;line-height:1.25;text-align:center;color:white}
      .sub{font-size:23px;font-weight:600;line-height:1.55;text-align:center;color:rgba(255,255,255,.86)}
      .center{font-size:28px;font-weight:900;line-height:1.3;text-align:center;color:#0F766E}
      .item{font-size:18px;font-weight:900;line-height:1.35;text-align:center;color:#0F766E}
      .small{font-size:18px;line-height:1.5;text-align:center;color:#4A5568}
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="250" fill="url(#header)"/>
  <path d="M0,190 C360,310 720,220 1080,350 L1080,430 L0,430 Z" fill="#5B2A86" opacity="0.14"/>

  <foreignObject x="70" y="55" width="940" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">چرا تغییر می‌تواند امیدبخش باشد؟</div>
      <div class="sub">گذار می‌تواند فرصت تاریخی باشد؛ اگر با نهادسازی همراه شود.</div>
    </div>
  </foreignObject>

  <circle cx="540" cy="535" r="112" fill="#ffffff" stroke="#0F766E" stroke-width="5" filter="url(#shadow)"/>
  <foreignObject x="430" y="485" width="220" height="105">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo center">امید به گشایش</div>
  </foreignObject>

  <!-- Items -->
  <rect x="120" y="345" width="260" height="75" rx="18" fill="#ffffff" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="140" y="363" width="220" height="42"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">شکستن انحصار قدرت</div></foreignObject>

  <rect x="700" y="345" width="260" height="75" rx="18" fill="#ffffff" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="720" y="363" width="220" height="42"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">گشایش اجتماعی</div></foreignObject>

  <rect x="105" y="535" width="270" height="75" rx="18" fill="#ffffff" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="125" y="553" width="230" height="42"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">کاهش تنش خارجی</div></foreignObject>

  <rect x="705" y="535" width="270" height="75" rx="18" fill="#ffffff" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="725" y="553" width="230" height="42"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">توسعه اقتصادی</div></foreignObject>

  <rect x="120" y="725" width="260" height="75" rx="18" fill="#ffffff" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="140" y="743" width="220" height="42"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">پایان استبداد دینی</div></foreignObject>

  <rect x="700" y="725" width="260" height="75" rx="18" fill="#ffffff" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="720" y="743" width="220" height="42"><div xmlns="http://www.w3.org/1999/xhtml" class="fo item">قانون اساسی جدید</div></foreignObject>

  <!-- Arrows -->
  <line x1="455" y1="495" x2="380" y2="410" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="625" y1="495" x2="700" y2="410" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="428" y1="540" x2="375" y2="570" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="652" y1="540" x2="705" y2="570" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="455" y1="575" x2="380" y2="725" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="625" y1="575" x2="700" y2="725" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="120" y="895" width="840" height="75" rx="22" fill="#172A3A"/>
  <foreignObject x="150" y="912" width="780" height="44">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo small" style="color:white;font-weight:800;">
      تغییر می‌تواند فرصت تاریخی باشد؛ اما فرصت بدون نهاد، به‌راحتی به خطر تبدیل می‌شود.
    </div>
  </foreignObject>
</svg>
