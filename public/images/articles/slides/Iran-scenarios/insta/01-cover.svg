<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172A3A"/>
      <stop offset="55%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2D1B3D"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <marker id="arrowWhite" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#ffffff" opacity="0.86"/>
    </marker>

    <style>
      .fo {
        font-family: Vazirmatn, Tahoma, Arial, sans-serif;
        direction: rtl;
        unicode-bidi: plaintext;
        box-sizing: border-box;
        color: #172A3A;
      }
      .title {
        font-size: 54px;
        font-weight: 900;
        line-height: 1.28;
        text-align: center;
        color: #172A3A;
      }
      .sub {
        font-size: 25px;
        font-weight: 600;
        line-height: 1.6;
        text-align: center;
        color: #1F4E79;
      }
      .small {
        font-size: 18px;
        line-height: 1.5;
        text-align: center;
        color: #4A5568;
      }
      .whiteTitle {
        color: #ffffff;
        font-size: 35px;
        font-weight: 900;
        line-height: 1.25;
        text-align: center;
      }
      .whiteSmall {
        color: rgba(255,255,255,0.86);
        font-size: 16px;
        line-height: 1.5;
        text-align: center;
      }
      .tagText {
        font-size: 15px;
        font-weight: 800;
        line-height: 1.35;
        text-align: center;
        color: #172A3A;
      }
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <path d="M0,0 C260,70 510,120 1080,70 L1080,0 Z" fill="#0F766E" opacity="0.35"/>
  <path d="M0,210 C310,315 690,245 1080,350 L1080,510 C700,410 315,520 0,390 Z" fill="#0F766E" opacity="0.25"/>
  <path d="M0,760 C330,620 720,720 1080,600 L1080,1080 L0,1080 Z" fill="#8B1E3F" opacity="0.25"/>

  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <path d="M90 0 V1080"/><path d="M180 0 V1080"/><path d="M270 0 V1080"/>
    <path d="M360 0 V1080"/><path d="M450 0 V1080"/><path d="M540 0 V1080"/>
    <path d="M630 0 V1080"/><path d="M720 0 V1080"/><path d="M810 0 V1080"/>
    <path d="M900 0 V1080"/><path d="M990 0 V1080"/>
    <path d="M0 90 H1080"/><path d="M0 180 H1080"/><path d="M0 270 H1080"/>
    <path d="M0 360 H1080"/><path d="M0 450 H1080"/><path d="M0 540 H1080"/>
    <path d="M0 630 H1080"/><path d="M0 720 H1080"/><path d="M0 810 H1080"/>
    <path d="M0 900 H1080"/><path d="M0 990 H1080"/>
  </g>

  <rect x="70" y="70" width="940" height="260" rx="34" fill="#ffffff" opacity="0.96" filter="url(#shadow)"/>
  <foreignObject x="105" y="102" width="870" height="205">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">آیا هر عبور از دیکتاتوری، آزادی می‌آورد؟</div>
      <div class="sub">نقشه‌ای برای فهم آینده‌ی ایران، گذار، امید و خطر</div>
      <div class="small">بر اساس مقاله‌ای از مهدی سالم</div>
    </div>
  </foreignObject>

  <circle cx="540" cy="555" r="130" fill="rgba(255,255,255,0.12)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="540" cy="555" r="165" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-dasharray="9 10" opacity="0.36"/>

  <foreignObject x="425" y="490" width="230" height="140">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="whiteTitle">ایران</div>
      <div class="whiteSmall">در وضعیت گذار<br/>میان امکان و خطر</div>
    </div>
  </foreignObject>

  <!-- Scenario tags -->
  <rect x="75" y="445" width="220" height="68" rx="18" fill="#E6FFFA" stroke="#0F766E" stroke-width="3"/>
  <foreignObject x="88" y="458" width="194" height="42">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo tagText">جمهوری سکولار</div>
  </foreignObject>

  <rect x="785" y="445" width="220" height="68" rx="18" fill="#FFF8E1" stroke="#B7791F" stroke-width="3"/>
  <foreignObject x="798" y="458" width="194" height="42">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo tagText">پادشاهی مشروطه</div>
  </foreignObject>

  <rect x="760" y="710" width="245" height="72" rx="18" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="3"/>
  <foreignObject x="775" y="722" width="215" height="48">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo tagText">بقای جمهوری اسلامی</div>
  </foreignObject>

  <rect x="75" y="710" width="245" height="72" rx="18" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="3"/>
  <foreignObject x="90" y="722" width="215" height="48">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo tagText">فروپاشی و کلنگی‌شدن</div>
  </foreignObject>

  <rect x="365" y="845" width="350" height="75" rx="18" fill="#F3E8FF" stroke="#5B2A86" stroke-width="3"/>
  <foreignObject x="385" y="858" width="310" height="48">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo tagText">جنگ و مداخله‌ی خارجی</div>
  </foreignObject>

  <!-- Arrows -->
  <line x1="430" y1="515" x2="295" y2="485" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowWhite)"/>
  <line x1="650" y1="515" x2="785" y2="485" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowWhite)"/>
  <line x1="650" y1="610" x2="760" y2="725" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowWhite)"/>
  <line x1="430" y1="610" x2="320" y2="725" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowWhite)"/>
  <line x1="540" y1="685" x2="540" y2="845" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="7 8" marker-end="url(#arrowWhite)"/>

  <rect x="110" y="955" width="860" height="58" rx="18" fill="#ffffff" opacity="0.90"/>
  <foreignObject x="130" y="967" width="820" height="36">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo small">
      مهدی سالم | مقایسه‌ی دیکتاتوری مستقر با استبداد احتمالی
    </div>
  </foreignObject>
</svg>
