<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172A3A"/>
      <stop offset="100%" stop-color="#281A33"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M0 0 L16 8 L0 16 Z" fill="#ffffff"/>
    </marker>
    <style>
      .fo{font-family:Vazirmatn,Tahoma,Arial,sans-serif;direction:rtl;unicode-bidi:plaintext;box-sizing:border-box;color:#172A3A}
      .title{font-size:48px;font-weight:900;line-height:1.25;text-align:center;color:#ffffff}
      .sub{font-size:23px;font-weight:600;line-height:1.6;text-align:center;color:rgba(255,255,255,.85)}
      .h{font-size:29px;font-weight:900;line-height:1.35;text-align:center}
      .body{font-size:22px;line-height:1.6;color:#263849;text-align:center}
      .list{font-size:23px;line-height:1.85;color:#263849}
      .small{font-size:18px;line-height:1.5;text-align:center;color:#4A5568}
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <path d="M0,0 C300,95 640,115 1080,50 L1080,0 Z" fill="#1F4E79" opacity="0.9"/>
  <path d="M0,210 C390,360 720,270 1080,390 L1080,510 C700,420 350,550 0,420 Z" fill="#0F766E" opacity="0.25"/>

  <foreignObject x="70" y="65" width="940" height="145">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">جامعه مثل پرتاب دوباره‌ی تاس نیست</div>
      <div class="sub">سیاست تصادف خالص نیست؛ ساختار، حافظه و بازیگر خارجی دارد.</div>
    </div>
  </foreignObject>

  <rect x="95" y="270" width="390" height="310" rx="32" fill="#E6FFFA" stroke="#0F766E" stroke-width="5" filter="url(#shadow)"/>
  <foreignObject x="125" y="300" width="330" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo h" style="color:#0F766E;">تاس سالم</div>
  </foreignObject>
  <rect x="220" y="375" width="140" height="140" rx="24" fill="#ffffff" stroke="#0F766E" stroke-width="5"/>
  <circle cx="260" cy="415" r="9" fill="#0F766E"/>
  <circle cx="290" cy="445" r="9" fill="#0F766E"/>
  <circle cx="320" cy="475" r="9" fill="#0F766E"/>
  <foreignObject x="125" y="525" width="330" height="45">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo body">استقلال، تصادف، قواعد ثابت</div>
  </foreignObject>

  <line x1="495" y1="425" x2="585" y2="425" stroke="#ffffff" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="595" y="270" width="390" height="310" rx="32" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="5" filter="url(#shadow)"/>
  <foreignObject x="625" y="300" width="330" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo h" style="color:#8B1E3F;">تاس کج</div>
  </foreignObject>
  <g transform="translate(720,375) rotate(-10 70 70)">
    <rect x="0" y="0" width="140" height="140" rx="24" fill="#ffffff" stroke="#8B1E3F" stroke-width="5"/>
    <circle cx="48" cy="70" r="9" fill="#8B1E3F"/>
    <circle cx="92" cy="70" r="9" fill="#8B1E3F"/>
  </g>
  <foreignObject x="625" y="525" width="330" height="45">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo body">تاریخ، نهاد، سرکوب، مداخله</div>
  </foreignObject>

  <rect x="95" y="655" width="890" height="250" rx="30" fill="#ffffff" opacity="0.96" filter="url(#shadow)"/>
  <foreignObject x="135" y="690" width="810" height="185">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="list">
        • رویدادهای سیاسی مستقل نیستند.<br/>
        • حافظه‌ی تاریخی و نهادهای سرکوب اثر می‌گذارند.<br/>
        • شکاف‌های اجتماعی و بازیگران خارجی می‌توانند قواعد بازی را عوض کنند.
      </div>
    </div>
  </foreignObject>

  <rect x="140" y="935" width="800" height="62" rx="18" fill="#ffffff" opacity="0.90"/>
  <foreignObject x="160" y="950" width="760" height="35">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo small">
      نتیجه: بد بودن وضع موجود، به‌تنهایی اثبات نمی‌کند هر بدیلی بهتر است.
    </div>
  </foreignObject>
</svg>
