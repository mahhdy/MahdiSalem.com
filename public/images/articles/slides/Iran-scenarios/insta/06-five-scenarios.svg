<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172A3A"/>
      <stop offset="100%" stop-color="#281A33"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowWhite" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#ffffff" opacity="0.86"/>
    </marker>
    <style>
      .fo{font-family:Vazirmatn,Tahoma,Arial,sans-serif;direction:rtl;unicode-bidi:plaintext;box-sizing:border-box;color:#172A3A}
      .title{font-size:49px;font-weight:900;line-height:1.25;text-align:center;color:white}
      .sub{font-size:23px;font-weight:600;line-height:1.55;text-align:center;color:rgba(255,255,255,.86)}
      .centerTitle{font-size:34px;font-weight:900;line-height:1.25;text-align:center;color:white}
      .centerSmall{font-size:16px;line-height:1.45;text-align:center;color:rgba(255,255,255,.82)}
      .tag{font-size:20px;font-weight:900;line-height:1.35;text-align:center;color:#172A3A}
      .mini{font-size:15px;line-height:1.35;text-align:center;color:#34495E}
      .small{font-size:18px;line-height:1.5;text-align:center;color:#4A5568}
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <path d="M0,0 C320,90 650,120 1080,55 L1080,0 Z" fill="#1F4E79" opacity="0.9"/>
  <path d="M0,210 C390,340 720,260 1080,390 L1080,520 C705,420 360,545 0,420 Z" fill="#0F766E" opacity="0.25"/>
  <path d="M0,760 C350,610 720,730 1080,600 L1080,1080 L0,1080 Z" fill="#8B1E3F" opacity="0.22"/>

  <foreignObject x="70" y="62" width="940" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">آینده فقط دو گزینه ندارد</div>
      <div class="sub">ایران در میدان چند سناریوی هم‌زمان قرار دارد.</div>
    </div>
  </foreignObject>

  <circle cx="540" cy="500" r="112" fill="rgba(255,255,255,0.12)" stroke="#ffffff" stroke-width="4" filter="url(#shadow)"/>
  <circle cx="540" cy="500" r="148" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8 10" opacity="0.35"/>
  <foreignObject x="430" y="438" width="220" height="125">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="centerTitle">ایران</div>
      <div class="centerSmall">میدان سناریوهای متعارض</div>
    </div>
  </foreignObject>

  <!-- Scenario cards -->
  <rect x="75" y="270" width="270" height="112" rx="22" fill="#EAF3FA" stroke="#1F4E79" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="95" y="288" width="230" height="78">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="tag">اصلاح درونی</div>
      <div class="mini">تعدیل، توافق، کاهش تنش</div>
    </div>
  </foreignObject>

  <rect x="735" y="270" width="270" height="112" rx="22" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="755" y="288" width="230" height="78">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="tag">تشدید وضع موجود</div>
      <div class="mini">انسداد، سرکوب، امنیتی‌سازی</div>
    </div>
  </foreignObject>

  <rect x="75" y="620" width="270" height="112" rx="22" fill="#FFF8E1" stroke="#B7791F" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="95" y="638" width="230" height="78">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="tag">پادشاهی مشروطه</div>
      <div class="mini">نماد وحدت یا تمرکز قدرت؟</div>
    </div>
  </foreignObject>

  <rect x="735" y="620" width="270" height="112" rx="22" fill="#E6FFFA" stroke="#0F766E" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="755" y="638" width="230" height="78">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="tag">جمهوری سکولار</div>
      <div class="mini">حاکمیت قانون و احزاب</div>
    </div>
  </foreignObject>

  <rect x="345" y="805" width="390" height="112" rx="22" fill="#F3E8FF" stroke="#5B2A86" stroke-width="3" filter="url(#shadow)"/>
  <foreignObject x="370" y="823" width="340" height="78">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="tag">فروپاشی، جنگ یا مداخله خارجی</div>
      <div class="mini">متغیرهای پرهزینه و برهم‌زننده</div>
    </div>
  </foreignObject>

  <!-- Arrows -->
  <line x1="455" y1="445" x2="345" y2="360" stroke="#ffffff" stroke-width="2.8" marker-end="url(#arrowWhite)"/>
  <line x1="625" y1="445" x2="735" y2="360" stroke="#ffffff" stroke-width="2.8" marker-end="url(#arrowWhite)"/>
  <line x1="455" y1="555" x2="345" y2="650" stroke="#ffffff" stroke-width="2.8" marker-end="url(#arrowWhite)"/>
  <line x1="625" y1="555" x2="735" y2="650" stroke="#ffffff" stroke-width="2.8" marker-end="url(#arrowWhite)"/>
  <line x1="540" y1="612" x2="540" y2="805" stroke="#ffffff" stroke-width="2.8" stroke-dasharray="8 9" marker-end="url(#arrowWhite)"/>

  <rect x="120" y="950" width="840" height="68" rx="20" fill="#ffffff" opacity="0.92"/>
  <foreignObject x="145" y="965" width="790" height="38">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo small">
      هر سناریو هم امکان دارد، هم خطر. تحلیل سیاسی یعنی دیدن هر دو سوی ماجرا.
    </div>
  </foreignObject>
</svg>
