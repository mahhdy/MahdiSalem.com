<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FAFC"/>
      <stop offset="100%" stop-color="#EAF3FA"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172A3A"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowGreen" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M0 0 L16 8 L0 16 Z" fill="#0F766E"/>
    </marker>
    <marker id="arrowRed" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M0 0 L16 8 L0 16 Z" fill="#8B1E3F"/>
    </marker>
    <style>
      .fo{font-family:Vazirmatn,Tahoma,Arial,sans-serif;direction:rtl;unicode-bidi:plaintext;box-sizing:border-box;color:#172A3A}
      .title{font-size:47px;font-weight:900;line-height:1.25;text-align:center;color:white}
      .sub{font-size:23px;font-weight:600;line-height:1.55;text-align:center;color:rgba(255,255,255,.86)}
      .h{font-size:30px;font-weight:900;line-height:1.35;color:#172A3A}
      .body{font-size:24px;line-height:1.7;color:#263849}
      .label{font-size:24px;font-weight:900;line-height:1.35;text-align:center}
      .mini{font-size:18px;line-height:1.55;text-align:center;color:#34495E}
      .small{font-size:18px;line-height:1.5;text-align:center;color:#4A5568}
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="260" fill="url(#header)"/>
  <path d="M0,205 C360,325 700,220 1080,350 L1080,450 L0,450 Z" fill="#5B2A86" opacity="0.17"/>

  <foreignObject x="70" y="55" width="940" height="165">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="title">زبان مبارزه، آینده را می‌سازد</div>
      <div class="sub">ابزارهای امروز، فقط ابزار نیستند؛ مصالح نظم فردا هستند.</div>
    </div>
  </foreignObject>

  <rect x="95" y="330" width="890" height="185" rx="30" fill="#ffffff" stroke="#1F4E79" stroke-width="4" filter="url(#shadow)"/>
  <foreignObject x="135" y="365" width="810" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="body">
        اگر در مسیر مبارزه با استبداد، حذف، تحقیر، رهبرپرستی و نفی تکثر عادی شود، آینده‌ی دموکراتیک خودبه‌خود ساخته نمی‌شود.
      </div>
    </div>
  </foreignObject>

  <circle cx="540" cy="650" r="72" fill="#FFF8E1" stroke="#B7791F" stroke-width="5" filter="url(#shadow)"/>
  <foreignObject x="465" y="615" width="150" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo label" style="color:#B7791F;">مسیر گذار</div>
  </foreignObject>

  <rect x="95" y="740" width="390" height="165" rx="28" fill="#E6FFFA" stroke="#0F766E" stroke-width="4" filter="url(#shadow)"/>
  <foreignObject x="125" y="770" width="330" height="105">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="label" style="color:#0F766E;">نقدپذیری و تکثر</div>
      <div class="mini">قانون، گفت‌وگو، حق مخالف<br/>امکان دموکراسی</div>
    </div>
  </foreignObject>

  <rect x="595" y="740" width="390" height="165" rx="28" fill="#FCE8EF" stroke="#8B1E3F" stroke-width="4" filter="url(#shadow)"/>
  <foreignObject x="625" y="770" width="330" height="105">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo">
      <div class="label" style="color:#8B1E3F;">حذف و تقدیس</div>
      <div class="mini">رهبرپرستی، برچسب‌زنی<br/>بازتولید استبداد</div>
    </div>
  </foreignObject>

  <line x1="500" y1="705" x2="355" y2="740" stroke="#0F766E" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="580" y1="705" x2="725" y2="740" stroke="#8B1E3F" stroke-width="4" marker-end="url(#arrowRed)"/>

  <rect x="140" y="940" width="800" height="62" rx="18" fill="#172A3A"/>
  <foreignObject x="160" y="953" width="760" height="36">
    <div xmlns="http://www.w3.org/1999/xhtml" class="fo small" style="color:white;font-weight:800;">
      فرهنگ سیاسی دوران گذار، پیش‌نویس نظم آینده است.
    </div>
  </foreignObject>
</svg>
