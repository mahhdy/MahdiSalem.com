<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&amp;family=Inter:wght@400;500;600;700;800;900&amp;display=swap');

      .fa {
        font-family: "Vazirmatn", "Tahoma", sans-serif;
        direction: rtl;
        unicode-bidi: plaintext;
      }

      .en {
        font-family: "Inter", "Segoe UI", sans-serif;
        direction: ltr;
        unicode-bidi: plaintext;
      }

      .kicker {
        font-size: 18px;
        font-weight: 800;
        fill: #2563EB;
        letter-spacing: 1.2px;
      }

      .title {
        font-size: 66px;
        font-weight: 900;
        fill: #0F172A;
        letter-spacing: -1px;
      }

      .subtitle {
        font-size: 24px;
        font-weight: 700;
        fill: #334155;
      }

      .small {
        font-size: 15px;
        font-weight: 600;
        fill: #64748B;
      }

      .chip-fa {
        font-size: 15px;
        font-weight: 800;
        fill: #1E293B;
      }

      .chip-en {
        font-size: 10px;
        font-weight: 700;
        fill: #64748B;
        font-style: italic;
      }

      .node-title {
        font-size: 16px;
        font-weight: 900;
        fill: #1E293B;
      }

      .node-small {
        font-size: 11px;
        font-weight: 600;
        fill: #64748B;
      }

      .core {
        font-size: 38px;
        font-weight: 900;
        fill: #111827;
      }

      .core-en {
        font-size: 13px;
        font-weight: 700;
        fill: #64748B;
        font-style: italic;
      }

      .footer {
        font-size: 12px;
        font-weight: 700;
        fill: #64748B;
      }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="42%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>

    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="45%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>

    <linearGradient id="bluePink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>

    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#0F172A" flood-opacity="0.11"/>
    </filter>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0 L0 0 L0 42" fill="none" stroke="#CBD5E1" stroke-width="0.6" opacity="0.35"/>
    </pattern>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.55"/>

  <circle cx="80" cy="90" r="210" fill="#DBEAFE" opacity="0.42"/>
  <circle cx="1510" cy="120" r="260" fill="#DCFCE7" opacity="0.34"/>
  <circle cx="1440" cy="830" r="280" fill="#EDE9FE" opacity="0.36"/>
  <circle cx="110" cy="830" r="230" fill="#FEF3C7" opacity="0.38"/>

  <!-- Main card -->
  <g transform="translate(70,60)" filter="url(#shadow)">
    <rect x="0" y="0" width="1460" height="780" rx="46" fill="url(#hero)" stroke="#CBD5E1" stroke-width="1.4"/>
  </g>

  <!-- Top newspaper strip -->
  <g transform="translate(105,92)">
    <rect x="0" y="0" width="1390" height="52" rx="20" fill="#FFFFFF" opacity="0.82" stroke="#E2E8F0"/>
    <text x="30" y="33" class="en footer" text-anchor="start">
      MDX ARTICLE COVER · CONCEPTUAL GEOGRAPHY OF DIALOGUE · THEORY / PRACTICE / FREEDOM OF SPEECH
    </text>
    <text x="1360" y="33" class="fa footer" text-anchor="start">
      پرونده ویژه: گفتگو، گونه‌شناسی، آسیب‌شناسی، آزادی بیان و راهکارهای گفتگوی مؤثر
    </text>
  </g>

  <!-- Title block -->
  <g transform="translate(118,190)">
    <text x="760" y="0" text-anchor="end" class="en kicker">
      DIALOGUE GEOGRAPHY
    </text>

    <text x="710" y="78" text-anchor="start" class="fa title">
      جغرافیای مفهومی گفتگو
    </text>

    <text x="700" y="124" text-anchor="start" class="fa subtitle">
      گونه‌ها، موقعیت‌ها، نظریه‌ها، آزادی بیان، خطاها و راهکارهای گفتگوی مؤثر
    </text>

    <text x="760" y="165" text-anchor="start" class="fa small">
      از سکوت معنادار تا مناظره، مذاکره، درد دل، فراگفتگو و گفتگوی ترمیمی
    </text>
  </g>

  <!-- Abstract chips -->
  <g transform="translate(155,405)">
    <g transform="translate(0,0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="210" height="58" rx="29" fill="#EFF6FF" stroke="#93C5FD"/>
      <text x="190" y="26" text-anchor="start" class="fa chip-fa">ابعاد موقعیت</text>
      <text x="20" y="38" text-anchor="start" class="en chip-en">Context</text>
    </g>

    <g transform="translate(235,0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="210" height="58" rx="29" fill="#F0FDF4" stroke="#86EFAC"/>
      <text x="190" y="26" text-anchor="start" class="fa chip-fa">گونه‌شناسی</text>
      <text x="20" y="38" text-anchor="start" class="en chip-en">Taxonomy</text>
    </g>

    <g transform="translate(470,0)" filter="url(#softShadow)">
      <rect x="0" y="0" width="210" height="58" rx="29" fill="#FFF7ED" stroke="#FDBA74"/>
      <text x="190" y="26" text-anchor="start" class="fa chip-fa">آسیب‌شناسی</text>
      <text x="20" y="38" text-anchor="start" class="en chip-en">Pathology</text>
    </g>

    <g transform="translate(0,78)" filter="url(#softShadow)">
      <rect x="0" y="0" width="210" height="58" rx="29" fill="#F5F3FF" stroke="#C4B5FD"/>
      <text x="190" y="26" text-anchor="start" class="fa chip-fa">نظریه‌ها</text>
      <text x="20" y="38" text-anchor="start" class="en chip-en">Theories</text>
    </g>

    <g transform="translate(235,78)" filter="url(#softShadow)">
      <rect x="0" y="0" width="210" height="58" rx="29" fill="#FDF2F8" stroke="#F9A8D4"/>
      <text x="190" y="26" text-anchor="start" class="fa chip-fa">آزادی بیان</text>
      <text x="20" y="38" text-anchor="start" class="en chip-en">Free Speech</text>
    </g>

    <g transform="translate(470,78)" filter="url(#softShadow)">
      <rect x="0" y="0" width="210" height="58" rx="29" fill="#ECFDF5" stroke="#5EEAD4"/>
      <text x="190" y="26" text-anchor="start" class="fa chip-fa">راهکار عملی</text>
      <text x="20" y="38" text-anchor="start" class="en chip-en">Practice</text>
    </g>
  </g>

  <!-- Central radial map -->
  <g transform="translate(1135,452)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="260" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="0" cy="0" r="198" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="135" fill="#EEF2FF" stroke="#C4B5FD" stroke-width="2"/>
    <circle cx="0" cy="0" r="78" fill="url(#coreGrad)" stroke="#7C3AED" stroke-width="3"/>

    <text x="0" y="-10" text-anchor="middle" class="fa core">گفتگو</text>
    <text x="0" y="22" text-anchor="middle" class="en core-en">Dialogue</text>
    <text x="0" y="48" text-anchor="middle" class="fa small">معنا + رابطه + کنش</text>

    <text x="0" y="-215" text-anchor="middle" class="fa node-title">رسانه</text>
    <text x="215" y="5" text-anchor="middle" class="fa node-title">نیت</text>
    <text x="0" y="228" text-anchor="middle" class="fa node-title">رسمیت</text>
    <text x="-215" y="5" text-anchor="middle" class="fa node-title">قدرت</text>

    <text x="150" y="-150" text-anchor="middle" class="fa node-small">عمق</text>
    <text x="-150" y="-150" text-anchor="middle" class="fa node-small">فرهنگ</text>
    <text x="150" y="164" text-anchor="middle" class="fa node-small">هدف</text>
    <text x="-150" y="164" text-anchor="middle" class="fa node-small">قواعد</text>
  </g>

  <!-- Orbit nodes around radial map -->
  <g>
    <path d="M1135 452 C1040 345, 985 300, 920 285" fill="none" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrow)" opacity="0.85"/>
    <path d="M1135 452 C1210 330, 1270 285, 1360 275" fill="none" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrow)" opacity="0.85"/>
    <path d="M1135 452 C980 480, 920 545, 865 625" fill="none" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrow)" opacity="0.85"/>
    <path d="M1135 452 C1240 545, 1305 605, 1385 640" fill="none" stroke="#CBD5E1" stroke-width="2.2" marker-end="url(#arrow)" opacity="0.85"/>
  </g>

  <g transform="translate(820,238)" filter="url(#softShadow)">
    <rect x="0" y="0" width="245" height="72" rx="20" fill="#FFFFFF" stroke="#2563EB"/>
    <text x="220" y="28" text-anchor="start" class="fa node-title">مناظره و بحث</text>
    <text x="220" y="52" text-anchor="start" class="fa node-small">آزمون دلیل‌ها و اختلاف</text>
    <circle cx="34" cy="36" r="19" fill="#DBEAFE"/>
    <text x="34" y="43" text-anchor="middle" font-size="17">🎤</text>
  </g>

  <g transform="translate(1275,228)" filter="url(#softShadow)">
    <rect x="0" y="0" width="245" height="72" rx="20" fill="#FFFFFF" stroke="#16A34A"/>
    <text x="220" y="28" text-anchor="start" class="fa node-title">همفکری</text>
    <text x="220" y="52" text-anchor="start" class="fa node-small">ساختن راه‌حل مشترک</text>
    <circle cx="34" cy="36" r="19" fill="#DCFCE7"/>
    <text x="34" y="43" text-anchor="middle" font-size="17">💡</text>
  </g>

  <g transform="translate(760,610)" filter="url(#softShadow)">
    <rect x="0" y="0" width="270" height="72" rx="20" fill="#FFFFFF" stroke="#EF4444"/>
    <text x="245" y="28" text-anchor="start" class="fa node-title">گفتگوی ترمیمی</text>
    <text x="245" y="52" text-anchor="start" class="fa node-small">رنجش، آشتی، مسئولیت</text>
    <circle cx="34" cy="36" r="19" fill="#FEE2E2"/>
    <text x="34" y="43" text-anchor="middle" font-size="17">🕊️</text>
  </g>

  <g transform="translate(1320,625)" filter="url(#softShadow)">
    <rect x="0" y="0" width="245" height="72" rx="20" fill="#FFFFFF" stroke="#F97316"/>
    <text x="220" y="28" text-anchor="start" class="fa node-title">مذاکره</text>
    <text x="220" y="52" text-anchor="start" class="fa node-small">توافق، منفعت، تصمیم</text>
    <circle cx="34" cy="36" r="19" fill="#FFEDD5"/>
    <text x="34" y="43" text-anchor="middle" font-size="17">🤝</text>
  </g>

  <!-- Bottom quote -->
  <g transform="translate(150,690)" filter="url(#softShadow)">
    <rect x="0" y="0" width="690" height="92" rx="26" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="0" y="0" width="8" height="92" rx="4" fill="url(#bluePink)"/>
    <text x="650" y="36" text-anchor="start" class="fa subtitle" font-size="21">
      گفتگوی خوب یعنی انتخاب قالب درست برای نیاز واقعی
    </text>
    <text x="650" y="65" text-anchor="start" class="fa small">
      با حفظ حقیقت، رابطه، امنیت، آزادی بیان و امکان ترمیم
    </text>
  </g>

  <!-- Footer -->
  <g transform="translate(105,815)">
    <line x1="0" y1="0" x2="1390" y2="0" stroke="#CBD5E1"/>
    <text x="0" y="32" text-anchor="start" class="en footer">
      Cover image · 1600×900 · WebP optimized · Dialogue / Taxonomy / Free Speech / Repair
    </text>
    <text x="1390" y="32" text-anchor="start" class="fa footer">
      مناسب برای کاور مقاله، Open Graph، شبکه‌های اجتماعی و صفحه فرود
    </text>
  </g>
</svg>
