<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1250" width="1800" height="1250">
  <defs>
    <!-- =======================
         GLOBAL STYLE
    ======================== -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700;800&amp;display=swap');

      .fa {
        font-family: "Vazirmatn", "Tahoma", sans-serif;
        direction: rtl;
        unicode-bidi: plaintext;
      }

      .en {
        font-family: "Inter", "Segoe UI", sans-serif;
        direction: ltr;
        unicode-bidi: plaintext;
      }

      .title-fa {
        font-size: 43px;
        font-weight: 800;
        fill: #172033;
      }

      .subtitle-en {
        font-size: 20px;
        font-weight: 500;
        fill: #64748B;
        font-style: italic;
      }

      .small-muted {
        font-size: 14px;
        fill: #94A3B8;
      }

      .card-title {
        font-size: 20px;
        font-weight: 800;
      }

      .card-subtitle {
        font-size: 13.5px;
        font-style: italic;
        font-weight: 500;
      }

      .card-line {
        font-size: 15px;
        font-weight: 500;
        fill: #475569;
      }

      .lens-title {
        font-size: 13.5px;
        font-weight: 800;
        fill: #334155;
      }

      .lens-sub {
        font-size: 10.5px;
        fill: #64748B;
        font-style: italic;
      }

      .question {
        font-size: 17px;
        font-weight: 700;
        fill: #334155;
      }

      .question-en {
        font-size: 11.5px;
        fill: #64748B;
        font-style: italic;
      }
    </style>

    <!-- Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBFCFF"/>
      <stop offset="42%" stop-color="#F4F7FB"/>
      <stop offset="100%" stop-color="#EEF3F8"/>
    </linearGradient>

    <radialGradient id="coreGrad" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="58%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#DDE6FF"/>
    </radialGradient>

    <linearGradient id="coreStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Card gradients -->
    <linearGradient id="redCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF1F2"/>
    </linearGradient>

    <linearGradient id="amberCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFBEB"/>
    </linearGradient>

    <linearGradient id="greenCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0FDF4"/>
    </linearGradient>

    <linearGradient id="skyCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>

    <linearGradient id="violetCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>

    <linearGradient id="fuchsiaCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FDF4FF"/>
    </linearGradient>

    <linearGradient id="tealCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0FDFA"/>
    </linearGradient>

    <!-- Lens gradients -->
    <radialGradient id="lensA" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#C7D2FE" stop-opacity="0.42"/>
    </radialGradient>

    <radialGradient id="lensB" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0.45"/>
    </radialGradient>

    <radialGradient id="lensC" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#BBF7D0" stop-opacity="0.45"/>
    </radialGradient>

    <radialGradient id="lensD" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0.48"/>
    </radialGradient>

    <radialGradient id="lensE" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#FBCFE8" stop-opacity="0.44"/>
    </radialGradient>

    <radialGradient id="lensF" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#DDD6FE" stop-opacity="0.46"/>
    </radialGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.085"/>
    </filter>

    <filter id="subtleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.38
                0 0 0 0 0.40
                0 0 0 0 0.95
                0 0 0 0.25 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- =======================
       BACKGROUND
  ======================== -->
  <rect width="1800" height="1250" fill="url(#bgGrad)"/>

  <!-- Decorative soft blobs -->
  <circle cx="180" cy="170" r="150" fill="#E0F2FE" opacity="0.45"/>
  <circle cx="1620" cy="250" r="180" fill="#F5D0FE" opacity="0.28"/>
  <circle cx="1500" cy="1120" r="210" fill="#DCFCE7" opacity="0.32"/>
  <circle cx="260" cy="1060" r="170" fill="#FEF3C7" opacity="0.32"/>

  <!-- =======================
       TITLE
  ======================== -->
  <text x="900" y="68" text-anchor="middle" class="fa title-fa">جغرافیای مفهومی گفتگو</text>
  <text x="900" y="103" text-anchor="middle" class="en subtitle-en">
    Conceptual Geography of Speech, Expression &amp; Communicative Action
  </text>
  <text x="900" y="130" text-anchor="middle" class="en small-muted">
    Master Map · Central Index · v1
  </text>

  <!-- =======================
       CENTRAL ANALYTICAL LENSES
       overlapping circles around the core
  ======================== -->


  <!-- Caption for analytical lenses -->
  <g filter="url(#cardShadow)">
    <rect x="590" y="770" width="600" height="60" rx="18" fill="#FFFFFF" opacity="0.92" stroke="#E2E8F0"/>
    <text x="900" y="795" text-anchor="middle" class="fa" font-size="15" font-weight="700" fill="#334155">
      این دایره‌ها «ارجاع به کارت‌ها» نیستند؛ بلکه برش‌های تحلیلی برای گونه‌شناسی سخن‌اند.
    </text>
    <text x="900" y="815" text-anchor="middle" class="en" font-size="11.5" fill="#64748B" font-style="italic">
      Analytical lenses, not navigation numbers: different cuts through the same communicative phenomenon.
    </text>
  </g>
  <g opacity="0.96">
    <!-- Lenses: behind core -->
    <circle cx="900" cy="383" r="88" fill="url(#lensA)" stroke="#A5B4FC" stroke-width="1.5"/>
    <circle cx="1030" cy="460" r="88" fill="url(#lensB)" stroke="#7DD3FC" stroke-width="1.5"/>
    <circle cx="1030" cy="610" r="88" fill="url(#lensC)" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="900" cy="687" r="88" fill="url(#lensD)" stroke="#FCD34D" stroke-width="1.5"/>
    <circle cx="770" cy="610" r="88" fill="url(#lensE)" stroke="#F9A8D4" stroke-width="1.5"/>
    <circle cx="770" cy="460" r="88" fill="url(#lensF)" stroke="#C4B5FD" stroke-width="1.5"/>

    <!-- Lens labels -->
    <text x="900" y="370" text-anchor="middle" class="fa lens-title">تعداد طرفین</text>
    <text x="900" y="390" text-anchor="middle" class="en lens-sub">Participation Structure</text>

    <text x="1030" y="447" text-anchor="middle" class="fa lens-title">نیت و جهت‌گیری</text>
    <text x="1030" y="467" text-anchor="middle" class="en lens-sub">Intentionality</text>

    <text x="1030" y="597" text-anchor="middle" class="fa lens-title">رسمیت و زمینه</text>
    <text x="1030" y="617" text-anchor="middle" class="en lens-sub">Formality / Context</text>

    <text x="900" y="674" text-anchor="middle" class="fa lens-title">رسانه و زمان</text>
    <text x="900" y="694" text-anchor="middle" class="en lens-sub">Medium / Temporality</text>

    <text x="770" y="597" text-anchor="middle" class="fa lens-title">قدرت و جایگاه</text>
    <text x="770" y="617" text-anchor="middle" class="en lens-sub">Power Relation</text>

    <text x="770" y="447" text-anchor="middle" class="fa lens-title">عمق و ریسک</text>
    <text x="770" y="467" text-anchor="middle" class="en lens-sub">Depth / Risk</text>
  </g>
  <!-- =======================
       CORE
  ======================== -->
  <g filter="url(#softShadow)">
    <circle cx="900" cy="535" r="154" fill="url(#coreGrad)" stroke="url(#coreStroke)" stroke-width="3"/>
    <circle cx="900" cy="535" r="121" fill="none" stroke="#A5B4FC" stroke-width="1.2" stroke-dasharray="4 6" opacity="0.75"/>

    <text x="900" y="493" text-anchor="middle" class="en" font-size="24" font-weight="800" fill="#312E81">
      SPEECH · EXPRESSION
    </text>
    <text x="900" y="529" text-anchor="middle" class="fa" font-size="31" font-weight="800" fill="#1E1B4B">
      سخن، بیان، ابراز
    </text>
    <text x="900" y="559" text-anchor="middle" class="fa" font-size="18" font-weight="700" fill="#4338CA">
      و کنش ارتباطی
    </text>
    <text x="900" y="587" text-anchor="middle" class="en" font-size="13.5" fill="#6366F1" font-style="italic">
      Communicative Action
    </text>
      <text x="900" y="610" text-anchor="middle" class="en" font-size="13.5" fill="#6366F1" font-style="italic">
      kommunikatives Handeln
    </text>
        <text x="900" y="630" text-anchor="middle" class="en" font-size="13.5" fill="#6366F1" font-style="italic">
      acte communicationnel
    </text>
  </g>

  <!-- =======================
       CONNECTORS
       Curved lines passing outside the analytical circles
  ======================== -->
  <g stroke="#CBD5E1" stroke-width="1.45" fill="none" stroke-dasharray="5 7" opacity="0.75">
    <path d="M 665 500 C 520 420, 415 360, 300 325"/>
    <path d="M 810 295 C 735 250, 690 230, 610 215"/>
    <path d="M 1075 375 C 1210 335, 1335 320, 1490 330"/>
    <path d="M 1118 535 C 1270 545, 1370 555, 1510 590"/>
    <path d="M 1075 700 C 1215 795, 1325 855, 1490 920"/>
    <path d="M 900 810 C 900 870, 900 915, 900 960"/>
    <path d="M 725 700 C 600 790, 500 860, 310 920"/>
  </g>

  <!-- =======================
       CARD COMPONENTS
  ======================== -->

  <!-- Card 1: Taxonomy -->
  <g transform="translate(120,240)" filter="url(#cardShadow)">
    <rect width="380" height="190" rx="24" fill="url(#redCard)" stroke="#FCA5A5" stroke-width="2"/>
    <circle cx="330" cy="46" r="27" fill="#FEE2E2"/>
    <text x="330" y="55" text-anchor="middle" font-size="24">🌳</text>

    <text x="296" y="42" text-anchor="start" class="fa card-title" fill="#991B1B">نسخه یک · گونه‌شناسی</text>
    <text x="296" y="65" text-anchor="end" class="en card-subtitle" fill="#7F1D1D">Taxonomy · Typologie</text>
    <line x1="26" y1="88" x2="324" y2="88" stroke="#FECACA" stroke-width="1"/>

    <text x="324" y="116" text-anchor="start" class="fa card-line">• درخت کامل گونه‌ها در چند سطح</text>
    <text x="324" y="141" text-anchor="start" class="fa card-line">• بیش از چهل نوع گفتار و مکالمه</text>
    <text x="324" y="166" text-anchor="start" class="fa card-line">• طیف تقابل، رقابت، همکاری، مراقبت</text>
  </g>

  <!-- Card 2: Matrix -->
  <g transform="translate(80,520)" filter="url(#cardShadow)">
    <rect width="380" height="190" rx="24" fill="url(#amberCard)" stroke="#FCD34D" stroke-width="2"/>
    <circle cx="330" cy="46" r="27" fill="#FEF3C7"/>
    <text x="330" y="55" text-anchor="middle" font-size="24">🎛️</text>

    <text x="296" y="42" text-anchor="start" class="fa card-title" fill="#92400E">نسخه دو · ماتریس ابعاد</text>
    <text x="296" y="65" text-anchor="end" class="en card-subtitle" fill="#78350F">Dimensional Matrix · Matrix der Dimensionen</text>
    <line x1="26" y1="88" x2="324" y2="88" stroke="#FDE68A" stroke-width="1"/>

    <text x="324" y="116" text-anchor="start" class="fa card-line">• تعداد طرفین، نیت، رسمیت</text>
    <text x="324" y="141" text-anchor="start" class="fa card-line">• رسانه، همزمانی، قدرت، عمق</text>
    <text x="324" y="166" text-anchor="start" class="fa card-line">• جدول مقایسه‌ای برای گونه‌ها</text>
  </g>

  <!-- Card 3: Profile Cards -->
  <g transform="translate(1280,240)" filter="url(#cardShadow)">
    <rect width="380" height="190" rx="24" fill="url(#greenCard)" stroke="#86EFAC" stroke-width="2"/>
    <circle cx="330" cy="46" r="27" fill="#DCFCE7"/>
    <text x="330" y="55" text-anchor="middle" font-size="24">🗂️</text>

    <text x="296" y="42" text-anchor="start" class="fa card-title" fill="#166534">نسخه سه · کارت‌های پروفایل</text>
    <text x="296" y="65" text-anchor="end" class="en card-subtitle" fill="#14532D">Profile Cards · Steckbriefe</text>
    <line x1="26" y1="88" x2="324" y2="88" stroke="#BBF7D0" stroke-width="1"/>

    <text x="324" y="116" text-anchor="start" class="fa card-line">• بیست‌وچهار کارت تخصصی</text>
    <text x="324" y="141" text-anchor="start" class="fa card-line">• هدف، قواعد، شاخص موفقیت، تله‌ها</text>
    <text x="324" y="166" text-anchor="start" class="fa card-line">• مثال تاریخی، سازمانی و روزمره</text>
  </g>

  <!-- Card 4: Pathology -->
  <g transform="translate(1340,520)" filter="url(#cardShadow)">
    <rect width="380" height="190" rx="24" fill="url(#skyCard)" stroke="#7DD3FC" stroke-width="2"/>
    <circle cx="330" cy="46" r="27" fill="#E0F2FE"/>
    <text x="330" y="55" text-anchor="middle" font-size="24">🧬</text>

    <text x="296" y="42" text-anchor="start" class="fa card-title" fill="#075985">نسخه چهار · آسیب‌شناسی</text>
    <text x="296" y="65" text-anchor="end" class="en card-subtitle" fill="#0C4A6E">Pathology · Pathologie</text>
    <line x1="26" y1="88" x2="324" y2="88" stroke="#BAE6FD" stroke-width="1"/>

    <text x="324" y="116" text-anchor="start" class="fa card-line">• مغالطات، تحریف‌ها، بازی‌های زبانی</text>
    <text x="324" y="141" text-anchor="start" class="fa card-line">• انحراف هر گونه به نسخه ناسالم خود</text>
    <text x="324" y="166" text-anchor="start" class="fa card-line">• از گفت‌وگو تا جدل، سلطه و گسست</text>
  </g>

  <!-- Card 5: Theory -->
  <g transform="translate(1280,840)" filter="url(#cardShadow)">
    <rect width="380" height="190" rx="24" fill="url(#violetCard)" stroke="#C4B5FD" stroke-width="2"/>
    <circle cx="330" cy="46" r="27" fill="#EDE9FE"/>
    <text x="330" y="55" text-anchor="middle" font-size="24">📚</text>

    <text x="296" y="42" text-anchor="start" class="fa card-title" fill="#5B21B6">نسخه پنج · چارچوب نظری</text>
    <text x="296" y="65" text-anchor="end" class="en card-subtitle" fill="#4C1D95">Theoretical Frame · cadre théorique</text>
    <line x1="46" y1="88" x2="324" y2="88" stroke="#DDD6FE" stroke-width="1"/>

    <text x="324" y="116" text-anchor="start" class="fa card-line">• هابرماس، بوبر، بوهم، گادامر</text>
    <text x="324" y="141" text-anchor="start" class="fa card-line">• گرایس، آستین، سرل، روزنبرگ</text>
    <text x="324" y="166" text-anchor="start" class="fa card-line">• از کنش گفتاری تا کنش ارتباطی</text>
  </g>

  <!-- Card 6: Persian-Islamic Tradition -->
  <g transform="translate(690,840)" filter="url(#cardShadow)">
    <rect width="380" height="190" rx="24" fill="url(#fuchsiaCard)" stroke="#F0ABFC" stroke-width="2" stroke-dasharray="6 4"/>
    <circle cx="320" cy="46" r="27" fill="#FAE8FF"/>
    <text x="320" y="55" text-anchor="middle" font-size="24">🕌</text>

    <text x="286" y="42" text-anchor="start" class="fa card-title" fill="#86198F">نسخه شش · سنت ایرانی-اسلامی</text>
    <text x="286" y="65" text-anchor="end" class="en card-subtitle" fill="#701A75">Persian-Islamic Tradition</text>
    <line x1="26" y1="88" x2="324" y2="88" stroke="#F5D0FE" stroke-width="1"/>

    <text x="324" y="116" text-anchor="start" class="fa card-line">• مناظره، محاجّه، مباهله، مناجات</text>
    <text x="324" y="141" text-anchor="start" class="fa card-line">• مرید و مراد، شطح، وعظ، مجلس</text>
    <text x="324" y="166" text-anchor="start" class="fa card-line">• کارت جانبی؛ نه محور اصلی نقشه</text>
  </g>

  <!-- Card 7: Decision Flow -->
  <g transform="translate(120,840)" filter="url(#cardShadow)">
    <rect width="380" height="190" rx="24" fill="url(#tealCard)" stroke="#5EEAD4" stroke-width="2"/>
    <circle cx="330" cy="46" r="27" fill="#CCFBF1"/>
    <text x="330" y="55" text-anchor="middle" font-size="24">🧭</text>

    <text x="296" y="42" text-anchor="start" class="fa card-title" fill="#115E59">نسخه هفت · فلوچارت انتخاب</text>
    <text x="296" y="65" text-anchor="end" class="en card-subtitle" fill="#134E4A">Decision Flowchart · Entscheidungsbaum</text>
    <line x1="46" y1="88" x2="324" y2="88" stroke="#99F6E4" stroke-width="1"/>

    <text x="324" y="116" text-anchor="start" class="fa card-line">• چه نوع گفت‌وگویی لازم دارم؟</text>
    <text x="324" y="141" text-anchor="start" class="fa card-line">• اقناع، حل اختلاف، درمان، یادگیری؟</text>
    <text x="324" y="166" text-anchor="start" class="fa card-line">• راهنمای عملی برای انتخاب فرم مناسب</text>
  </g>

  <!-- =======================
       ENGAGEMENT QUESTIONS
  ======================== -->
  <g filter="url(#cardShadow)">
    <rect x="250" y="1040" width="1150" height="122" rx="30" fill="#FFFFFF" opacity="0.92" stroke="#E2E8F0"/>
    <text x="900" y="1073" text-anchor="middle" class="fa" font-size="20" font-weight="800" fill="#1E293B">
      پرسش‌هایی برای ورود به نسخه‌های تفصیلی
    </text>

    <g>
      <circle cx="1330" cy="1114" r="9" fill="#FCA5A5"/>
      <text x="1312" y="1120" text-anchor="start" class="fa question">چه زمانی «گفتگو» به «جدل» تبدیل می‌شود؟</text>
      <text x="1312" y="1140" text-anchor="end" class="en question-en">When does dialogue collapse into verbal combat?</text>
    </g>

    <g>
      <circle cx="965" cy="1114" r="9" fill="#86EFAC"/>
      <text x="947" y="1120" text-anchor="start" class="fa question">آیا مذاکره همیشه اخلاقی‌تر از رقابت است؟</text>
      <text x="947" y="1140" text-anchor="end" class="en question-en">Is negotiation always more ethical than competition?</text>
    </g>

    <g>
      <circle cx="610" cy="1114" r="9" fill="#7DD3FC"/>
      <text x="592" y="1120" text-anchor="start" class="fa question">چگونه سکوت می‌تواند بخشی از سخن باشد؟</text>
      <text x="592" y="1140" text-anchor="end" class="en question-en">How can silence function as speech?</text>
    </g>
  </g>

  <!-- =======================
       FOOTER
  ======================== -->
  <line x1="120" y1="1190" x2="1680" y2="1190" stroke="#E2E8F0" stroke-width="1"/>

  <text x="120" y="1216" text-anchor="end" class="fa small-muted">
    طراحی بر اساس نمودار اولیه حسین بیات · بازطراحی و توسعه مفهومی
  </text>

  <text x="1680" y="1216" text-anchor="end" class="en small-muted">
    Conceptual Geography of Conversation · Master Map v1
  </text>
</svg>