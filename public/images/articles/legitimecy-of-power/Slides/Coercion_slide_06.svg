<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Tahoma, Arial, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="gold6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg6)"/>
  <rect x="0" y="0" width="1080" height="5" fill="url(#gold6)"/>

  <!-- Header -->
  <text x="540" y="65" text-anchor="middle" fill="url(#gold6)" font-size="36" font-weight="bold" direction="rtl">👁 دو عینک، دو معیار</text>
  <text x="540" y="100" text-anchor="middle" fill="#8899aa" font-size="20" direction="rtl">نگرش «خودی‌محور»: پنهان‌ترین دوگانه‌ی اخلاقی</text>

  <!-- Two lenses visual -->
  <!-- Lens 1: Strict -->
  <g transform="translate(280,230)">
    <ellipse rx="200" ry="100" fill="none" stroke="#e63946" stroke-width="3" opacity="0.6"/>
    <ellipse rx="180" ry="85" fill="#e63946" opacity="0.05"/>
    <text x="0" y="-30" text-anchor="middle" fill="#e63946" font-size="50">🔍</text>
    <text x="0" y="10" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold" direction="rtl">عینک سخت‌گیرانه</text>
    <text x="0" y="40" text-anchor="middle" fill="#aab" font-size="16" direction="rtl">رفتار با «شهروندان خود»</text>
    <text x="0" y="65" text-anchor="middle" fill="#e63946" font-size="15" direction="rtl">← اگر بد باشد: «شرور»</text>
  </g>

  <!-- Lens 2: Lenient -->
  <g transform="translate(800,230)">
    <ellipse rx="200" ry="100" fill="none" stroke="#457b9d" stroke-width="3" opacity="0.6"/>
    <ellipse rx="180" ry="85" fill="#457b9d" opacity="0.05"/>
    <text x="0" y="-30" text-anchor="middle" fill="#457b9d" font-size="50">🔍</text>
    <text x="0" y="10" text-anchor="middle" fill="#89CFF0" font-size="20" font-weight="bold" direction="rtl">عینک سهل‌گیرانه</text>
    <text x="0" y="40" text-anchor="middle" fill="#aab" font-size="16" direction="rtl">رفتار با «غیرشهروندان / بیگانه‌ها»</text>
    <text x="0" y="65" text-anchor="middle" fill="#457b9d" font-size="15" direction="rtl">← اگر بد باشد: «ناگوار، ولی…»</text>
  </g>

  <!-- VS -->
  <text x="540" y="240" text-anchor="middle" fill="#fca311" font-size="30" font-weight="bold">VS</text>

  <!-- Concrete examples -->
  <text x="540" y="400" text-anchor="middle" fill="url(#gold6)" font-size="24" font-weight="bold" direction="rtl">نمونه‌های عینی</text>

  <!-- Example cards -->
  <!-- Guantanamo -->
  <g transform="translate(540,460)">
    <rect x="-460" y="-15" width="920" height="110" rx="12" fill="#1b2838" stroke="#e63946" stroke-width="1"/>
    <text x="400" y="15" text-anchor="middle" fill="#fca311" font-size="18" font-weight="bold" direction="rtl">گوانتانامو</text>
    <text x="0" y="15" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">۷۷۹ غیرشهروند، ۲۰+ سال بازداشت بدون محاکمه، شکنجه‌ی مستند</text>
    <text x="0" y="45" text-anchor="middle" fill="#457b9d" font-size="15" direction="rtl">اگر ۷۷۹ شهروند آمریکایی بودند ← سقوط حکومت</text>
    <text x="0" y="72" text-anchor="middle" fill="#e63946" font-size="15" direction="rtl">اما غیرشهروندند ← «اقدام امنیتی استثنایی»</text>
  </g>

  <!-- Iraq sanctions -->
  <g transform="translate(540,600)">
    <rect x="-460" y="-15" width="920" height="110" rx="12" fill="#1b2838" stroke="#e63946" stroke-width="1"/>
    <text x="400" y="15" text-anchor="middle" fill="#fca311" font-size="18" font-weight="bold" direction="rtl">تحریم عراق</text>
    <text x="0" y="15" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">مرگ ~۵۰۰,۰۰۰ کودک عراقی | آلبرایت: «ارزشش را داشت»</text>
    <text x="0" y="45" text-anchor="middle" fill="#457b9d" font-size="15" direction="rtl">اگر ۵۰۰,۰۰۰ کودک آمریکایی بودند ← قابل تصور هم نبود</text>
    <text x="0" y="72" text-anchor="middle" fill="#e63946" font-size="15" direction="rtl">اما عراقی‌اند ← «هزینه‌ی قابل‌قبول سیاست خارجی»</text>
  </g>

  <!-- Drone strikes -->
  <g transform="translate(540,740)">
    <rect x="-460" y="-15" width="920" height="110" rx="12" fill="#1b2838" stroke="#e63946" stroke-width="1"/>
    <text x="400" y="15" text-anchor="middle" fill="#fca311" font-size="18" font-weight="bold" direction="rtl">حملات پهپادی</text>
    <text x="0" y="15" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">+۱۴,۰۰۰ حمله | صدها غیرنظامی کشته در پاکستان، یمن، سومالی</text>
    <text x="0" y="45" text-anchor="middle" fill="#457b9d" font-size="15" direction="rtl">ترور ۱ شهروند آمریکایی (العولقی) ← بحران حقوقی</text>
    <text x="0" y="72" text-anchor="middle" fill="#e63946" font-size="15" direction="rtl">ترور صدها غیرشهروند ← فقط «آمار عملیاتی»</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(540,920)">
    <rect x="-420" y="-20" width="840" height="120" rx="15" fill="#fca311" opacity="0.08" stroke="#fca311" stroke-width="2"/>
    <text x="0" y="15" text-anchor="middle" fill="#fca311" font-size="26" font-weight="bold" direction="rtl">💡 نتیجه</text>
    <text x="0" y="55" text-anchor="middle" fill="#e8e8e8" font-size="19" direction="rtl">ارزش جان انسان نباید تابع پاسپورت او باشد</text>
    <text x="0" y="85" text-anchor="middle" fill="#aab" font-size="17" direction="rtl">مرز شهروندی ≠ مرز اخلاقی</text>
  </g>

  <!-- Quote -->
  <g transform="translate(540,1090)">
    <text x="0" y="0" text-anchor="middle" fill="#6c757d" font-size="16" font-style="italic" direction="rtl">«اگر حکومتی زور خود را بر بیگانه اعمال کند نه شهروند،</text>
    <text x="0" y="28" text-anchor="middle" fill="#6c757d" font-size="16" font-style="italic" direction="rtl">این تعریف «امپراتوری» است، نه «دموکراسی»»</text>
  </g>

  <text x="540" y="1260" text-anchor="middle" fill="#fca311" font-size="18" direction="rtl">◀ ادامه</text>
  <text x="540" y="1290" text-anchor="middle" fill="#556" font-size="14" direction="rtl">۶ از ۱۰</text>
  <rect x="0" y="1345" width="1080" height="5" fill="url(#gold6)"/>
</svg>