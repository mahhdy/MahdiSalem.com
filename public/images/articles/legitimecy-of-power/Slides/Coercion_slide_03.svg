<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Tahoma, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
    <linearGradient id="blue3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#457b9d"/>
      <stop offset="100%" stop-color="#1d3557"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg3)"/>
  <rect x="0" y="0" width="1080" height="5" fill="url(#gold3)"/>

  <!-- Header -->
  <rect x="0" y="20" width="1080" height="80" fill="url(#blue3)" opacity="0.6"/>
  <text x="540" y="72" text-anchor="middle" fill="#fff" font-size="38" font-weight="bold" direction="rtl">🇺🇸 ایالات متحده آمریکا: پرونده‌ی زور</text>

  <!-- Big stat circles -->
  <g transform="translate(180,210)">
    <circle r="85" fill="#457b9d" opacity="0.2"/>
    <circle r="70" fill="#457b9d" opacity="0.3"/>
    <text x="0" y="-10" text-anchor="middle" fill="#89CFF0" font-size="48" font-weight="bold">+۷۵۰</text>
    <text x="0" y="25" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">پایگاه نظامی</text>
    <text x="0" y="48" text-anchor="middle" fill="#8899aa" font-size="14" direction="rtl">در ۸۰ کشور جهان</text>
  </g>

  <g transform="translate(540,210)">
    <circle r="85" fill="#457b9d" opacity="0.2"/>
    <circle r="70" fill="#457b9d" opacity="0.3"/>
    <text x="0" y="-10" text-anchor="middle" fill="#89CFF0" font-size="48" font-weight="bold">۸۱</text>
    <text x="0" y="25" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">دخالت در انتخابات</text>
    <text x="0" y="48" text-anchor="middle" fill="#8899aa" font-size="14" direction="rtl">۱۹۴۶–۲۰۰۰</text>
  </g>

  <g transform="translate(900,210)">
    <circle r="85" fill="#457b9d" opacity="0.2"/>
    <circle r="70" fill="#457b9d" opacity="0.3"/>
    <text x="0" y="-10" text-anchor="middle" fill="#89CFF0" font-size="48" font-weight="bold">$۸T</text>
    <text x="0" y="25" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">هزینه جنگ‌ها</text>
    <text x="0" y="48" text-anchor="middle" fill="#8899aa" font-size="14" direction="rtl">پس از ۱۱ سپتامبر</text>
  </g>

  <!-- Timeline of interventions -->
  <text x="540" y="360" text-anchor="middle" fill="url(#gold3)" font-size="26" font-weight="bold" direction="rtl">نمونه‌های مداخله و زورگویی</text>
  
  <!-- Timeline line -->
  <line x1="100" y1="400" x2="100" y2="1100" stroke="#457b9d" stroke-width="3" opacity="0.4"/>

  <!-- Timeline items -->
  <g transform="translate(100,430)">
    <circle r="10" fill="#457b9d"/>
    <text x="30" y="-15" fill="#fca311" font-size="22" font-weight="bold" direction="rtl">۱۸۴۶</text>
    <text x="630" y="20" fill="#e8e8e8" font-size="24" direction="rtl">جنگ با مکزیک — الحاق نیمی از خاک مکزیک</text>
  </g>

  <g transform="translate(100,500)">
    <circle r="10" fill="#457b9d"/>
    <text x="30" y="-15" fill="#fca311" font-size="22" font-weight="bold" direction="rtl">۱۸۹۸</text>
    <text x="630" y="20" fill="#e8e8e8" font-size="24" direction="rtl">الحاق هاوایی — سرنگونی ملکه لیلیئوکالانی</text>
  </g>

  <g transform="translate(100,570)">
    <circle r="10" fill="#e63946"/>
    <text x="30" y="-15" fill="#fca311" font-size="22" font-weight="bold" direction="rtl">۱۹۵۳</text>
    <text x="630" y="20" fill="#e8e8e8" font-size="24" direction="rtl">کودتا علیه مصدق (ایران) — بازگرداندن شاه</text>
  </g>

  <g transform="translate(100,640)">
    <circle r="10" fill="#457b9d"/>
    <text x="30" y="-15" fill="#fca311" font-size="22" font-weight="bold" direction="rtl">۱۹۷۳</text>
    <text x="630" y="20" fill="#e8e8e8" font-size="24" direction="rtl">کودتای شیلی — سرنگونی آلنده، ۱۷ سال دیکتاتوری</text>
  </g>

  <g transform="translate(100,710)">
    <circle r="10" fill="#e63946"/>
    <text x="30" y="-15" fill="#fca311" font-size="22" font-weight="bold" direction="rtl">۲۰۰۳</text>
    <text x="630" y="20" fill="#e8e8e8" font-size="24" direction="rtl">حمله به عراق — اطلاعات جعلی، ۵۰۰,۰۰۰+ کشته</text>
  </g>

  <g transform="translate(100,780)">
    <circle r="10" fill="#457b9d"/>
    <text x="60" y="-15" fill="#fca311" font-size="22" font-weight="bold" direction="rtl">۲۰۰۱–۲۰۲۴</text>
    <text x="630" y="20" fill="#e8e8e8" font-size="24" direction="rtl">+۱۴,۰۰۰ حمله پهپادی — صدها غیرنظامی کشته</text>
  </g>

  <!-- Label box -->
  <g transform="translate(540,900)">
    <rect x="-400" y="-15" width="800" height="50" rx="25" fill="#457b9d" opacity="0.2" stroke="#457b9d" stroke-width="2"/>
    <text x="0" y="18" text-anchor="middle" fill="#89CFF0" font-size="24" font-weight="bold" direction="rtl">برچسب در گفتمان مسلط: «رهبر جهان آزاد» 🏛</text>
  </g>

  <!-- Paradox box -->
  <g transform="translate(540,1010)">
    <rect x="-440" y="-20" width="880" height="150" rx="15" fill="#e63946" opacity="0.08" stroke="#e63946" stroke-width="1"/>
    <text x="0" y="15" text-anchor="middle" fill="#e63946" font-size="24" font-weight="bold" direction="rtl">⚠ پارادوکس</text>
    <text x="0" y="55" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">آمریکا دقیقاً همان اعمالی را که در دیگران محکوم می‌کند</text>
    <text x="0" y="85" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">خود در مقیاسی بسیار بزرگ‌تر انجام می‌دهد</text>
    <text x="0" y="115" text-anchor="middle" fill="#8899aa" font-size="15" direction="rtl">— نوام چامسکی</text>
  </g>

  <text x="540" y="1260" text-anchor="middle" fill="#fca311" font-size="18" direction="rtl">◀ ادامه</text>
  <text x="540" y="1290" text-anchor="middle" fill="#556" font-size="14" direction="rtl">۳ از ۱۰</text>
  <rect x="0" y="1345" width="1080" height="5" fill="url(#gold3)"/>
</svg>