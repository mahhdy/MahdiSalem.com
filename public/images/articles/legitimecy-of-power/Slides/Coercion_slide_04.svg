
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Tahoma, Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
    <linearGradient id="red4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#9b1b30"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg4)"/>
  <rect x="0" y="0" width="1080" height="5" fill="url(#gold4)"/>

  <!-- Header -->
  <text x="540" y="65" text-anchor="middle" fill="url(#gold4)" font-size="36" font-weight="bold" direction="rtl">رقبای آمریکا: برچسب قرمز</text>
  <line x1="290" y1="85" x2="790" y2="105" stroke="#fca311" stroke-width="1.5" opacity="0.5"/>

  <!-- RUSSIA Section -->
  <g transform="translate(540,130)">
    <rect x="-480" y="0" width="960" height="430" rx="15" fill="#1b2838" stroke="#e63946" stroke-width="2"/>
    
    <rect x="-480" y="0" width="960" height="50" rx="15" fill="url(#red4)" opacity="0.8"/>
    <rect x="-480" y="35" width="960" height="15" fill="url(#red4)" opacity="0.8"/>
    <text x="0" y="35" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold" direction="rtl">🇷🇺 روسیه</text>

    <!-- Stats row -->
    <g transform="translate(-300,110)">
      <circle r="50" fill="#e63946" opacity="0.15"/>
      <text x="0" y="-5" text-anchor="middle" fill="#ff6b6b" font-size="30" font-weight="bold">۲۰۱۴</text>
      <text x="0" y="25" text-anchor="middle" fill="#aab" font-size="14" direction="rtl">الحاق کریمه</text>
    </g>
    <g transform="translate(0,110)">
      <circle r="50" fill="#e63946" opacity="0.15"/>
      <text x="0" y="-5" text-anchor="middle" fill="#ff6b6b" font-size="30" font-weight="bold">۲۰۲۲</text>
      <text x="0" y="25" text-anchor="middle" fill="#aab" font-size="14" direction="rtl">تجاوز به اوکراین</text>
    </g>
    <g transform="translate(300,110)">
      <circle r="50" fill="#e63946" opacity="0.15"/>
      <text x="0" y="-5" text-anchor="middle" fill="#ff6b6b" font-size="24" font-weight="bold">واگنر</text>
      <text x="0" y="25" text-anchor="middle" fill="#aab" font-size="14" direction="rtl">حضور در ۶+ کشور آفریقایی</text>
    </g>

    <!-- Key facts -->
    <text x="0" y="210" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● الحاق غیرقانونی ۴ استان اوکراین</text>
    <text x="0" y="245" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● بمباران زیرساخت‌های غیرنظامی</text>
    <text x="0" y="280" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● مسموم‌کردن ناوالنی و لیتویننکو</text>
    <text x="0" y="315" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● دخالت در انتخابات آمریکا ۲۰۱۶</text>

    <!-- Label -->
    <rect x="-200" y="350" width="400" height="40" rx="20" fill="#e63946" opacity="0.2" stroke="#e63946"/>
    <text x="0" y="377" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold" direction="rtl">برچسب: «متجاوز» / «تهدید جهانی»</text>
  </g>

  <!-- CHINA Section -->
  <g transform="translate(540,610)">
    <rect x="-480" y="0" width="960" height="430" rx="15" fill="#1b2838" stroke="#e63946" stroke-width="2"/>
    
    <rect x="-480" y="0" width="960" height="50" rx="15" fill="url(#red4)" opacity="0.8"/>
    <rect x="-480" y="35" width="960" height="15" fill="url(#red4)" opacity="0.8"/>
    <text x="0" y="35" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold" direction="rtl">🇨🇳 چین</text>

    <!-- Stats row -->
    <g transform="translate(-300,110)">
      <circle r="50" fill="#e63946" opacity="0.15"/>
      <text x="0" y="-5" text-anchor="middle" fill="#ff6b6b" font-size="26" font-weight="bold">+۱M</text>
      <text x="0" y="25" text-anchor="middle" fill="#aab" font-size="14" direction="rtl">بازداشتی اویغور</text>
    </g>
    <g transform="translate(0,110)">
      <circle r="50" fill="#e63946" opacity="0.15"/>
      <text x="0" y="-5" text-anchor="middle" fill="#ff6b6b" font-size="22" font-weight="bold">تایوان</text>
      <text x="0" y="25" text-anchor="middle" fill="#aab" font-size="14" direction="rtl">تهدید نظامی مستمر</text>
    </g>
    <g transform="translate(300,110)">
      <circle r="50" fill="#e63946" opacity="0.15"/>
      <text x="0" y="-5" text-anchor="middle" fill="#ff6b6b" font-size="22" font-weight="bold">جزایر</text>
      <text x="0" y="25" text-anchor="middle" fill="#aab" font-size="14" direction="rtl">نظامی‌سازی دریای جنوب</text>
    </g>

    <text x="0" y="210" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● اردوگاه‌های بازآموزی (نسل‌کشی فرهنگی)</text>
    <text x="0" y="245" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● نقض اصل «یک کشور، دو نظام» در هنگ‌کنگ</text>
    <text x="0" y="280" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● رد حکم دادگاه لاهه درباره دریای جنوب (۲۰۱۶)</text>
    <text x="0" y="315" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">● صادرات فناوری نظارتی به رژیم‌های استبدادی</text>

    <rect x="-230" y="350" width="460" height="40" rx="20" fill="#e63946" opacity="0.2" stroke="#e63946"/>
    <text x="0" y="377" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold" direction="rtl">برچسب: «توسعه‌طلب خطرناک» / «نسل‌کش»</text>
  </g>

  <!-- Comparison note -->
  <g transform="translate(540,1100)">
    <rect x="-440" y="-15" width="880" height="80" rx="10" fill="#fca311" opacity="0.08" stroke="#fca311" stroke-width="1"/>
    <text x="0" y="15" text-anchor="middle" fill="#fca311" font-size="20" font-weight="bold" direction="rtl">⚖ مقایسه کنید:</text>
    <text x="0" y="48" text-anchor="middle" fill="#aab" font-size="17" direction="rtl">آمریکا ۸۱ بار در انتخابات دخالت کرده — روسیه ۳۶ بار. اما فقط روسیه «مقصر» است.</text>
  </g>

  <text x="540" y="1260" text-anchor="middle" fill="#fca311" font-size="18" direction="rtl">◀ ادامه</text>
  <text x="540" y="1290" text-anchor="middle" fill="#556" font-size="14" direction="rtl">۴ از ۱۰</text>
  <rect x="0" y="1345" width="1080" height="5" fill="url(#gold4)"/>
</svg>