<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Tahoma, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1080" height="5" fill="url(#gold2)"/>

  <!-- Header -->
  <text x="540" y="70" text-anchor="middle" fill="url(#gold2)" font-size="40" font-weight="bold" direction="rtl">پرسش‌های بنیادین</text>
  <line x1="340" y1="90" x2="740" y2="90" stroke="#fca311" stroke-width="1.5" opacity="0.5"/>

  <!-- Question cards -->
  <!-- Q1 -->
  <g transform="translate(540,180)">
    <rect x="-460" y="-40" width="920" height="120" rx="15" fill="#1b2838" stroke="#fca311" stroke-width="1.5"/>
    <text x="-420" y="-5" fill="#fca311" font-size="50" font-weight="bold">۱</text>
    <text x="0" y="-5" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">آیا زورگویی جمهوری اسلامی بد است</text>
    <text x="0" y="30" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">ولی زورگویی آمریکا و روسیه خوب است؟</text>
    <circle cx="420" cy="0" r="20" fill="#e63946" opacity="0.3"/>
    <text x="420" y="7" text-anchor="middle" fill="#e63946" font-size="22">؟</text>
  </g>

  <!-- Q2 -->
  <g transform="translate(540,360)">
    <rect x="-460" y="-40" width="920" height="120" rx="15" fill="#1b2838" stroke="#457b9d" stroke-width="1.5"/>
    <text x="-420" y="-5" fill="#457b9d" font-size="50" font-weight="bold">۲</text>
    <text x="0" y="-5" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">آیا تحمیل ایدئولوژی آمریکایی خوب است</text>
    <text x="0" y="30" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">ولی تحمیل ایدئولوژی ایرانی بد است؟</text>
    <circle cx="420" cy="0" r="20" fill="#457b9d" opacity="0.3"/>
    <text x="420" y="7" text-anchor="middle" fill="#457b9d" font-size="22">؟</text>
  </g>

  <!-- Q3 -->
  <g transform="translate(540,540)">
    <rect x="-460" y="-40" width="920" height="120" rx="15" fill="#1b2838" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="-420" y="-5" fill="#2a9d8f" font-size="50" font-weight="bold">۳</text>
    <text x="0" y="-5" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">آیا ۷۵۰ پایگاه نظامی آمریکا «ثبات» است</text>
    <text x="0" y="30" text-anchor="middle" fill="#e8e8e8" font-size="22" direction="rtl">ولی چند متحد منطقه‌ای ایران «تروریسم»؟</text>
    <circle cx="420" cy="0" r="20" fill="#2a9d8f" opacity="0.3"/>
    <text x="420" y="7" text-anchor="middle" fill="#2a9d8f" font-size="22">؟</text>
  </g>

  <!-- Central insight -->
  <g transform="translate(540,740)">
    <rect x="-400" y="-30" width="800" height="100" rx="15" fill="#fca311" opacity="0.1" stroke="#fca311" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#fca311" font-size="28" font-weight="bold" direction="rtl">💡 نکته‌ی کلیدی</text>
    <text x="0" y="45" text-anchor="middle" fill="#e8e8e8" font-size="20" direction="rtl">تعیین‌کننده نه ذات زور، بلکه هویت زورگوست</text>
  </g>

  <!-- Definition box -->
  <g transform="translate(540,920)">
    <rect x="-440" y="-20" width="880" height="250" rx="15" fill="#1b2838"/>
    <text x="0" y="15" text-anchor="middle" fill="#fca311" font-size="24" font-weight="bold" direction="rtl">دوگانه‌ی اخلاقی چیست؟</text>
    <text x="0" y="55" text-anchor="middle" fill="#e8e8e8" font-size="18" direction="rtl">Moral Double Standard</text>
    <line x1="-300" y1="75" x2="300" y2="75" stroke="#334" stroke-width="1"/>
    <text x="0" y="110" text-anchor="middle" fill="#aab" font-size="19" direction="rtl">یک رفتار واحد:</text>
    <text x="0" y="145" text-anchor="middle" fill="#457b9d" font-size="19" direction="rtl">وقتی «ما» انجام دهیم ← مشروع، ضروری، اخلاقی</text>
    <text x="0" y="180" text-anchor="middle" fill="#e63946" font-size="19" direction="rtl">وقتی «دیگری» انجام دهد ← نامشروع، خطرناک، غیراخلاقی</text>
  </g>

  <text x="540" y="1260" text-anchor="middle" fill="#fca311" font-size="18" direction="rtl">◀ ادامه</text>
  <text x="540" y="1290" text-anchor="middle" fill="#556" font-size="14" direction="rtl">۲ از ۱۰</text>
  <rect x="0" y="1345" width="1080" height="5" fill="url(#gold2)"/>
</svg>