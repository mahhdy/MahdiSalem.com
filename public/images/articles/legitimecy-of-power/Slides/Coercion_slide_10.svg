<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="Tahoma, Arial, sans-serif">
  <defs>
    <linearGradient id="bg10f" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold10f" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
    <filter id="gl10f">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg10f)"/>
  <rect x="0" y="0" width="1080" height="5" fill="url(#gold10f)"/>

  <!-- Decorative -->
  <circle cx="540" cy="400" r="300" fill="none" stroke="#fca311" stroke-width="0.5" opacity="0.1"/>
  <circle cx="540" cy="400" r="350" fill="none" stroke="#fca311" stroke-width="0.3" opacity="0.07"/>

  <text x="540" y="65" text-anchor="middle" fill="url(#gold10f)" font-size="38" font-weight="bold" direction="rtl" filter="url(#gl10f)">🔑 نتیجه‌گیری نهایی</text>

  <!-- 4 conclusions -->
  <!-- 1 -->
  <g transform="translate(540,140)">
    <rect x="-450" y="-15" width="900" height="120" rx="15" fill="#1b2838" stroke="#fca311" stroke-width="1.5"/>
    <circle cx="-390" cy="45" r="30" fill="#fca311" opacity="0.15"/>
    <text x="-390" y="52" text-anchor="middle" fill="#fca311" font-size="28" font-weight="bold">۱</text>
    <text x="20" y="20" text-anchor="middle" fill="#fca311" font-size="22" font-weight="bold" direction="rtl">زور ذاتاً نه خوب است و نه بد</text>
    <text x="20" y="55" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">بستر، شیوه، تناسب و پاسخ‌گویی تعیین‌کننده‌اند</text>
    <text x="20" y="82" text-anchor="middle" fill="#8899aa" font-size="15" direction="rtl">نه هویت و پاسپورت کاربرنده‌ی زور</text>
  </g>

  <!-- 2 -->
  <g transform="translate(540,290)">
    <rect x="-450" y="-15" width="900" height="120" rx="15" fill="#1b2838" stroke="#e63946" stroke-width="1.5"/>
    <circle cx="-390" cy="45" r="30" fill="#e63946" opacity="0.15"/>
    <text x="-390" y="52" text-anchor="middle" fill="#e63946" font-size="28" font-weight="bold">۲</text>
    <text x="20" y="20" text-anchor="middle" fill="#e63946" font-size="22" font-weight="bold" direction="rtl">دوگانه‌ی اخلاقی واقعی و مستند است</text>
    <text x="20" y="55" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">رفتار مشابه از سوی قدرت‌های بزرگ «طبیعی»</text>
    <text x="20" y="82" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">و از سوی بازیگران ضعیف‌تر «خطرناک» تلقی می‌شود</text>
   </g>

  <!-- 3 -->
  <g transform="translate(540,440)">
    <rect x="-450" y="-15" width="900" height="120" rx="15" fill="#1b2838" stroke="#2a9d8f" stroke-width="1.5"/>
    <circle cx="-390" cy="45" r="30" fill="#2a9d8f" opacity="0.15"/>
    <text x="-390" y="52" text-anchor="middle" fill="#2a9d8f" font-size="28" font-weight="bold">۳</text>
    <text x="20" y="20" text-anchor="middle" fill="#2a9d8f" font-size="22" font-weight="bold" direction="rtl">نقد باید همه‌جانبه باشد</text>
    <text x="20" y="55" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">هم نقد آمریکا و غرب — هم نقد ج.ا. و روسیه و چین</text>
    <text x="20" y="82" text-anchor="middle" fill="#8899aa" font-size="15" direction="rtl">سکوت در برابر هیچ‌کدام نه اخلاقی است و نه تحلیلی</text>
  </g>

  <!-- 4 -->
  <g transform="translate(540,590)">
    <rect x="-450" y="-15" width="900" height="120" rx="15" fill="#1b2838" stroke="#457b9d" stroke-width="1.5"/>
    <circle cx="-390" cy="45" r="30" fill="#457b9d" opacity="0.15"/>
    <text x="-390" y="52" text-anchor="middle" fill="#457b9d" font-size="28" font-weight="bold">۴</text>
    <text x="20" y="20" text-anchor="middle" fill="#457b9d" font-size="22" font-weight="bold" direction="rtl">مرز شهروندی ≠ مرز اخلاقی</text>
    <text x="20" y="55" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">ارزش جان انسان نباید تابع پاسپورت او باشد</text>
    <text x="20" y="82" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">زور بر «بیگانه» همان‌قدر مذموم است که زور بر «خودی»</text>
  </g>

  <!-- Mirror Principle - THE key takeaway -->
  <g transform="translate(540,770)">
    <rect x="-440" y="-20" width="880" height="200" rx="20" fill="#fca311" opacity="0.06" stroke="#fca311" stroke-width="2.5"/>
    
    <!-- Mirror icon -->
    <g transform="translate(0,-5)">
      <ellipse rx="35" ry="40" fill="#fca311" opacity="0.1"/>
      <text x="0" y="12" text-anchor="middle" fill="#fca311" font-size="45">🪞</text>
    </g>
    
    <text x="0" y="70" text-anchor="middle" fill="#fca311" font-size="26" font-weight="bold" direction="rtl">اصل «آینه‌ی برابر»</text>
    <text x="0" y="98" text-anchor="middle" fill="#fca311" font-size="14">Equal Mirror Principle</text>
    <line x1="-300" y1="112" x2="300" y2="112" stroke="#fca311" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="140" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">هر حکم اخلاقی تنها زمانی معتبر و مشروع است که</text>
    <text x="0" y="170" text-anchor="middle" fill="#e8e8e8" font-size="17" direction="rtl">حاکم‌کننده‌ی آن حاضر باشد همان حکم را بر خود و متحدانش نیز اعمال کند</text>
  </g>

  <!-- Test yourself box -->
  <g transform="translate(540,1020)">
    <rect x="-420" y="-15" width="840" height="130" rx="15" fill="#1b2838" stroke="#e63946" stroke-width="1"/>
    <text x="0" y="15" text-anchor="middle" fill="#e63946" font-size="20" font-weight="bold" direction="rtl">🧪 آزمون فکری</text>
    <text x="0" y="50" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">اگر آمریکا با شهروندانش همان رفتاری را می‌کرد که با مردم عراق کرد</text>
    <text x="0" y="78" text-anchor="middle" fill="#e8e8e8" font-size="16" direction="rtl">آیا هنوز «رهبر جهان آزاد» بود یا «رژیم سرکوبگر»؟</text>
    <text x="0" y="105" text-anchor="middle" fill="#8899aa" font-size="14" direction="rtl">آشکار بودن پاسخ = ناموجه بودن تفکیک اخلاقی شهروند/غیرشهروند</text>
  </g>

  <!-- Final quote -->
  <g transform="translate(540,1180)">
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#fca311" stroke-width="1" opacity="0.3"/>
    <text x="0" y="30" text-anchor="middle" fill="#fca311" font-size="16" font-style="italic" direction="rtl">«قدرتمند آن‌چه می‌تواند انجام می‌دهد</text>
    <text x="0" y="55" text-anchor="middle" fill="#fca311" font-size="16" font-style="italic" direction="rtl">و ضعیف آن‌چه باید تحمل می‌کند»</text>
    <text x="0" y="80" text-anchor="middle" fill="#8899aa" font-size="14" direction="rtl">— توکیدیدس | اما آیا باید بر این واقعیت تلخ تمکین کرد؟</text>
  </g>

  <text x="540" y="1300" text-anchor="middle" fill="#556" font-size="14" direction="rtl">۱۰ از ۱۰ | پایان</text>
  <rect x="0" y="1345" width="1080" height="5" fill="url(#gold10f)"/>
</svg>