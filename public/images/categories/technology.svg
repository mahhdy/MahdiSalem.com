<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
    <!-- Microchip / CPU Core -->
    <rect x="70" y="70" width="60" height="60" rx="8" stroke="currentColor" stroke-width="3" opacity="0.6" />
    <rect x="85" y="85" width="30" height="30" rx="4" fill="currentColor" opacity="0.5" />

    <!-- Circuit traces & Nodes -->
    <path d="M80 70 L80 40 L50 40" stroke="currentColor" stroke-width="3" stroke-linejoin="round" opacity="0.5" />
    <circle cx="50" cy="40" r="6" fill="currentColor" opacity="0.6" />

    <path d="M120 70 L120 40 L150 40" stroke="currentColor" stroke-width="3" stroke-linejoin="round" opacity="0.5" />
    <circle cx="150" cy="40" r="6" fill="currentColor" opacity="0.6" />

    <path d="M80 130 L80 160 L50 160" stroke="currentColor" stroke-width="3" stroke-linejoin="round" opacity="0.5" />
    <circle cx="50" cy="160" r="6" fill="currentColor" opacity="0.6" />

    <path d="M120 130 L120 160 L150 160" stroke="currentColor" stroke-width="3" stroke-linejoin="round" opacity="0.5" />
    <circle cx="150" cy="160" r="6" fill="currentColor" opacity="0.6" />

    <!-- Data flow vectors -->
    <line x1="30" y1="100" x2="58" y2="100" stroke="currentColor" stroke-width="3" marker-end="url(#arrow-tech)"
        opacity="0.4" />
    <line x1="170" y1="100" x2="142" y2="100" stroke="currentColor" stroke-width="3" marker-end="url(#arrow-tech)"
        opacity="0.4" />

    <defs>
        <marker id="arrow-tech" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"
            markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="currentColor" />
        </marker>
    </defs>
</svg>