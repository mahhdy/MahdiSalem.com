<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg131" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0B1A"/>
      <stop offset="50%" stop-color="#1A1035"/>
      <stop offset="100%" stop-color="#0D0B1A"/>
    </linearGradient>
    <radialGradient id="glow131" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow131">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg131)"/>
  <rect width="1080" height="1080" fill="url(#glow131)"/>

  <!-- خطوط تزئینی هندسی -->
  <line x1="80" y1="160" x2="1000" y2="160" stroke="#A855F7" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="80" y1="920" x2="1000" y2="920" stroke="#A855F7" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="540" cy="540" r="320" fill="none" stroke="#A855F7" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="540" cy="540" r="220" fill="none" stroke="#C084FC" stroke-opacity="0.06" stroke-width="1"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="420" height="48" rx="24"
        fill="#A855F7" fill-opacity="0.08" stroke="#A855F7" stroke-opacity="0.25"/>
  <text x="250" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#C084FC"
        text-anchor="middle" direction="rtl">فصل ۱۳ · نقد دوگانه‌ها · اسلاید ۲</text>

  <!-- عنوان اصلی -->
  <text x="540" y="220" font-family="Vazirmatn, Tahoma" font-size="56" font-weight="900"
        fill="#E9D5FF" text-anchor="middle" direction="rtl" filter="url(#softglow131)">دوگانه‌ها: ابزار یا زندان؟</text>

  <!-- زیرعنوان -->
  <text x="540" y="280" font-family="Vazirmatn, Tahoma" font-size="26" fill="#A78BFA"
        text-anchor="middle" direction="rtl">آیا تقابل‌سازی، شناخت را پیش می‌برد یا زمینگیر می‌کند؟</text>

  <!-- دو ستون تقابلی -->
  <!-- ستون راست: ابزار -->
  <rect x="555" y="330" width="470" height="280" rx="20"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.2"/>
  <text x="790" y="375" font-family="Vazirmatn, Tahoma" font-size="34" fill="#4ADE80"
        font-weight="bold" text-anchor="middle" direction="rtl">✦ ابزار شناخت</text>
  <text x="990" y="425" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BBB"
        text-anchor="start" direction="rtl">فضای مفهومی را نقشه‌برداری می‌کند</text>
  <text x="990" y="465" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BBB"
        text-anchor="start" direction="rtl">قطب‌های مرجع برای موضع‌گیری</text>
  <text x="990" y="505" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BBB"
        text-anchor="start" direction="rtl">ساده‌سازی لازم برای ورود اولیه</text>
  <text x="990" y="555" font-family="Vazirmatn, Tahoma" font-size="22" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-style="italic">«هر نقشه ساده‌سازی واقعیت است»</text>

  <!-- ستون چپ: زندان -->
  <rect x="55" y="330" width="470" height="280" rx="20"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="290" y="375" font-family="Vazirmatn, Tahoma" font-size="34" fill="#F87171"
        font-weight="bold" text-anchor="middle" direction="rtl">✦ زندان فکری</text>
  <text x="490" y="425" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BBB"
        text-anchor="start" direction="rtl">میانه و طیف را نادیده می‌گیرد</text>
  <text x="490" y="465" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BBB"
        text-anchor="start" direction="rtl">قطبی‌سازی کاذب ایجاد می‌کند</text>
  <text x="490" y="505" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BBB"
        text-anchor="start" direction="rtl">ترکیب‌های خلاق را مسدود می‌کند</text>
  <text x="490" y="555" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="start" direction="rtl" font-style="italic">«دوگانه = وسوسه‌ی ذهن تنبل»</text>

  <!-- بخش نقادانه مرکزی -->
  <rect x="120" y="650" width="840" height="200" rx="22"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.25"/>
  <text x="540" y="705" font-family="Vazirmatn, Tahoma" font-size="32" fill="#FCD34D"
        font-weight="bold" text-anchor="middle" direction="rtl">⟡ دیدگاه نقادانه</text>
  <text x="540" y="755" font-family="Vazirmatn, Tahoma" font-size="26" fill="#EEE"
        text-anchor="middle" direction="rtl">دوگانه‌ها «نقطه‌ی شروع» هستند نه «نقطه‌ی پایان»</text>
  <text x="540" y="800" font-family="Vazirmatn, Tahoma" font-size="24" fill="#CCC"
        text-anchor="middle" direction="rtl">ارزش تحلیلی دارند اگر به «طیف» و «ترکیب» راه دهند</text>
  <text x="540" y="835" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F59E0B"
        text-anchor="middle" direction="rtl">بحث اصلی: فصل بعد ← از دوگانه به منظومه</text>

  <!-- پاورقی -->
  <rect x="40" y="960" width="1000" height="2" rx="1" fill="#A855F7" opacity="0.2"/>
  <text x="540" y="1000" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق و حقوق · نقد دوگانه‌ها · ادامه دارد ←</text>
  <text x="540" y="1040" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">«هر دوگانه‌ای که تو را از دیدن میانه باز دارد، ابزار سلطه شده نه ابزار شناخت»</text>
</svg>
