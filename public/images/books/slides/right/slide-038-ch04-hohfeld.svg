<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg38" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#10081A"/>
    </linearGradient>
    <radialGradient id="glow38" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg38)"/>
  <rect width="1080" height="1080" fill="url(#glow38)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#14B8A6" fill-opacity="0.08" stroke="#14B8A6" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#14B8A6"
        text-anchor="middle" direction="rtl">فصل ۴ · اسلاید ۸ از ۱۰</text>

  <!-- عنوان -->
  <text x="1000" y="150" font-family="Vazirmatn, Tahoma" font-size="46" font-weight="900"
        fill="#2DD4BF" text-anchor="start" direction="rtl">هوفلد: تحلیل ساختاری حق</text>
  <text x="1000" y="200" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="start" direction="rtl">ابزاری که نویسنده از آن فراتر می‌رود</text>

  <!-- چهار مفهوم هوفلد -->
  <rect x="560" y="260" width="440" height="160" rx="18"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="960" y="310" font-family="Vazirmatn, Tahoma" font-size="28" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">حقّ ادّعایی (Claim)</text>
  <text x="960" y="350" font-family="Vazirmatn, Tahoma" font-size="20" fill="#CCC"
        text-anchor="start" direction="rtl">A حق دارد ← B وظیفه دارد</text>
  <text x="960" y="385" font-family="Vazirmatn, Tahoma" font-size="18" fill="#999"
        text-anchor="start" direction="rtl">مثال: حقّ دریافت دستمزد ← وظیفهٔ کارفرما</text>

  <rect x="80" y="260" width="440" height="160" rx="18"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.2"/>
  <text x="480" y="310" font-family="Vazirmatn, Tahoma" font-size="28" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">آزادی (Liberty)</text>
  <text x="480" y="350" font-family="Vazirmatn, Tahoma" font-size="20" fill="#CCC"
        text-anchor="start" direction="rtl">A مجاز است ← B نمی‌تواند ادّعا کند</text>
  <text x="480" y="385" font-family="Vazirmatn, Tahoma" font-size="18" fill="#999"
        text-anchor="start" direction="rtl">مثال: آزادی پوشش ← دیگری حقّ اعتراض ندارد</text>

  <rect x="560" y="440" width="440" height="160" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="960" y="490" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">قدرت (Power)</text>
  <text x="960" y="530" font-family="Vazirmatn, Tahoma" font-size="20" fill="#CCC"
        text-anchor="start" direction="rtl">A توان تغییر وضعیت حقوقی دارد</text>
  <text x="960" y="565" font-family="Vazirmatn, Tahoma" font-size="18" fill="#999"
        text-anchor="start" direction="rtl">مثال: قاضی حکم صادر می‌کند</text>

  <rect x="80" y="440" width="440" height="160" rx="18"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.2"/>
  <text x="480" y="490" font-family="Vazirmatn, Tahoma" font-size="28" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">مصونیت (Immunity)</text>
  <text x="480" y="530" font-family="Vazirmatn, Tahoma" font-size="20" fill="#CCC"
        text-anchor="start" direction="rtl">A مصون است ← B ناتوان از تغییر</text>
  <text x="480" y="565" font-family="Vazirmatn, Tahoma" font-size="18" fill="#999"
        text-anchor="start" direction="rtl">مثال: مصونیت پارلمانی</text>

  <!-- مقایسه با نویسنده -->
  <rect x="80" y="650" width="920" height="240" rx="20"
        fill="#14B8A6" fill-opacity="0.04" stroke="#14B8A6" stroke-opacity="0.2" stroke-width="1.5"/>
  <text x="960" y="700" font-family="Vazirmatn, Tahoma" font-size="28" fill="#2DD4BF"
        text-anchor="start" direction="rtl" font-weight="bold">تفاوت نگاه نویسنده:</text>

  <text x="960" y="750" font-family="Vazirmatn, Tahoma" font-size="22" fill="#EEE"
        text-anchor="start" direction="rtl">• هوفلد: حق را تحلیل می‌کند (قطعات موتور)</text>
  <text x="960" y="790" font-family="Vazirmatn, Tahoma" font-size="22" fill="#EEE"
        text-anchor="start" direction="rtl">• نویسنده: حق را می‌سازد (اصول طراحی موتور)</text>
  <text x="960" y="835" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FBBF24"
        text-anchor="start" direction="rtl">• هوفلد = عملکردی · نویسنده = بنیادین و فرایندی</text>
  <text x="960" y="870" font-family="Vazirmatn, Tahoma" font-size="20" fill="#999"
        text-anchor="start" direction="rtl">هر دو لازم‌اند: بدون هوفلد تحلیل نداریم، بدون بنیاد جهت نداریم</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#14B8A6" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۴</text>
</svg>
