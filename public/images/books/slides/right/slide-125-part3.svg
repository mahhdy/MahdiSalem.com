  <text x="540" y="400" font-family="Vazirmatn, Tahoma" font-size="30" fill="#778"
        text-anchor="middle" direction="rtl">بخش سوم</text>

  <text x="540" y="510" font-family="Vazirmatn, Tahoma" font-size="62" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" direction="rtl">آزمون</text>
  <text x="540" y="570" font-family="Vazirmatn, Tahoma" font-size="34" fill="#F87171"
        text-anchor="middle" direction="rtl">تطبیق و نقد</text>

  <rect x="290" y="595" width="500" height="3" rx="1.5" fill="url(#glP3)" opacity="0.5"/>

  <text x="540" y="670" font-family="Vazirmatn, Tahoma" font-size="28" fill="#AAB"
