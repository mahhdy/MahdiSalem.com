<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgP3" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="100%" stop-color="#2A1A1A"/>
    </linearGradient>
    <linearGradient id="glP3" x1="200" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgP3)"/>

  <g stroke="#DC2626" stroke-opacity="0.03" stroke-width="0.5">
    <circle cx="540" cy="540" r="120"/>
    <circle cx="540" cy="540" r="240"/>
    <circle cx="540" cy="540" r="360"/>
  </g>

  <text x="540" y="300" font-family="Vazirmatn, Tahoma" font-size="180" font-weight="900"
