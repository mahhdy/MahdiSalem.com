<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg45" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0818"/>
      <stop offset="100%" stop-color="#081520"/>
    </linearGradient>
    <radialGradient id="glow45" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg45)"/>
  <rect width="1080" height="1080" fill="url(#glow45)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#06B6D4"
        text-anchor="middle" direction="rtl">فصل ۵ · اسلاید ۵ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="150" font-family="Vazirmatn, Tahoma" font-size="46" font-weight="900"
        fill="#22D3EE" text-anchor="middle" direction="rtl">مثلث تنظیم‌گری جامعه</text>
  <text x="540" y="200" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="middle" direction="rtl">حق، قانون و اخلاق: سه سازوکار مکمّل نه جایگزین</text>

  <!-- مثلث بزرگ -->
  <!-- رأس بالا: حق -->
  <polygon points="540,290 820,700 260,700"
           fill="none" stroke="#E8B83D" stroke-opacity="0.15" stroke-width="2"/>

  <!-- رأس بالا -->
  <circle cx="540" cy="290" r="65" fill="#E8B83D" fill-opacity="0.06" stroke="#E8B83D" stroke-opacity="0.4" stroke-width="2"/>
  <text x="540" y="285" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FBBF24"
        text-anchor="middle" direction="rtl" font-weight="bold">حق</text>
  <text x="540" y="315" font-family="Vazirmatn, Tahoma" font-size="16" fill="#AAA"
        text-anchor="middle" direction="rtl">مرزها و دامنه‌ها</text>

  <!-- رأس چپ -->
  <circle cx="260" cy="700" r="65" fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-opacity="0.4" stroke-width="2"/>
  <text x="260" y="695" font-family="Vazirmatn, Tahoma" font-size="28" fill="#22D3EE"
        text-anchor="middle" direction="rtl" font-weight="bold">قانون</text>
  <text x="260" y="725" font-family="Vazirmatn, Tahoma" font-size="16" fill="#AAA"
        text-anchor="middle" direction="rtl">ضمانت اجرا</text>

  <!-- رأس راست -->
  <circle cx="820" cy="700" r="65" fill="#EC4899" fill-opacity="0.06" stroke="#EC4899" stroke-opacity="0.4" stroke-width="2"/>
  <text x="820" y="695" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F9A8D4"
        text-anchor="middle" direction="rtl" font-weight="bold">اخلاق</text>
  <text x="820" y="725" font-family="Vazirmatn, Tahoma" font-size="16" fill="#AAA"
        text-anchor="middle" direction="rtl">قطب‌نمای جهت</text>

  <!-- برچسب یال‌ها -->
  <!-- حق → قانون -->
  <text x="340" y="480" font-family="Vazirmatn, Tahoma" font-size="20" fill="#7DD3FC"
        text-anchor="middle" direction="rtl" transform="rotate(-35, 340, 480)">قانون حق را تضمین می‌کند</text>

  <!-- حق → اخلاق -->
  <text x="730" y="480" font-family="Vazirmatn, Tahoma" font-size="20" fill="#F9A8D4"
        text-anchor="middle" direction="rtl" transform="rotate(35, 730, 480)">اخلاق حق را جهت می‌دهد</text>

  <!-- قانون → اخلاق -->
  <text x="540" y="730" font-family="Vazirmatn, Tahoma" font-size="20" fill="#999"
        text-anchor="middle" direction="rtl">قانون بدون اخلاق = ابزار سلطه</text>

  <!-- دیدگاه نویسنده -->
  <rect x="80" y="800" width="920" height="110" rx="20"
        fill="#E8B83D" fill-opacity="0.04" stroke="#E8B83D" stroke-opacity="0.18"/>
  <text x="960" y="845" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">دیدگاه نویسنده:</text>
  <text x="960" y="885" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">اخلاق = قطب‌نما · حق = نقشه · قانون = جاده — هر سه لازم‌اند</text>

  <!-- نقد -->
  <rect x="150" y="935" width="780" height="45" rx="10"
        fill="#DC2626" fill-opacity="0.03" stroke="#DC2626" stroke-opacity="0.1"/>
  <text x="540" y="965" font-family="Vazirmatn, Tahoma" font-size="20" fill="#F87171"
        text-anchor="middle" direction="rtl">⚠ وقتی قانون و اخلاق متعارض شوند، حق داور است یا طرف؟</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#06B6D4" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۵</text>
</svg>
