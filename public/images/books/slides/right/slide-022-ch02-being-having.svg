<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-bh" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18120A"/>
      <stop offset="100%" stop-color="#0E0C08"/>
    </linearGradient>
    <radialGradient id="bhGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#C19A3E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#C19A3E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-bh)"/>
  <rect width="1080" height="1080" fill="url(#bhGlow)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="440" height="48" rx="24"
        fill="#C19A3E" fill-opacity="0.08" stroke="#C19A3E" stroke-opacity="0.25"/>
  <text x="430" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#C19A3E"
        text-anchor="start" direction="rtl">فصل ۲ · زبان حق · تمایز بنیادین</text>

  <!-- عنوان -->
  <text x="1000" y="170" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#FEF3C7" text-anchor="start" direction="rtl">بر حق بودن ≠ حق داشتن</text>
  <text x="1000" y="225" font-family="Vazirmatn, Tahoma" font-size="24" fill="#D4C5A0"
        text-anchor="start" direction="rtl">Being Right vs Having Right · تمایزی ارزشمند و کم‌توجه‌شده</text>

  <!-- خط جداکننده‌ی عمودی مرکزی -->
  <rect x="536" y="280" width="4" height="440" rx="2" fill="#C19A3E" fill-opacity="0.15"/>
  <text x="540" y="270" font-family="Vazirmatn, Tahoma" font-size="24" fill="#C19A3E"
        font-weight="bold" text-anchor="middle" direction="rtl">≠</text>

  <!-- ستون راست: Being Right -->
  <text x="990" y="330" font-family="Vazirmatn, Tahoma" font-size="36" fill="#67E8F9"
        font-weight="bold" text-anchor="start" direction="rtl">بر حق بودن</text>
  <text x="990" y="368" font-family="Vazirmatn, Tahoma" font-size="22" fill="#7DD3FC"
        text-anchor="start" direction="rtl">Being Right</text>
  <text x="990" y="415" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• معرفت‌شناختی و اخلاقی</text>
  <text x="990" y="455" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• درست بودن · صادق بودن</text>
  <text x="990" y="495" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• مستقل از شناسایی دیگران</text>

  <rect x="575" y="535" width="440" height="80" rx="14"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="975" y="568" font-family="Vazirmatn, Tahoma" font-size="21" fill="#67E8F9"
        text-anchor="start" direction="rtl" font-style="italic">مثال: معترضی در نظام استبدادی</text>
  <text x="975" y="600" font-family="Vazirmatn, Tahoma" font-size="21" fill="#67E8F9"
        text-anchor="start" direction="rtl" font-style="italic">بر حق است ولی حق قانونی ندارد</text>

  <!-- ستون چپ: Having Right -->
  <text x="490" y="330" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">حق داشتن</text>
  <text x="490" y="368" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FDE68A"
        text-anchor="start" direction="rtl">Having Right</text>
  <text x="490" y="415" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• حقوقی و سیاسی</text>
  <text x="490" y="455" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• صاحب حق بودن · مجاز بودن</text>
  <text x="490" y="495" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• نیازمند شناسایی نهادی</text>

  <rect x="60" y="535" width="440" height="80" rx="14"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="460" y="568" font-family="Vazirmatn, Tahoma" font-size="21" fill="#FCD34D"
        text-anchor="start" direction="rtl" font-style="italic">مثال: مالکی با خلأ قانونی</text>
  <text x="460" y="600" font-family="Vazirmatn, Tahoma" font-size="21" fill="#FCD34D"
        text-anchor="start" direction="rtl" font-style="italic">حق قانونی دارد ولی بر حق نیست</text>

  <!-- تأمل عمیق -->
  <rect x="80" y="660" width="920" height="180" rx="20"
        fill="#C19A3E" fill-opacity="0.04" stroke="#C19A3E" stroke-opacity="0.2"/>
  <text x="960" y="708" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FEF3C7"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ چرا این تمایز مهم است؟</text>
  <text x="960" y="752" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">شکاف میان این دو = فضای نقد و اصلاح حقوقی</text>
  <text x="960" y="792" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">هر جامعه‌ای که این شکاف را نبیند</text>
  <text x="960" y="828" font-family="Vazirmatn, Tahoma" font-size="24" fill="#C19A3E"
        font-weight="bold" text-anchor="start" direction="rtl">قانون‌پرستی کور یا عدالت‌خواهی بی‌ریشه خواهد داشت</text>

  <!-- پاورقی -->
  <rect x="40" y="890" width="1000" height="2" rx="1" fill="#C19A3E" opacity="0.2"/>
  <text x="540" y="935" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">در فارسی «حق» هر دو معنا را حمل می‌کند — در انگلیسی Right هم</text>
  <text x="540" y="975" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">Right as Correct · Right as Legitimate · Right as Ethical · Right as Legal</text>
  <text x="540" y="1050" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">فصل ۲ · زبان و مفهوم حق</text>
</svg>
