<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg50" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0D14"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg50)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="360" height="48" rx="24"
        fill="#3B82F6" fill-opacity="0.08" stroke="#3B82F6" stroke-opacity="0.25"/>
  <text x="220" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#3B82F6"
        text-anchor="middle" direction="rtl">فصل ۵ · اسلاید ۱ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="180" font-family="Vazirmatn, Tahoma" font-size="64" font-weight="900"
        fill="#3B82F6" text-anchor="middle" direction="rtl">جغرافیای مفهومی</text>
  <text x="540" y="235" font-family="Vazirmatn, Tahoma" font-size="28" fill="#778"
        text-anchor="middle" direction="rtl">حق در همسایگی چه مفاهیمی زندگی می‌کند؟</text>

  <!-- شبکهٔ مفاهیم مجاور -->
  <!-- مرکز: حق -->
  <circle cx="540" cy="540" r="80" fill="#3B82F6" fill-opacity="0.1"
          stroke="#3B82F6" stroke-opacity="0.5" stroke-width="2.5"/>
  <text x="540" y="550" font-family="Vazirmatn, Tahoma" font-size="40" fill="#FFFFFF"
        font-weight="bold" text-anchor="middle">حق</text>

  <!-- گره‌ها -->
  <circle cx="540" cy="310" r="55" fill="#DC2626" fill-opacity="0.08"
          stroke="#DC2626" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="540" y="318" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F87171"
        font-weight="bold" text-anchor="middle" direction="rtl">تکلیف</text>

  <circle cx="780" cy="400" r="55" fill="#22C55E" fill-opacity="0.08"
          stroke="#22C55E" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="780" y="408" font-family="Vazirmatn, Tahoma" font-size="28" fill="#4ADE80"
        font-weight="bold" text-anchor="middle" direction="rtl">عدالت</text>

  <circle cx="820" cy="600" r="55" fill="#A855F7" fill-opacity="0.08"
          stroke="#A855F7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="820" y="608" font-family="Vazirmatn, Tahoma" font-size="28" fill="#C084FC"
        font-weight="bold" text-anchor="middle" direction="rtl">آزادی</text>

  <circle cx="680" cy="760" r="55" fill="#F59E0B" fill-opacity="0.08"
          stroke="#F59E0B" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="680" y="768" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F59E0B"
        font-weight="bold" text-anchor="middle" direction="rtl">قانون</text>

  <circle cx="400" cy="760" r="55" fill="#EC4899" fill-opacity="0.08"
          stroke="#EC4899" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="400" y="768" font-family="Vazirmatn, Tahoma" font-size="28" fill="#EC4899"
        font-weight="bold" text-anchor="middle" direction="rtl">قدرت</text>

  <circle cx="260" cy="600" r="55" fill="#06B6D4" fill-opacity="0.08"
          stroke="#06B6D4" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="260" y="608" font-family="Vazirmatn, Tahoma" font-size="26" fill="#06B6D4"
        font-weight="bold" text-anchor="middle" direction="rtl">مشروعیت</text>

  <circle cx="300" cy="400" r="55" fill="#C19A3E" fill-opacity="0.08"
          stroke="#C19A3E" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="300" y="408" font-family="Vazirmatn, Tahoma" font-size="28" fill="#C19A3E"
        font-weight="bold" text-anchor="middle" direction="rtl">اخلاق</text>

  <!-- خطوط اتصال -->
  <g stroke="#556" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="5,5">
    <line x1="540" y1="460" x2="540" y2="365"/>
    <line x1="615" y1="495" x2="730" y2="415"/>
    <line x1="615" y1="575" x2="770" y2="590"/>
    <line x1="590" y1="615" x2="640" y2="720"/>
    <line x1="490" y1="615" x2="440" y2="720"/>
    <line x1="465" y1="575" x2="310" y2="590"/>
    <line x1="465" y1="495" x2="350" y2="415"/>
  </g>

  <!-- بصیرت -->
  <rect x="90" y="870" width="900" height="100" rx="18"
        fill="#3B82F6" fill-opacity="0.04" stroke="#3B82F6" stroke-opacity="0.18"/>
  <text x="540" y="910" font-family="Vazirmatn, Tahoma" font-size="28" fill="#60A5FA"
        font-weight="bold" text-anchor="middle" direction="rtl">✦ حق مفهومی ارتباطی و شبکه‌ای است</text>
  <text x="540" y="950" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">بدون فهم همسایگانش قابل تعریف نیست</text>

  <rect x="40" y="1010" width="1000" height="2.5" rx="1" fill="#3B82F6" opacity="0.3"/>
  <text x="540" y="1060" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بعدی: فرض‌های بنیادین ←</text>
</svg>
