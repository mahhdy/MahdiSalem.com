<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg021" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg021)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="360" height="50" rx="25"
        fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="220" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F59E0B"
        text-anchor="middle" direction="rtl">فصل ۲ · اسلاید ۲ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="150" font-family="Vazirmatn, Tahoma" font-size="60" font-weight="bold"
        fill="#F59E0B" text-anchor="middle" direction="rtl">سلسله‌مراتب «حق به مثابهٔ...»</text>

  <!-- لایهٔ بنیادین -->
  <rect x="90" y="210" width="900" height="150" rx="18"
        fill="#22C55E" fill-opacity="0.05" stroke="#22C55E" stroke-opacity="0.4"/>
  <text x="540" y="255" font-family="Vazirmatn, Tahoma" font-size="34" fill="#4ADE80"
        font-weight="bold" text-anchor="middle" direction="rtl">لایهٔ بنیادین</text>
  <text x="540" y="305" font-family="Vazirmatn, Tahoma" font-size="28" fill="#D1D5DB"
        text-anchor="middle" direction="rtl">قابلیت خودتعریفی · قواعد بازی · حریم مصون</text>

  <!-- لایهٔ نهادی -->
  <rect x="90" y="390" width="900" height="150" rx="18"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.4"/>
  <text x="540" y="435" font-family="Vazirmatn, Tahoma" font-size="34" fill="#C084FC"
        font-weight="bold" text-anchor="middle" direction="rtl">لایهٔ نهادی</text>
  <text x="540" y="485" font-family="Vazirmatn, Tahoma" font-size="28" fill="#E5E7EB"
        text-anchor="middle" direction="rtl">توافق تعهدآفرین · عضویت · سهم · امتیاز</text>

  <!-- لایهٔ عملیاتی -->
  <rect x="90" y="570" width="900" height="150" rx="18"
        fill="#0EA5E9" fill-opacity="0.05" stroke="#0EA5E9" stroke-opacity="0.4"/>
  <text x="540" y="615" font-family="Vazirmatn, Tahoma" font-size="34" fill="#38BDF8"
        font-weight="bold" text-anchor="middle" direction="rtl">لایهٔ عملیاتی</text>
  <text x="540" y="665" font-family="Vazirmatn, Tahoma" font-size="28" fill="#E5E7EB"
        text-anchor="middle" direction="rtl">محدودهٔ مجاز عمل · ادّعا · مجوز · بهره‌مندی</text>

  <!-- نکتهٔ نقادانه -->
  <rect x="90" y="770" width="900" height="120" rx="18"
        fill="#1F2937" stroke="#6B7280" stroke-opacity="0.4"/>
  <text x="540" y="820" font-family="Vazirmatn, Tahoma" font-size="30" fill="#F9FAFB"
        text-anchor="middle" direction="rtl">⚡ خطر: تقلیل حق به فقط یک لایه</text>
  <text x="540" y="865" font-family="Vazirmatn, Tahoma" font-size="26" fill="#D1D5DB"
        text-anchor="middle" direction="rtl">مثلاً فقط «ادّعا» یا فقط «سهم» → کور شدن نسبت به بقیهٔ ابعاد</text>

  <text x="540" y="1030" font-family="Vazirmatn, Tahoma" font-size="22" fill="#6B7280"
        text-anchor="middle" direction="rtl">بعدی: تاریخ حق در سه موج اصلی ←</text>
</svg>
