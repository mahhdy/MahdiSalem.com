<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-const" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A1C"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-const)"/>
  <rect width="1080" height="1080" fill="url(#starGlow)"/>

  <!-- ستاره‌های پس‌زمینه -->
  <circle cx="120" cy="90" r="1.5" fill="#FFF" opacity="0.4"/>
  <circle cx="350" cy="60" r="1" fill="#FFF" opacity="0.3"/>
  <circle cx="780" cy="120" r="1.8" fill="#FFF" opacity="0.35"/>
  <circle cx="950" cy="200" r="1" fill="#FFF" opacity="0.25"/>
  <circle cx="200" cy="980" r="1.2" fill="#FFF" opacity="0.3"/>
  <circle cx="870" cy="950" r="1.5" fill="#FFF" opacity="0.35"/>
  <circle cx="500" cy="1000" r="1" fill="#FFF" opacity="0.2"/>
  <circle cx="650" cy="80" r="2" fill="#FFF" opacity="0.3"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="400" height="48" rx="24"
        fill="#FCD34D" fill-opacity="0.08" stroke="#FCD34D" stroke-opacity="0.25"/>
  <text x="240" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#FCD34D"
        text-anchor="middle" direction="rtl">فصل ۱۱ · اخلاق و حق · دیدگاه نویسنده</text>

  <!-- عنوان -->
  <text x="540" y="165" font-family="Vazirmatn, Tahoma" font-size="54" font-weight="900"
        fill="#FEF3C7" text-anchor="middle" direction="rtl">اخلاق منظوم</text>
  <text x="540" y="218" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCD34D"
        text-anchor="middle" direction="rtl">Constellation Ethics · ادغام سه سنت اخلاقی در یک منظومه</text>

  <!-- خطوط اتصال منظومه -->
  <line x1="540" y1="440" x2="300" y2="580" stroke="#F59E0B" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="540" y1="440" x2="780" y2="580" stroke="#F59E0B" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="540" y1="440" x2="540" y2="680" stroke="#F59E0B" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="300" y1="580" x2="780" y2="580" stroke="#F59E0B" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="300" y1="580" x2="540" y2="680" stroke="#F59E0B" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="780" y1="580" x2="540" y2="680" stroke="#F59E0B" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- مرکز: اخلاق -->
  <circle cx="540" cy="440" r="60" fill="#FCD34D" fill-opacity="0.08" stroke="#FCD34D" stroke-opacity="0.5" stroke-width="2"/>
  <text x="540" y="435" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FEF3C7"
        font-weight="bold" text-anchor="middle" direction="rtl">اخلاق</text>
  <text x="540" y="462" font-family="Vazirmatn, Tahoma" font-size="18" fill="#FCD34D"
        text-anchor="middle" direction="rtl">قطب‌نما</text>

  <!-- سه قطب -->
  <!-- وظیفه‌گرا -->
  <circle cx="300" cy="580" r="70" fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-opacity="0.4" stroke-width="2"/>
  <text x="300" y="570" font-family="Vazirmatn, Tahoma" font-size="22" fill="#67E8F9"
        font-weight="bold" text-anchor="middle" direction="rtl">وظیفه‌گرا</text>
  <text x="300" y="598" font-family="Vazirmatn, Tahoma" font-size="17" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">Deontological</text>

  <!-- نتیجه‌گرا -->
  <circle cx="780" cy="580" r="70" fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-opacity="0.4" stroke-width="2"/>
  <text x="780" y="570" font-family="Vazirmatn, Tahoma" font-size="22" fill="#86EFAC"
        font-weight="bold" text-anchor="middle" direction="rtl">نتیجه‌گرا</text>
  <text x="780" y="598" font-family="Vazirmatn, Tahoma" font-size="17" fill="#BBF7D0"
        text-anchor="middle" direction="rtl">Consequentialist</text>

  <!-- فضیلت‌گرا -->
  <circle cx="540" cy="680" r="70" fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-opacity="0.4" stroke-width="2"/>
  <text x="540" y="670" font-family="Vazirmatn, Tahoma" font-size="22" fill="#D8B4FE"
        font-weight="bold" text-anchor="middle" direction="rtl">فضیلت‌گرا</text>
  <text x="540" y="698" font-family="Vazirmatn, Tahoma" font-size="17" fill="#E9D5FF"
        text-anchor="middle" direction="rtl">Virtue Ethics</text>

  <!-- توضیح پایین -->
  <rect x="80" y="790" width="920" height="190" rx="20"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.18"/>
  <text x="540" y="838" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FEF3C7"
        font-weight="bold" text-anchor="middle" direction="rtl">سه سنت، یک منظومه</text>
  <text x="540" y="878" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="middle" direction="rtl">هر سنت سهم و نقش خود را در کلیت کنش اخلاقی ایفا می‌کند</text>
  <text x="540" y="918" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="middle" direction="rtl">نه تقلیل به یکی، نه تعارض میان آن‌ها — بلکه هم‌افزایی</text>
  <text x="540" y="958" font-family="Vazirmatn, Tahoma" font-size="20" fill="#F59E0B"
        text-anchor="middle" direction="rtl">مقایسه با «کوه واحد» پارفیت: اینجا منظومه، نه کوه</text>

  <!-- پاورقی -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#FCD34D" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق و حقوق · اخلاق منظوم · ابتکار نویسنده</text>
</svg>
