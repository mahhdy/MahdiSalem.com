<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg26" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#10081A"/>
    </linearGradient>
    <radialGradient id="glow26" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg26)"/>
  <rect width="1080" height="1080" fill="url(#glow26)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#22C55E" fill-opacity="0.08" stroke="#22C55E" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#22C55E"
        text-anchor="middle" direction="rtl">فصل ۳ · اسلاید ۶ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="155" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#4ADE80" text-anchor="middle" direction="rtl">سه نسل حقوق بشر</text>
  <text x="540" y="205" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="middle" direction="rtl">تکامل تاریخی از آزادی تا همبستگی (تقسیم‌بندی واساک)</text>

  <!-- سه بلوک بزرگ افقی -->
  <!-- نسل اول -->
  <rect x="80" y="260" width="920" height="195" rx="22"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="80" y="260" width="10" height="195" rx="5" fill="#06B6D4" fill-opacity="0.6"/>
  <circle cx="960" cy="305" r="30" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-opacity="0.4"/>
  <text x="960" y="314" font-family="Vazirmatn, Tahoma" font-size="26" fill="#06B6D4"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="910" y="314" font-family="Vazirmatn, Tahoma" font-size="32" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">حقوق مدنی و سیاسی</text>
  <text x="910" y="360" font-family="Vazirmatn, Tahoma" font-size="24" fill="#DDD"
        text-anchor="start" direction="rtl">آزادی بیان · حقّ رأی · مالکیت · امنیت جانی</text>
  <text x="910" y="400" font-family="Vazirmatn, Tahoma" font-size="20" fill="#999"
        text-anchor="start" direction="rtl">ریشه: روشنگری · لاک · انقلاب فرانسه</text>
  <rect x="120" y="420" width="200" height="28" rx="8" fill="#06B6D4" fill-opacity="0.1"/>
  <text x="220" y="441" font-family="Vazirmatn, Tahoma" font-size="18" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">شعار: آزادی</text>

  <!-- نسل دوم -->
  <rect x="80" y="475" width="920" height="195" rx="22"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="80" y="475" width="10" height="195" rx="5" fill="#F59E0B" fill-opacity="0.6"/>
  <circle cx="960" cy="520" r="30" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.4"/>
  <text x="960" y="529" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F59E0B"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="910" y="529" font-family="Vazirmatn, Tahoma" font-size="32" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">حقوق اقتصادی و اجتماعی</text>
  <text x="910" y="575" font-family="Vazirmatn, Tahoma" font-size="24" fill="#DDD"
        text-anchor="start" direction="rtl">آموزش · بهداشت · مسکن · کار شایسته · تأمین اجتماعی</text>
  <text x="910" y="615" font-family="Vazirmatn, Tahoma" font-size="20" fill="#999"
        text-anchor="start" direction="rtl">ریشه: سوسیالیسم · جنبش کارگری · دولت رفاه</text>
  <rect x="120" y="635" width="200" height="28" rx="8" fill="#F59E0B" fill-opacity="0.1"/>
  <text x="220" y="656" font-family="Vazirmatn, Tahoma" font-size="18" fill="#FBBF24"
        text-anchor="middle" direction="rtl">شعار: برابری</text>

  <!-- نسل سوم -->
  <rect x="80" y="690" width="920" height="195" rx="22"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="80" y="690" width="10" height="195" rx="5" fill="#A855F7" fill-opacity="0.6"/>
  <circle cx="960" cy="735" r="30" fill="#A855F7" fill-opacity="0.12" stroke="#A855F7" stroke-opacity="0.4"/>
  <text x="960" y="744" font-family="Vazirmatn, Tahoma" font-size="26" fill="#C084FC"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="910" y="744" font-family="Vazirmatn, Tahoma" font-size="32" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">حقوق همبستگی و جمعی</text>
  <text x="910" y="790" font-family="Vazirmatn, Tahoma" font-size="24" fill="#DDD"
        text-anchor="start" direction="rtl">محیط زیست · صلح · توسعه · حقوق نسل‌های آینده</text>
  <text x="910" y="830" font-family="Vazirmatn, Tahoma" font-size="20" fill="#999"
        text-anchor="start" direction="rtl">ریشه: جهانی‌شدن · بحران اقلیمی · عدالت بین‌نسلی</text>
  <rect x="120" y="850" width="200" height="28" rx="8" fill="#A855F7" fill-opacity="0.1"/>
  <text x="220" y="871" font-family="Vazirmatn, Tahoma" font-size="18" fill="#C084FC"
        text-anchor="middle" direction="rtl">شعار: همبستگی</text>

  <!-- نقد نویسنده -->
  <rect x="200" y="920" width="680" height="55" rx="14"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.12"/>
  <text x="540" y="955" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="middle" direction="rtl">⚠ نقد نویسنده: هر نسل بدون قبلی پوسته‌ای توخالی‌ست — باید منظومه‌ای دید</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#22C55E" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۳</text>
</svg>
