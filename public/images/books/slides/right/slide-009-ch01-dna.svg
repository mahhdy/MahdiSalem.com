<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg9" x1="540" y1="0" x2="540" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1220"/>
      <stop offset="100%" stop-color="#0A0E18"/>
    </linearGradient>
    <radialGradient id="glow9" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E8B83D" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#E8B83D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg9)"/>
  <rect width="1080" height="1080" fill="url(#glow9)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#E8B83D" fill-opacity="0.08" stroke="#E8B83D" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E8B83D"
        text-anchor="middle" direction="rtl">فصل ۱ · اسلاید ۹ از ۱۰</text>

  <!-- عنوان -->
  <text x="990" y="155" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#E8B83D" text-anchor="start" direction="rtl">DNA فلسفی نویسنده</text>
  <text x="990" y="200" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="start" direction="rtl">یک نقشهٔ فشرده از مبانی فکری کتاب</text>

  <!-- شبکه ۶ مفهوم کلیدی -->
  <!-- ردیف اول -->
  <rect x="560" y="250" width="440" height="110" rx="16"
        fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="960" y="295" font-family="Vazirmatn, Tahoma" font-size="26" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">هستی‌شناسی حق</text>
  <text x="960" y="335" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">ساختی‐کشفی · نه واقعی محض، نه قراردادی محض</text>

  <rect x="80" y="250" width="440" height="110" rx="16"
        fill="#22C55E" fill-opacity="0.05" stroke="#22C55E" stroke-opacity="0.2"/>
  <text x="480" y="295" font-family="Vazirmatn, Tahoma" font-size="26" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">معرفت‌شناسی</text>
  <text x="480" y="335" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">بدون نقطه ارشمیدسی · کشتی نویرات</text>

  <!-- ردیف دوم -->
  <rect x="560" y="380" width="440" height="110" rx="16"
        fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="960" y="425" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F59E0B"
        text-anchor="start" direction="rtl" font-weight="bold">عاملیت</text>
  <text x="960" y="465" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">محوری · فاعل مختار خلّاق · سوژهٔ دغدغه‌مند</text>

  <rect x="80" y="380" width="440" height="110" rx="16"
        fill="#DC2626" fill-opacity="0.05" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="480" y="425" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">پل باید و هست</text>
  <text x="480" y="465" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">چهارگانه: مشروط + اراده + رنج + اجبار</text>

  <!-- ردیف سوم -->
  <rect x="560" y="510" width="440" height="110" rx="16"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.2"/>
  <text x="960" y="555" font-family="Vazirmatn, Tahoma" font-size="26" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">اخلاق</text>
  <text x="960" y="595" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">منظوم · ترکیب وظیفه + نتیجه + فضیلت</text>

  <rect x="80" y="510" width="440" height="110" rx="16"
        fill="#E8B83D" fill-opacity="0.05" stroke="#E8B83D" stroke-opacity="0.2"/>
  <text x="480" y="555" font-family="Vazirmatn, Tahoma" font-size="26" fill="#E8B83D"
        text-anchor="start" direction="rtl" font-weight="bold">غایت</text>
  <text x="480" y="595" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">شکوفایی · پویایی · پایستگی · انصاف</text>

  <!-- فلش مرکزی اتصال -->
  <line x1="540" y1="650" x2="540" y2="710" stroke="#E8B83D" stroke-opacity="0.3" stroke-width="2"/>
  <polygon points="528,708 540,728 552,708" fill="#E8B83D" fill-opacity="0.4"/>

  <!-- نتیجه -->
  <rect x="140" y="740" width="800" height="160" rx="22"
        fill="#E8B83D" fill-opacity="0.04" stroke="#E8B83D" stroke-opacity="0.2"/>
  <text x="540" y="800" font-family="Vazirmatn, Tahoma" font-size="32" fill="#E8B83D"
        text-anchor="middle" direction="rtl" font-weight="bold">نتیجه: حقوق مهندسی‌شدهٔ مقیّد به کرامت</text>
  <text x="540" y="845" font-family="Vazirmatn, Tahoma" font-size="24" fill="#CCC"
        text-anchor="middle" direction="rtl">خروجی ماشین زنده‌ای خودسامان، خودنقاد و خودیادگیرنده</text>
  <text x="540" y="880" font-family="Vazirmatn, Tahoma" font-size="22" fill="#999"
        text-anchor="middle" direction="rtl">← تعریف سطح اخص حق در این کتاب</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#E8B83D" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۱</text>
</svg>
