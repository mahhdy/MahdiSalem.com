<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg050" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg050)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="380" height="50" rx="25"
        fill="#22C55E" fill-opacity="0.08" stroke="#22C55E" stroke-opacity="0.4"/>
  <text x="230" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#22C55E"
        text-anchor="middle" direction="rtl">فصل ۵ · اسلاید ۱ از ۱۰ — جغرافیای مفهومی</text>

  <!-- عنوان -->
  <text x="540" y="170" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="bold"
        fill="#22C55E" text-anchor="middle" direction="rtl">نقشهٔ دو بعدی حق</text>

  <!-- محورهای مفهومی -->
  <line x1="220" y1="820" x2="880" y2="820" stroke="#4B5563" stroke-width="2"/>
  <line x1="550" y1="330" x2="550" y2="880" stroke="#4B5563" stroke-width="2"/>

  <text x="885" y="815" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E5E7EB"
        text-anchor="start" direction="rtl">فردی</text>
  <text x="215" y="815" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E5E7EB"
        text-anchor="end" direction="rtl">جمعی</text>

  <text x="555" y="320" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E5E7EB"
        text-anchor="middle" direction="rtl">«داشتن» حق</text>
  <text x="555" y="900" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E5E7EB"
        text-anchor="middle" direction="rtl">«بر حق بودن»</text>

  <!-- چند نقطهٔ مفهومی -->
  <circle cx="780" cy="380" r="14" fill="#22C55E"/>
  <text x="780" y="365" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BBF7D0"
        text-anchor="middle" direction="rtl">مالکیت فردی</text>

  <circle cx="320" cy="390" r="14" fill="#38BDF8"/>
  <text x="320" y="375" font-family="Vazirmatn, Tahoma" font-size="24" fill="#BAE6FD"
        text-anchor="middle" direction="rtl">حق اقلیت</text>

  <circle cx="780" cy="760" r="14" fill="#F97316"/>
  <text x="780" y="745" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FED7AA"
        text-anchor="middle" direction="rtl">وجدان اخلاقی فرد</text>

  <circle cx="300" cy="760" r="14" fill="#EC4899"/>
  <text x="300" y="745" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FECDD3"
        text-anchor="middle" direction="rtl">روح جمعی / ارادهٔ عمومی</text>

  <!-- پیام -->
  <rect x="80" y="890" width="920" height="130" rx="18"
        fill="#111827" stroke="#6B7280" stroke-opacity="0.4"/>
  <text x="540" y="935" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F9FAFB"
        text-anchor="middle" direction="rtl">کتاب تلاش می‌کند حق را در هر چهار ربع نقشه ببیند،</text>
  <text x="540" y="975" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F9FAFB"
        text-anchor="middle" direction="rtl">نه فقط در «فردی/داشتن» یا «جمعی/برحق بودن»</text>
</svg>
