<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg14" x1="1080" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#101828"/>
    </linearGradient>
    <radialGradient id="glow14" cx="40%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg14)"/>
  <rect width="1080" height="1080" fill="url(#glow14)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#06B6D4"
        text-anchor="middle" direction="rtl">فصل ۲ · اسلاید ۴ از ۱۰</text>

  <!-- عنوان -->
  <text x="1000" y="155" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#22D3EE" text-anchor="start" direction="rtl">Right: هفت وجه یک واژه</text>
  <text x="1000" y="205" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="start" direction="rtl">حفاری در زبان انگلیسی برای فهم تطبیقی</text>

  <!-- ۷ کارت عمودی -->
  <rect x="80" y="260" width="920" height="82" rx="14"
        fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-opacity="0.15"/>
  <text x="960" y="298" font-family="Vazirmatn, Tahoma" font-size="26" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">Right as Correct</text>
  <text x="420" y="298" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">درست · صحیح · مطابق واقع</text>

  <rect x="80" y="355" width="920" height="82" rx="14"
        fill="#22C55E" fill-opacity="0.05" stroke="#22C55E" stroke-opacity="0.15"/>
  <text x="960" y="393" font-family="Vazirmatn, Tahoma" font-size="26" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">Right as Legitimate</text>
  <text x="420" y="393" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">مشروع · موجّه · قابل‌دفاع</text>

  <rect x="80" y="450" width="920" height="82" rx="14"
        fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-opacity="0.15"/>
  <text x="960" y="488" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F59E0B"
        text-anchor="start" direction="rtl" font-weight="bold">Right as Ethical</text>
  <text x="420" y="488" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">اخلاقاً بر حق · نیکو · شایسته</text>

  <rect x="80" y="545" width="920" height="82" rx="14"
        fill="#DC2626" fill-opacity="0.05" stroke="#DC2626" stroke-opacity="0.15"/>
  <text x="960" y="583" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">Right as Entitlement</text>
  <text x="420" y="583" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">استحقاق · حقّ داشتن · بهره‌مندی</text>

  <rect x="80" y="640" width="920" height="82" rx="14"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.15"/>
  <text x="960" y="678" font-family="Vazirmatn, Tahoma" font-size="26" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">Right as Solution</text>
  <text x="420" y="678" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">پاسخ درست · راه‌حل · حلّ مسئله</text>

  <rect x="80" y="735" width="920" height="82" rx="14"
        fill="#EC4899" fill-opacity="0.05" stroke="#EC4899" stroke-opacity="0.15"/>
  <text x="960" y="773" font-family="Vazirmatn, Tahoma" font-size="26" fill="#EC4899"
        text-anchor="start" direction="rtl" font-weight="bold">Right as Fit / Competent</text>
  <text x="420" y="773" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">شایسته · متناسب · در جایگاه درست</text>

  <rect x="80" y="830" width="920" height="82" rx="14"
        fill="#14B8A6" fill-opacity="0.05" stroke="#14B8A6" stroke-opacity="0.15"/>
  <text x="960" y="868" font-family="Vazirmatn, Tahoma" font-size="26" fill="#14B8A6"
        text-anchor="start" direction="rtl" font-weight="bold">Right as Rightfulness</text>
  <text x="420" y="868" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">بر حق بودن · حقّانیت · صواب</text>

  <!-- نکته -->
  <rect x="120" y="935" width="840" height="50" rx="12"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.1"/>
  <text x="540" y="968" font-family="Vazirmatn, Tahoma" font-size="22" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">همهٔ این وجوه در واژهٔ فارسی «حق» نیز حضور دارند ← شبکهٔ مشترک</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#06B6D4" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۲</text>
</svg>
