<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg33" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1220"/>
      <stop offset="100%" stop-color="#0A0E18"/>
    </linearGradient>
    <radialGradient id="glow33" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8B83D" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#E8B83D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg33)"/>
  <rect width="1080" height="1080" fill="url(#glow33)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#E8B83D" fill-opacity="0.08" stroke="#E8B83D" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E8B83D"
        text-anchor="middle" direction="rtl">فصل ۴ · اسلاید ۳ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="155" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#FBBF24" text-anchor="middle" direction="rtl">ده منشأ حق (۶ تا ۱۰)</text>
  <text x="540" y="205" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="middle" direction="rtl">شامل دو نوآوری نویسنده: رنج و عاملیت</text>

  <!-- منشأ ۶ -->
  <rect x="80" y="260" width="920" height="120" rx="18"
        fill="#EC4899" fill-opacity="0.04" stroke="#EC4899" stroke-opacity="0.18"/>
  <circle cx="960" cy="295" r="26" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-opacity="0.4"/>
  <text x="960" y="303" font-family="Vazirmatn, Tahoma" font-size="22" fill="#EC4899"
        text-anchor="middle" font-weight="bold">۶</text>
  <text x="920" y="303" font-family="Vazirmatn, Tahoma" font-size="30" fill="#F9A8D4"
        text-anchor="start" direction="rtl" font-weight="bold">خون و نژاد</text>
  <text x="920" y="348" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">ژنتیک · خاندان · نژاد · امتیازات موروثی</text>

  <!-- منشأ ۷ -->
  <rect x="80" y="395" width="920" height="120" rx="18"
        fill="#14B8A6" fill-opacity="0.04" stroke="#14B8A6" stroke-opacity="0.18"/>
  <circle cx="960" cy="430" r="26" fill="#14B8A6" fill-opacity="0.15" stroke="#14B8A6" stroke-opacity="0.4"/>
  <text x="960" y="438" font-family="Vazirmatn, Tahoma" font-size="22" fill="#2DD4BF"
        text-anchor="middle" font-weight="bold">۷</text>
  <text x="920" y="438" font-family="Vazirmatn, Tahoma" font-size="30" fill="#2DD4BF"
        text-anchor="start" direction="rtl" font-weight="bold">عملکرد</text>
  <text x="920" y="483" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">نتایج عملی · بهینه‌سازی · کارآمدی توزیع حق</text>

  <!-- منشأ ۸ -->
  <rect x="80" y="530" width="920" height="120" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.18"/>
  <circle cx="960" cy="565" r="26" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-opacity="0.4"/>
  <text x="960" y="573" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FBBF24"
        text-anchor="middle" font-weight="bold">۸</text>
  <text x="920" y="573" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">مصلحت</text>
  <text x="920" y="618" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">سود جمعی · هزینه-فایده · فایده‌گرایی</text>

  <!-- منشأ ۹ - نوآوری -->
  <rect x="80" y="665" width="920" height="120" rx="18"
        fill="#DC2626" fill-opacity="0.06" stroke="#DC2626" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="960" cy="700" r="26" fill="#DC2626" fill-opacity="0.2" stroke="#DC2626" stroke-opacity="0.6"/>
  <text x="960" y="708" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="middle" font-weight="bold">۹</text>
  <text x="920" y="700" font-family="Vazirmatn, Tahoma" font-size="30" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">رنج و آسیب‌پذیری ★</text>
  <text x="920" y="748" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">تجربهٔ درد · فریاد بی‌حقّی · ضمانت عدم تکرار</text>
  <text x="130" y="748" font-family="Vazirmatn, Tahoma" font-size="18" fill="#F87171"
        text-anchor="start" direction="rtl">نوآوری نویسنده</text>

  <!-- منشأ ۱۰ - نوآوری -->
  <rect x="80" y="800" width="920" height="120" rx="18"
        fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-opacity="0.3" stroke-width="2"/>
  <circle cx="960" cy="835" r="26" fill="#22C55E" fill-opacity="0.2" stroke="#22C55E" stroke-opacity="0.6"/>
  <text x="960" y="843" font-family="Vazirmatn, Tahoma" font-size="22" fill="#4ADE80"
        text-anchor="middle" font-weight="bold">۱۰</text>
  <text x="910" y="835" font-family="Vazirmatn, Tahoma" font-size="30" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">عاملیت و قابلیت ★</text>
  <text x="910" y="883" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">توانایی خودتعریفی · خلّاقیت · شدن و فراتررفتن</text>
  <text x="130" y="883" font-family="Vazirmatn, Tahoma" font-size="18" fill="#4ADE80"
        text-anchor="start" direction="rtl">نوآوری نویسنده</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#E8B83D" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۴</text>
</svg>
