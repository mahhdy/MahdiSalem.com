<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1220"/>
      <stop offset="100%" stop-color="#0E0A18"/>
    </linearGradient>
    <radialGradient id="glow16" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg16)"/>
  <rect width="1080" height="1080" fill="url(#glow16)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#EC4899" fill-opacity="0.08" stroke="#EC4899" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EC4899"
        text-anchor="middle" direction="rtl">فصل ۲ · اسلاید ۶ از ۱۰</text>

  <!-- عنوان -->
  <text x="1000" y="155" font-family="Vazirmatn, Tahoma" font-size="54" font-weight="900"
        fill="#F472B6" text-anchor="start" direction="rtl">حق و مجوز</text>
  <text x="1000" y="210" font-family="Vazirmatn, Tahoma" font-size="26" fill="#888"
        text-anchor="start" direction="rtl">حفاری عمیق‌تر: وقتی زبان «اجازه» می‌گوید چه می‌فهمیم؟</text>

  <!-- پرسش مرکزی بزرگ -->
  <rect x="120" y="270" width="840" height="130" rx="22"
        fill="#EC4899" fill-opacity="0.05" stroke="#EC4899" stroke-opacity="0.2" stroke-width="1.5"/>
  <text x="540" y="325" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF"
        text-anchor="middle" direction="rtl" font-weight="bold">آیا مجوز چیزی جز این‌هاست؟</text>
  <text x="540" y="375" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F9A8D4"
        text-anchor="middle" direction="rtl">اجازهٔ انتخاب · آزادی عمل · دامنهٔ آزاد کنش · حریم امن</text>

  <!-- سه لایهٔ مجوز -->
  <rect x="80" y="440" width="920" height="140" rx="20"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.15"/>
  <circle cx="960" cy="480" r="28" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-opacity="0.4"/>
  <text x="960" y="488" font-family="Vazirmatn, Tahoma" font-size="22" fill="#06B6D4"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="920" y="488" font-family="Vazirmatn, Tahoma" font-size="30" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">اجازهٔ انتخاب</text>
  <text x="920" y="535" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">حق یعنی بتوانی انتخاب کنی — نه فقط اینکه انتخابت درست باشد</text>

  <rect x="80" y="600" width="920" height="140" rx="20"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.15"/>
  <circle cx="960" cy="640" r="28" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-opacity="0.4"/>
  <text x="960" y="648" font-family="Vazirmatn, Tahoma" font-size="22" fill="#22C55E"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="920" y="648" font-family="Vazirmatn, Tahoma" font-size="30" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">حریم مصون</text>
  <text x="920" y="695" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">فضایی که دیگران حقّ تعرّض و انسداد و حمله به آن را ندارند</text>

  <rect x="80" y="760" width="920" height="140" rx="20"
        fill="#E8B83D" fill-opacity="0.04" stroke="#E8B83D" stroke-opacity="0.15"/>
  <circle cx="960" cy="800" r="28" fill="#E8B83D" fill-opacity="0.15" stroke="#E8B83D" stroke-opacity="0.4"/>
  <text x="960" y="808" font-family="Vazirmatn, Tahoma" font-size="22" fill="#E8B83D"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="920" y="808" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">بی‌نیازی از تأیید</text>
  <text x="920" y="855" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">در این دامنه نیازی به اذن و رخصت دیگری نداری</text>

  <!-- نکته -->
  <rect x="200" y="935" width="680" height="50" rx="14"
        fill="#EC4899" fill-opacity="0.04" stroke="#EC4899" stroke-opacity="0.12"/>
  <text x="540" y="968" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F9A8D4"
        text-anchor="middle" direction="rtl">هر سه لایه در زبان فارسی در واژهٔ «حق» و «اجازه» نهفته‌اند</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#EC4899" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۲</text>
</svg>
