<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg23" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glow23" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg23)"/>
  <rect width="1080" height="1080" fill="url(#glow23)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#06B6D4"
        text-anchor="middle" direction="rtl">فصل ۳ · اسلاید ۳ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="150" font-family="Vazirmatn, Tahoma" font-size="46" font-weight="900"
        fill="#22D3EE" text-anchor="middle" direction="rtl">خطّ زمانی حق: تحوّل بزرگ</text>
  <text x="540" y="195" font-family="Vazirmatn, Tahoma" font-size="22" fill="#888"
        text-anchor="middle" direction="rtl">از حقوق طبیعی مدرن تا اعلامیه جهانی و فراتر</text>

  <!-- خط زمانی عمودی -->
  <line x1="800" y1="240" x2="800" y2="940" stroke="#06B6D4" stroke-opacity="0.15" stroke-width="3"/>

  <!-- نقطه ۱: هابز/لاک -->
  <circle cx="800" cy="280" r="12" fill="#F59E0B" fill-opacity="0.3" stroke="#F59E0B" stroke-opacity="0.7" stroke-width="2"/>
  <text x="770" y="275" font-family="Vazirmatn, Tahoma" font-size="20" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">قرن ۱۷</text>
  <rect x="100" y="255" width="640" height="65" rx="14"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.12"/>
  <text x="710" y="283" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">هابز و لاک: حقوق طبیعی مدرن</text>
  <text x="710" y="310" font-family="Vazirmatn, Tahoma" font-size="18" fill="#AAA"
        text-anchor="start" direction="rtl">حق = حالت طبیعی فرد · قرارداد اجتماعی · دولت نگهبان</text>

  <!-- نقطه ۲: روسو/کانت -->
  <circle cx="800" cy="390" r="12" fill="#22C55E" fill-opacity="0.3" stroke="#22C55E" stroke-opacity="0.7" stroke-width="2"/>
  <text x="770" y="385" font-family="Vazirmatn, Tahoma" font-size="20" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">قرن ۱۸</text>
  <rect x="100" y="365" width="640" height="65" rx="14"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.12"/>
  <text x="710" y="393" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">روسو و کانت: کرامت و خودآیینی</text>
  <text x="710" y="420" font-family="Vazirmatn, Tahoma" font-size="18" fill="#AAA"
        text-anchor="start" direction="rtl">انسان غایت نه ابزار · اعلامیهٔ حقوق بشر فرانسه ۱۷۸۹</text>

  <!-- نقطه ۳: مارکس -->
  <circle cx="800" cy="500" r="12" fill="#DC2626" fill-opacity="0.3" stroke="#DC2626" stroke-opacity="0.7" stroke-width="2"/>
  <text x="770" y="495" font-family="Vazirmatn, Tahoma" font-size="20" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">قرن ۱۹</text>
  <rect x="100" y="475" width="640" height="65" rx="14"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.12"/>
  <text x="710" y="503" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">مارکس: نقد حقوق بورژوایی</text>
  <text x="710" y="530" font-family="Vazirmatn, Tahoma" font-size="18" fill="#AAA"
        text-anchor="start" direction="rtl">حق صوری بدون عدالت واقعی = ابزار سلطهٔ طبقاتی</text>

  <!-- نقطه ۴: اعلامیه جهانی -->
  <circle cx="800" cy="610" r="12" fill="#06B6D4" fill-opacity="0.3" stroke="#06B6D4" stroke-opacity="0.7" stroke-width="2"/>
  <text x="770" y="605" font-family="Vazirmatn, Tahoma" font-size="20" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">۱۹۴۸</text>
  <rect x="100" y="585" width="640" height="65" rx="14"
        fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="710" y="613" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">اعلامیهٔ جهانی حقوق بشر</text>
  <text x="710" y="640" font-family="Vazirmatn, Tahoma" font-size="18" fill="#AAA"
        text-anchor="start" direction="rtl">زاده از رنج هولوکاست · اولین اجماع جهانی دربارهٔ حق</text>

  <!-- نقطه ۵: رالز -->
  <circle cx="800" cy="720" r="12" fill="#A855F7" fill-opacity="0.3" stroke="#A855F7" stroke-opacity="0.7" stroke-width="2"/>
  <text x="770" y="715" font-family="Vazirmatn, Tahoma" font-size="20" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">۱۹۷۱</text>
  <rect x="100" y="695" width="640" height="65" rx="14"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.12"/>
  <text x="710" y="723" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">رالز: عدالت به مثابهٔ انصاف</text>
  <text x="710" y="750" font-family="Vazirmatn, Tahoma" font-size="18" fill="#AAA"
        text-anchor="start" direction="rtl">پردهٔ بی‌خبری · اصل تفاوت · احیای فلسفهٔ سیاسی</text>

  <!-- نقطه ۶: سن/نوسباوم -->
  <circle cx="800" cy="830" r="12" fill="#EC4899" fill-opacity="0.3" stroke="#EC4899" stroke-opacity="0.7" stroke-width="2"/>
  <text x="770" y="825" font-family="Vazirmatn, Tahoma" font-size="20" fill="#EC4899"
        text-anchor="start" direction="rtl" font-weight="bold">۱۹۹۰+</text>
  <rect x="100" y="805" width="640" height="65" rx="14"
        fill="#EC4899" fill-opacity="0.04" stroke="#EC4899" stroke-opacity="0.12"/>
  <text x="710" y="833" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">سن و نوسباوم: رویکرد قابلیت</text>
  <text x="710" y="860" font-family="Vazirmatn, Tahoma" font-size="18" fill="#AAA"
        text-anchor="start" direction="rtl">حق = قابلیت واقعی · نه فقط آزادی صوری بلکه توانایی بالفعل</text>

  <!-- نکته -->
  <rect x="100" y="900" width="880" height="55" rx="14"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.12"/>
  <text x="540" y="935" font-family="Vazirmatn, Tahoma" font-size="22" fill="#22D3EE"
        text-anchor="middle" direction="rtl">دیدگاه نویسنده: هر دوره پاسخی ناقص داد · نوبت نگاه نوین است ←</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#06B6D4" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۳</text>
</svg>
