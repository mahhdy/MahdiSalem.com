<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg2)"/>
  <rect width="1080" height="1080" fill="url(#glow2)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#DC2626" fill-opacity="0.08" stroke="#DC2626" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#DC2626"
        text-anchor="middle" direction="rtl">فصل ۱ · اسلاید ۲ از ۱۰</text>

  <!-- علامت سؤال بزرگ دکوراتیو -->
  <text x="540" y="480" font-family="Georgia, serif" font-size="500" fill="#DC2626"
        fill-opacity="0.04" text-anchor="middle" font-weight="bold">?</text>

  <!-- پرسش محوری -->
  <text x="540" y="260" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#F87171" text-anchor="middle" direction="rtl">پرسشِ بنیادین</text>

  <rect x="140" y="310" width="800" height="3" rx="1.5"
        fill="#DC2626" fill-opacity="0.3"/>

  <!-- سه سؤال کلیدی -->
  <rect x="100" y="370" width="880" height="120" rx="20"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.15"/>
  <text x="940" y="420" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">پرسش ۱</text>
  <text x="940" y="465" font-family="Vazirmatn, Tahoma" font-size="38" fill="#FFFFFF"
        text-anchor="start" direction="rtl">«حق» دقیقاً چیست و از کجا می‌آید؟</text>

  <rect x="100" y="510" width="880" height="120" rx="20"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.15"/>
  <text x="940" y="560" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F59E0B"
        text-anchor="start" direction="rtl" font-weight="bold">پرسش ۲</text>
  <text x="940" y="605" font-family="Vazirmatn, Tahoma" font-size="38" fill="#FFFFFF"
        text-anchor="start" direction="rtl">چرا تعریف‌های موجود ناکافی‌اند؟</text>

  <rect x="100" y="650" width="880" height="120" rx="20"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.15"/>
  <text x="940" y="700" font-family="Vazirmatn, Tahoma" font-size="22" fill="#06B6D4"
        text-anchor="start" direction="rtl" font-weight="bold">پرسش ۳</text>
  <text x="940" y="745" font-family="Vazirmatn, Tahoma" font-size="38" fill="#FFFFFF"
        text-anchor="start" direction="rtl">آیا می‌توان حق را «مهندسی» کرد؟</text>

  <!-- نقل‌قول -->
  <rect x="120" y="830" width="840" height="100" rx="16"
        fill="#FFFFFF" fill-opacity="0.02" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="540" y="870" font-family="Vazirmatn, Tahoma" font-size="26" fill="#C19A3E"
        text-anchor="middle" direction="rtl" font-style="italic">«هر مفهومِ بنیادینی که بی‌پرسش بماند</text>
  <text x="540" y="910" font-family="Vazirmatn, Tahoma" font-size="26" fill="#C19A3E"
        text-anchor="middle" direction="rtl" font-style="italic">ابزار دست قدرت می‌شود.»</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#DC2626" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۱</text>
</svg>
