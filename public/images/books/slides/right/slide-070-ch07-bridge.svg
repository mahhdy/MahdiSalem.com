<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg70" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0F1A"/>
      <stop offset="100%" stop-color="#141E30"/>
    </linearGradient>
    <linearGradient id="bridge" x1="100" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg70)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="360" height="48" rx="24"
        fill="#3B82F6" fill-opacity="0.08" stroke="#3B82F6" stroke-opacity="0.25"/>
  <text x="220" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#3B82F6"
        text-anchor="middle" direction="rtl">فصل ۷ · اسلاید ۱ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="200" font-family="Vazirmatn, Tahoma" font-size="68" font-weight="900"
        fill="url(#bridge)" text-anchor="middle" direction="rtl">پل باید و هست</text>
  <text x="540" y="260" font-family="Vazirmatn, Tahoma" font-size="28" fill="#778"
        text-anchor="middle" direction="rtl">شکاف هیوم چگونه پر می‌شود؟</text>

  <!-- پل بصری -->
  <rect x="100" y="330" width="380" height="80" rx="14"
        fill="#3B82F6" fill-opacity="0.08" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="2"/>
  <text x="290" y="380" font-family="Vazirmatn, Tahoma" font-size="38" fill="#3B82F6"
        font-weight="bold" text-anchor="middle" direction="rtl">هست</text>

  <rect x="600" y="330" width="380" height="80" rx="14"
        fill="#EC4899" fill-opacity="0.08" stroke="#EC4899" stroke-opacity="0.4" stroke-width="2"/>
  <text x="790" y="380" font-family="Vazirmatn, Tahoma" font-size="38" fill="#EC4899"
        font-weight="bold" text-anchor="middle" direction="rtl">باید</text>

  <rect x="480" y="350" width="120" height="40" rx="8" fill="url(#bridge)" opacity="0.4"/>
  <text x="540" y="378" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFF"
        font-weight="bold" text-anchor="middle">پل</text>

  <!-- چهار پل -->
  <text x="540" y="480" font-family="Vazirmatn, Tahoma" font-size="32" fill="#C19A3E"
        font-weight="bold" text-anchor="middle" direction="rtl">چهار پل پیشنهادی:</text>

  <rect x="555" y="520" width="465" height="100" rx="16"
        fill="#3B82F6" fill-opacity="0.05" stroke="#3B82F6" stroke-opacity="0.25"/>
  <text x="787" y="565" font-family="Vazirmatn, Tahoma" font-size="30" fill="#60A5FA"
        font-weight="bold" text-anchor="middle" direction="rtl">۱. امر مشروط</text>
  <text x="787" y="602" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="middle" direction="rtl">اگر X می‌خواهی، Y را باید انجام دهی</text>

  <rect x="60" y="520" width="465" height="100" rx="16"
        fill="#EC4899" fill-opacity="0.05" stroke="#EC4899" stroke-opacity="0.25"/>
  <text x="292" y="565" font-family="Vazirmatn, Tahoma" font-size="30" fill="#EC4899"
        font-weight="bold" text-anchor="middle" direction="rtl">۲. اراده و عاملیت</text>
  <text x="292" y="602" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="middle" direction="rtl">جهش خلّاقانه از واقعیت فراتر می‌رود</text>

  <rect x="555" y="640" width="465" height="100" rx="16"
        fill="#22C55E" fill-opacity="0.05" stroke="#22C55E" stroke-opacity="0.25"/>
  <text x="787" y="685" font-family="Vazirmatn, Tahoma" font-size="30" fill="#4ADE80"
        font-weight="bold" text-anchor="middle" direction="rtl">۳. رنج</text>
  <text x="787" y="722" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="middle" direction="rtl">تجربهٔ درد مرز «باید» را نشان می‌دهد</text>

  <rect x="60" y="640" width="465" height="100" rx="16"
        fill="#C19A3E" fill-opacity="0.05" stroke="#C19A3E" stroke-opacity="0.25"/>
  <text x="292" y="685" font-family="Vazirmatn, Tahoma" font-size="30" fill="#C19A3E"
        font-weight="bold" text-anchor="middle" direction="rtl">۴. اجبار اجتماعی</text>
  <text x="292" y="722" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="middle" direction="rtl">پیچیدگی جامعه مشارکت اخلاقی را اجبار می‌کند</text>

  <!-- مثال چای -->
  <rect x="80" y="790" width="920" height="130" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.18"/>
  <text x="540" y="840" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F59E0B"
        font-weight="bold" text-anchor="middle" direction="rtl">🫖 مثال چای:</text>
  <text x="540" y="885" font-family="Vazirmatn, Tahoma" font-size="26" fill="#CCC"
        text-anchor="middle" direction="rtl">اگر چای خوشمزه فقط با آب جوشیده تهیه شود</text>
  <text x="540" y="920" font-family="Vazirmatn, Tahoma" font-size="26" fill="#CCC"
        text-anchor="middle" direction="rtl">و علی چای خوشمزه بخواهد ← باید آب بجوشاند!</text>

  <rect x="40" y="960" width="1000" height="2" rx="1" fill="url(#bridge)" opacity="0.3"/>

  <!-- نقد -->
  <text x="540" y="1010" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F87171"
        text-anchor="middle" direction="rtl">⚡ نقد: مثال چای برای حقوق فنّی کار می‌کند، برای حقوق بنیادین؟</text>

  <text x="540" y="1060" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بعدی: ماشین زنده ←</text>
</svg>
