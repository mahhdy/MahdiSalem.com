<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg27" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E0810"/>
      <stop offset="100%" stop-color="#0A1018"/>
    </linearGradient>
    <radialGradient id="glow27" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg27)"/>
  <rect width="1080" height="1080" fill="url(#glow27)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F59E0B"
        text-anchor="middle" direction="rtl">فصل ۳ · اسلاید ۷ از ۱۰</text>

  <!-- عنوان -->
  <text x="1000" y="155" font-family="Vazirmatn, Tahoma" font-size="48" font-weight="900"
        fill="#FBBF24" text-anchor="start" direction="rtl">نقد تاریخ‌نگاری خطّی</text>
  <text x="1000" y="205" font-family="Vazirmatn, Tahoma" font-size="26" fill="#888"
        text-anchor="start" direction="rtl">آیا تاریخ حق واقعاً «پیشرفت» بوده است؟</text>

  <!-- دو تصویر: خطی vs مارپیچی -->
  <!-- تصویر خطی (بالا) - خط‌خورده -->
  <rect x="80" y="280" width="920" height="220" rx="20"
        fill="#DC2626" fill-opacity="0.03" stroke="#DC2626" stroke-opacity="0.15"/>
  <text x="960" y="325" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">روایت رایج: خطّ صعودی</text>

  <!-- فلش خطی -->
  <line x1="180" y1="420" x2="900" y2="320" stroke="#F87171" stroke-opacity="0.4" stroke-width="3"/>
  <polygon points="895,310 910,315 895,330" fill="#F87171" fill-opacity="0.4"/>
  <!-- خطّ قرمز روی آن -->
  <line x1="400" y1="300" x2="600" y2="440" stroke="#DC2626" stroke-opacity="0.6" stroke-width="3"/>
  <line x1="400" y1="440" x2="600" y2="300" stroke="#DC2626" stroke-opacity="0.6" stroke-width="3"/>

  <text x="540" y="480" font-family="Vazirmatn, Tahoma" font-size="20" fill="#F87171"
        text-anchor="middle" direction="rtl">✗ بردگی مدرن · استعمار · هولوکاست · این پیشرفت خطی نیست</text>

  <!-- تصویر مارپیچی (پایین) -->
  <rect x="80" y="530" width="920" height="250" rx="20"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.18"/>
  <text x="960" y="575" font-family="Vazirmatn, Tahoma" font-size="28" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">دیدگاه نویسنده: مارپیچ صعودی</text>

  <!-- مارپیچ ساده‌سازی شده -->
  <ellipse cx="350" cy="670" rx="80" ry="35" fill="none" stroke="#4ADE80" stroke-opacity="0.2" stroke-width="2"/>
  <ellipse cx="500" cy="655" rx="80" ry="35" fill="none" stroke="#4ADE80" stroke-opacity="0.3" stroke-width="2"/>
  <ellipse cx="650" cy="640" rx="80" ry="35" fill="none" stroke="#4ADE80" stroke-opacity="0.4" stroke-width="2"/>
  <ellipse cx="800" cy="625" rx="80" ry="35" fill="none" stroke="#4ADE80" stroke-opacity="0.5" stroke-width="2"/>
  <!-- فلش صعودی نرم -->
  <line x1="270" y1="680" x2="870" y2="610" stroke="#4ADE80" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="8,5"/>
  <polygon points="865,603 880,607 868,618" fill="#4ADE80" fill-opacity="0.4"/>

  <text x="960" y="625" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">هر دور: یادگیری + عقبگرد + بازسازی</text>
  <text x="960" y="660" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">= دور هرمنوتیکی مشروعیت</text>
  <text x="960" y="695" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">همان کشتی نویرات در حرکت</text>
  <text x="960" y="735" font-family="Vazirmatn, Tahoma" font-size="20" fill="#999"
        text-anchor="start" direction="rtl">✓ صعود تضمینی نیست ولی ممکن است</text>

  <!-- نکته مقایسه‌ای -->
  <rect x="80" y="810" width="920" height="100" rx="18"
        fill="#E8B83D" fill-opacity="0.04" stroke="#E8B83D" stroke-opacity="0.15"/>
  <text x="540" y="850" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FBBF24"
        text-anchor="middle" direction="rtl" font-weight="bold">تفاوت با هگل:</text>
  <text x="540" y="890" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="middle" direction="rtl">هگل: روح مطلق تضمین پیشرفت می‌کند · نویسنده: هیچ تضمینی نیست جز عاملیت آگاه</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#F59E0B" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۳</text>
</svg>
