<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-games" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F1720"/>
      <stop offset="100%" stop-color="#141E2C"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-games)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="420" height="48" rx="24"
        fill="#14B8A6" fill-opacity="0.08" stroke="#14B8A6" stroke-opacity="0.25"/>
  <text x="410" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#5EEAD4"
        text-anchor="start" direction="rtl">فصل ۹ · انواع بازی · تصنیف نویسنده</text>

  <!-- عنوان -->
  <text x="1000" y="165" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#CCFBF1" text-anchor="start" direction="rtl">سه نوع بازی اجتماعی</text>
  <text x="1000" y="218" font-family="Vazirmatn, Tahoma" font-size="24" fill="#99F6E4"
        text-anchor="start" direction="rtl">طبیعی · ساختگی · بازساخته‌شده</text>

  <!-- بازی ۱: طبیعی -->
  <rect x="80" y="270" width="920" height="175" rx="22"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.25"/>
  <circle cx="950" cy="310" r="24" fill="#22C55E" fill-opacity="0.1" stroke="#22C55E" stroke-opacity="0.4"/>
  <text x="950" y="318" font-family="Vazirmatn, Tahoma" font-size="22" fill="#4ADE80"
        font-weight="bold" text-anchor="middle">۱</text>
  <text x="900" y="318" font-family="Vazirmatn, Tahoma" font-size="32" fill="#4ADE80"
        font-weight="bold" text-anchor="start" direction="rtl">بازی طبیعی</text>
  <text x="960" y="365" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="start" direction="rtl">قواعد نانوشته · تکامل خودجوش · شبیه بازار آزاد</text>
  <text x="960" y="403" font-family="Vazirmatn, Tahoma" font-size="21" fill="#AAA"
        text-anchor="start" direction="rtl">تشخیص حق: پسینی و مبتنی بر تجربه و مشاهده</text>
  <text x="960" y="433" font-family="Vazirmatn, Tahoma" font-size="19" fill="#4ADE80"
        text-anchor="start" direction="rtl">↰ مانند نهادهای خودجوش هایک · نظم خودانگیخته</text>

  <!-- بازی ۲: ساختگی -->
  <rect x="80" y="460" width="920" height="175" rx="22"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.25"/>
  <circle cx="950" cy="500" r="24" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-opacity="0.4"/>
  <text x="950" y="508" font-family="Vazirmatn, Tahoma" font-size="22" fill="#67E8F9"
        font-weight="bold" text-anchor="middle">۲</text>
  <text x="900" y="508" font-family="Vazirmatn, Tahoma" font-size="32" fill="#67E8F9"
        font-weight="bold" text-anchor="start" direction="rtl">بازی ساختگی (تدوین‌شده)</text>
  <text x="960" y="555" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="start" direction="rtl">قواعد صریح · طراحی آگاهانه · شبیه قانون اساسی</text>
  <text x="960" y="593" font-family="Vazirmatn, Tahoma" font-size="21" fill="#AAA"
        text-anchor="start" direction="rtl">تعاریف و تنظیمات، حقوق و آزادی‌ها را تعیین می‌کنند</text>
  <text x="960" y="623" font-family="Vazirmatn, Tahoma" font-size="19" fill="#67E8F9"
        text-anchor="start" direction="rtl">↰ مانند قرارداد اجتماعی روسو · طراحی نهادی</text>

  <!-- بازی ۳: بازساخته‌شده -->
  <rect x="80" y="650" width="920" height="175" rx="22"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.3"/>
  <circle cx="950" cy="690" r="24" fill="#A855F7" fill-opacity="0.12" stroke="#A855F7" stroke-opacity="0.4"/>
  <text x="950" y="698" font-family="Vazirmatn, Tahoma" font-size="22" fill="#D8B4FE"
        font-weight="bold" text-anchor="middle">۳</text>
  <text x="900" y="698" font-family="Vazirmatn, Tahoma" font-size="32" fill="#D8B4FE"
        font-weight="bold" text-anchor="start" direction="rtl">بازی بازساخته‌شده</text>
  <text x="960" y="745" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="start" direction="rtl">اصلاح و بازطراحی بازی در حین بازی</text>
  <text x="960" y="783" font-family="Vazirmatn, Tahoma" font-size="21" fill="#AAA"
        text-anchor="start" direction="rtl">ترکیب تجربه‌ی طبیعی با اصلاح آگاهانه</text>
  <text x="960" y="813" font-family="Vazirmatn, Tahoma" font-size="19" fill="#D8B4FE"
        text-anchor="start" direction="rtl">↰ دقیقاً کشتی نویرات: بازسازی در دریای باز</text>

  <!-- نکته کلیدی -->
  <rect x="80" y="850" width="920" height="90" rx="16"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.18"/>
  <text x="960" y="890" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ تمایز شبیه: ویتگنشتاین (بازی‌های زبانی) + نورث (نهادها)</text>
  <text x="960" y="928" font-family="Vazirmatn, Tahoma" font-size="21" fill="#AAA"
        text-anchor="start" direction="rtl">ولی افزودن «بازی بازساخته‌شده» = ابتکار نویسنده: فرایند تحول حقوق</text>

  <!-- پاورقی -->
  <rect x="40" y="980" width="1000" height="2" rx="1" fill="#14B8A6" opacity="0.2"/>
  <text x="540" y="1020" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق در هر نوع بازی معنای متفاوتی دارد · تکثّر بازی‌ها = تکثّر حقوق</text>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">فصل ۹ · بازی اجتماعی · ادامه دارد ←</text>
</svg>
