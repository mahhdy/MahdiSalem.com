<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg30" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0E1A"/>
      <stop offset="50%" stop-color="#0F1528"/>
      <stop offset="100%" stop-color="#0B0E1A"/>
    </linearGradient>
    <radialGradient id="glow30" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redGold30" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E8B83D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg30)"/>
  <rect width="1080" height="1080" fill="url(#glow30)"/>

  <!-- کادر تزئینی -->
  <rect x="60" y="60" width="960" height="960" rx="30" fill="none"
        stroke="#E8B83D" stroke-opacity="0.06" stroke-width="1"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="360" height="48" rx="24"
        fill="#DC2626" fill-opacity="0.08" stroke="#DC2626" stroke-opacity="0.25"/>
  <text x="220" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#DC2626"
        text-anchor="middle" direction="rtl">فصل ۳ · اسلاید ۱۰ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="170" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" direction="rtl">آنچه تاریخ آموخت</text>

  <rect x="200" y="210" width="680" height="2.5" rx="1" fill="url(#redGold30)"/>

  <!-- ۶ درس -->
  <rect x="120" y="260" width="840" height="78" rx="14"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.12"/>
  <circle cx="920" cy="299" r="20" fill="#DC2626" fill-opacity="0.15"/>
  <text x="920" y="307" font-family="Vazirmatn, Tahoma" font-size="18" fill="#F87171"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="880" y="307" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">حق مفهومی ابدی و ثابت نیست — تاریخ و زمینه دارد</text>

  <rect x="120" y="350" width="840" height="78" rx="14"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.12"/>
  <circle cx="920" cy="389" r="20" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="920" y="397" font-family="Vazirmatn, Tahoma" font-size="18" fill="#FBBF24"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="880" y="397" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">رنج، نه طراحی، مهم‌ترین موتور تحوّل حق بوده</text>

  <rect x="120" y="440" width="840" height="78" rx="14"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.12"/>
  <circle cx="920" cy="479" r="20" fill="#22C55E" fill-opacity="0.15"/>
  <text x="920" y="487" font-family="Vazirmatn, Tahoma" font-size="18" fill="#4ADE80"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="880" y="487" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">گذار از تکلیف به حق = بازتوزیع قدرت</text>

  <rect x="120" y="530" width="840" height="78" rx="14"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.12"/>
  <circle cx="920" cy="569" r="20" fill="#06B6D4" fill-opacity="0.15"/>
  <text x="920" y="577" font-family="Vazirmatn, Tahoma" font-size="18" fill="#22D3EE"
        text-anchor="middle" font-weight="bold">۴</text>
  <text x="880" y="577" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">هر نسل حق بدون نسل‌های قبل پوسته‌ای توخالی‌ست</text>

  <rect x="120" y="620" width="840" height="78" rx="14"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.12"/>
  <circle cx="920" cy="659" r="20" fill="#A855F7" fill-opacity="0.15"/>
  <text x="920" y="667" font-family="Vazirmatn, Tahoma" font-size="18" fill="#C084FC"
        text-anchor="middle" font-weight="bold">۵</text>
  <text x="880" y="667" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">تاریخ خطّی نیست — مارپیچ صعودیِ بدون تضمین</text>

  <rect x="120" y="710" width="840" height="78" rx="14"
        fill="#EC4899" fill-opacity="0.04" stroke="#EC4899" stroke-opacity="0.12"/>
  <circle cx="920" cy="749" r="20" fill="#EC4899" fill-opacity="0.15"/>
  <text x="920" y="757" font-family="Vazirmatn, Tahoma" font-size="18" fill="#EC4899"
        text-anchor="middle" font-weight="bold">۶</text>
  <text x="880" y="757" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">بحران معاصر = فرصت بازمهندسی نه پایان حق</text>

  <!-- نقل‌قول نهایی -->
  <rect x="120" y="825" width="840" height="80" rx="16"
        fill="#E8B83D" fill-opacity="0.04" stroke="#E8B83D" stroke-opacity="0.15"/>
  <text x="540" y="875" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FBBF24"
        text-anchor="middle" direction="rtl" font-style="italic">«تاریخ حق کتابی ناتمام است — و ما در حال نوشتن فصل بعدی‌ایم»</text>

  <!-- دعوت -->
  <rect x="280" y="930" width="520" height="50" rx="14"
        fill="#1A1A30" stroke="#E8B83D" stroke-opacity="0.2"/>
  <text x="540" y="963" font-family="Vazirmatn, Tahoma" font-size="22" fill="#E8B83D"
        text-anchor="middle" direction="rtl">فصل بعدی: مکاتب و منشأها ←</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#DC2626" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۳ — پایان</text>
</svg>
