<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1520"/>
      <stop offset="50%" stop-color="#0A1A2A"/>
      <stop offset="100%" stop-color="#0D1520"/>
    </linearGradient>
    <radialGradient id="glow11" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amberLine11" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg11)"/>
  <rect width="1080" height="1080" fill="url(#glow11)"/>

  <!-- کادر تزئینی -->
  <rect x="50" y="50" width="980" height="980" rx="32" fill="none"
        stroke="#F59E0B" stroke-opacity="0.10" stroke-width="1.5"/>
  <rect x="70" y="70" width="940" height="940" rx="24" fill="none"
        stroke="#F59E0B" stroke-opacity="0.05" stroke-width="1"/>

  <!-- نشان بخش -->
  <rect x="360" y="130" width="360" height="52" rx="26"
        fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="540" y="165" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F59E0B"
        text-anchor="middle" direction="rtl" font-weight="bold">بخش اول · زمینه و بازشناسی</text>

  <rect x="140" y="230" width="800" height="2" rx="1" fill="url(#amberLine11)"/>

  <!-- عدد فصل بزرگ -->
  <text x="540" y="400" font-family="Vazirmatn, Tahoma" font-size="180" fill="#F59E0B"
        fill-opacity="0.07" text-anchor="middle" font-weight="900">۲</text>

  <!-- عنوان فصل -->
  <text x="540" y="510" font-family="Vazirmatn, Tahoma" font-size="78" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" direction="rtl">معدن زبان</text>

  <!-- زیرعنوان -->
  <text x="540" y="580" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FBBF24"
        text-anchor="middle" direction="rtl">حفاری در ژرف‌ترین لایه‌های زبان فارسی برای فهم «حق»</text>

  <rect x="340" y="620" width="400" height="2" rx="1" fill="url(#amberLine11)"/>

  <!-- سه کلیدواژه -->
  <rect x="720" y="690" width="260" height="68" rx="16"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="850" y="734" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F59E0B"
        text-anchor="middle" direction="rtl" font-weight="bold">انکشاف زبانی</text>

  <rect x="410" y="690" width="260" height="68" rx="16"
        fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="540" y="734" font-family="Vazirmatn, Tahoma" font-size="26" fill="#06B6D4"
        text-anchor="middle" direction="rtl" font-weight="bold">شبکهٔ معنایی</text>

  <rect x="100" y="690" width="260" height="68" rx="16"
        fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-opacity="0.2"/>
  <text x="230" y="734" font-family="Vazirmatn, Tahoma" font-size="26" fill="#A855F7"
        text-anchor="middle" direction="rtl" font-weight="bold">عقل سلیم زبانی</text>

  <!-- توضیح -->
  <rect x="140" y="810" width="800" height="100" rx="18"
        fill="#FFFFFF" fill-opacity="0.02" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <text x="540" y="852" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">زبان، نخستین منبع شناخت ماست</text>
  <text x="540" y="890" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="middle" direction="rtl">پیش از هر نظریه‌پردازی، باید ببینیم زبان چه می‌گوید</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#F59E0B" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۲ · اسلاید ۱ از ۱۰</text>
</svg>
