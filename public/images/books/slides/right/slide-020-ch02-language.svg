<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg20" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#18182A"/>
    </linearGradient>
    <radialGradient id="glow20" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg20)"/>
  <rect width="1080" height="1080" fill="url(#glow20)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="360" height="48" rx="24"
        fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.25"/>
  <text x="220" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F59E0B"
        text-anchor="middle" direction="rtl">فصل ۲ · اسلاید ۱ از ۱۰</text>

  <text x="540" y="140" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بخش اول: زمینه و بازشناسی</text>

  <!-- عنوان -->
  <text x="540" y="260" font-family="Vazirmatn, Tahoma" font-size="72" font-weight="900"
        fill="#F59E0B" text-anchor="middle" direction="rtl">معدن زبان</text>
  <text x="540" y="320" font-family="Vazirmatn, Tahoma" font-size="30" fill="#888"
        text-anchor="middle" direction="rtl">انکشاف زبانی: کاوش در لایه‌های معنایی «حق»</text>

  <!-- روش -->
  <rect x="80" y="380" width="920" height="150" rx="20"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2" stroke-width="2"/>
  <text x="540" y="435" font-family="Vazirmatn, Tahoma" font-size="34" fill="#FFFFFF"
        font-weight="bold" text-anchor="middle" direction="rtl">روش: بدون تعهد هستی‌شناختی پیشین</text>
  <text x="540" y="490" font-family="Vazirmatn, Tahoma" font-size="28" fill="#CCC"
        text-anchor="middle" direction="rtl">از زبان و عقل سلیم استخراج می‌کنیم، نظریه‌پردازی نمی‌کنیم</text>

  <!-- سه تعبیر نمونه -->
  <rect x="710" y="580" width="310" height="180" rx="16"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="865" y="635" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F59E0B"
        font-weight="bold" text-anchor="middle" direction="rtl">حق = سهم</text>
  <text x="865" y="685" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">تقسیم منصفانه</text>
  <text x="865" y="725" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">بدون دوز و کلک</text>

  <rect x="385" y="580" width="310" height="180" rx="16"
        fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-opacity="0.3"/>
  <text x="540" y="635" font-family="Vazirmatn, Tahoma" font-size="30" fill="#C084FC"
        font-weight="bold" text-anchor="middle" direction="rtl">حق = قواعد بازی</text>
  <text x="540" y="685" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">حذفشان = توقف بازی</text>
  <text x="540" y="725" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">بازی‌های تودرتو</text>

  <rect x="60" y="580" width="310" height="180" rx="16"
        fill="#00D4FF" fill-opacity="0.06" stroke="#00D4FF" stroke-opacity="0.3"/>
  <text x="215" y="635" font-family="Vazirmatn, Tahoma" font-size="30" fill="#00D4FF"
        font-weight="bold" text-anchor="middle" direction="rtl">حق = حریم مصون</text>
  <text x="215" y="685" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">آزادی بدون تأیید</text>
  <text x="215" y="725" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">دیگری</text>

  <!-- نوآوری -->
  <rect x="80" y="810" width="920" height="120" rx="18"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.2"/>
  <text x="540" y="860" font-family="Vazirmatn, Tahoma" font-size="28" fill="#4ADE80"
        font-weight="bold" text-anchor="middle" direction="rtl">✦ نوآوری: شباهت خانوادگی ویتگنشتاینی</text>
  <text x="540" y="905" font-family="Vazirmatn, Tahoma" font-size="26" fill="#99A"
        text-anchor="middle" direction="rtl">تعابیر حق جوهر واحد ندارند · شبکهٔ معانی متداخل‌اند</text>

  <rect x="40" y="1000" width="1000" height="2.5" rx="1"
        fill="#F59E0B" opacity="0.3"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بعدی: سلسله‌مراتب تعابیر ←</text>
</svg>
