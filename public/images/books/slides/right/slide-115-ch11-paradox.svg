<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-paradox" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14080A"/>
      <stop offset="50%" stop-color="#0D0A18"/>
      <stop offset="100%" stop-color="#08080E"/>
    </linearGradient>
    <radialGradient id="paradoxGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-paradox)"/>
  <rect width="1080" height="1080" fill="url(#paradoxGlow)"/>

  <!-- خط تزئینی -->
  <rect x="930" y="150" width="4" height="750" rx="2" fill="#F59E0B" opacity="0.12"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="460" height="48" rx="24"
        fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.25"/>
  <text x="460" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#FCD34D"
        text-anchor="start" direction="rtl">فصل ۱۱ · پارادوکس رواداری · درنگ فلسفی</text>

  <!-- عنوان اصلی -->
  <text x="890" y="185" font-family="IranNastaliq, Vazirmatn, Tahoma" font-size="48" font-weight="900"
        fill="#FEF3C7" text-anchor="start" direction="rtl">اگر جانیان هم حق دارند</text>
  <text x="890" y="252" font-family="IranNastaliq, Vazirmatn, Tahoma" font-size="48" font-weight="900"
        fill="#FCD34D" text-anchor="start" direction="rtl">رواداری کجا متوقف می‌شود؟</text>

  <!-- خط جداکننده -->
  <rect x="300" y="295" width="600" height="2" rx="1" fill="#F59E0B" opacity="0.2"/>

  <!-- دو پارادوکس -->
  <rect x="80" y="330" width="430" height="180" rx="18"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="470" y="375" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F87171"
        font-weight="bold" text-anchor="start" direction="rtl">پارادوکس رواداری</text>
  <text x="470" y="418" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">اگر نارواداران را تحمل کنیم</text>
  <text x="470" y="453" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">رواداری خود نابود می‌شود</text>
  <text x="470" y="490" font-family="Vazirmatn, Tahoma" font-size="18" fill="#888"
        text-anchor="start" direction="rtl">پوپر · ۱۹۴۵</text>

  <rect x="540" y="330" width="430" height="180" rx="18"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.2"/>
  <text x="930" y="375" font-family="Vazirmatn, Tahoma" font-size="26" fill="#D8B4FE"
        font-weight="bold" text-anchor="start" direction="rtl">پارادوکس آزادی</text>
  <text x="930" y="418" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">آزادی مطلق = آزادی قوی</text>
  <text x="930" y="453" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">برای نابودی آزادی ضعیف</text>
  <text x="930" y="490" font-family="Vazirmatn, Tahoma" font-size="18" fill="#888"
        text-anchor="start" direction="rtl">برلین · ۱۹۵۸</text>

  <!-- دیدگاه نویسنده -->
  <rect x="80" y="545" width="860" height="230" rx="22"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.18"/>
  <text x="900" y="590" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FEF3C7"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ پاسخ نویسنده: کنش ابرانسان‌وار</text>
  <text x="900" y="635" font-family="Vazirmatn, Tahoma" font-size="23" fill="#EEE"
        text-anchor="start" direction="rtl">فراتر رفتن از تعلقات به شیوه‌ای تنقیح‌شده</text>
  <text x="900" y="675" font-family="Vazirmatn, Tahoma" font-size="23" fill="#EEE"
        text-anchor="start" direction="rtl">مجرمان و تروریست‌ها نیز حقوقی دارند</text>
  <text x="900" y="715" font-family="Vazirmatn, Tahoma" font-size="23" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">ولی این به شدت خطرناک و مستعد فاشیسم است</text>
  <text x="900" y="755" font-family="Vazirmatn, Tahoma" font-size="20" fill="#AAA"
        text-anchor="start" direction="rtl">پیشنهاد: «فاعل تنقیح‌شده» به جای «ابرانسان» + مکانیزم‌های نهادی مهار</text>

  <!-- هشدار -->
  <rect x="80" y="810" width="860" height="80" rx="16"
        fill="#DC2626" fill-opacity="0.03" stroke="#DC2626" stroke-opacity="0.15"/>
  <text x="900" y="850" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FCA5A5"
        font-weight="bold" text-anchor="start" direction="rtl">⚠ صادقانه‌ترین اعتراف نویسنده:</text>
  <text x="900" y="882" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">«الآن چیز خوبی در ذهنم نیست جز همین خطرات و پیچیدگی‌ها»</text>

  <!-- پاورقی -->
  <rect x="40" y="930" width="1000" height="2" rx="1" fill="#F59E0B" opacity="0.2"/>
  <text x="540" y="975" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">چه نهادهایی تضمین می‌کنند «فاعل تنقیح‌شده» به دیکتاتور تبدیل نشود؟</text>
  <text x="540" y="1020" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">پرسش باز · نیازمند پاسخی فکرشده و دقیق</text>
  <text x="540" y="1060" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">فصل ۱۱ · اخلاق و حق · پارادوکس‌ها</text>
</svg>
