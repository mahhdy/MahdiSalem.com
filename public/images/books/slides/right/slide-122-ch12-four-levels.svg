<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-4lev" x1="540" y1="0" x2="540" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0A2E"/>
      <stop offset="100%" stop-color="#0A0A18"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-4lev)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="500" height="48" rx="24"
        fill="#C084FC" fill-opacity="0.08" stroke="#C084FC" stroke-opacity="0.25"/>
  <text x="500" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#C084FC"
        text-anchor="start" direction="rtl">روش‌شناسی · نسخه‌ی توسعه‌یافته · چهار سطح معنا</text>

  <!-- عنوان -->
  <text x="1000" y="150" font-family="Vazirmatn, Tahoma" font-size="48" font-weight="900"
        fill="#F0E6FF" text-anchor="start" direction="rtl">از حداقل تا آرمان</text>
  <text x="1000" y="200" font-family="Vazirmatn, Tahoma" font-size="24" fill="#C4B5FD"
        text-anchor="start" direction="rtl">چهار سطح معنای هر مفهوم بنیادین · نسخه‌ی کامل</text>

  <!-- خط عمودی مرکزی -->
  <line x1="120" y1="250" x2="120" y2="900" stroke="#C084FC" stroke-opacity="0.12" stroke-width="2"/>

  <!-- سطح ۰: حداقلی -->
  <rect x="160" y="255" width="860" height="130" rx="20"
        fill="#EF4444" fill-opacity="0.04" stroke="#EF4444" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="120" cy="320" r="20" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-opacity="0.5"/>
  <text x="120" y="327" font-family="Vazirmatn, Tahoma" font-size="18" fill="#FCA5A5"
        font-weight="bold" text-anchor="middle">۰</text>
  <text x="980" y="300" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FCA5A5"
        font-weight="bold" text-anchor="start" direction="rtl">حداقلی — خطّ قرمز</text>
  <text x="980" y="340" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">بدون آن اصلاً «حقی» نیست · مرز نظام حقوقی و نظام سلطه</text>
  <text x="980" y="375" font-family="Vazirmatn, Tahoma" font-size="20" fill="#F87171"
        text-anchor="start" direction="rtl">مثال: منع بردگی · منع شکنجه · حداقل امنیت جانی</text>

  <!-- فلش -->
  <polygon points="120,400 112,410 128,410" fill="#C084FC" fill-opacity="0.3"/>

  <!-- سطح ۱: عام -->
  <rect x="160" y="415" width="860" height="120" rx="20"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.25"/>
  <circle cx="120" cy="475" r="20" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-opacity="0.5"/>
  <text x="120" y="482" font-family="Vazirmatn, Tahoma" font-size="18" fill="#67E8F9"
        font-weight="bold" text-anchor="middle">۱</text>
  <text x="980" y="458" font-family="Vazirmatn, Tahoma" font-size="30" fill="#67E8F9"
        font-weight="bold" text-anchor="start" direction="rtl">عام — توصیفی</text>
  <text x="980" y="498" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">هر چیزی که عملاً «حق» نامیده می‌شود · پوزیتیویسم</text>
  <text x="980" y="528" font-family="Vazirmatn, Tahoma" font-size="20" fill="#7DD3FC"
        text-anchor="start" direction="rtl">هر دامنه‌ی مجاز کنش در هر نظام · آستین · کلزن</text>

  <!-- فلش -->
  <polygon points="120,550 112,560 128,560" fill="#C084FC" fill-opacity="0.3"/>

  <!-- سطح ۲: خاص -->
  <rect x="160" y="570" width="860" height="120" rx="20"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.25"/>
  <circle cx="120" cy="630" r="20" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.5"/>
  <text x="120" y="637" font-family="Vazirmatn, Tahoma" font-size="18" fill="#FCD34D"
        font-weight="bold" text-anchor="middle">۲</text>
  <text x="980" y="613" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">خاص — مدرن</text>
  <text x="980" y="653" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">مبتنی بر قرارداد · دموکراسی · آزادی · لیبرالیسم</text>
  <text x="980" y="683" font-family="Vazirmatn, Tahoma" font-size="20" fill="#FDE68A"
        text-anchor="start" direction="rtl">حقوق روشنگرانه · لاک · رالز · اعلامیه جهانی</text>

  <!-- فلش -->
  <polygon points="120,705 112,715 128,715" fill="#C084FC" fill-opacity="0.3"/>

  <!-- سطح ۳: اخص -->
  <rect x="160" y="725" width="860" height="120" rx="20"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.3"/>
  <circle cx="120" cy="785" r="20" fill="#A855F7" fill-opacity="0.15" stroke="#A855F7" stroke-opacity="0.5"/>
  <text x="120" y="792" font-family="Vazirmatn, Tahoma" font-size="18" fill="#D8B4FE"
        font-weight="bold" text-anchor="middle">۳</text>
  <text x="980" y="768" font-family="Vazirmatn, Tahoma" font-size="30" fill="#D8B4FE"
        font-weight="bold" text-anchor="start" direction="rtl">اخص — آرمانی</text>
  <text x="980" y="808" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">قطب‌نما و شاخص داوری · کرامت · انصاف · شکوفایی</text>
  <text x="980" y="838" font-family="Vazirmatn, Tahoma" font-size="20" fill="#E9D5FF"
        text-anchor="start" direction="rtl">ایدئال تنظیمی: افقی که جهت حرکت را نشان می‌دهد</text>

  <!-- نکته -->
  <rect x="160" y="870" width="860" height="70" rx="14"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.15"/>
  <text x="960" y="912" font-family="Vazirmatn, Tahoma" font-size="22" fill="#86EFAC"
        text-anchor="start" direction="rtl">↰ سطح حداقلی: ابتکار جدید · مرز تفکیک «نظام حقوقی» از «نظام سلطه»</text>

  <!-- پاورقی -->
  <rect x="40" y="975" width="1000" height="2" rx="1" fill="#C084FC" opacity="0.2"/>
  <text x="540" y="1015" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">نکته‌ی نویسنده: آرمان، هم تنظیمی و هم تحقق‌پذیر است — ولی شکننده</text>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">«وقتی به قطب جنوب رسیدی، قطب‌نما گیج‌ات می‌کند — نردبان ویتگنشتاین را دور بینداز»</text>
</svg>
