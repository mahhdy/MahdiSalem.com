<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E0F1A"/>
      <stop offset="100%" stop-color="#141822"/>
    </linearGradient>
    <radialGradient id="glow12" cx="60%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg12)"/>
  <rect width="1080" height="1080" fill="url(#glow12)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#22C55E" fill-opacity="0.08" stroke="#22C55E" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#22C55E"
        text-anchor="middle" direction="rtl">فصل ۲ · اسلاید ۲ از ۱۰</text>

  <!-- عنوان -->
  <text x="1000" y="160" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#4ADE80" text-anchor="start" direction="rtl">انکشاف زبانی چیست؟</text>
  <text x="1000" y="210" font-family="Vazirmatn, Tahoma" font-size="26" fill="#888"
        text-anchor="start" direction="rtl">روشی که زبان را نه ابزار بلکه معدن بصیرت می‌داند</text>

  <!-- دیاگرام مراحل - عمودی -->
  <!-- مرحله ۱ -->
  <rect x="560" y="270" width="440" height="130" rx="18"
        fill="#22C55E" fill-opacity="0.05" stroke="#22C55E" stroke-opacity="0.2"/>
  <circle cx="960" cy="310" r="26" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-opacity="0.5"/>
  <text x="960" y="318" font-family="Vazirmatn, Tahoma" font-size="24" fill="#4ADE80"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="920" y="318" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">غوطه‌وری در زبان</text>
  <text x="920" y="365" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">بررسی تعابیر، ضرب‌المثل‌ها، ریشه‌ها و کاربردها</text>

  <!-- فلش اتصال -->
  <line x1="780" y1="400" x2="780" y2="430" stroke="#22C55E" stroke-opacity="0.3" stroke-width="2"/>
  <polygon points="773,428 780,442 787,428" fill="#22C55E" fill-opacity="0.4"/>

  <!-- مرحله ۲ -->
  <rect x="560" y="445" width="440" height="130" rx="18"
        fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-opacity="0.2"/>
  <circle cx="960" cy="485" r="26" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-opacity="0.5"/>
  <text x="960" y="493" font-family="Vazirmatn, Tahoma" font-size="24" fill="#06B6D4"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="920" y="493" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">استخراج بصیرت‌ها</text>
  <text x="920" y="540" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">کشف مفاهیم هم‌خانواده و لایه‌های پنهان معنا</text>

  <!-- فلش اتصال -->
  <line x1="780" y1="575" x2="780" y2="605" stroke="#06B6D4" stroke-opacity="0.3" stroke-width="2"/>
  <polygon points="773,603 780,617 787,603" fill="#06B6D4" fill-opacity="0.4"/>

  <!-- مرحله ۳ -->
  <rect x="560" y="620" width="440" height="130" rx="18"
        fill="#E8B83D" fill-opacity="0.05" stroke="#E8B83D" stroke-opacity="0.2"/>
  <circle cx="960" cy="660" r="26" fill="#E8B83D" fill-opacity="0.15" stroke="#E8B83D" stroke-opacity="0.5"/>
  <text x="960" y="668" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E8B83D"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="920" y="668" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">تنقیح و تعبیرسازی</text>
  <text x="920" y="715" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">ساختن تعریف سه‌سطحی از دل خود زبان</text>

  <!-- نکته سمت چپ -->
  <rect x="80" y="300" width="420" height="440" rx="20"
        fill="#FFFFFF" fill-opacity="0.02" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="460" y="360" font-family="Vazirmatn, Tahoma" font-size="28" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">تفاوت با تحلیل مفهومی معمول:</text>
  <text x="460" y="410" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="start" direction="rtl">• صرفاً واکاوی منطقی نیست</text>
  <text x="460" y="455" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="start" direction="rtl">• غرق شدن در زیست زبانی است</text>
  <text x="460" y="500" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="start" direction="rtl">• شهود و عقل سلیم حجّت دارند</text>
  <text x="460" y="545" font-family="Vazirmatn, Tahoma" font-size="23" fill="#DDD"
        text-anchor="start" direction="rtl">• هدف: کشف نه اثبات</text>
  <text x="460" y="610" font-family="Vazirmatn, Tahoma" font-size="22" fill="#999"
        text-anchor="start" direction="rtl">این نگاه اکتشافی/انکشافی</text>
  <text x="460" y="648" font-family="Vazirmatn, Tahoma" font-size="22" fill="#999"
        text-anchor="start" direction="rtl">نظریه‌پردازی نیست،</text>
  <text x="460" y="686" font-family="Vazirmatn, Tahoma" font-size="22" fill="#999"
        text-anchor="start" direction="rtl">حاصل تلاش فکری صادقانه است.</text>

  <!-- نقل‌قول -->
  <rect x="100" y="800" width="880" height="90" rx="16"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.12"/>
  <text x="540" y="855" font-family="Vazirmatn, Tahoma" font-size="26" fill="#4ADE80"
        text-anchor="middle" direction="rtl" font-style="italic">«ما میراث‌دار انتقادیِ سنت‌های زبانی بزرگی هستیم»</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#22C55E" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۲</text>
</svg>
