<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg32" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0E18"/>
      <stop offset="100%" stop-color="#0D1220"/>
    </linearGradient>
    <radialGradient id="glow32" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg32)"/>
  <rect width="1080" height="1080" fill="url(#glow32)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#06B6D4"
        text-anchor="middle" direction="rtl">فصل ۴ · اسلاید ۲ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="155" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#22D3EE" text-anchor="middle" direction="rtl">ده منشأ حق (۱ تا ۵)</text>
  <text x="540" y="205" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="middle" direction="rtl">حق از کجا می‌آید؟ جامع‌ترین تصنیف موجود</text>

  <!-- ۵ منشأ اول -->
  <!-- منشأ ۱ -->
  <rect x="80" y="260" width="920" height="120" rx="18"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.18"/>
  <circle cx="960" cy="295" r="26" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626" stroke-opacity="0.4"/>
  <text x="960" y="303" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="920" y="303" font-family="Vazirmatn, Tahoma" font-size="30" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">قدرت</text>
  <text x="920" y="348" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">نفوذ · خشونت · ثروت · مشروع یا نامشروع</text>

  <!-- منشأ ۲ -->
  <rect x="80" y="395" width="920" height="120" rx="18"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.18"/>
  <circle cx="960" cy="430" r="26" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-opacity="0.4"/>
  <text x="960" y="438" font-family="Vazirmatn, Tahoma" font-size="22" fill="#4ADE80"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="920" y="438" font-family="Vazirmatn, Tahoma" font-size="30" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">طبیعت</text>
  <text x="920" y="483" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">فطرت · ذات انسانی · حقوق طبیعی پیش‌اجتماعی</text>

  <!-- منشأ ۳ -->
  <rect x="80" y="530" width="920" height="120" rx="18"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.18"/>
  <circle cx="960" cy="565" r="26" fill="#A855F7" fill-opacity="0.15" stroke="#A855F7" stroke-opacity="0.4"/>
  <text x="960" y="573" font-family="Vazirmatn, Tahoma" font-size="22" fill="#C084FC"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="920" y="573" font-family="Vazirmatn, Tahoma" font-size="30" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">ماوراء و وحی</text>
  <text x="920" y="618" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">دستور الهی · متون مقدس · تناسخ · کارما</text>

  <!-- منشأ ۴ -->
  <rect x="80" y="665" width="920" height="120" rx="18"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.18"/>
  <circle cx="960" cy="700" r="26" fill="#06B6D4" fill-opacity="0.15" stroke="#06B6D4" stroke-opacity="0.4"/>
  <text x="960" y="708" font-family="Vazirmatn, Tahoma" font-size="22" fill="#22D3EE"
        text-anchor="middle" font-weight="bold">۴</text>
  <text x="920" y="708" font-family="Vazirmatn, Tahoma" font-size="30" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">سازگاری و بقا</text>
  <text x="920" y="753" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">فرگشت اجتماعی · رقابت و همکاری · بقای گروه</text>

  <!-- منشأ ۵ -->
  <rect x="80" y="800" width="920" height="120" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.18"/>
  <circle cx="960" cy="835" r="26" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-opacity="0.4"/>
  <text x="960" y="843" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FBBF24"
        text-anchor="middle" font-weight="bold">۵</text>
  <text x="920" y="843" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">توافق</text>
  <text x="920" y="888" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">قرارداد اجتماعی · اجماع · مذاکره · توازن قدرت</text>

  <!-- ادامه دارد -->
  <rect x="300" y="945" width="480" height="45" rx="12"
        fill="#1A1A30" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="540" y="975" font-family="Vazirmatn, Tahoma" font-size="22" fill="#22D3EE"
        text-anchor="middle" direction="rtl">۵ منشأ دیگر در اسلاید بعدی ←</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#06B6D4" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۴</text>
</svg>
