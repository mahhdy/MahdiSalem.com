<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-duty" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E1018"/>
      <stop offset="100%" stop-color="#141220"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-duty)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="440" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="440" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#22D3EE"
        text-anchor="start" direction="rtl">فصل ۱۳ · حق و تکلیف · دوگانه‌ی بنیادین</text>

  <!-- عنوان -->
  <text x="1000" y="170" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#E0F2FE" text-anchor="start" direction="rtl">حق ↔ تکلیف</text>
  <text x="1000" y="225" font-family="Vazirmatn, Tahoma" font-size="26" fill="#7DD3FC"
        text-anchor="start" direction="rtl">Right vs Duty · My Rights = Your Obligations</text>

  <!-- سکه‌ی بصری -->
  <ellipse cx="540" cy="440" rx="200" ry="60" fill="none" stroke="#C19A3E" stroke-opacity="0.1" stroke-width="1.5"/>
  <ellipse cx="540" cy="440" rx="180" ry="180" fill="none" stroke="#C19A3E" stroke-opacity="0.08" stroke-width="2"/>

  <!-- نیم سکه راست: حق -->
  <path d="M 540 260 A 180 180 0 0 1 540 620" fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.2" stroke-width="1.5"/>
  <text x="660" y="400" font-family="Vazirmatn, Tahoma" font-size="36" fill="#67E8F9"
        font-weight="bold" text-anchor="middle" direction="rtl">حق</text>
  <text x="660" y="440" font-family="Vazirmatn, Tahoma" font-size="19" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">آزادی عمل</text>
  <text x="660" y="470" font-family="Vazirmatn, Tahoma" font-size="19" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">امتیاز</text>
  <text x="660" y="500" font-family="Vazirmatn, Tahoma" font-size="19" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">مطالبه</text>

  <!-- نیم سکه چپ: تکلیف -->
  <path d="M 540 260 A 180 180 0 0 0 540 620" fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2" stroke-width="1.5"/>
  <text x="420" y="400" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FCD34D"
        font-weight="bold" text-anchor="middle" direction="rtl">تکلیف</text>
  <text x="420" y="440" font-family="Vazirmatn, Tahoma" font-size="19" fill="#FDE68A"
        text-anchor="middle" direction="rtl">وظیفه</text>
  <text x="420" y="470" font-family="Vazirmatn, Tahoma" font-size="19" fill="#FDE68A"
        text-anchor="middle" direction="rtl">تعهد</text>
  <text x="420" y="500" font-family="Vazirmatn, Tahoma" font-size="19" fill="#FDE68A"
        text-anchor="middle" direction="rtl">مسئولیت</text>

  <!-- دیدگاه نویسنده -->
  <rect x="80" y="660" width="920" height="200" rx="22"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.18"/>
  <text x="960" y="705" font-family="Vazirmatn, Tahoma" font-size="28" fill="#E0F2FE"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ دیدگاه نویسنده</text>
  <text x="960" y="748" font-family="Vazirmatn, Tahoma" font-size="23" fill="#EEE"
        text-anchor="start" direction="rtl">حق «در مقابل» تکالیف و تعهدات و مسئولیت‌ها تعریف می‌شود</text>
  <text x="960" y="788" font-family="Vazirmatn, Tahoma" font-size="23" fill="#EEE"
        text-anchor="start" direction="rtl">در جوامع با تمرکز قدرت: تکلیف غالب · حق حداقلی</text>
  <text x="960" y="828" font-family="Vazirmatn, Tahoma" font-size="23" fill="#22D3EE"
        font-weight="bold" text-anchor="start" direction="rtl">تکالیف = زبان سلطه · حقوق = زبان آزادی</text>
  <text x="960" y="855" font-family="Vazirmatn, Tahoma" font-size="19" fill="#888"
        text-anchor="start" direction="rtl">فوکو: در نظام‌های استبدادی، زبان تکلیف بر زبان حق غالب می‌شود</text>

  <!-- پاورقی -->
  <rect x="40" y="900" width="1000" height="2" rx="1" fill="#06B6D4" opacity="0.2"/>
  <text x="540" y="945" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حقوق من = انتظارات و آزادی عمل‌های من از سوی دیگران</text>
  <text x="540" y="985" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">تکالیف من = انتظارات و محدودیت‌هایم در مقابل دیگران</text>
  <text x="540" y="1050" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">فصل ۱۳ · دوگانه‌ها · حق و تکلیف</text>
</svg>
