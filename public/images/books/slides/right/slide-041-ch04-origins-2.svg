<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg41" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#161E2E"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg41)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="360" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="220" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#06B6D4"
        text-anchor="middle" direction="rtl">فصل ۴ · اسلاید ۲ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="170" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#06B6D4" text-anchor="middle" direction="rtl">منشأهای ۶ تا ۱۰</text>

  <!-- ۶ -->
  <rect x="555" y="225" width="470" height="110" rx="16"
        fill="#78716C" fill-opacity="0.06" stroke="#78716C" stroke-opacity="0.3"/>
  <text x="990" y="275" font-family="Vazirmatn, Tahoma" font-size="32" fill="#A8A29E"
        font-weight="bold" text-anchor="start" direction="rtl">۶. خون و نژاد</text>
  <text x="990" y="315" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="start" direction="rtl">تبار · خاندان — ❌ ردّ هنجاری</text>

  <!-- ۷ -->
  <rect x="55" y="225" width="470" height="110" rx="16"
        fill="#EC4899" fill-opacity="0.05" stroke="#EC4899" stroke-opacity="0.3"/>
  <text x="490" y="275" font-family="Vazirmatn, Tahoma" font-size="32" fill="#EC4899"
        font-weight="bold" text-anchor="start" direction="rtl">۷. عملکرد</text>
  <text x="490" y="315" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="start" direction="rtl">نتایج · کارآمدی · بهینگی</text>

  <!-- ۸ -->
  <rect x="555" y="355" width="470" height="110" rx="16"
        fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="990" y="405" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F59E0B"
        font-weight="bold" text-anchor="start" direction="rtl">۸. مصلحت</text>
  <text x="990" y="445" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="start" direction="rtl">مدیریت بحران · اولویت‌سنجی</text>

  <!-- ۹ — محوری -->
  <rect x="55" y="355" width="470" height="110" rx="16"
        fill="#DC2626" fill-opacity="0.07" stroke="#DC2626" stroke-opacity="0.4" stroke-width="2"/>
  <text x="490" y="405" font-family="Vazirmatn, Tahoma" font-size="32" fill="#F87171"
        font-weight="bold" text-anchor="start" direction="rtl">۹. رنج ⭐</text>
  <text x="490" y="445" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="start" direction="rtl">فریاد بی‌حقّی · واکنش به فاجعه</text>

  <!-- ۱۰ — محوری -->
  <rect x="250" y="485" width="580" height="110" rx="16"
        fill="#22C55E" fill-opacity="0.07" stroke="#22C55E" stroke-opacity="0.4" stroke-width="2"/>
  <text x="795" y="535" font-family="Vazirmatn, Tahoma" font-size="32" fill="#4ADE80"
        font-weight="bold" text-anchor="start" direction="rtl">۱۰. عاملیت و قابلیت ⭐</text>
  <text x="795" y="575" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="start" direction="rtl">توانایی فعل · خودتعیّنی · شکوفایی</text>

  <!-- پروفایل نویسنده -->
  <rect x="80" y="640" width="920" height="220" rx="20"
        fill="#C19A3E" fill-opacity="0.04" stroke="#C19A3E" stroke-opacity="0.2" stroke-width="2"/>
  <text x="540" y="690" font-family="Vazirmatn, Tahoma" font-size="30" fill="#C19A3E"
        font-weight="bold" text-anchor="middle" direction="rtl">پروفایل نویسنده:</text>
  <text x="540" y="740" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="middle" direction="rtl">سه قلّه: توافق (۵) · رنج (۵) · عاملیت (۵)</text>
  <text x="540" y="785" font-family="Vazirmatn, Tahoma" font-size="26" fill="#CCC"
        text-anchor="middle" direction="rtl">وزن صفر: خون/نژاد — وزن حداقلی: قدرت</text>
  <text x="540" y="825" font-family="Vazirmatn, Tahoma" font-size="24" fill="#999"
        text-anchor="middle" direction="rtl">هر نظام واقعی یک بردار ده‌بُعدی در این فضاست</text>

  <!-- نقد -->
  <rect x="120" y="880" width="840" height="70" rx="14"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="540" y="925" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F87171"
        text-anchor="middle" direction="rtl">⚡ نقد: وزن‌دهی عددی ساده‌سازی است — عینیت کاذب تولید نکند!</text>

  <rect x="40" y="1010" width="1000" height="2.5" rx="1" fill="#06B6D4" opacity="0.3"/>
  <text x="540" y="1060" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بعدی: جغرافیای مفهومی ←</text>
</svg>
