<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg29" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0505"/>
      <stop offset="100%" stop-color="#0D0D18"/>
    </linearGradient>
    <radialGradient id="glow29" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg29)"/>
  <rect width="1080" height="1080" fill="url(#glow29)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#DC2626" fill-opacity="0.08" stroke="#DC2626" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#DC2626"
        text-anchor="middle" direction="rtl">فصل ۳ · اسلاید ۹ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="155" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#F87171" text-anchor="middle" direction="rtl">بحران معاصر حق</text>
  <text x="540" y="210" font-family="Vazirmatn, Tahoma" font-size="26" fill="#999"
        text-anchor="middle" direction="rtl">چرا در قرن ۲۱ حق هنوز محل مناقشه است؟</text>

  <!-- ۶ بحران در گرید ۲×۳ -->
  <!-- ردیف ۱ -->
  <rect x="560" y="270" width="440" height="130" rx="18"
        fill="#DC2626" fill-opacity="0.05" stroke="#DC2626" stroke-opacity="0.18"/>
  <text x="960" y="320" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">۱. پوپولیسم ضدّحقوقی</text>
  <text x="960" y="365" font-family="Vazirmatn, Tahoma" font-size="20" fill="#BBB"
        text-anchor="start" direction="rtl">حقوق بشر = «نخبه‌گرایی غربی»</text>

  <rect x="80" y="270" width="440" height="130" rx="18"
        fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-opacity="0.18"/>
  <text x="480" y="320" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">۲. ابزاری‌شدن حق</text>
  <text x="480" y="365" font-family="Vazirmatn, Tahoma" font-size="20" fill="#BBB"
        text-anchor="start" direction="rtl">حق = بهانهٔ مداخلهٔ نظامی</text>

  <!-- ردیف ۲ -->
  <rect x="560" y="420" width="440" height="130" rx="18"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.18"/>
  <text x="960" y="470" font-family="Vazirmatn, Tahoma" font-size="26" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">۳. تضاد حقوق</text>
  <text x="960" y="515" font-family="Vazirmatn, Tahoma" font-size="20" fill="#BBB"
        text-anchor="start" direction="rtl">آزادی بیان vs حقّ امنیت / عدم تبعیض</text>

  <rect x="80" y="420" width="440" height="130" rx="18"
        fill="#06B6D4" fill-opacity="0.05" stroke="#06B6D4" stroke-opacity="0.18"/>
  <text x="480" y="470" font-family="Vazirmatn, Tahoma" font-size="26" fill="#22D3EE"
        text-anchor="start" direction="rtl" font-weight="bold">۴. نابرابری ساختاری</text>
  <text x="480" y="515" font-family="Vazirmatn, Tahoma" font-size="20" fill="#BBB"
        text-anchor="start" direction="rtl">حق صوری هست، توان مطالبه نیست</text>

  <!-- ردیف ۳ -->
  <rect x="560" y="570" width="440" height="130" rx="18"
        fill="#22C55E" fill-opacity="0.05" stroke="#22C55E" stroke-opacity="0.18"/>
  <text x="960" y="620" font-family="Vazirmatn, Tahoma" font-size="26" fill="#4ADE80"
        text-anchor="start" direction="rtl" font-weight="bold">۵. فنّاوری و حریم</text>
  <text x="960" y="665" font-family="Vazirmatn, Tahoma" font-size="20" fill="#BBB"
        text-anchor="start" direction="rtl">هوش مصنوعی · نظارت دیجیتال · حقوق داده</text>

  <rect x="80" y="570" width="440" height="130" rx="18"
        fill="#EC4899" fill-opacity="0.05" stroke="#EC4899" stroke-opacity="0.18"/>
  <text x="480" y="620" font-family="Vazirmatn, Tahoma" font-size="26" fill="#EC4899"
        text-anchor="start" direction="rtl" font-weight="bold">۶. بحران مبنا</text>
  <text x="480" y="665" font-family="Vazirmatn, Tahoma" font-size="20" fill="#BBB"
        text-anchor="start" direction="rtl">حقوق بشر از کجا مشروعیت می‌گیرد؟</text>

  <!-- دیدگاه نویسنده -->
  <rect x="80" y="740" width="920" height="160" rx="20"
        fill="#E8B83D" fill-opacity="0.04" stroke="#E8B83D" stroke-opacity="0.18"/>
  <text x="960" y="790" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FBBF24"
        text-anchor="start" direction="rtl" font-weight="bold">پاسخ نویسنده:</text>
  <text x="960" y="835" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">بحران معاصر نشانهٔ نیاز به بازمهندسی حق است</text>
  <text x="960" y="870" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">نه پایان حق بلکه آغاز دور تازهٔ مارپیچ صعودی</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#DC2626" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۳</text>
</svg>
