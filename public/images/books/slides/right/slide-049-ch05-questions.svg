<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg49" x1="0" y1="1080" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E0A1A"/>
      <stop offset="100%" stop-color="#150D22"/>
    </linearGradient>
    <radialGradient id="glow49" cx="60%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg49)"/>
  <rect width="1080" height="1080" fill="url(#glow49)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="340" height="48" rx="24"
        fill="#A855F7" fill-opacity="0.08" stroke="#A855F7" stroke-opacity="0.25"/>
  <text x="210" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#A855F7"
        text-anchor="middle" direction="rtl">فصل ۵ · اسلاید ۹ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="155" font-family="Vazirmatn, Tahoma" font-size="48" font-weight="900"
        fill="#C084FC" text-anchor="middle" direction="rtl">پرسش‌های نقادانه</text>
  <text x="540" y="210" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="middle" direction="rtl">سؤال‌هایی که جغرافیای مفهومی بی‌پاسخ گذاشته</text>

  <!-- پرسش ۱ -->
  <rect x="80" y="270" width="920" height="130" rx="18"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.15"/>
  <circle cx="960" cy="305" r="24" fill="#DC2626" fill-opacity="0.15"/>
  <text x="960" y="313" font-family="Vazirmatn, Tahoma" font-size="20" fill="#F87171"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="920" y="315" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">اگر حق پل عدالت و آزادی است:</text>
  <text x="920" y="365" font-family="Vazirmatn, Tahoma" font-size="20" fill="#AAA"
        text-anchor="start" direction="rtl">وقتی عدالت و آزادی تعارض دارند (مثلاً مالیات بالا) حق کدام طرف؟</text>

  <!-- پرسش ۲ -->
  <rect x="80" y="415" width="920" height="130" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.15"/>
  <circle cx="960" cy="450" r="24" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="960" y="458" font-family="Vazirmatn, Tahoma" font-size="20" fill="#FBBF24"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="920" y="460" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">مرز حق و اخلاق کجاست؟</text>
  <text x="920" y="510" font-family="Vazirmatn, Tahoma" font-size="20" fill="#AAA"
        text-anchor="start" direction="rtl">آیا هر وظیفهٔ اخلاقی حقّ متناظر دارد؟ (مثلاً وظیفهٔ بخشش)</text>

  <!-- پرسش ۳ -->
  <rect x="80" y="560" width="920" height="130" rx="18"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.15"/>
  <circle cx="960" cy="595" r="24" fill="#06B6D4" fill-opacity="0.15"/>
  <text x="960" y="603" font-family="Vazirmatn, Tahoma" font-size="20" fill="#22D3EE"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="920" y="605" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">آیا نقشهٔ مفهومی جهان‌شمول است؟</text>
  <text x="920" y="655" font-family="Vazirmatn, Tahoma" font-size="20" fill="#AAA"
        text-anchor="start" direction="rtl">جغرافیای مفهومی فارسی با انگلیسی فرق دارد — کدام معتبرتر؟</text>

  <!-- پرسش ۴ -->
  <rect x="80" y="705" width="920" height="130" rx="18"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.15"/>
  <circle cx="960" cy="740" r="24" fill="#22C55E" fill-opacity="0.15"/>
  <text x="960" y="748" font-family="Vazirmatn, Tahoma" font-size="20" fill="#4ADE80"
        text-anchor="middle" font-weight="bold">۴</text>
  <text x="920" y="750" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">حقوق حیوانات و طبیعت کجای نقشه‌اند؟</text>
  <text x="920" y="800" font-family="Vazirmatn, Tahoma" font-size="20" fill="#AAA"
        text-anchor="start" direction="rtl">آیا «حق» فقط مفهومی انسانی است یا فراتر می‌رود؟</text>

  <!-- دعوت -->
  <rect x="140" y="875" width="800" height="60" rx="14"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.15"/>
  <text x="540" y="913" font-family="Vazirmatn, Tahoma" font-size="24" fill="#C084FC"
        text-anchor="middle" direction="rtl">پاسخ‌ها در بخش دوم (تأسیس) شکل می‌گیرند — صبور باشید</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#A855F7" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۵</text>
</svg>
