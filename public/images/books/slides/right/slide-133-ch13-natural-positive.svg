<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg133" x1="0" y1="1080" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1A12"/>
      <stop offset="100%" stop-color="#0F1B24"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg133)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="440" height="48" rx="24"
        fill="#22C55E" fill-opacity="0.08" stroke="#22C55E" stroke-opacity="0.25"/>
  <text x="430" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#4ADE80"
        text-anchor="start" direction="rtl">فصل ۱۳ · دوگانه‌ی طبیعی و وضعی</text>

  <!-- عنوان -->
  <text x="1000" y="170" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#ECFDF5" text-anchor="start" direction="rtl">حق: ذاتی یا قراردادی؟</text>
  <text x="1000" y="225" font-family="Vazirmatn, Tahoma" font-size="25" fill="#86EFAC"
        text-anchor="start" direction="rtl">Natural Right vs Positive Right · کهن‌ترین دوگانه‌ی فلسفهٔ حق</text>

  <!-- دو ستون -->
  <!-- طبیعی -->
  <rect x="555" y="275" width="470" height="300" rx="20"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.25"/>
  <text x="990" y="320" font-family="Vazirmatn, Tahoma" font-size="34" fill="#4ADE80"
        font-weight="bold" text-anchor="start" direction="rtl">حق طبیعی</text>
  <text x="990" y="365" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• ذاتی و پیش‌اجتماعی</text>
  <text x="990" y="400" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• کشف‌شدنی نه ساخته‌شدنی</text>
  <text x="990" y="435" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• زایل‌نشدنی و تفویض‌ناپذیر</text>
  <text x="990" y="475" font-family="Vazirmatn, Tahoma" font-size="20" fill="#86EFAC"
        text-anchor="start" direction="rtl" font-style="italic">«حق دادنی نیست، پس از حیات محقق می‌شود»</text>
  <text x="990" y="510" font-family="Vazirmatn, Tahoma" font-size="19" fill="#888"
        text-anchor="start" direction="rtl">لاک · فینیس · اعلامیه‌ی جهانی حقوق بشر</text>
  <text x="990" y="545" font-family="Vazirmatn, Tahoma" font-size="19" fill="#888"
        text-anchor="start" direction="rtl">⚠ خطر: ذات‌انگاری مطلق و بی‌توجهی به بافت</text>

  <!-- وضعی -->
  <rect x="55" y="275" width="470" height="300" rx="20"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="490" y="320" font-family="Vazirmatn, Tahoma" font-size="34" fill="#67E8F9"
        font-weight="bold" text-anchor="start" direction="rtl">حق وضعی</text>
  <text x="490" y="365" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• اعتباری و قراردادی</text>
  <text x="490" y="400" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• ساخته‌شدنی و متغیر</text>
  <text x="490" y="435" font-family="Vazirmatn, Tahoma" font-size="22" fill="#CCC"
        text-anchor="start" direction="rtl">• وابسته به قانون‌گذار و رویه</text>
  <text x="490" y="475" font-family="Vazirmatn, Tahoma" font-size="20" fill="#67E8F9"
        text-anchor="start" direction="rtl" font-style="italic">«حق فرمان حاکم مشروع است»</text>
  <text x="490" y="510" font-family="Vazirmatn, Tahoma" font-size="19" fill="#888"
        text-anchor="start" direction="rtl">آستین · کلزن · هارت</text>
  <text x="490" y="545" font-family="Vazirmatn, Tahoma" font-size="19" fill="#888"
        text-anchor="start" direction="rtl">⚠ خطر: مشروعیت‌بخشی به هر قانونی</text>

  <!-- بخش نقد و دیدگاه -->
  <rect x="80" y="620" width="920" height="250" rx="22"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="960" y="668" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ فراتر از دوگانه: دیدگاه نویسنده</text>
  <text x="960" y="715" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">حقوق بنیادین: ذاتی‌اند ولی فقط در جمع تحقق می‌یابند</text>
  <text x="960" y="755" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">حقوق نهادی: ارتباطی‌اند و محصول طراحی نهادی</text>
  <text x="960" y="800" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F59E0B"
        text-anchor="start" direction="rtl">↰ سطح اخص (آرمانی) = ثابت · سطح عام (عملی) = پویا</text>
  <text x="960" y="840" font-family="Vazirmatn, Tahoma" font-size="20" fill="#AAA"
        text-anchor="start" direction="rtl">تنش حل‌نشده: «اگر حق فقط در تعامل معنا دارد، چگونه زایل‌ناشدنی؟»</text>

  <!-- پاورقی -->
  <rect x="40" y="920" width="1000" height="2" rx="1" fill="#22C55E" opacity="0.2"/>
  <text x="540" y="970" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">راه‌حل: حقوق بنیادین «محدودیت‌های طراحی» هستند نه «متغیّرهای طراحی»</text>
  <text x="540" y="1050" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">فصل ۱۳ · دوگانه‌ها · ادامه دارد ←</text>
</svg>
