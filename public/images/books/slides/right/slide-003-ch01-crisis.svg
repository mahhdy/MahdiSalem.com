<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glow3" cx="25%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="warnBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg3)"/>
  <rect width="1080" height="1080" fill="url(#glow3)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F59E0B"
        text-anchor="middle" direction="rtl">فصل ۱ · اسلاید ۳ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="170" font-family="Vazirmatn, Tahoma" font-size="58" font-weight="900"
        fill="#F59E0B" text-anchor="middle" direction="rtl">بحران صوری‌شدن حق</text>
  <text x="540" y="220" font-family="Vazirmatn, Tahoma" font-size="26" fill="#999"
        text-anchor="middle" direction="rtl">وقتی حق به پوسته‌ای بدون مغز تبدیل می‌شود</text>

  <!-- نمودار هشداری - سه ستون -->
  <!-- ستون ۱ -->
  <rect x="740" y="290" width="240" height="380" rx="18"
        fill="#DC2626" fill-opacity="0.06" stroke="#DC2626" stroke-opacity="0.2"/>
  <rect x="740" y="290" width="240" height="6" rx="3" fill="#DC2626" fill-opacity="0.6"/>
  <text x="860" y="350" font-family="Vazirmatn, Tahoma" font-size="42" fill="#F87171"
        text-anchor="middle" direction="rtl" font-weight="bold">⚠</text>
  <text x="860" y="400" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F87171"
        text-anchor="middle" direction="rtl" font-weight="bold">تمرکز قدرت</text>
  <text x="860" y="450" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">حق‌ها اعلام می‌شوند</text>
  <text x="860" y="485" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">ولی قدرت مطالبه</text>
  <text x="860" y="520" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">تنها دست اقلیت است</text>
  <rect x="780" y="580" width="160" height="60" rx="12"
        fill="#DC2626" fill-opacity="0.1"/>
  <text x="860" y="620" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="middle" direction="rtl">نابرابری مطالبه</text>

  <!-- ستون ۲ -->
  <rect x="420" y="290" width="240" height="380" rx="18"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.2"/>
  <rect x="420" y="290" width="240" height="6" rx="3" fill="#F59E0B" fill-opacity="0.6"/>
  <text x="540" y="350" font-family="Vazirmatn, Tahoma" font-size="42" fill="#F59E0B"
        text-anchor="middle" direction="rtl" font-weight="bold">⚡</text>
  <text x="540" y="400" font-family="Vazirmatn, Tahoma" font-size="28" fill="#F59E0B"
        text-anchor="middle" direction="rtl" font-weight="bold">پوست بدون مغز</text>
  <text x="540" y="450" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">اسناد حقوقی انباشته</text>
  <text x="540" y="485" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">ولی فهم عمیق از</text>
  <text x="540" y="520" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">ماهیت حق غایب</text>
  <rect x="460" y="580" width="160" height="60" rx="12"
        fill="#F59E0B" fill-opacity="0.1"/>
  <text x="540" y="620" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F59E0B"
        text-anchor="middle" direction="rtl">خلأ مبنایی</text>

  <!-- ستون ۳ -->
  <rect x="100" y="290" width="240" height="380" rx="18"
        fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-opacity="0.2"/>
  <rect x="100" y="290" width="240" height="6" rx="3" fill="#A855F7" fill-opacity="0.6"/>
  <text x="220" y="350" font-family="Vazirmatn, Tahoma" font-size="42" fill="#C084FC"
        text-anchor="middle" direction="rtl" font-weight="bold">🔄</text>
  <text x="220" y="400" font-family="Vazirmatn, Tahoma" font-size="28" fill="#C084FC"
        text-anchor="middle" direction="rtl" font-weight="bold">ابهام مشروعیت</text>
  <text x="220" y="450" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">چه کسی حق را تعریف</text>
  <text x="220" y="485" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">می‌کند؟ با چه مبنایی؟</text>
  <text x="220" y="520" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="middle" direction="rtl">دور باطل مشروعیت</text>
  <rect x="140" y="580" width="160" height="60" rx="12"
        fill="#A855F7" fill-opacity="0.1"/>
  <text x="220" y="620" font-family="Vazirmatn, Tahoma" font-size="22" fill="#C084FC"
        text-anchor="middle" direction="rtl">بحران مرجعیت</text>

  <!-- جمع‌بندی -->
  <rect x="100" y="730" width="880" height="110" rx="20"
        fill="#FFFFFF" fill-opacity="0.03" stroke="#F59E0B" stroke-opacity="0.15"/>
  <text x="540" y="775" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF"
        text-anchor="middle" direction="rtl" font-weight="bold">دیدگاه نویسنده:</text>
  <text x="540" y="820" font-family="Vazirmatn, Tahoma" font-size="26" fill="#E8B83D"
        text-anchor="middle" direction="rtl">صوری‌شدنِ حق، بزرگ‌ترین تهدید علیه خودِ حق است</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#F59E0B" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۱</text>
</svg>
