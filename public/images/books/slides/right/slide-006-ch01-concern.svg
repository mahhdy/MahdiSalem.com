<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0505"/>
      <stop offset="50%" stop-color="#120A14"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <radialGradient id="glow6" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0"/>
      <stop offset="50%" stop-color="#DC2626" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg6)"/>
  <rect width="1080" height="1080" fill="url(#glow6)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#DC2626" fill-opacity="0.08" stroke="#DC2626" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#DC2626"
        text-anchor="middle" direction="rtl">فصل ۱ · اسلاید ۶ از ۱۰</text>

  <!-- عنوان -->
  <text x="990" y="165" font-family="Vazirmatn, Tahoma" font-size="56" font-weight="900"
        fill="#F87171" text-anchor="start" direction="rtl">نگرانی نویسنده</text>
  <rect x="140" y="195" width="850" height="3" rx="1.5" fill="url(#redFade)"/>

  <!-- هشدار مرکزی بزرگ -->
  <rect x="120" y="250" width="840" height="200" rx="24"
        fill="#DC2626" fill-opacity="0.06" stroke="#DC2626" stroke-opacity="0.2" stroke-width="2"/>
  <!-- آیکون هشدار -->
  <polygon points="540,280 580,350 500,350" fill="none" stroke="#F87171" stroke-width="2.5"/>
  <text x="540" y="343" font-family="Vazirmatn, Tahoma" font-size="24" fill="#F87171"
        text-anchor="middle" font-weight="bold">!</text>
  <text x="540" y="400" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FFFFFF"
        text-anchor="middle" direction="rtl" font-weight="bold">حق بدون فهم عمیق = ابزار سلطه</text>

  <!-- سه تهدید -->
  <rect x="690" y="500" width="320" height="180" rx="18"
        fill="#F87171" fill-opacity="0.05" stroke="#F87171" stroke-opacity="0.2"/>
  <rect x="690" y="500" width="320" height="5" rx="2.5" fill="#F87171" fill-opacity="0.4"/>
  <text x="970" y="550" font-family="Vazirmatn, Tahoma" font-size="30" fill="#F87171"
        text-anchor="start" direction="rtl" font-weight="bold">صوری‌شدن</text>
  <text x="970" y="590" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">حق روی کاغذ هست</text>
  <text x="970" y="620" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">ولی در زندگی غایب</text>

  <rect x="340" y="500" width="320" height="180" rx="18"
        fill="#F59E0B" fill-opacity="0.05" stroke="#F59E0B" stroke-opacity="0.2"/>
  <rect x="340" y="500" width="320" height="5" rx="2.5" fill="#F59E0B" fill-opacity="0.4"/>
  <text x="620" y="550" font-family="Vazirmatn, Tahoma" font-size="30" fill="#F59E0B"
        text-anchor="start" direction="rtl" font-weight="bold">نابرابری مطالبه</text>
  <text x="620" y="590" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">قدرتمندان مطالبه می‌کنند</text>
  <text x="620" y="620" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">ضعفا تحمّل می‌کنند</text>

  <rect x="80" y="500" width="230" height="180" rx="18"
        fill="#A855F7" fill-opacity="0.05" stroke="#A855F7" stroke-opacity="0.2"/>
  <rect x="80" y="500" width="230" height="5" rx="2.5" fill="#A855F7" fill-opacity="0.4"/>
  <text x="270" y="550" font-family="Vazirmatn, Tahoma" font-size="30" fill="#C084FC"
        text-anchor="start" direction="rtl" font-weight="bold">تمرکز قدرت</text>
  <text x="270" y="590" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">تعریفِ حق = انحصارِ</text>
  <text x="270" y="620" font-family="Vazirmatn, Tahoma" font-size="22" fill="#BBB"
        text-anchor="start" direction="rtl">نخبگان قدرت</text>

  <!-- خط پیوند -->
  <line x1="540" y1="700" x2="540" y2="750" stroke="#DC2626" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="530,748 540,765 550,748" fill="#DC2626" fill-opacity="0.4"/>

  <!-- نتیجه‌گیری -->
  <rect x="140" y="780" width="800" height="110" rx="20"
        fill="#FFFFFF" fill-opacity="0.03" stroke="#E8B83D" stroke-opacity="0.2"/>
  <text x="540" y="830" font-family="Vazirmatn, Tahoma" font-size="30" fill="#E8B83D"
        text-anchor="middle" direction="rtl" font-weight="bold">بنابراین «چرا حق؟» صرفاً آکادمیک نیست</text>
  <text x="540" y="870" font-family="Vazirmatn, Tahoma" font-size="24" fill="#CCC"
        text-anchor="middle" direction="rtl">پرسشی است حیاتی برای بقای زیست جمعیِ عادلانه</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#DC2626" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۱</text>
</svg>
