<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-starts" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1020"/>
      <stop offset="100%" stop-color="#14182C"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-starts)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="480" height="48" rx="24"
        fill="#8B5CF6" fill-opacity="0.08" stroke="#8B5CF6" stroke-opacity="0.25"/>
  <text x="480" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#A78BFA"
        text-anchor="start" direction="rtl">فصل ۱۰ · مشروعیت · فرض‌های بنیادین آغاز</text>

  <!-- عنوان -->
  <text x="1000" y="165" font-family="Vazirmatn, Tahoma" font-size="46" font-weight="900"
        fill="#EDE9FE" text-anchor="start" direction="rtl">هر نظامی یک «فرض آغاز» دارد</text>
  <text x="1000" y="218" font-family="Vazirmatn, Tahoma" font-size="24" fill="#C4B5FD"
        text-anchor="start" direction="rtl">Non-Inferential Foundational Assumption · فرض غیراستدلالی</text>

  <!-- چهار نمونه -->
  <rect x="555" y="270" width="470" height="125" rx="18"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="990" y="312" font-family="Vazirmatn, Tahoma" font-size="26" fill="#67E8F9"
        font-weight="bold" text-anchor="start" direction="rtl">🇫🇷 انقلاب فرانسه</text>
  <text x="990" y="348" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">اعلامیه‌ی حقوق بشر ← فرض حقوق پیشااجتماعی</text>
  <text x="990" y="380" font-family="Vazirmatn, Tahoma" font-size="19" fill="#7DD3FC"
        text-anchor="start" direction="rtl">«حقوق طبیعی و تفویض‌ناپذیر انسان»</text>

  <rect x="55" y="270" width="470" height="125" rx="18"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.2"/>
  <text x="490" y="312" font-family="Vazirmatn, Tahoma" font-size="26" fill="#4ADE80"
        font-weight="bold" text-anchor="start" direction="rtl">🇺🇸 انقلاب آمریکا</text>
  <text x="490" y="348" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">فرض بداهت ← حقایق بدیهی</text>
  <text x="490" y="380" font-family="Vazirmatn, Tahoma" font-size="19" fill="#86EFAC"
        text-anchor="start" direction="rtl">«ما این حقایق را بدیهی می‌دانیم»</text>

  <rect x="555" y="410" width="470" height="125" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="990" y="452" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">🇩🇪 قانون اساسی آلمان ۱۹۴۹</text>
  <text x="990" y="488" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">فرض کرامت ← پس از هولوکاست</text>
  <text x="990" y="520" font-family="Vazirmatn, Tahoma" font-size="19" fill="#FDE68A"
        text-anchor="start" direction="rtl">«کرامت انسان خدشه‌ناپذیر است»</text>

  <rect x="55" y="410" width="470" height="125" rx="18"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="490" y="452" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FCA5A5"
        font-weight="bold" text-anchor="start" direction="rtl">🇮🇷 انقلاب ایران</text>
  <text x="490" y="488" font-family="Vazirmatn, Tahoma" font-size="21" fill="#CCC"
        text-anchor="start" direction="rtl">فرض مشروعیت الهی ← ولایت فقیه</text>
  <text x="490" y="520" font-family="Vazirmatn, Tahoma" font-size="19" fill="#FCA5A5"
        text-anchor="start" direction="rtl">«حاکمیت مطلقه‌ی خداوند»</text>

  <!-- تحلیل نقادانه -->
  <rect x="80" y="570" width="920" height="200" rx="22"
        fill="#8B5CF6" fill-opacity="0.04" stroke="#8B5CF6" stroke-opacity="0.18"/>
  <text x="960" y="615" font-family="Vazirmatn, Tahoma" font-size="28" fill="#EDE9FE"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ تحلیل نقادانه</text>
  <text x="960" y="658" font-family="Vazirmatn, Tahoma" font-size="23" fill="#EEE"
        text-anchor="start" direction="rtl">هریک یک فرض بنیادین غیراستدلالی دارد</text>
  <text x="960" y="698" font-family="Vazirmatn, Tahoma" font-size="23" fill="#EEE"
        text-anchor="start" direction="rtl">هیچ‌کدام این فرض را «اثبات» نکرده‌اند بلکه «اعلام» کرده‌اند</text>
  <text x="960" y="738" font-family="Vazirmatn, Tahoma" font-size="22" fill="#A78BFA"
        text-anchor="start" direction="rtl">پرسش: فرض بنیادین نویسنده چیست؟</text>
  <text x="960" y="765" font-family="Vazirmatn, Tahoma" font-size="20" fill="#C4B5FD"
        text-anchor="start" direction="rtl">پاسخ: «عاملیت و اختیار انسان» + مشروعیت فرایندی مارپیچی</text>

  <!-- هشدار -->
  <rect x="80" y="800" width="920" height="80" rx="14"
        fill="#F59E0B" fill-opacity="0.03" stroke="#F59E0B" stroke-opacity="0.12"/>
  <text x="960" y="840" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCD34D"
        text-anchor="start" direction="rtl">⚠ بازی اجتماع ابتدای صفری نداشته — ولی هر بازسازی نیازمند فرض آغاز است</text>
  <text x="960" y="870" font-family="Vazirmatn, Tahoma" font-size="20" fill="#AAA"
        text-anchor="start" direction="rtl">این فرض باید صراحتاً اعلام شود نه پنهان بماند</text>

  <!-- پاورقی -->
  <rect x="40" y="920" width="1000" height="2" rx="1" fill="#8B5CF6" opacity="0.2"/>
  <text x="540" y="965" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">کلزن: هنجار بنیادین (Grundnorm) · هارت: قاعده‌ی شناسایی (Rule of Recognition)</text>
  <text x="540" y="1005" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">هیچ‌کدام به‌طور کامل حلّ نشد — مسأله‌ای باز در فلسفه‌ی حقوق</text>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">فصل ۱۰ · مشروعیت · فرض‌های آغاز</text>
</svg>
