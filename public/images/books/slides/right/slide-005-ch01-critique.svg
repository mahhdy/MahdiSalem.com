<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg5" x1="0" y1="1080" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E0A1A"/>
      <stop offset="100%" stop-color="#150D22"/>
    </linearGradient>
    <radialGradient id="glow5" cx="70%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg5)"/>
  <rect width="1080" height="1080" fill="url(#glow5)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="320" height="48" rx="24"
        fill="#A855F7" fill-opacity="0.08" stroke="#A855F7" stroke-opacity="0.25"/>
  <text x="200" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#A855F7"
        text-anchor="middle" direction="rtl">فصل ۱ · اسلاید ۵ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="165" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#C084FC" text-anchor="middle" direction="rtl">پرسش‌های نقادانه</text>
  <text x="540" y="215" font-family="Vazirmatn, Tahoma" font-size="26" fill="#888"
        text-anchor="middle" direction="rtl">مخاطرات و ابهام‌هایی که باید پاسخ بگیرند</text>

  <!-- ۴ کادر پرسش نقادانه -->
  <!-- پرسش ۱ -->
  <rect x="80" y="280" width="920" height="130" rx="18"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.15"/>
  <circle cx="950" cy="315" r="22" fill="#DC2626" fill-opacity="0.15"/>
  <text x="950" y="323" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="910" y="325" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">آیا بدون بنیاد ثابت، حق سقوط نمی‌کند؟</text>
  <text x="910" y="375" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">نقد کلاسیک: نسبی‌گرایی ← اگر حق فرایندی باشد، هر نتیجه‌ای موجه است؟</text>

  <!-- پرسش ۲ -->
  <rect x="80" y="425" width="920" height="130" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.15"/>
  <circle cx="950" cy="460" r="22" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="950" y="468" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F59E0B"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="910" y="470" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">مهندسی حق = مهندسی اجتماعی؟</text>
  <text x="910" y="520" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">خطر: ابزارشدن مفهوم حق برای مهندسان اجتماعی قدرت‌مدار</text>

  <!-- پرسش ۳ -->
  <rect x="80" y="570" width="920" height="130" rx="18"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.15"/>
  <circle cx="950" cy="605" r="22" fill="#06B6D4" fill-opacity="0.15"/>
  <text x="950" y="613" font-family="Vazirmatn, Tahoma" font-size="22" fill="#06B6D4"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="910" y="615" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">کشتی نویرات: بازسازی بی‌لنگرگاه؟</text>
  <text x="910" y="665" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">آیا بازشناسی انتقادی درون‌ماندگار در عمل ممکن است؟</text>

  <!-- پرسش ۴ -->
  <rect x="80" y="715" width="920" height="130" rx="18"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.15"/>
  <circle cx="950" cy="750" r="22" fill="#22C55E" fill-opacity="0.15"/>
  <text x="950" y="758" font-family="Vazirmatn, Tahoma" font-size="22" fill="#4ADE80"
        text-anchor="middle" font-weight="bold">۴</text>
  <text x="910" y="760" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">چه کسی بازی را داوری می‌کند؟</text>
  <text x="910" y="810" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">مسئله داور: اگر مشروعیت فرایندی باشد، داور هم فرایندی است؟</text>

  <!-- دعوت به تأمل -->
  <rect x="200" y="890" width="680" height="60" rx="14"
        fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-opacity="0.2"/>
  <text x="540" y="930" font-family="Vazirmatn, Tahoma" font-size="26" fill="#C084FC"
        text-anchor="middle" direction="rtl">این کتاب پاسخ‌هایی دارد — اما پرسش شما مهم‌تر است</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#A855F7" opacity="0.2"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۱</text>
</svg>
