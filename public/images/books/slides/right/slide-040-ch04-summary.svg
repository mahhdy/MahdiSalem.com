<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg40f" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0E1A"/>
      <stop offset="50%" stop-color="#0F1528"/>
      <stop offset="100%" stop-color="#0B0E1A"/>
    </linearGradient>
    <radialGradient id="glow40f" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyanGold40" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E8B83D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg40f)"/>
  <rect width="1080" height="1080" fill="url(#glow40f)"/>

  <!-- کادر تزئینی -->
  <rect x="60" y="60" width="960" height="960" rx="30" fill="none"
        stroke="#06B6D4" stroke-opacity="0.06" stroke-width="1"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="370" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="225" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#06B6D4"
        text-anchor="middle" direction="rtl">فصل ۴ · اسلاید ۱۰ از ۱۰</text>

  <!-- عنوان -->
  <text x="540" y="170" font-family="Vazirmatn, Tahoma" font-size="50" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" direction="rtl">برداشت‌های کلیدی</text>

  <rect x="200" y="210" width="680" height="2.5" rx="1" fill="url(#cyanGold40)"/>

  <!-- ۵ برداشت -->
  <rect x="120" y="260" width="840" height="80" rx="14"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.12"/>
  <circle cx="920" cy="300" r="22" fill="#06B6D4" fill-opacity="0.15"/>
  <text x="920" y="308" font-family="Vazirmatn, Tahoma" font-size="18" fill="#22D3EE"
        text-anchor="middle" font-weight="bold">۱</text>
  <text x="880" y="308" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">ده منشأ متمایز: جامع‌ترین تصنیف موجود</text>

  <rect x="120" y="355" width="840" height="80" rx="14"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.12"/>
  <circle cx="920" cy="395" r="22" fill="#22C55E" fill-opacity="0.15"/>
  <text x="920" y="403" font-family="Vazirmatn, Tahoma" font-size="18" fill="#4ADE80"
        text-anchor="middle" font-weight="bold">۲</text>
  <text x="880" y="403" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">نوآوری: رنج + عاملیت = دو منشأ نادیده‌گرفته‌شده</text>

  <rect x="120" y="450" width="840" height="80" rx="14"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.12"/>
  <circle cx="920" cy="490" r="22" fill="#A855F7" fill-opacity="0.15"/>
  <text x="920" y="498" font-family="Vazirmatn, Tahoma" font-size="18" fill="#C084FC"
        text-anchor="middle" font-weight="bold">۳</text>
  <text x="880" y="498" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">فضای برداری: هر نظام = نقطه‌ای در فضای ۱۰بُعدی</text>

  <rect x="120" y="545" width="840" height="80" rx="14"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.12"/>
  <circle cx="920" cy="585" r="22" fill="#F59E0B" fill-opacity="0.15"/>
  <text x="920" y="593" font-family="Vazirmatn, Tahoma" font-size="18" fill="#FBBF24"
        text-anchor="middle" font-weight="bold">۴</text>
  <text x="880" y="593" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">هیچ مکتبی به تنهایی کافی نیست — ترکیب لازم</text>

  <rect x="120" y="640" width="840" height="80" rx="14"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.12"/>
  <circle cx="920" cy="680" r="22" fill="#DC2626" fill-opacity="0.15"/>
  <text x="920" y="688" font-family="Vazirmatn, Tahoma" font-size="18" fill="#F87171"
        text-anchor="middle" font-weight="bold">۵</text>
  <text x="880" y="688" font-family="Vazirmatn, Tahoma" font-size="24" fill="#FFFFFF"
        text-anchor="start" direction="rtl" font-weight="bold">پرسش باز: قطب‌نمای وزن‌دهی چیست؟ ← اخلاق منظوم</text>

  <!-- پل به بخش دوم -->
  <rect x="100" y="770" width="880" height="130" rx="20"
        fill="#E8B83D" fill-opacity="0.04" stroke="#E8B83D" stroke-opacity="0.2"/>
  <text x="540" y="815" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FBBF24"
        text-anchor="middle" direction="rtl" font-weight="bold">پایان بخش اول: زمینه و بازشناسی ✓</text>
  <text x="540" y="858" font-family="Vazirmatn, Tahoma" font-size="24" fill="#CCC"
        text-anchor="middle" direction="rtl">اکنون آمادهٔ تأسیس هستیم:</text>
  <text x="540" y="888" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="middle" direction="rtl">فرض‌ها · پل باید و هست · ماشین زنده · بازی · اخلاق منظوم</text>

  <!-- دعوت نهایی -->
  <rect x="280" y="925" width="520" height="50" rx="14"
        fill="#1A1A30" stroke="#E8B83D" stroke-opacity="0.25"/>
  <text x="540" y="958" font-family="Vazirmatn, Tahoma" font-size="24" fill="#E8B83D"
        text-anchor="middle" direction="rtl" font-weight="bold">بخش دوم: تأسیس ← فصل ۵: جغرافیای مفهومی</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#06B6D4" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۴ — پایان</text>
</svg>
