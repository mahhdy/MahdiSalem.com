<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-defeat" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E1422"/>
      <stop offset="100%" stop-color="#141028"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-defeat)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="440" height="48" rx="24"
        fill="#14B8A6" fill-opacity="0.08" stroke="#14B8A6" stroke-opacity="0.25"/>
  <text x="440" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#5EEAD4"
        text-anchor="start" direction="rtl">فصل ۱۱ · ابطال‌پذیری شرایطی · Defeasibility</text>

  <!-- عنوان -->
  <text x="1000" y="168" font-family="Vazirmatn, Tahoma" font-size="48" font-weight="900"
        fill="#CCFBF1" text-anchor="start" direction="rtl">آموزه‌ها در خلأ نیستند</text>
  <text x="1000" y="225" font-family="Vazirmatn, Tahoma" font-size="26" fill="#99F6E4"
        text-anchor="start" direction="rtl">شرایط می‌تواند نتیجه را تغییر دهد · اخلاق منظوم</text>

  <!-- قاعده‌ی اصلی -->
  <rect x="80" y="280" width="920" height="100" rx="18"
        fill="#14B8A6" fill-opacity="0.05" stroke="#14B8A6" stroke-opacity="0.25"/>
  <text x="960" y="325" font-family="Vazirmatn, Tahoma" font-size="32" fill="#5EEAD4"
        font-weight="bold" text-anchor="start" direction="rtl">قاعده: «دزدی ممنوع است»</text>
  <text x="960" y="365" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">Prima Facie Duty · وظیفه‌ی ظاهری · راس (W.D. Ross)</text>

  <!-- فلش پایین -->
  <polygon points="540,390 530,400 550,400" fill="#5EEAD4" fill-opacity="0.3"/>
  <text x="540" y="425" font-family="Vazirmatn, Tahoma" font-size="20" fill="#5EEAD4"
        text-anchor="middle" direction="rtl">ولی اگر...</text>

  <!-- شرایط استثنایی -->
  <rect x="80" y="445" width="920" height="110" rx="18"
        fill="#F59E0B" fill-opacity="0.04" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="960" y="493" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">شرط: تنها راه نجات جان فرزند گرسنه = دزدی نان</text>
  <text x="960" y="535" font-family="Vazirmatn, Tahoma" font-size="22" fill="#AAA"
        text-anchor="start" direction="rtl">اضطرار فقهی · ضرورت اخلاقی · تعارض وظایف</text>

  <!-- فلش -->
  <polygon points="540,565 530,575 550,575" fill="#F59E0B" fill-opacity="0.3"/>

  <!-- نتیجه -->
  <rect x="80" y="590" width="920" height="100" rx="18"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.22"/>
  <text x="960" y="635" font-family="Vazirmatn, Tahoma" font-size="28" fill="#D8B4FE"
        font-weight="bold" text-anchor="start" direction="rtl">قاعده «شکسته» می‌شود بدون آنکه باطل شود</text>
  <text x="960" y="672" font-family="Vazirmatn, Tahoma" font-size="22" fill="#C4B5FD"
        text-anchor="start" direction="rtl">Defeasibility ≠ ابطال · بلکه تعلیق شرایطی</text>

  <!-- دیدگاه نویسنده -->
  <rect x="80" y="730" width="920" height="170" rx="22"
        fill="#06B6D4" fill-opacity="0.04" stroke="#06B6D4" stroke-opacity="0.18"/>
  <text x="960" y="775" font-family="Vazirmatn, Tahoma" font-size="28" fill="#E0F2FE"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ دیدگاه نویسنده</text>
  <text x="960" y="820" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">آموزه‌ها در سطح وظایف اخلاقی پاسخ پیش‌فرض دارند</text>
  <text x="960" y="858" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">ولی نمی‌توان نتیجه گرفت شرایطی نیست که نتیجه را تغییر دهد</text>
  <text x="960" y="892" font-family="Vazirmatn, Tahoma" font-size="22" fill="#67E8F9"
        text-anchor="start" direction="rtl">اخلاق منظوم: وظیفه + نتیجه + فضیلت همه سهم دارند</text>

  <!-- نکته سطح استعلایی -->
  <rect x="80" y="920" width="920" height="60" rx="12"
        fill="#22C55E" fill-opacity="0.03" stroke="#22C55E" stroke-opacity="0.12"/>
  <text x="960" y="958" font-family="Vazirmatn, Tahoma" font-size="22" fill="#86EFAC"
        text-anchor="start" direction="rtl">سطح استعلایی ثابت + سطح زمینی پویا = ستون فقرات هستی‌شناسی حق نویسنده</text>

  <!-- پاورقی -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#14B8A6" opacity="0.2"/>
  <text x="540" y="1050" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">مشابه تمایز شیعی «ثوابت و متغیرات» · تمایز رالزی «اصول» و «نهادها»</text>
</svg>
