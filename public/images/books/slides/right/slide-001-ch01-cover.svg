<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0E1A"/>
      <stop offset="50%" stop-color="#121833"/>
      <stop offset="100%" stop-color="#0B0E1A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E8B83D" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E8B83D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8B83D" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E8B83D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E8B83D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg1)"/>
  <rect width="1080" height="1080" fill="url(#glow1)"/>

  <!-- کادر تزئینی بیرونی -->
  <rect x="50" y="50" width="980" height="980" rx="32" fill="none"
        stroke="#E8B83D" stroke-opacity="0.12" stroke-width="1.5"/>
  <rect x="70" y="70" width="940" height="940" rx="24" fill="none"
        stroke="#E8B83D" stroke-opacity="0.06" stroke-width="1"/>

  <!-- نشان بخش -->
  <rect x="360" y="130" width="360" height="52" rx="26"
        fill="#E8B83D" fill-opacity="0.08" stroke="#E8B83D" stroke-opacity="0.3" stroke-width="1.2"/>
  <text x="540" y="165" font-family="Vazirmatn, Tahoma" font-size="26" fill="#E8B83D"
        text-anchor="middle" direction="rtl" font-weight="bold">بخش اول · زمینه و بازشناسی</text>

  <!-- خط تزئینی -->
  <rect x="140" y="230" width="800" height="2" rx="1" fill="url(#goldLine)"/>

  <!-- عدد فصل بزرگ -->
  <text x="540" y="400" font-family="Vazirmatn, Tahoma" font-size="180" fill="#E8B83D"
        fill-opacity="0.08" text-anchor="middle" font-weight="900">۱</text>
  <text x="540" y="395" font-family="Vazirmatn, Tahoma" font-size="160" fill="none"
        stroke="#E8B83D" stroke-opacity="0.2" stroke-width="1" text-anchor="middle" font-weight="900">۱</text>

  <!-- عنوان فصل -->
  <text x="540" y="520" font-family="Vazirmatn, Tahoma" font-size="78" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" direction="rtl">چرا حق؟</text>

  <!-- زیرعنوان -->
  <text x="540" y="590" font-family="Vazirmatn, Tahoma" font-size="30" fill="#C9B97A"
        text-anchor="middle" direction="rtl">پرسشی که بی‌پاسخ ماندنش خطرناک‌تر از پاسخ‌دادنش است</text>

  <!-- خط تزئینی -->
  <rect x="340" y="640" width="400" height="2" rx="1" fill="url(#goldLine)"/>

  <!-- سه کلیدواژه -->
  <rect x="700" y="700" width="280" height="68" rx="16"
        fill="#E8B83D" fill-opacity="0.06" stroke="#E8B83D" stroke-opacity="0.2"/>
  <text x="840" y="744" font-family="Vazirmatn, Tahoma" font-size="28" fill="#E8B83D"
        text-anchor="middle" direction="rtl" font-weight="bold">ضرورت پرسش</text>

  <rect x="390" y="700" width="280" height="68" rx="16"
        fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-opacity="0.2"/>
  <text x="530" y="744" font-family="Vazirmatn, Tahoma" font-size="28" fill="#06B6D4"
        text-anchor="middle" direction="rtl" font-weight="bold">بحران مفهومی</text>

  <rect x="80" y="700" width="280" height="68" rx="16"
        fill="#A855F7" fill-opacity="0.06" stroke="#A855F7" stroke-opacity="0.2"/>
  <text x="220" y="744" font-family="Vazirmatn, Tahoma" font-size="28" fill="#A855F7"
        text-anchor="middle" direction="rtl" font-weight="bold">فرصت بازاندیشی</text>

  <!-- توضیح پایینی -->
  <rect x="140" y="830" width="800" height="100" rx="18"
        fill="#FFFFFF" fill-opacity="0.02" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <text x="540" y="870" font-family="Vazirmatn, Tahoma" font-size="24" fill="#999"
        text-anchor="middle" direction="rtl">«حق» بنیادی‌ترین مفهوم سیاسی-اجتماعی بشر است</text>
  <text x="540" y="910" font-family="Vazirmatn, Tahoma" font-size="24" fill="#888"
        text-anchor="middle" direction="rtl">اما آیا واقعاً می‌دانیم از چه سخن می‌گوییم؟</text>

  <!-- فوتر -->
  <rect x="40" y="1010" width="1000" height="2" rx="1" fill="#E8B83D" opacity="0.15"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق: فرایند، بازی، مهندسی · فصل ۱ · اسلاید ۱ از ۱۰</text>
</svg>
