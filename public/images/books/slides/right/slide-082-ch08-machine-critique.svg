<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-machine" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#071520"/>
      <stop offset="100%" stop-color="#0C1F2E"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-machine)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="380" height="48" rx="24"
        fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="230" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#06B6D4"
        text-anchor="middle" direction="rtl">فصل ۸ · ماشین حق · مرور نقادانه</text>

  <!-- عنوان -->
  <text x="540" y="155" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#E0F2FE" text-anchor="middle" direction="rtl">حق = خروجی یک ماشین زنده</text>
  <text x="540" y="210" font-family="Vazirmatn, Tahoma" font-size="24" fill="#67E8F9"
        text-anchor="middle" direction="rtl">تعریف فرایندی حق · نه شیء، نه ویژگی، بلکه محصول فرایند</text>

  <!-- ماشین: ورودی‌ها (سمت راست) -->
  <text x="960" y="290" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FCD34D"
        font-weight="bold" text-anchor="start" direction="rtl">⟵ ورودی‌ها</text>

  <!-- باکس‌های ورودی -->
  <rect x="740" y="310" width="290" height="55" rx="12"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="885" y="345" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCD34D"
        text-anchor="middle" direction="rtl">ارزش‌ها و مطلوبیت‌ها</text>

  <rect x="740" y="375" width="290" height="55" rx="12"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="885" y="410" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCD34D"
        text-anchor="middle" direction="rtl">تجارب تاریخی و دردها</text>

  <rect x="740" y="440" width="290" height="55" rx="12"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="885" y="475" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCD34D"
        text-anchor="middle" direction="rtl">توازن قدرت و گفتگو</text>

  <rect x="740" y="505" width="290" height="55" rx="12"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="885" y="540" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCD34D"
        text-anchor="middle" direction="rtl">عقل سلیم و شهود اخلاقی</text>

  <!-- فلش ورود -->
  <polygon points="720,430 690,400 690,460" fill="#F59E0B" fill-opacity="0.5"/>
  <rect x="580" y="420" width="110" height="20" rx="4" fill="url(#pipe)"/>

  <!-- ماشین مرکزی -->
  <rect x="300" y="310" width="280" height="260" rx="28"
        fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-opacity="0.4" stroke-width="2"/>
  <text x="440" y="390" font-family="Vazirmatn, Tahoma" font-size="28" fill="#22D3EE"
        font-weight="bold" text-anchor="middle" direction="rtl">⚙ ماشین حق</text>
  <text x="440" y="430" font-family="Vazirmatn, Tahoma" font-size="20" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">نهادسازی · بازشناسی</text>
  <text x="440" y="460" font-family="Vazirmatn, Tahoma" font-size="20" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">رقابت · همکاری</text>
  <text x="440" y="490" font-family="Vazirmatn, Tahoma" font-size="20" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">مرجع مشروع · نظارت</text>
  <text x="440" y="520" font-family="Vazirmatn, Tahoma" font-size="20" fill="#7DD3FC"
        text-anchor="middle" direction="rtl">بازتعریف مداوم</text>

  <!-- نماد چرخ‌دنده -->
  <circle cx="440" cy="355" r="18" fill="none" stroke="#22D3EE" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="440" cy="355" r="8" fill="#22D3EE" fill-opacity="0.3"/>

  <!-- فلش خروج -->
  <rect x="190" y="420" width="110" height="20" rx="4" fill="url(#pipe)"/>
  <polygon points="190,430 160,400 160,460" fill="#22C55E" fill-opacity="0.6"/>

  <!-- خروجی‌ها (سمت چپ) -->
  <text x="130" y="290" font-family="Vazirmatn, Tahoma" font-size="28" fill="#4ADE80"
        font-weight="bold" text-anchor="end" direction="rtl">خروجی‌ها ⟶</text>

  <rect x="30" y="310" width="290" height="55" rx="12"
        fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="175" y="345" font-family="Vazirmatn, Tahoma" font-size="22" fill="#86EFAC"
        text-anchor="middle" direction="rtl">مرزبندی‌ها و اجازه‌ها</text>

  <rect x="30" y="375" width="290" height="55" rx="12"
        fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="175" y="410" font-family="Vazirmatn, Tahoma" font-size="22" fill="#86EFAC"
        text-anchor="middle" direction="rtl">امتیازها و آزادی‌ها</text>

  <rect x="30" y="440" width="290" height="55" rx="12"
        fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="175" y="475" font-family="Vazirmatn, Tahoma" font-size="22" fill="#86EFAC"
        text-anchor="middle" direction="rtl">تکالیف و مسئولیت‌ها</text>

  <rect x="30" y="505" width="290" height="55" rx="12"
        fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="175" y="540" font-family="Vazirmatn, Tahoma" font-size="22" fill="#86EFAC"
        text-anchor="middle" direction="rtl">نقش‌ها و قواعد تعامل</text>

  <!-- حلقه بازخورد -->
  <path d="M 440 580 Q 440 680 640 680 Q 840 680 840 580" fill="none"
        stroke="#C084FC" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="640" y="720" font-family="Vazirmatn, Tahoma" font-size="20" fill="#C084FC"
        text-anchor="middle" direction="rtl">↻ حلقه‌ی بازخورد: خودسامانی و خودنقادی</text>

  <!-- نکته نقادانه پایین -->
  <rect x="80" y="760" width="920" height="160" rx="20"
        fill="#A855F7" fill-opacity="0.04" stroke="#A855F7" stroke-opacity="0.18"/>
  <text x="540" y="810" font-family="Vazirmatn, Tahoma" font-size="30" fill="#E9D5FF"
        font-weight="bold" text-anchor="middle" direction="rtl">⟡ نقد: ماشین یا اکوسیستم؟</text>
  <text x="540" y="855" font-family="Vazirmatn, Tahoma" font-size="24" fill="#CCC"
        text-anchor="middle" direction="rtl">ماشین طراح بیرونی دارد · اکوسیستم خودسامان است</text>
  <text x="540" y="895" font-family="Vazirmatn, Tahoma" font-size="24" fill="#CCC"
        text-anchor="middle" direction="rtl">حقوق واقعی ترکیبی است: «ماشین زنده» با حلقه‌ی بازخورد</text>

  <!-- پاورقی -->
  <rect x="40" y="970" width="1000" height="2" rx="1" fill="#06B6D4" opacity="0.2"/>
  <text x="540" y="1010" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">حق و حقوق · ماشین فرایندی · مرور انتقادی</text>
  <text x="540" y="1050" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">«بستنی شیرینی نیست و بستنی‌ساز هم شیرینی نیست — ولی شیرینی فقط از این مسیر حاصل می‌شود»</text>
</svg>
