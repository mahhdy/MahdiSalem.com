<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg90" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <radialGradient id="glow90" cx="50%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg90)"/>
  <rect width="1080" height="1080" fill="url(#glow90)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="360" height="48" rx="24"
        fill="#8B5CF6" fill-opacity="0.08" stroke="#8B5CF6" stroke-opacity="0.25"/>
  <text x="220" y="62" font-family="Vazirmatn, Tahoma" font-size="24" fill="#8B5CF6"
        text-anchor="middle" direction="rtl">فصل ۹ · اسلاید ۱ از ۱۰</text>

  <text x="540" y="140" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بخش دوم: تأسیس</text>

  <!-- عنوان -->
  <text x="540" y="260" font-family="Vazirmatn, Tahoma" font-size="80" font-weight="900"
        fill="#8B5CF6" text-anchor="middle" direction="rtl">بازی</text>
  <text x="540" y="320" font-family="Vazirmatn, Tahoma" font-size="30" fill="#888"
        text-anchor="middle" direction="rtl">حق به مثابهٔ قواعد و آزادی‌عمل بازیگران</text>

  <!-- سه نوع بازی -->
  <text x="540" y="410" font-family="Vazirmatn, Tahoma" font-size="32" fill="#C19A3E"
        font-weight="bold" text-anchor="middle" direction="rtl">سه نوع بازی:</text>

  <!-- بازی طبیعی -->
  <rect x="720" y="450" width="310" height="200" rx="18"
        fill="#22C55E" fill-opacity="0.06" stroke="#22C55E" stroke-opacity="0.3" stroke-width="2"/>
  <text x="875" y="510" font-family="Vazirmatn, Tahoma" font-size="34" fill="#4ADE80"
        font-weight="bold" text-anchor="middle" direction="rtl">طبیعی</text>
  <text x="875" y="560" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">تشخیص حق پسینی</text>
  <text x="875" y="600" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">مبتنی بر تجربه</text>
  <text x="875" y="635" font-family="Vazirmatn, Tahoma" font-size="22" fill="#666"
        text-anchor="middle" direction="rtl">مثال: بازار آزاد</text>

  <!-- بازی ساختگی -->
  <rect x="385" y="450" width="310" height="200" rx="18"
        fill="#8B5CF6" fill-opacity="0.06" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="2"/>
  <text x="540" y="510" font-family="Vazirmatn, Tahoma" font-size="34" fill="#A78BFA"
        font-weight="bold" text-anchor="middle" direction="rtl">ساختگی</text>
  <text x="540" y="560" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">قواعد از پیش تعیین‌شده</text>
  <text x="540" y="600" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">طراحی نهادی</text>
  <text x="540" y="635" font-family="Vazirmatn, Tahoma" font-size="22" fill="#666"
        text-anchor="middle" direction="rtl">مثال: قانون اساسی</text>

  <!-- بازی بازساخته -->
  <rect x="50" y="450" width="310" height="200" rx="18"
        fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="2"/>
  <text x="205" y="510" font-family="Vazirmatn, Tahoma" font-size="34" fill="#F59E0B"
        font-weight="bold" text-anchor="middle" direction="rtl">بازساخته</text>
  <text x="205" y="560" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">اصلاح قواعد موجود</text>
  <text x="205" y="600" font-family="Vazirmatn, Tahoma" font-size="24" fill="#AAA"
        text-anchor="middle" direction="rtl">دور هرمنوتیکی</text>
  <text x="205" y="635" font-family="Vazirmatn, Tahoma" font-size="22" fill="#666"
        text-anchor="middle" direction="rtl">مثال: اصلاحات حقوقی</text>

  <!-- بصیرت کلیدی -->
  <rect x="80" y="700" width="920" height="130" rx="20"
        fill="#8B5CF6" fill-opacity="0.04" stroke="#8B5CF6" stroke-opacity="0.2"/>
  <text x="540" y="755" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FFFFFF"
        font-weight="bold" text-anchor="middle" direction="rtl">بازی‌ها تودرتو هستند</text>
  <text x="540" y="805" font-family="Vazirmatn, Tahoma" font-size="26" fill="#CCC"
        text-anchor="middle" direction="rtl">قواعد یک بازی، خروجی فرابازی بالاسری آن هستند</text>

  <!-- نقد -->
  <rect x="120" y="870" width="840" height="80" rx="14"
        fill="#DC2626" fill-opacity="0.04" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="540" y="920" font-family="Vazirmatn, Tahoma" font-size="26" fill="#F87171"
        text-anchor="middle" direction="rtl">⚡ آیا زندگی واقعاً «بازی» است یا استعاره‌اش خطرناک است؟</text>

  <rect x="40" y="1000" width="1000" height="2.5" rx="1"
        fill="#8B5CF6" opacity="0.3"/>
  <text x="540" y="1055" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بعدی: مشروعیت مرجع ←</text>
</svg>
