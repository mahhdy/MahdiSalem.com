<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg-pain" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="50%" stop-color="#1C0F18"/>
      <stop offset="100%" stop-color="#0D0A14"/>
    </linearGradient>
    <radialGradient id="painGlow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg-pain)"/>
  <rect width="1080" height="1080" fill="url(#painGlow)"/>

  <!-- سربرگ -->
  <rect x="40" y="28" width="480" height="48" rx="24"
        fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-opacity="0.25"/>
  <text x="480" y="62" font-family="Vazirmatn, Tahoma" font-size="23" fill="#FCA5A5"
        text-anchor="start" direction="rtl">فصل ۴ · منشأ یازدهم · ابتکار نویسنده</text>

  <!-- عنوان -->
  <text x="1000" y="170" font-family="Vazirmatn, Tahoma" font-size="52" font-weight="900"
        fill="#FEE2E2" text-anchor="start" direction="rtl">حق منشعب از درد</text>
  <text x="1000" y="228" font-family="Vazirmatn, Tahoma" font-size="26" fill="#FCA5A5"
        text-anchor="start" direction="rtl">رنج و آسیب‌پذیری به مثابه منشأ شناخت حق</text>

  <!-- نماد بصری: شعله/قطره خون -->
  <ellipse cx="540" cy="420" rx="120" ry="140" fill="none" stroke="#EF4444" stroke-opacity="0.08" stroke-width="2"/>
  <ellipse cx="540" cy="420" rx="80" ry="95" fill="none" stroke="#EF4444" stroke-opacity="0.14" stroke-width="1.5"/>
  <ellipse cx="540" cy="420" rx="40" ry="50" fill="#EF4444" fill-opacity="0.04" stroke="#EF4444" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="540" y="428" font-family="Vazirmatn, Tahoma" font-size="36" fill="#FCA5A5"
        text-anchor="middle" direction="rtl">درد</text>

  <!-- شاخه‌های منشعب از درد -->
  <!-- بالا راست -->
  <line x1="620" y1="340" x2="800" y2="280" stroke="#FCA5A5" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="680" y="255" width="340" height="55" rx="12"
        fill="#FEE2E2" fill-opacity="0.04" stroke="#FCA5A5" stroke-opacity="0.2"/>
  <text x="990" y="290" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCA5A5"
        text-anchor="start" direction="rtl">اعلامیه‌ی جهانی ← رنج هولوکاست</text>

  <!-- بالا چپ -->
  <line x1="460" y1="340" x2="280" y2="280" stroke="#FCA5A5" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="60" y="255" width="340" height="55" rx="12"
        fill="#FEE2E2" fill-opacity="0.04" stroke="#FCA5A5" stroke-opacity="0.2"/>
  <text x="370" y="290" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCA5A5"
        text-anchor="start" direction="rtl">حقوق کارگران ← رنج استثمار</text>

  <!-- پایین راست -->
  <line x1="630" y1="500" x2="800" y2="550" stroke="#FCA5A5" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="680" y="525" width="340" height="55" rx="12"
        fill="#FEE2E2" fill-opacity="0.04" stroke="#FCA5A5" stroke-opacity="0.2"/>
  <text x="990" y="560" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCA5A5"
        text-anchor="start" direction="rtl">حقوق زنان ← رنج تبعیض</text>

  <!-- پایین چپ -->
  <line x1="450" y1="500" x2="280" y2="550" stroke="#FCA5A5" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="60" y="525" width="340" height="55" rx="12"
        fill="#FEE2E2" fill-opacity="0.04" stroke="#FCA5A5" stroke-opacity="0.2"/>
  <text x="370" y="560" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCA5A5"
        text-anchor="start" direction="rtl">حقوق مدنی ← رنج بردگی</text>

  <!-- دیدگاه نویسنده -->
  <rect x="80" y="630" width="920" height="200" rx="22"
        fill="#EF4444" fill-opacity="0.03" stroke="#EF4444" stroke-opacity="0.18"/>
  <text x="960" y="678" font-family="Vazirmatn, Tahoma" font-size="30" fill="#FEE2E2"
        font-weight="bold" text-anchor="start" direction="rtl">⟡ دیدگاه نویسنده</text>
  <text x="960" y="722" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">تجاربی هستند که لزوم تأکید بر مرزها را یادآوری می‌کنند</text>
  <text x="960" y="765" font-family="Vazirmatn, Tahoma" font-size="24" fill="#EEE"
        text-anchor="start" direction="rtl">ارزش دارد انرژی ثابتی برای جلوگیری سرمایه‌گذاری شود</text>
  <text x="960" y="805" font-family="Vazirmatn, Tahoma" font-size="22" fill="#FCA5A5"
        text-anchor="start" direction="rtl">حقوق ضمانت عدم تکرار · پیشگیری به جای درمان پرهزینه</text>

  <!-- مقایسه -->
  <rect x="80" y="860" width="920" height="70" rx="14"
        fill="#1A1025" stroke="#A78BFA" stroke-opacity="0.15"/>
  <text x="960" y="903" font-family="Vazirmatn, Tahoma" font-size="21" fill="#C4B5FD"
        text-anchor="start" direction="rtl">باتلر: آسیب‌پذیری مشترک = بنیاد اخلاقی حقوق · لویناس: «چهره‌ی دیگری» = سرآغاز تکلیف</text>

  <!-- پاورقی -->
  <rect x="40" y="970" width="1000" height="2" rx="1" fill="#EF4444" opacity="0.2"/>
  <text x="540" y="1010" font-family="Vazirmatn, Tahoma" font-size="20" fill="#556"
        text-anchor="middle" direction="rtl">«پیش از هر نظریه‌پردازی، فریاد هست»</text>
  <text x="540" y="1050" font-family="Vazirmatn, Tahoma" font-size="18" fill="#445"
        text-anchor="middle" direction="rtl">حق و حقوق · منشأهای حق · لایه‌ی پدیدارشناختی</text>
</svg>
