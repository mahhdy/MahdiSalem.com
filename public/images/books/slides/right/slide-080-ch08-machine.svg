<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1B0D"/>
      <stop offset="100%" stop-color="#1A2E1A"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greenGold" x1="0" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#C19A3E"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg3)"/>
  <rect width="1080" height="1080" fill="url(#glow3)"/>

  <!-- شبکهٔ نقطه‌ای -->
  <g fill="#22C55E" fill-opacity="0.04">
    <circle cx="108" cy="108" r="2"/>
    <circle cx="216" cy="108" r="2"/>
    <circle cx="324" cy="108" r="2"/>
    <circle cx="432" cy="108" r="2"/>
    <circle cx="540" cy="108" r="2"/>
    <circle cx="648" cy="108" r="2"/>
    <circle cx="756" cy="108" r="2"/>
    <circle cx="864" cy="108" r="2"/>
    <circle cx="972" cy="108" r="2"/>
    <circle cx="108" cy="972" r="2"/>
    <circle cx="216" cy="972" r="2"/>
    <circle cx="324" cy="972" r="2"/>
    <circle cx="432" cy="972" r="2"/>
    <circle cx="540" cy="972" r="2"/>
    <circle cx="648" cy="972" r="2"/>
    <circle cx="756" cy="972" r="2"/>
    <circle cx="864" cy="972" r="2"/>
    <circle cx="972" cy="972" r="2"/>
  </g>

  <!-- سربرگ -->
  <rect x="680" y="28" width="360" height="44" rx="22"
        fill="#22C55E" fill-opacity="0.08" stroke="#22C55E" stroke-opacity="0.25"/>
  <text x="860" y="58" font-family="Vazirmatn, Tahoma" font-size="22" fill="#22C55E"
        text-anchor="middle" direction="rtl">فصل ۸ · اسلاید ۱ از ۱۰</text>

  <text x="540" y="130" font-family="Vazirmatn, Tahoma" font-size="22" fill="#556"
        text-anchor="middle" direction="rtl">بخش دوم: تأسیس</text>

  <!-- عنوان -->
  <text x="540" y="230" font-family="Vazirmatn, Tahoma" font-size="64" font-weight="900"
        fill="#22C55E" text-anchor="middle" direction="rtl">ماشین زنده</text>
  <rect x="340" y="255" width="400" height="3" rx="1.5" fill="url(#greenGold)" opacity="0.5"/>

  <!-- سه ویژگی ماشین زنده — دایره‌ها -->
  <circle cx="835" cy="430" r="100" fill="#22C55E" fill-opacity="0.06"
          stroke="#22C55E" stroke-opacity="0.3" stroke-width="2"/>
  <text x="835" y="420" font-family="Vazirmatn, Tahoma" font-size="28" fill="#22C55E"
        font-weight="bold" text-anchor="middle" direction="rtl">خودسامان</text>
  <text x="835" y="455" font-family="Vazirmatn, Tahoma" font-size="18" fill="#99A"
        text-anchor="middle" direction="rtl">تنظیم درونی</text>

  <circle cx="540" cy="430" r="100" fill="#C19A3E" fill-opacity="0.06"
          stroke="#C19A3E" stroke-opacity="0.3" stroke-width="2"/>
  <text x="540" y="420" font-family="Vazirmatn, Tahoma" font-size="28" fill="#C19A3E"
        font-weight="bold" text-anchor="middle" direction="rtl">خودنقاد</text>
  <text x="540" y="455" font-family="Vazirmatn, Tahoma" font-size="18" fill="#99A"
        text-anchor="middle" direction="rtl">شناسایی خطا</text>

  <circle cx="245" cy="430" r="100" fill="#00D4FF" fill-opacity="0.06"
          stroke="#00D4FF" stroke-opacity="0.3" stroke-width="2"/>
  <text x="245" y="420" font-family="Vazirmatn, Tahoma" font-size="26" fill="#00D4FF"
        font-weight="bold" text-anchor="middle" direction="rtl">خودیادگیرنده</text>
  <text x="245" y="455" font-family="Vazirmatn, Tahoma" font-size="18" fill="#99A"
        text-anchor="middle" direction="rtl">ارتقا از تجربه</text>

  <!-- فلش‌های اتصال -->
  <line x1="345" y1="430" x2="440" y2="430" stroke="#556" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arrowG)"/>
  <line x1="640" y1="430" x2="735" y2="430" stroke="#556" stroke-width="1.5"
        stroke-dasharray="6,4"/>

  <!-- جعبهٔ بصیرت -->
  <rect x="90" y="570" width="900" height="130" rx="18"
        fill="#22C55E" fill-opacity="0.04" stroke="#22C55E" stroke-opacity="0.18"/>
  <text x="540" y="620" font-family="Vazirmatn, Tahoma" font-size="28" fill="#FFFFFF"
        font-weight="bold" text-anchor="middle" direction="rtl">ماشین زنده = نهاد + اکوسیستم</text>
  <text x="540" y="668" font-family="Vazirmatn, Tahoma" font-size="24" fill="#99A"
        text-anchor="middle" direction="rtl">طراحی‌پذیر مثل نهاد · خودسازمان‌ده مثل اکوسیستم</text>

  <!-- مقایسه -->
  <rect x="90" y="740" width="435" height="120" rx="15"
        fill="#1A237E" fill-opacity="0.25" stroke="#5566CC" stroke-opacity="0.2"/>
  <text x="307" y="785" font-family="Vazirmatn, Tahoma" font-size="22" fill="#7788DD"
        font-weight="bold" text-anchor="middle" direction="rtl">ماشین مرده (نهاد استخراجی)</text>
  <text x="307" y="825" font-family="Vazirmatn, Tahoma" font-size="20" fill="#778"
        text-anchor="middle" direction="rtl">حقوق صوری · قدرت متمرکز</text>

  <rect x="555" y="740" width="435" height="120" rx="15"
        fill="#22C55E" fill-opacity="0.08" stroke="#22C55E" stroke-opacity="0.25"/>
  <text x="772" y="785" font-family="Vazirmatn, Tahoma" font-size="22" fill="#4ADE80"
        font-weight="bold" text-anchor="middle" direction="rtl">ماشین زنده (نهاد فراگیر)</text>
  <text x="772" y="825" font-family="Vazirmatn, Tahoma" font-size="20" fill="#778"
        text-anchor="middle" direction="rtl">حقوق واقعی · قدرت توزیع‌شده</text>

  <!-- هشدار -->
  <rect x="90" y="900" width="900" height="80" rx="14"
        fill="#DC2626" fill-opacity="0.05" stroke="#DC2626" stroke-opacity="0.2"/>
  <text x="540" y="950" font-family="Vazirmatn, Tahoma" font-size="22" fill="#F87171"
        text-anchor="middle" direction="rtl">⚡ خطر: «مهندسی حقوق» بدون قید کرامت = تکنوکراسی استبدادی</text>

  <!-- پانویس -->
  <rect x="40" y="1020" width="1000" height="2" rx="1" fill="url(#greenGold)" opacity="0.3"/>
  <text x="540" y="1060" font-family="Vazirmatn, Tahoma" font-size="20" fill="#445"
        text-anchor="middle" direction="rtl">بعدی: ورودی‌ها و خروجی‌های ماشین ←</text>
</svg>
