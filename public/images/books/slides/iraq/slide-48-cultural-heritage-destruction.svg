<text x="960" y="868" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">📌 ۷,۰۰۰ سال میراث بشری — در ۲۰ سال بین بمب آمریکا، پتک داعش، و بی‌توجهی جهان ویران شد</text>
<text x="960" y="888" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">رامسفلد: «Stuff happens» — سومریان، آشوریان، بابلیان: ۷ هزار سال «stuff» بشری</text>

