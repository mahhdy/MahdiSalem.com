<text x="985" y="710" fill="rgba(255,255,255,0.6)" font-size="10">▸ بین‌النهرین = مهد خط، ریاضی، قانون، کشاورزی، شهرنشینی بشر</text>
<text x="985" y="730" fill="rgba(255,255,255,0.6)" font-size="10">▸ حمورابی (۱۷۵۰ ق.م): اولین قانون مدون → بشر بدون عراق، تاریخش ناقص است</text>
<text x="985" y="750" fill="rgba(255,255,255,0.6)" font-size="10">▸ گیلگمش: اولین حماسه ادبی بشر — ۱,۰۰۰ سال قبل از هومر</text>
<text x="985" y="770" fill="rgba(255,255,255,0.6)" font-size="10">▸ بابل: یکی از ۷ عجایب جهان باستان → اکنون سایت نظامی آمریکا بود</text>

<rect x="985" y="785" width="850" height="30" rx="4" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.12)" stroke-width="1"/>
<text x="1410" y="805" fill="#e74c3c" font-size="10" font-weight="700" text-anchor="middle">⚡ کمپ آلفا (Camp Alpha): پایگاه آمریکا روی ویرانه‌های بابل → آسیب ساختاری به دیوارها و خاک</text>

