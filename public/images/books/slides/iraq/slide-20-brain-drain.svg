<text x="1635" y="350" class="node-label">سوئد</text>
<text x="1635" y="370" class="node-val">≈۸,۰۰۰ نفر</text>
<text x="1635" y="388" class="node-val">بزرگترین دیاسپورای اروپا</text>
<text x="1635" y="405" fill="rgba(59,130,246,0.5)" font-size="10" text-anchor="middle">۱۵% سهم</text>

<!-- UK: 7,000 -->
<rect x="1550" y="435" width="170" height="110" rx="8" fill="rgba(46,204,113,0.12)" stroke="rgba(46,204,113,0.25)" stroke-width="1.5"/>
<text x="1635" y="465" fill="#2ecc71" font-size="22">🇬🇧</text>
<text x="1635" y="488" class="node-label">بریتانیا</text>
<text x="1635" y="508" class="node-val">≈۷,۰۰۰ نفر</text>
<text x="1635" y="535" fill="rgba(46,204,113,0.5)" font-size="10" text-anchor="middle">۱۳% سهم</text>

<!-- USA/Canada: 6,000 -->
<rect x="1550" y="565" width="170" height="110" rx="8" fill="rgba(255,152,0,0.12)" stroke="rgba(255,152,0,0.25)" stroke-width="1.5"/>
<text x="1635" y="595" fill="#ff9800" font-size="22">🇺🇸</text>
<text x="1635" y="618" class="node-label">آمریکا/کانادا</text>
<text x="1635" y="638" class="node-val">≈۶,۰۰۰ نفر</text>
<text x="1635" y="665" fill="rgba(255,152,0,0.5)" font-size="10" text-anchor="middle">۱۱% سهم</text>

<!-- Germany/Other EU: 5,000 -->
<rect x="1550" y="695" width="170" height="95" rx="8" fill="rgba(147,51,234,0.12)" stroke="rgba(147,51,234,0.25)" stroke-width="1.5"/>
<text x="1635" y="720" fill="#9333ea" font-size="22">🇩🇪🇳🇱</text>
<text x="1635" y="743" class="node-label">آلمان + اتحادیه اروپا</text>
<text x="1635" y="763" class="node-val">≈۵,۰۰۰ نفر</text>
<text x="1635" y="780" fill="rgba(147,51,234,0.5)" font-size="10" text-anchor="middle">۱۰% سهم</text>

<!-- Other: 15,000 -->
<text x="1635" y="808" fill="rgba(255,255,255,0.3)" font-size="11" text-anchor="middle">سایر (ترکیه، مالزی، استرالیا...): ≈۱۵,۰۰۰ (۲۸%)</text>

