<!-- BOTTOM INSIGHT BAR                     -->
<!-- ══════════════════════════════════════ -->
<rect x="60" y="845" width="1800" height="100" rx="10" class="note-box"/>
<text x="960" y="873" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">📌 عراق ۵۹% پزشکانش را از دست داد — ۱ پزشک برای هر ۵,۰۰۰ نفر (استاندارد WHO: ۱ به ۱,۰۰۰)</text>
<text x="960" y="897" fill="rgba(255,255,255,0.55)" font-size="12" text-anchor="middle">از ۲۰۰۳ تا ۲۰۱۲ بیش از ۵۰۰ دانشگاهی به‌طور هدفمند ترور شدند — پاکسازی سیستماتیک سرمایه انسانی</text>
<text x="960" y="918" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">هزینه تخمینی: $۴۰–۶۰ میلیارد سرمایه انسانی — معادل کل بودجه بازسازی ۵ ساله عراق</text>
<text x="960" y="936" fill="rgba(255,255,255,0.3)" font-size="11" text-anchor="middle">مقایسه: پزشک در اردن $۳,۵۰۰/ماه | پزشک در عراق $۸۰۰/ماه + ریسک ترور = انگیزه صفر برای ماندن</text>

