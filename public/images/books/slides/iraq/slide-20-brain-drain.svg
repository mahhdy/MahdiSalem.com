<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .col-title { fill: #d4af37; font-size: 16px; font-weight: 700; text-anchor: middle; }
    .node-label { fill: #fff; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .node-val { fill: rgba(255,255,255,0.6); font-size: 11px; text-anchor: middle; }
    .flow { fill-opacity: 0.12; stroke-width: 0; }
    .stat-big { fill: #e74c3c; font-size: 42px; font-weight: 900; text-anchor: middle; }
    .stat-label { fill: rgba(255,255,255,0.6); font-size: 13px; text-anchor: middle; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">فرار مغزها: خونریزی خاموش عراق</text>
<text x="960" y="68" class="subtitle">مهاجرت نخبگان عراقی ۲۰۰۳–۲۰۲۳ — از کدام تخصص، به کجا، و چرا؟</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- Main container -->
<rect x="60" y="95" width="1800" height="730" class="glass" filter="url(#sh)"/>

<!-- ══════════════════════════════════════════════════ -->
<!-- ALLUVIAL FLOW: 3 columns                           -->
<!-- Col 1 (LEFT): Professions — x=180→350              -->
<!-- Col 2 (CENTER): Iraq hub — x=880→1040              -->
<!-- Col 3 (RIGHT): Destinations — x=1550→1720          -->
<!-- ══════════════════════════════════════════════════ -->

<!-- Column headers -->
<text x="265" y="125" class="col-title">تخصص</text>
<text x="960" y="125" class="col-title">🇮🇶 عراق</text>
<text x="1635" y="125" class="col-title">مقصد مهاجرت</text>

<!-- ════════════ -->
<!-- LEFT NODES   -->
<!-- ════════════ -->

<!-- Doctors: 20,000+ emigrated. Height proportional: 200px -->
<rect x="180" y="155" width="170" height="180" rx="8" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.3)" stroke-width="1.5"/>
<text x="265" y="185" fill="#e74c3c" font-size="26">🩺</text>
<text x="265" y="215" class="node-label">پزشکان</text>
<text x="265" y="235" class="node-val">۲۰,۰۰۰+ مهاجرت</text>
<text x="265" y="252" class="node-val" fill="#e74c3c">از ۳۴,۰۰۰ → ۱۴,۰۰۰ باقی</text>
<text x="265" y="270" class="node-val">۱ پزشک/۵,۰۰۰ نفر!</text>
<text x="265" y="320" fill="rgba(231,76,60,0.4)" font-size="10" text-anchor="middle">▼ ۵۹% کاهش</text>

<!-- Engineers: 15,000 -->
<rect x="180" y="355" width="170" height="140" rx="8" fill="rgba(255,152,0,0.12)" stroke="rgba(255,152,0,0.25)" stroke-width="1.5"/>
<text x="265" y="385" fill="#ff9800" font-size="26">⚙️</text>
<text x="265" y="410" class="node-label">مهندسان</text>
<text x="265" y="430" class="node-val">۱۵,۰۰۰+ مهاجرت</text>
<text x="265" y="447" class="node-val" fill="#ff9800">بازسازی بدون مهندس</text>
<text x="265" y="480" fill="rgba(255,152,0,0.4)" font-size="10" text-anchor="middle">▼ ۴۰% کاهش</text>

<!-- Academics: 10,000 -->
<rect x="180" y="515" width="170" height="130" rx="8" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/>
<text x="265" y="545" fill="#3b82f6" font-size="26">🎓</text>
<text x="265" y="570" class="node-label">دانشگاهیان</text>
<text x="265" y="590" class="node-val">۱۰,۰۰۰+ مهاجرت</text>
<text x="265" y="607" class="node-val" fill="#3b82f6">۵۰۰+ ترور شده</text>
<text x="265" y="630" fill="rgba(59,130,246,0.4)" font-size="10" text-anchor="middle">▼ ۴۵% کاهش</text>

<!-- IT/Tech + Other: 8,000 -->
<rect x="180" y="665" width="170" height="110" rx="8" fill="rgba(147,51,234,0.12)" stroke="rgba(147,51,234,0.25)" stroke-width="1.5"/>
<text x="265" y="695" fill="#9333ea" font-size="26">💻</text>
<text x="265" y="720" class="node-label">فناوری + سایر</text>
<text x="265" y="740" class="node-val">۸,۰۰۰+ مهاجرت</text>
<text x="265" y="757" class="node-val" fill="#9333ea">خلبانان، حقوقدانان</text>

<!-- ════════════════ -->
<!-- CENTER HUB NODE  -->
<!-- ════════════════ -->
<rect x="870" y="200" width="180" height="520" rx="12" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="2"/>
<text x="960" y="250" fill="#e74c3c" font-size="48">🇮🇶</text>
<text x="960" y="290" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">عراق</text>
<text x="960" y="315" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">جمعیت: ۴۲ میلیون</text>

<line x1="890" y1="340" x2="1030" y2="340" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<text x="960" y="370" fill="#e74c3c" font-size="16" font-weight="700" text-anchor="middle">مجموع مهاجرت نخبگان:</text>
<text x="960" y="410" class="stat-big">۵۳,۰۰۰+</text>
<text x="960" y="435" class="stat-label">نفر متخصص (۲۰۰۳–۲۰۲۳)</text>

<line x1="890" y1="460" x2="1030" y2="460" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Push factors -->
<text x="960" y="485" fill="#d4af37" font-size="13" font-weight="600" text-anchor="middle">دلایل مهاجرت:</text>
<text x="960" y="508" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">• ترور هدفمند دانشگاهیان</text>
<text x="960" y="528" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">• حقوق ناچیز (پزشک: $۸۰۰/ماه)</text>
<text x="960" y="548" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">• ناامنی + تهدید داعش</text>
<text x="960" y="568" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">• فساد اداری + پارتی‌بازی</text>
<text x="960" y="588" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">• بی‌آینده بودن تحقیقات</text>

<line x1="890" y1="610" x2="1030" y2="610" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<text x="960" y="640" fill="#e74c3c" font-size="13" font-weight="700" text-anchor="middle">هزینه تخمینی:</text>
<text x="960" y="665" fill="#e74c3c" font-size="22" font-weight="900" text-anchor="middle">$۴۰–۶۰ میلیارد</text>
<text x="960" y="688" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">سرمایه انسانی از دست رفته</text>

<!-- ════════════ -->
<!-- RIGHT NODES  -->
<!-- ════════════ -->

<!-- Jordan: 12,000 -->
<rect x="1550" y="155" width="170" height="120" rx="8" fill="rgba(0,180,216,0.12)" stroke="rgba(0,180,216,0.25)" stroke-width="1.5"/>
<text x="1635" y="185" fill="#00b4d8" font-size="22">🇯🇴</text>
<text x="1635" y="210" class="node-label">اردن</text>
<text x="1635" y="230" class="node-val">≈۱۲,۰۰۰ نفر</text>
<text x="1635" y="248" class="node-val">نزدیکترین مقصد</text>
<text x="1635" y="265" fill="rgba(0,180,216,0.5)" font-size="10" text-anchor="middle">۲۳% سهم</text>

<!-- Sweden: 8,000 -->
