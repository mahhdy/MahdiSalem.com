<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .axis-label { fill: rgba(255,255,255,0.7); font-size: 14px; font-weight: 600; }
    .axis-arrow { fill: rgba(255,255,255,0.4); }
    .grid { stroke: rgba(255,255,255,0.04); stroke-width: 1; }
    .country-label { font-size: 13px; font-weight: 700; }
    .country-sub { font-size: 10px; fill: rgba(255,255,255,0.5); }
    .zone-label { font-size: 12px; font-weight: 600; text-anchor: middle; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="glow-w">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feFlood flood-color="#fff" flood-opacity="0.15"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pulse-iran">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feFlood flood-color="#2ecc71" flood-opacity="0.4"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pulse-iraq">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feFlood flood-color="#e74c3c" flood-opacity="0.5"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="curve-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#d4af37" stop-opacity="0.4"/>
    <stop offset="30%" stop-color="#e74c3c" stop-opacity="0.8"/>
    <stop offset="60%" stop-color="#ff9800" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.8"/>
  </linearGradient>
  <linearGradient id="zone-auth" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#e74c3c" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="zone-trans" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ff9800" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#ff9800" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="zone-demo" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
  </linearGradient>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">منحنی J: ثبات در برابر باز بودن سیاسی</text>
<text x="960" y="68" class="subtitle">مدل Ian Bremmer — جایگاه ایران، عراق و ۵ کشور مرجع روی منحنی ثبات</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ═══════════════════════════════ -->
<!-- LEFT PANEL: J-CURVE CHART      -->
<!-- Chart area: x=140→1320, y=130→780 -->
<!-- ═══════════════════════════════ -->
<rect x="80" y="100" width="1280" height="720" class="glass" filter="url(#sh)"/>

<!-- Zone backgrounds -->
<!-- Authoritarian zone: x=160→540 -->
<rect x="160" y="130" width="380" height="640" fill="url(#zone-auth)" rx="8"/>
<text x="350" y="155" class="zone-label" fill="rgba(231,76,60,0.5)">منطقه استبدادی</text>

<!-- Transition danger zone: x=540→860 -->
<rect x="540" y="130" width="320" height="640" fill="url(#zone-trans)" rx="8"/>
<text x="700" y="155" class="zone-label" fill="rgba(255,152,0,0.5)">⚠️ منطقه خطر گذار</text>

<!-- Democratic zone: x=860→1300 -->
<rect x="860" y="130" width="440" height="640" fill="url(#zone-demo)" rx="8"/>
<text x="1080" y="155" class="zone-label" fill="rgba(46,204,113,0.5)">منطقه دموکراتیک</text>

<!-- Grid lines -->
<line x1="160" y1="270" x2="1300" y2="270" class="grid"/>
<line x1="160" y1="410" x2="1300" y2="410" class="grid"/>
<line x1="160" y1="550" x2="1300" y2="550" class="grid"/>
<line x1="160" y1="690" x2="1300" y2="690" class="grid"/>

<!-- Y-Axis: Stability -->
<line x1="160" y1="770" x2="160" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
<polygon points="160,140 155,155 165,155" class="axis-arrow"/>
<text x="130" y="460" class="axis-label" text-anchor="middle" transform="rotate(-90,130,460)">ثبات (Stability) →</text>
<!-- Y scale labels -->
<text x="148" y="693" fill="rgba(255,255,255,0.25)" font-size="10" text-anchor="end">کم</text>
<text x="148" y="413" fill="rgba(255,255,255,0.25)" font-size="10" text-anchor="end">متوسط</text>
<text x="148" y="173" fill="rgba(255,255,255,0.25)" font-size="10" text-anchor="end">زیاد</text>

<!-- X-Axis: Openness -->
<line x1="160" y1="770" x2="1310" y2="770" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
<polygon points="1310,770 1295,765 1295,775" class="axis-arrow"/>
<text x="730" y="798" class="axis-label" text-anchor="middle">باز بودن سیاسی (Openness) →</text>

<!-- ═══════════════════════ -->
<!-- THE J-CURVE ITSELF      -->
<!-- ═══════════════════════ -->
<!-- Cubic bezier: starts high-left (authoritarian stable), -->
<!-- dips down in the middle (transition instability),       -->
<!-- then rises high-right (democratic stable)               -->
<path d="M 200,220 C 350,230 480,680 700,720 S 950,680 1100,300 Q 1200,180 1280,170"
      fill="none" stroke="url(#curve-grad)" stroke-width="4" filter="url(#glow-w)"
      stroke-linecap="round"/>

<!-- Curve area fill (subtle) -->
<path d="M 200,220 C 350,230 480,680 700,720 S 950,680 1100,300 Q 1200,180 1280,170 L 1280,770 L 200,770 Z"
      fill="rgba(212,175,55,0.03)"/>

<!-- ═══════════════════════════════ -->
<!-- COUNTRY MARKERS ON THE CURVE   -->
<!-- ═══════════════════════════════ -->

<!-- 1. North Korea — far left, high stability (authoritarian) -->
<!-- x≈230, curve-y≈225 -->
<circle cx="230" cy="225" r="14" fill="rgba(231,76,60,0.2)" stroke="#e74c3c" stroke-width="2"/>
<text x="230" y="229" fill="#e74c3c" font-size="16" text-anchor="middle">🇰🇵</text>
<text x="230" y="208" class="country-label" fill="#e74c3c" text-anchor="middle">کره شمالی</text>
<text x="230" y="252" class="country-sub" text-anchor="middle">بسته/باثبات ظاهری</text>

<!-- 2. IRAN — left-center, moderately high stability -->
<!-- x≈340, curve-y≈260 -->
<circle cx="340" cy="260" r="18" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="2.5" filter="url(#pulse-iran)"/>
<text x="340" y="264" fill="#2ecc71" font-size="18" text-anchor="middle">🇮🇷</text>
<text x="340" y="240" class="country-label" fill="#2ecc71" text-anchor="middle" font-size="14">ایران</text>
<text x="340" y="290" class="country-sub" text-anchor="middle" fill="#2ecc71">نسبتاً بسته / باثبات</text>

<!-- 3. IRAQ — in the dip! low stability, half-open -->
<!-- x≈660, curve-y≈710 -->
<circle cx="660" cy="700" r="20" fill="rgba(231,76,60,0.2)" stroke="#e74c3c" stroke-width="2.5" filter="url(#pulse-iraq)"/>
<text x="660" y="704" fill="#e74c3c" font-size="20" text-anchor="middle">🇮🇶</text>
<text x="660" y="680" class="country-label" fill="#e74c3c" text-anchor="middle" font-size="14">عراق</text>
<text x="660" y="730" class="country-sub" text-anchor="middle" fill="#e74c3c">نیمه‌باز / بی‌ثبات‌ترین نقطه</text>

<!-- Arrow pointing to Iraq with danger label -->
<line x1="660" y1="740" x2="660" y2="762" stroke="#e74c3c" stroke-width="1.5" opacity="0.6"/>
<text x="660" y="760" fill="#e74c3c" font-size="11" font-weight="700" text-anchor="middle">⚠️ ته منحنی J</text>

<!-- 4. Russia — left area, moderate stability -->
<!-- x≈280, curve-y≈235 -->
<circle cx="280" cy="235" r="12" fill="rgba(0,180,216,0.15)" stroke="#00b4d8" stroke-width="1.5"/>
<text x="280" y="239" fill="#00b4d8" font-size="14" text-anchor="middle">🇷🇺</text>
<text x="280" y="220" class="country-sub" text-anchor="middle" fill="#00b4d8">روسیه</text>

<!-- 5. Turkey — center-right, rising -->
<!-- x≈850, curve-y≈530 -->
<circle cx="850" cy="530" r="14" fill="rgba(255,152,0,0.15)" stroke="#ff9800" stroke-width="1.5"/>
<text x="850" y="534" fill="#ff9800" font-size="16" text-anchor="middle">🇹🇷</text>
<text x="850" y="515" class="country-label" fill="#ff9800" text-anchor="middle">ترکیه</text>
<text x="850" y="555" class="country-sub" text-anchor="middle" fill="#ff9800">نیمه‌باز / در حال لغزش</text>

<!-- 6. Germany — far right, high stability + open -->
<!-- x≈1200, curve-y≈210 -->
<circle cx="1200" cy="210" r="14" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1.5"/>
<text x="1200" y="214" fill="#2ecc71" font-size="16" text-anchor="middle">🇩🇪</text>
<text x="1200" y="195" class="country-label" fill="#2ecc71" text-anchor="middle">آلمان</text>
<text x="1200" y="232" class="country-sub" text-anchor="middle">باز / باثبات</text>

<!-- 7. Libya (failed state example) — deep in the dip -->
<!-- x≈590, curve-y≈700 -->
<circle cx="590" cy="710" r="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
<text x="590" y="714" fill="rgba(255,255,255,0.6)" font-size="13" text-anchor="middle">🇱🇾</text>
<text x="590" y="732" class="country-sub" text-anchor="middle">لیبی</text>

<!-- ═══════════════════════════════ -->
<!-- RIGHT PANEL: Explanation        -->
<!-- ═══════════════════════════════ -->
<rect x="1390" y="100" width="470" height="720" class="glass" filter="url(#sh)"/>

<text x="1625" y="140" fill="#d4af37" font-size="19px" font-weight="700" text-anchor="middle">مدل منحنی J چیست؟</text>
<line x1="1410" y1="155" x2="1840" y2="155" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Explanation text block -->
<text x="1820" y="180" fill="rgba(255,255,255,0.75)" font-size="12" text-anchor="end">ایان برمر (Ian Bremmer) در کتاب «منحنی J» نشان</text>
<text x="1820" y="198" fill="rgba(255,255,255,0.75)" font-size="12" text-anchor="end">می‌دهد کشورهایی که از استبداد به سمت دموکراسی</text>
<text x="1820" y="216" fill="rgba(255,255,255,0.75)" font-size="12" text-anchor="end">حرکت می‌کنند، ابتدا از «منطقه خطر» عبور می‌کنند:</text>
<text x="1820" y="234" fill="rgba(255,255,255,0.75)" font-size="12" text-anchor="end">کنترل قدیمی رفته، نهاد جدید هنوز نیامده.</text>

<!-- Key insight boxes -->
<rect x="1410" y="260" width="430" height="80" rx="8" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.2)" stroke-width="1"/>
<text x="1625" y="283" fill="#2ecc71" font-size="14" font-weight="700" text-anchor="middle">🇮🇷 ایران: بالای منحنی (سمت چپ)</text>
<text x="1820" y="303" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">• نظام بسته اما باثبات — کنترل سپاه + دین + رسانه</text>
<text x="1820" y="320" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">• ریسک: اگر گشایش ناگهانی شود → سقوط به ته J</text>

<rect x="1410" y="355" width="430" height="95" rx="8" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>
<text x="1625" y="378" fill="#e74c3c" font-size="14" font-weight="700" text-anchor="middle">🇮🇶 عراق: ته منحنی J</text>
<text x="1820" y="398" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">• استبداد بعث برداشته شد (۲۰۰۳) — بدون جایگزین</text>
<text x="1820" y="415" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">• دموکراسی تحمیلی + محاصصه = بی‌ثباتی مزمن</text>
<text x="1820" y="432" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">• ۲۰ سال گذشت و هنوز در ته منحنی مانده</text>

<rect x="1410" y="465" width="430" height="75" rx="8" fill="rgba(255,152,0,0.06)" stroke="rgba(255,152,0,0.2)" stroke-width="1"/>
<text x="1625" y="488" fill="#ff9800" font-size="14" font-weight="700" text-anchor="middle">⚡ درس کلیدی</text>
<text x="1820" y="508" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">• تغییر رژیم بدون نهادسازی = سقوط آزاد</text>
<text x="1820" y="525" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">• آمریکا عراق را از بالای چپ به ته J پرتاب کرد</text>

<!-- Country comparison mini-table -->
<line x1="1410" y1="560" x2="1840" y2="560" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="1625" y="582" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">جدول مقایسه‌ای</text>

<!-- Table headers -->
<text x="1820" y="605" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end" font-weight="600">کشور</text>
<text x="1700" y="605" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" font-weight="600">ثبات</text>
<text x="1580" y="605" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" font-weight="600">باز بودن</text>
<text x="1470" y="605" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" font-weight="600">موقعیت</text>

<!-- Table rows -->
<line x1="1410" y1="612" x2="1840" y2="612" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

<text x="1820" y="630" fill="#e74c3c" font-size="11" text-anchor="end">🇰🇵 کره شمالی</text>
<text x="1700" y="630" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۹۰</text>
<text x="1580" y="630" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۵</text>
<text x="1470" y="630" fill="#e74c3c" font-size="10" text-anchor="middle">بالای چپ</text>

<text x="1820" y="650" fill="#2ecc71" font-size="11" text-anchor="end">🇮🇷 ایران</text>
<text x="1700" y="650" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۷۵</text>
<text x="1580" y="650" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۲۵</text>
<text x="1470" y="650" fill="#2ecc71" font-size="10" text-anchor="middle">بالای چپ</text>

<text x="1820" y="670" fill="#00b4d8" font-size="11" text-anchor="end">🇷🇺 روسیه</text>
<text x="1700" y="670" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۸۰</text>
<text x="1580" y="670" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۱۵</text>
<text x="1470" y="670" fill="#00b4d8" font-size="10" text-anchor="middle">بالای چپ</text>

<text x="1820" y="690" fill="#e74c3c" font-size="11" text-anchor="end" font-weight="700">🇮🇶 عراق</text>
<text x="1700" y="690" fill="#e74c3c" font-size="11" text-anchor="middle" font-weight="700">۲۰</text>
<text x="1580" y="690" fill="#e74c3c" font-size="11" text-anchor="middle" font-weight="700">۴۵</text>
<text x="1470" y="690" fill="#e74c3c" font-size="10" text-anchor="middle" font-weight="700">ته J ⚠️</text>

<text x="1820" y="710" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">🇱🇾 لیبی</text>
<text x="1700" y="710" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۱۰</text>
<text x="1580" y="710" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۴۰</text>
<text x="1470" y="710" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">ته J</text>

<text x="1820" y="730" fill="#ff9800" font-size="11" text-anchor="end">🇹🇷 ترکیه</text>
<text x="1700" y="730" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۵۵</text>
<text x="1580" y="730" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۵۰</text>
<text x="1470" y="730" fill="#ff9800" font-size="10" text-anchor="middle">وسط صعود</text>

<text x="1820" y="750" fill="#2ecc71" font-size="11" text-anchor="end">🇩🇪 آلمان</text>
<text x="1700" y="750" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۹۲</text>
<text x="1580" y="750" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">۹۰</text>
<text x="1470" y="750" fill="#2ecc71" font-size="10" text-anchor="middle">بالای راست ✓</text>

<!-- ═══════════════════════════════ -->
<!-- BOTTOM INSIGHT BAR              -->
<!-- ═══════════════════════════════ -->
<rect x="80" y="845" width="1780" height="80" rx="10" class="note-box"/>
<text x="960" y="872" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">📌 عراق ۲۰ سال است در ته منحنی J گیر کرده — نه به استبداد برگشته، نه به دموکراسی رسیده</text>
<text x="960" y="895" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">ایران روی بال چپ ایستاده: باثبات اما بسته. اگر روزی گشایش ناگهانی شود (مثل ۲۰۰۳ عراق)، ریسک سقوط به ته J وجود دارد.</text>
<text x="960" y="912" fill="rgba(255,255,255,0.35)" font-size="11" text-anchor="middle">درس تاریخ: گذار موفق = تدریجی + نهادمحور (آلمان بعد ۱۹۴۵) | گذار شکست‌خورده = ناگهانی + بدون نهاد (عراق ۲۰۰۳، لیبی ۲۰۱۱)</text>

<!-- Footer -->
<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 15 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۴: ایران در برابر عراق</text>
<text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">منابع: Ian Bremmer, The J Curve (2006) | Freedom House Index | Fragile States Index | Polity IV | تحلیل نگارنده</text>
</svg>
