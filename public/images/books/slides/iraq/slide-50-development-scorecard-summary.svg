<text x="80" y="755" fill="#ff9800" font-size="11" font-weight="700">۲. $۶۰۰B درآمد نفتی: ۲۵% فساد + ۳۳% حقوق بوروکراسی + ۸% زیرساخت واقعی</text>
<text x="80" y="775" fill="#00b4d8" font-size="11" font-weight="700">۳. فرار مغزها: ۴۰% پزشکان + ۶,۰۰۰ استاد + ۲M+ نخبه = بازسازی بدون مغز</text>
<text x="80" y="795" fill="#9b59b6" font-size="11" font-weight="700">۴. بحران آب و محیط زیست: بین‌النهرین تا ۲۰۴۰ ممکن است غیرقابل سکونت شود</text>
<text x="80" y="815" fill="#2ecc71" font-size="11" font-weight="700">۵. تنها نقطه روشن: مقاومت مدنی نسل تشرین — هنوز زنده اما سرکوب‌شده</text>
<text x="80" y="840" fill="rgba(255,255,255,0.4)" font-size="9">→ سؤال اصلی: آیا «آزادسازی» که همه چیز را بدتر کند، آزادسازی است یا تخریب؟</text>

