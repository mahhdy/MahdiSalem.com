<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .sector-label { fill: #fff; font-size: 15px; font-weight: 700; text-anchor: middle; }
    .actor-name { fill: #fff; font-size: 11px; font-weight: 600; text-anchor: middle; }
    .actor-role { fill: rgba(255,255,255,0.5); font-size: 9px; text-anchor: middle; }
    .pct { fill: #d4af37; font-size: 22px; font-weight: 900; text-anchor: middle; }
    .conn { stroke-width: 1.5; fill: none; opacity: 0.35; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="glow-g">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#2ecc71" flood-opacity="0.25"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-r">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#e74c3c" flood-opacity="0.25"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-b">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#3b82f6" flood-opacity="0.25"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-p">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#9333ea" flood-opacity="0.25"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-gold">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feFlood flood-color="#d4af37" flood-opacity="0.3"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="rg-mil" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.05"/>
  </radialGradient>
  <radialGradient id="rg-pol" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
  </radialGradient>
  <radialGradient id="rg-eco" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.05"/>
  </radialGradient>
  <radialGradient id="rg-cul" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#9333ea" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#9333ea" stop-opacity="0.05"/>
  </radialGradient>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="45" class="title">نقشه نفوذ ایران در عراق</text>
<text x="960" y="72" class="subtitle">چهار حوزه کلیدی: نظامی، سیاسی، اقتصادی، فرهنگی-مذهبی — بازیگران و ابزارها</text>
<line x1="250" y1="88" x2="1670" y2="88" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ════════════════════════════════════ -->
<!-- CENTER HUB: IRAN / QUDS FORCE       -->
<!-- ════════════════════════════════════ -->
<circle cx="960" cy="500" r="75" fill="rgba(212,175,55,0.08)" stroke="#d4af37" stroke-width="2" filter="url(#glow-gold)"/>
<circle cx="960" cy="500" r="55" fill="rgba(212,175,55,0.12)" stroke="#d4af37" stroke-width="1"/>
<text x="960" y="488" fill="#d4af37" font-size="28" text-anchor="middle">🇮🇷</text>
<text x="960" y="512" fill="#d4af37" font-size="14" font-weight="900" text-anchor="middle">نیروی قدس</text>
<text x="960" y="528" fill="rgba(212,175,55,0.7)" font-size="10" text-anchor="middle">سپاه پاسداران — IRGC-QF</text>

<!-- Connection lines from center to 4 sectors -->
<path d="M 895,465 Q 700,350 480,280" class="conn" stroke="#e74c3c"/>
<path d="M 1025,465 Q 1200,350 1450,280" class="conn" stroke="#3b82f6"/>
<path d="M 895,535 Q 650,650 420,750" class="conn" stroke="#2ecc71"/>
<path d="M 1025,535 Q 1300,650 1500,750" class="conn" stroke="#9333ea"/>

<!-- ════════════════════════════════════ -->
<!-- SECTOR 1: MILITARY (Top-Left)       -->
<!-- ════════════════════════════════════ -->
<circle cx="380" cy="230" r="140" fill="url(#rg-mil)" stroke="rgba(231,76,60,0.25)" stroke-width="1.5" filter="url(#glow-r)"/>
<text x="380" y="140" class="sector-label" fill="#e74c3c">🎖️ نظامی</text>
<text x="380" y="160" class="pct" fill="#e74c3c">۸۵%</text>
<text x="380" y="175" fill="rgba(231,76,60,0.6)" font-size="10" text-anchor="middle">سطح نفوذ</text>

<!-- Military actors (sub-bubbles) -->
