<text x="960" y="413" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">جریان صدر: ناسیونالیسم عراقی شیعی ≠ ولایت فقیه</text>

<!-- ════════════════════════════════════ -->
<!-- BOTTOM INSIGHT BAR                   -->
<!-- ════════════════════════════════════ -->
<rect x="80" y="940" width="1760" height="65" rx="10" class="note-box"/>
<text x="960" y="965" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">📊 شاخص کل نفوذ ایران در عراق: ≈ ۷۳/۱۰۰ — بالاترین نفوذ خارجی یک کشور در کشور دیگر در خاورمیانه</text>
<text x="960" y="985" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="middle">نظامی ۸۵% | سیاسی ۷۵% | فرهنگی-مذهبی ۷۰% | اقتصادی ۶۰% — ابزار اصلی: حشد شعبی + چارچوب هماهنگی + گاز/برق + زیارت</text>

<!-- Footer -->
<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 13 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۴: ایران در برابر عراق</text>
