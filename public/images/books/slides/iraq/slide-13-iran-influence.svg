<!-- CENTER ANNOTATIONS                   -->
<!-- ════════════════════════════════════ -->

<!-- Key figure: Soleimani -->
<rect x="820" y="590" width="280" height="50" rx="8" fill="rgba(212,175,55,0.08)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
<text x="960" y="612" fill="#d4af37" font-size="13" font-weight="700" text-anchor="middle">قاسم سلیمانی (۱۹۹۸–۲۰۲۰)</text>
<text x="960" y="628" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">معمار اصلی نفوذ — ترور ژانویه ۲۰۲۰ توسط آمریکا</text>

<!-- Opposition: Sadr -->
