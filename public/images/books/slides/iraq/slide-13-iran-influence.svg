<circle cx="1550" cy="770" r="130" fill="url(#rg-cul)" stroke="rgba(147,51,234,0.25)" stroke-width="1.5" filter="url(#glow-p)"/>
<text x="1550" y="690" class="sector-label" fill="#9333ea">🕌 فرهنگی-مذهبی</text>
