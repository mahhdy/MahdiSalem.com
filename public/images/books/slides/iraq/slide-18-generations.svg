<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .gen-label { fill: #fff; font-size: 15px; font-weight: 800; }
    .gen-desc { fill: rgba(255,255,255,0.5); font-size: 11px; }
    .gen-stat { fill: #d4af37; font-size: 12px; font-weight: 700; }
    .year-mark { fill: rgba(255,255,255,0.3); font-size: 11px; text-anchor: middle; }
    .year-major { fill: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-anchor: middle; }
    .crisis-label { fill: #fff; font-size: 10px; font-weight: 600; text-anchor: middle; }
    .crisis-sub { fill: rgba(255,255,255,0.4); font-size: 9px; text-anchor: middle; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <!-- Crisis color fills -->
  <linearGradient id="crisis-war" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.1"/>
  </linearGradient>
  <linearGradient id="crisis-sanction" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ff9800" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#ff9800" stop-opacity="0.08"/>
  </linearGradient>
  <linearGradient id="crisis-occupy" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#9333ea" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#9333ea" stop-opacity="0.08"/>
  </linearGradient>
  <linearGradient id="crisis-isis" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.2"/>
  </linearGradient>
  <linearGradient id="crisis-civil" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#ff9800" stop-opacity="0.08"/>
  </linearGradient>
  <linearGradient id="peace" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.03"/>
  </linearGradient>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">تجربه زیسته نسل‌های عراقی: ۴ نسل، ۴۰ سال بحران</text>
<text x="960" y="68" class="subtitle">هر عراقی در طول عمرش چه بحران‌هایی را تجربه کرده؟</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- Main container -->
<rect x="60" y="95" width="1800" height="780" class="glass" filter="url(#sh)"/>

<!-- ══════════════════════════════════════════════════ -->
<!-- TIMELINE X-AXIS: 1960→2023. 63 years.             -->
<!-- x range: 250→1800. Scale ≈ 24.6px/year            -->
<!-- Formula: x = 250 + (year-1960) × 24.6             -->
<!-- ══════════════════════════════════════════════════ -->

<!-- Year markers along bottom -->
<g>
  <line x1="250" y1="850" x2="1800" y2="850" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Decade marks -->
  <line x1="250" y1="845" x2="250" y2="855" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="250" y="870" class="year-major">۱۹۶۰</text>

  <line x1="496" y1="845" x2="496" y2="855" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="496" y="870" class="year-major">۱۹۷۰</text>

  <line x1="742" y1="845" x2="742" y2="855" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="742" y="870" class="year-major">۱۹۸۰</text>

  <line x1="989" y1="845" x2="989" y2="855" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="989" y="870" class="year-major">۱۹۹۰</text>

  <line x1="1235" y1="845" x2="1235" y2="855" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="1235" y="870" class="year-major">۲۰۰۰</text>

  <line x1="1481" y1="845" x2="1481" y2="855" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="1481" y="870" class="year-major">۲۰۱۰</text>

  <line x1="1727" y1="845" x2="1727" y2="855" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="1727" y="870" class="year-major">۲۰۲۰</text>
</g>

<!-- ══════════════════════════════════ -->
<!-- CRISIS OVERLAY COLUMNS             -->
<!-- These span ALL generation bands    -->
<!-- ══════════════════════════════════ -->

<!-- Iran-Iraq War 1980-1988: x=742→939 -->
<rect x="742" y="110" width="197" height="740" fill="url(#crisis-war)" rx="4"/>
<text x="840" y="128" class="crisis-label" fill="#e74c3c">جنگ ایران-عراق</text>
<text x="840" y="140" class="crisis-sub" fill="#e74c3c">۱۹۸۰–۱۹۸۸</text>

<!-- Kuwait + Gulf War 1990-1991: x=989→1013 -->
<rect x="989" y="110" width="24" height="740" fill="url(#crisis-war)" rx="2"/>

<!-- Sanctions 1990-2003: x=989→1309 -->
<rect x="989" y="110" width="320" height="740" fill="url(#crisis-sanction)" rx="4" opacity="0.5"/>
<text x="1149" y="128" class="crisis-label" fill="#ff9800">تحریم ویرانگر</text>
<text x="1149" y="140" class="crisis-sub" fill="#ff9800">۱۹۹۰–۲۰۰۳</text>

<!-- US Invasion + Occupation 2003-2011: x=1309→1506 -->
<rect x="1309" y="110" width="197" height="740" fill="url(#crisis-occupy)" rx="4"/>
<text x="1407" y="128" class="crisis-label" fill="#9333ea">اشغال آمریکا</text>
<text x="1407" y="140" class="crisis-sub" fill="#9333ea">۲۰۰۳–۲۰۱۱</text>

<!-- Civil War peak 2006-2008: x=1383→1432 (inside occupation) -->
<rect x="1383" y="110" width="49" height="740" fill="url(#crisis-civil)" rx="2" opacity="0.6"/>

<!-- ISIS 2014-2017: x=1579→1653 -->
<rect x="1579" y="110" width="74" height="740" fill="url(#crisis-isis)" rx="3"/>
<text x="1616" y="128" class="crisis-label" fill="rgba(255,255,255,0.7)">داعش</text>
<text x="1616" y="140" class="crisis-sub">۲۰۱۴–۱۷</text>

<!-- Tishreen 2019: x=1702 (thin marker) -->
<line x1="1702" y1="110" x2="1702" y2="850" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
<text x="1702" y="128" class="crisis-label" fill="#d4af37">تشرین</text>

<!-- Relative peace periods -->
<!-- 1960-1980: some peace (but coups) -->
<rect x="250" y="110" width="492" height="740" fill="url(#peace)" rx="4" opacity="0.3"/>

<!-- ══════════════════════════════════════════ -->
<!-- GENERATION BANDS (4 horizontal rows)       -->
<!-- Each band: 160px height                    -->
<!-- Band 1 (Gen 1): y=155→305                  -->
<!-- Band 2 (Gen 2): y=320→470                  -->
<!-- Band 3 (Gen 3): y=485→635                  -->
<!-- Band 4 (Gen 4): y=650→800                  -->
<!-- ══════════════════════════════════════════ -->

<!-- ─── GENERATION 1: Born 1950s — "نسل طلایی" ─── -->
<rect x="100" y="155" width="140" height="150" rx="8" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.2)" stroke-width="1"/>
<text x="170" y="185" class="gen-label" fill="#2ecc71" text-anchor="middle">نسل اول</text>
<text x="170" y="202" fill="#2ecc71" font-size="11" text-anchor="middle">متولد ۱۹۵۰</text>
<text x="170" y="218" class="gen-desc" text-anchor="middle">«نسل طلایی»</text>
<text x="170" y="235" class="gen-desc" text-anchor="middle">عراق مرفه را دیده</text>
<text x="170" y="255" class="gen-stat" text-anchor="middle">سن فعلی: ≈۷۳</text>
<text x="170" y="272" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">بهترین سال‌ها + بدترین</text>
<text x="170" y="290" fill="#e74c3c" font-size="10" text-anchor="middle">۴۳ سال بحران از ۷۳ سال</text>

<!-- Life band: 1950→2023 = x=250(offset to ~5y before 1960)→1800 -->
<!-- Actually born 1950 = before our chart starts, so band starts at x=250 (age 10 in 1960) -->
<rect x="250" y="165" width="1550" height="130" rx="6" fill="none" stroke="rgba(46,204,113,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
<!-- Age markers on the band -->
<text x="250" y="300" fill="rgba(46,204,113,0.3)" font-size="9" text-anchor="middle">۱۰ ساله</text>
<text x="496" y="300" fill="rgba(46,204,113,0.3)" font-size="9" text-anchor="middle">۲۰</text>
<text x="742" y="300" fill="rgba(46,204,113,0.3)" font-size="9" text-anchor="middle">۳۰</text>
<text x="989" y="300" fill="rgba(46,204,113,0.3)" font-size="9" text-anchor="middle">۴۰</text>
<text x="1235" y="300" fill="rgba(46,204,113,0.3)" font-size="9" text-anchor="middle">۵۰</text>
<text x="1481" y="300" fill="rgba(46,204,113,0.3)" font-size="9" text-anchor="middle">۶۰</text>
<text x="1727" y="300" fill="rgba(46,204,113,0.3)" font-size="9" text-anchor="middle">۷۰</text>

<!-- ─── GENERATION 2: Born 1970 — "نسل جنگ" ─── -->
<rect x="100" y="320" width="140" height="150" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>
<text x="170" y="350" class="gen-label" fill="#e74c3c" text-anchor="middle">نسل دوم</text>
<text x="170" y="367" fill="#e74c3c" font-size="11" text-anchor="middle">متولد ۱۹۷۰</text>
<text x="170" y="383" class="gen-desc" text-anchor="middle">«نسل جنگ»</text>
<text x="170" y="400" class="gen-desc" text-anchor="middle">کودکی = جنگ</text>
<text x="170" y="420" class="gen-stat" text-anchor="middle">سن فعلی: ≈۵۳</text>
<text x="170" y="437" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">تمام عمر بالغ = بحران</text>
<text x="170" y="455" fill="#e74c3c" font-size="10" text-anchor="middle">۴۳ سال بحران از ۵۳ سال</text>

<!-- Life band: 1970→2023 = x=496→1800 -->
<rect x="496" y="330" width="1304" height="130" rx="6" fill="none" stroke="rgba(231,76,60,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
<text x="496" y="465" fill="rgba(231,76,60,0.3)" font-size="9" text-anchor="middle">تولد</text>
<text x="742" y="465" fill="rgba(231,76,60,0.3)" font-size="9" text-anchor="middle">۱۰</text>
<text x="989" y="465" fill="rgba(231,76,60,0.3)" font-size="9" text-anchor="middle">۲۰</text>
<text x="1235" y="465" fill="rgba(231,76,60,0.3)" font-size="9" text-anchor="middle">۳۰</text>
<text x="1481" y="465" fill="rgba(231,76,60,0.3)" font-size="9" text-anchor="middle">۴۰</text>
<text x="1727" y="465" fill="rgba(231,76,60,0.3)" font-size="9" text-anchor="middle">۵۰</text>

<!-- ─── GENERATION 3: Born 1985 — "نسل تحریم" ─── -->
<rect x="100" y="485" width="140" height="150" rx="8" fill="rgba(255,152,0,0.08)" stroke="rgba(255,152,0,0.2)" stroke-width="1"/>
<text x="170" y="515" class="gen-label" fill="#ff9800" text-anchor="middle">نسل سوم</text>
<text x="170" y="532" fill="#ff9800" font-size="11" text-anchor="middle">متولد ۱۹۸۵</text>
<text x="170" y="548" class="gen-desc" text-anchor="middle">«نسل تحریم»</text>
<text x="170" y="565" class="gen-desc" text-anchor="middle">سوءتغذیه + جنگ + اشغال</text>
<text x="170" y="585" class="gen-stat" text-anchor="middle">سن فعلی: ≈۳۸</text>
<text x="170" y="602" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">هیچ سال عادی نداشته</text>
<text x="170" y="620" fill="#e74c3c" font-size="10" font-weight="700" text-anchor="middle">۳۸ سال بحران از ۳۸ = ۱۰۰%</text>

<!-- Life band: 1985→2023 = x=865→1800 -->
<rect x="865" y="495" width="935" height="130" rx="6" fill="none" stroke="rgba(255,152,0,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
<text x="865" y="630" fill="rgba(255,152,0,0.3)" font-size="9" text-anchor="middle">تولد</text>
<text x="989" y="630" fill="rgba(255,152,0,0.3)" font-size="9" text-anchor="middle">۵</text>
<text x="1235" y="630" fill="rgba(255,152,0,0.3)" font-size="9" text-anchor="middle">۱۵</text>
<text x="1481" y="630" fill="rgba(255,152,0,0.3)" font-size="9" text-anchor="middle">۲۵</text>
<text x="1727" y="630" fill="rgba(255,152,0,0.3)" font-size="9" text-anchor="middle">۳۵</text>

<!-- Highlight: This generation = 100% crisis -->
<rect x="865" y="505" width="935" height="110" rx="4" fill="rgba(231,76,60,0.05)" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>

<!-- ─── GENERATION 4: Born 2000 — "نسل تشرین" ─── -->
<rect x="100" y="650" width="140" height="150" rx="8" fill="rgba(0,180,216,0.08)" stroke="rgba(0,180,216,0.2)" stroke-width="1"/>
<text x="170" y="680" class="gen-label" fill="#00b4d8" text-anchor="middle">نسل چهارم</text>
<text x="170" y="697" fill="#00b4d8" font-size="11" text-anchor="middle">متولد ۲۰۰۰</text>
<text x="170" y="713" class="gen-desc" text-anchor="middle">«نسل تشرین»</text>
<text x="170" y="730" class="gen-desc" text-anchor="middle">صدام ندیده / اینترنت دارد</text>
<text x="170" y="750" class="gen-stat" text-anchor="middle">سن فعلی: ≈۲۳</text>
<text x="170" y="767" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">جنبش ۲۰۱۹ = هویتشان</text>
<text x="170" y="785" fill="#00b4d8" font-size="10" text-anchor="middle">امید + خشم = انرژی تغییر</text>

<!-- Life band: 2000→2023 = x=1235→1800 -->
<rect x="1235" y="660" width="565" height="130" rx="6" fill="none" stroke="rgba(0,180,216,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
<text x="1235" y="795" fill="rgba(0,180,216,0.3)" font-size="9" text-anchor="middle">تولد</text>
<text x="1481" y="795" fill="rgba(0,180,216,0.3)" font-size="9" text-anchor="middle">۱۰</text>
<text x="1727" y="795" fill="rgba(0,180,216,0.3)" font-size="9" text-anchor="middle">۲۰</text>

<!-- ══════════════════════════════════════════ -->
<!-- BOTTOM INSIGHT BAR                         -->
<!-- ══════════════════════════════════════════ -->
<rect x="60" y="890" width="1800" height="100" rx="10" class="note-box"/>
<text x="960" y="918" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">📌 نتیجه: هیچ عراقی زنده‌ای یک دهه کامل صلح و ثبات را تجربه نکرده است</text>
<text x="960" y="942" fill="rgba(255,255,255,0.55)" font-size="12" text-anchor="middle">نسل سوم (متولد ۱۹۸۵) = ۱۰۰% عمرش در بحران گذشته: جنگ ایران‌عراق → تحریم → اشغال → جنگ داخلی → داعش → بی‌ثباتی</text>
<text x="960" y="963" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">نسل چهارم (تشرین) تنها نسلی است که عراق قبل را نمی‌شناسد — آنها نه نوستالژی صدام دارند و نه وفاداری به احزاب مذهبی = پتانسیل تغییر</text>
<text x="960" y="982" fill="rgba(255,255,255,0.3)" font-size="11" text-anchor="middle">مقایسه: یک آلمانی متولد ۱۹۵۰ = ۷۳ سال صلح | یک عراقی متولد ۱۹۵۰ = ۳۰ سال صلح + ۴۳ سال بحران</text>

<!-- Crisis legend (bottom) -->
<g transform="translate(250,1010)">
  <rect x="0" y="0" width="16" height="12" rx="2" fill="#e74c3c" opacity="0.4"/>
  <text x="22" y="11" fill="rgba(255,255,255,0.5)" font-size="10">جنگ</text>

  <rect x="80" y="0" width="16" height="12" rx="2" fill="#ff9800" opacity="0.35"/>
  <text x="102" y="11" fill="rgba(255,255,255,0.5)" font-size="10">تحریم</text>

  <rect x="160" y="0" width="16" height="12" rx="2" fill="#9333ea" opacity="0.35"/>
  <text x="182" y="11" fill="rgba(255,255,255,0.5)" font-size="10">اشغال</text>

  <rect x="240" y="0" width="16" height="12" rx="2" fill="#1a1a2e" opacity="0.6"/>
  <text x="262" y="11" fill="rgba(255,255,255,0.5)" font-size="10">داعش</text>

  <rect x="310" y="0" width="16" height="12" rx="2" fill="#2ecc71" opacity="0.15"/>
  <text x="332" y="11" fill="rgba(255,255,255,0.5)" font-size="10">ثبات نسبی</text>

  <line x1="410" y1="6" x2="426" y2="6" stroke="#d4af37" stroke-width="2"/>
  <text x="432" y="11" fill="rgba(255,255,255,0.5)" font-size="10">تشرین ۲۰۱۹</text>
</g>

<!-- Footer -->
<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 18 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۵: افکار عمومی و نسل‌ها</text>
<text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">منابع: UNDP Iraq Human Development Report (2014), World Bank, IIACSS Generational Study (2021) | تحلیل نگارنده</text>
</svg>
