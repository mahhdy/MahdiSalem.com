<text x="960" y="500" fill="#d4af37" font-size="16" font-weight="900" text-anchor="middle">📋 گزارش‌های رسمی: همه علیه مشروعیت جنگ</text>
<line x1="690" y1="513" x2="1230" y2="513" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>

<!-- Report 1: Chilcot -->
