<text x="710" y="561" fill="rgba(255,255,255,0.6)" font-size="10">«مبنای اطلاعاتی ناکافی | گزینه‌های صلح‌آمیز بررسی نشد | برنامه‌ریزی پس‌از‌جنگ: فاجعه»</text>
