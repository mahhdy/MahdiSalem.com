<text x="1310" y="370" fill="rgba(255,255,255,0.6)" font-size="10">بدون مجوز سازمان ملل | بمباران غیرنظامیان | اسلحه آمریکایی</text>
<text x="1310" y="385" fill="rgba(255,255,255,0.45)" font-size="9">منطق: «اگر آمریکا بدون مجوز حمله کرد، ما هم حق داریم»</text>

<!-- Precedent 3 -->
<rect x="1290" y="400" width="550" height="60" rx="10" fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.12)" stroke-width="1"/>
