<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<rect class="bg" width="1920" height="1080"/>
<text x="960" y="42" class="title">آیا جنگ عراق قانونی بود؟ — محاکمه حقوقی ۲۰ ساله</text>
<text x="960" y="68" class="subtitle">تحلیل مشروعیت حمله ۲۰۰۳ بر اساس حقوق بین‌الملل، منشور ملل متحد و گزارش‌های رسمی</text>
<line x1="150" y1="84" x2="1770" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ===================== TOP: VERDICT BANNER ===================== -->
<rect x="60" y="100" width="1800" height="70" rx="14" fill="rgba(231,76,60,0.1)" stroke="rgba(231,76,60,0.25)" stroke-width="2" filter="url(#sh)"/>
<text x="960" y="132" fill="#e74c3c" font-size="24" font-weight="900" text-anchor="middle">حکم: جنگ عراق طبق حقوق بین‌الملل غیرقانونی بود</text>
<text x="960" y="155" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">کوفی عنان (دبیرکل سازمان ملل، ۲۰۰۴): «از نظر من، حمله مطابق منشور سازمان ملل نبود — غیرقانونی بود»</text>

<!-- ===================== LEFT: LEGAL ARGUMENTS ===================== -->
<rect x="60" y="185" width="590" height="560" rx="14" class="glass" filter="url(#sh)"/>
<text x="355" y="215" fill="#e74c3c" font-size="18" font-weight="900" text-anchor="middle">❌ چرا غیرقانونی بود؟</text>
<text x="355" y="235" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">(اجماع اکثریت حقوقدانان بین‌المللی)</text>
<line x1="80" y1="248" x2="630" y2="248" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>

<!-- Argument 1: No UN Resolution -->
<rect x="80" y="260" width="550" height="80" rx="10" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.12)" stroke-width="1"/>
<circle cx="105" cy="285" r="16" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
<text x="105" y="291" fill="#e74c3c" font-size="14" font-weight="900" text-anchor="middle">۱</text>
<text x="130" y="283" fill="#e74c3c" font-size="13" font-weight="700">بدون مجوز شورای امنیت</text>
<text x="130" y="301" fill="rgba(255,255,255,0.6)" font-size="10">ماده ۳۹ منشور: فقط شورای امنیت حق مجوز جنگ دارد</text>
<text x="130" y="317" fill="rgba(255,255,255,0.55)" font-size="10">قطعنامه ۱۴۴۱: «عواقب جدی» ≠ مجوز حمله نظامی</text>
<text x="130" y="333" fill="rgba(255,255,255,0.45)" font-size="9">فرانسه + روسیه + چین: صراحتاً گفتند ۱۴۴۱ مجوز جنگ نیست</text>

<!-- Argument 2: No Self-Defense -->
<rect x="80" y="350" width="550" height="70" rx="10" fill="rgba(255,152,0,0.06)" stroke="rgba(255,152,0,0.12)" stroke-width="1"/>
<circle cx="105" cy="375" r="16" fill="rgba(255,152,0,0.15)" stroke="#ff9800" stroke-width="1.5"/>
<text x="105" y="381" fill="#ff9800" font-size="14" font-weight="900" text-anchor="middle">۲</text>
<text x="130" y="373" fill="#ff9800" font-size="13" font-weight="700">دفاع مشروع صدق نمی‌کند</text>
<text x="130" y="391" fill="rgba(255,255,255,0.6)" font-size="10">ماده ۵۱: فقط در صورت حمله مسلحانه — عراق به آمریکا حمله نکرده بود</text>
<text x="130" y="407" fill="rgba(255,255,255,0.55)" font-size="10">«دفاع پیشگیرانه» (Pre-emptive): مفهومی جدید — در حقوق بین‌الملل وجود ندارد</text>

<!-- Argument 3: WMD Lie -->
<rect x="80" y="430" width="550" height="70" rx="10" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.12)" stroke-width="1"/>
<circle cx="105" cy="455" r="16" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
<text x="105" y="461" fill="#e74c3c" font-size="14" font-weight="900" text-anchor="middle">۳</text>
<text x="130" y="453" fill="#e74c3c" font-size="13" font-weight="700">توجیه اصلی دروغ بود</text>
<text x="130" y="471" fill="rgba(255,255,255,0.6)" font-size="10">WMD وجود نداشت — بازرسان (UNMOVIC + IAEA) تأیید کردند</text>
<text x="130" y="487" fill="rgba(255,255,255,0.55)" font-size="10">هانس بلیکس: «به ما فرصت ندادند — جواب داشتیم پیدا می‌شد: هیچ‌چیز»</text>

<!-- Argument 4: Proportionality -->
<rect x="80" y="510" width="550" height="60" rx="10" fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.12)" stroke-width="1"/>
<circle cx="105" cy="535" r="16" fill="rgba(155,89,182,0.15)" stroke="#9b59b6" stroke-width="1.5"/>
<text x="105" y="541" fill="#9b59b6" font-size="14" font-weight="900" text-anchor="middle">۴</text>
<text x="130" y="533" fill="#9b59b6" font-size="13" font-weight="700">عدم تناسب (Proportionality)</text>
<text x="130" y="551" fill="rgba(255,255,255,0.6)" font-size="10">حتی اگر تهدیدی بود: اشغال کامل + تغییر رژیم ≠ پاسخ متناسب</text>
<text x="130" y="567" fill="rgba(255,255,255,0.45)" font-size="9">Shock &amp; Awe: ۲۹,۰۰۰ بمب در ۳ هفته اول — روی شهرهای مسکونی</text>

<!-- Argument 5: Humanitarian pretext -->
<rect x="80" y="580" width="550" height="60" rx="10" fill="rgba(0,180,216,0.06)" stroke="rgba(0,180,216,0.12)" stroke-width="1"/>
<circle cx="105" cy="605" r="16" fill="rgba(0,180,216,0.15)" stroke="#00b4d8" stroke-width="1.5"/>
<text x="105" y="611" fill="#00b4d8" font-size="14" font-weight="900" text-anchor="middle">۵</text>
<text x="130" y="603" fill="#00b4d8" font-size="13" font-weight="700">بهانه انسان‌دوستانه: بعداً اضافه شد</text>
<text x="130" y="621" fill="rgba(255,255,255,0.6)" font-size="10">«آزادسازی مردم عراق» بهانه سوم بود — وقتی WMD و القاعده ثابت نشد</text>
<text x="130" y="637" fill="rgba(255,255,255,0.45)" font-size="9">R2P (مسئولیت حفاظت): هنوز مجوز شورای امنیت لازم است — نه تصمیم یک‌جانبه</text>

<!-- Legal consensus box -->
<rect x="80" y="655" width="550" height="75" rx="10" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="1.5"/>
<text x="355" y="678" fill="#e74c3c" font-size="14" font-weight="700" text-anchor="middle">📊 اجماع حقوقی</text>
<text x="355" y="698" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">نظرسنجی حقوقدانان بین‌المللی (ASIL): ۸۷% غیرقانونی</text>
<text x="355" y="716" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">دادگاه عالی بریتانیا (۲۰۱۶): «مبنای حقوقی ناکافی بود»</text>

<!-- ===================== CENTER: WHAT US/UK CLAIMED ===================== -->
<rect x="670" y="185" width="580" height="270" rx="14" fill="rgba(0,180,216,0.03)" stroke="rgba(0,180,216,0.15)" stroke-width="1.5" filter="url(#sh)"/>
<text x="960" y="215" fill="#00b4d8" font-size="18" font-weight="900" text-anchor="middle">🛡️ استدلال آمریکا و بریتانیا</text>
<text x="960" y="235" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">(ادعاهایی که رد شدند)</text>
<line x1="690" y1="248" x2="1230" y2="248" stroke="rgba(0,180,216,0.15)" stroke-width="1"/>

<!-- Claim 1 -->
<g transform="translate(690,260)">
  <rect x="0" y="0" width="540" height="40" rx="6" fill="rgba(0,180,216,0.05)" stroke="rgba(0,180,216,0.08)" stroke-width="1"/>
  <text x="15" y="16" fill="#00b4d8" font-size="11" font-weight="700">ادعا: قطعنامه ۶۷۸ (۱۹۹۰) هنوز معتبر است</text>
  <text x="15" y="33" fill="rgba(255,255,255,0.5)" font-size="9">پاسخ: ۶۷۸ برای کویت بود — نه تغییر رژیم ۱۳ سال بعد | اکثر حقوقدانان: منقضی</text>

  <rect x="0" y="48" width="540" height="40" rx="6" fill="rgba(0,180,216,0.05)" stroke="rgba(0,180,216,0.08)" stroke-width="1"/>
  <text x="15" y="64" fill="#00b4d8" font-size="11" font-weight="700">ادعا: قطعنامه ۱۴۴۱ = مجوز خودکار</text>
  <text x="15" y="81" fill="rgba(255,255,255,0.5)" font-size="9">پاسخ: ۱۴۴۱ صراحتاً «بازگشت به شورا» را الزام کرد — آمریکا برنگشت</text>

  <rect x="0" y="96" width="540" height="40" rx="6" fill="rgba(0,180,216,0.05)" stroke="rgba(0,180,216,0.08)" stroke-width="1"/>
  <text x="15" y="112" fill="#00b4d8" font-size="11" font-weight="700">ادعا: دفاع پیشگیرانه مشروع است (Bush Doctrine)</text>
  <text x="15" y="129" fill="rgba(255,255,255,0.5)" font-size="9">پاسخ: مفهوم جدید — در حقوق بین‌الملل پذیرفته نیست | ICJ: فقط حمله واقعی = حق دفاع</text>

  <rect x="0" y="144" width="540" height="40" rx="6" fill="rgba(0,180,216,0.05)" stroke="rgba(0,180,216,0.08)" stroke-width="1"/>
  <text x="15" y="160" fill="#00b4d8" font-size="11" font-weight="700">ادعا: تغییر رژیم = سیاست رسمی (Iraq Liberation Act 1998)</text>
  <text x="15" y="177" fill="rgba(255,255,255,0.5)" font-size="9">پاسخ: قانون داخلی آمریکا ≠ مجوز بین‌المللی | کشور حق جنگ برای تغییر رژیم ندارد</text>
</g>

<!-- ===================== CENTER BOTTOM: KEY REPORTS ===================== -->
