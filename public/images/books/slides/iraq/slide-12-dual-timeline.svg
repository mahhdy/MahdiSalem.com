<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .year-mark { fill: rgba(255,255,255,0.25); font-size: 11px; text-anchor: middle; }
    .year-major { fill: rgba(255,255,255,0.5); font-size: 13px; font-weight: 700; text-anchor: middle; }
    .ev-ir { fill: #2ecc71; font-size: 10.5px; }
    .ev-iq { fill: #e74c3c; font-size: 10.5px; }
    .ev-sh { fill: #d4af37; font-size: 10.5px; font-weight: 600; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width: 1; rx: 10; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <linearGradient id="iran-gl" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#2ecc71" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.5"/>
  </linearGradient>
  <linearGradient id="iraq-gl" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#e74c3c" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.5"/>
  </linearGradient>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">تایم‌لاین تطبیقی: ایران و عراق (۱۹۰۰–۲۰۲۳)</text>
<text x="960" y="68" class="subtitle">دو مسیر متفاوت ملت‌سازی — از مشروطه تا امروز</text>
<line x1="200" y1="82" x2="1720" y2="82" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- Legend -->
<g transform="translate(540,90)">
  <line x1="0" y1="6" x2="25" y2="6" stroke="#2ecc71" stroke-width="3"/>
  <text x="32" y="11" fill="#2ecc71" font-size="12" font-weight="600">🇮🇷 ایران</text>
  <line x1="140" y1="6" x2="165" y2="6" stroke="#e74c3c" stroke-width="3"/>
  <text x="172" y="11" fill="#e74c3c" font-size="12" font-weight="600">🇮🇶 عراق</text>
  <line x1="280" y1="6" x2="305" y2="6" stroke="#d4af37" stroke-width="3" stroke-dasharray="4,3"/>
  <text x="312" y="11" fill="#d4af37" font-size="12" font-weight="600">رویداد مشترک</text>
  <circle cx="440" cy="6" r="5" fill="#ff9800"/>
  <text x="450" y="11" fill="#ff9800" font-size="12" font-weight="600">کودتا/مداخله خارجی</text>
</g>

<!-- Main container -->
<rect x="60" y="110" width="1800" height="840" class="glass" filter="url(#sh)"/>

