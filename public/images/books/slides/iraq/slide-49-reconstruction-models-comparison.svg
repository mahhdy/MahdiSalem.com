<rect width="1920" height="1080" fill="url(#bg49)"/>

<!-- Header -->
<text x="960" y="45" fill="#fff" font-size="30" font-weight="900" text-anchor="middle">🔄 چرا عراق «ژاپن» نشد؟ — مقایسه با الگوهای موفق بازسازی</text>
<text x="960" y="72" fill="#d4af37" font-size="15" font-weight="400" text-anchor="middle">ژاپن ۱۹۴۵ | آلمان ۱۹۴۵ | کره ۱۹۵۳ → معجزه اقتصادی | عراق ۲۰۰۳ → شکست کامل — چرا؟</text>
<line x1="150" y1="88" x2="1770" y2="88" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ====== MAIN TABLE: COMPARISON ====== -->
