<!-- ====== BOTTOM: WHY DID IRAQ FAIL? ====== -->
<rect x="60" y="565" width="1800" height="260" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh49)"/>
<text x="960" y="595" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">❓ ۷ دلیل اصلی شکست بازسازی عراق (vs موفقیت ژاپن/آلمان)</text>

<g transform="translate(85,610)">
  <!-- Reason 1 -->
