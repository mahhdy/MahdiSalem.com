  <text x="1520" y="150" fill="#e74c3c" font-size="9" font-weight="700" text-anchor="middle">$۶۰B «بازسازی» → $۵۰B+ فساد</text>
  <text x="1520" y="164" fill="rgba(255,255,255,0.3)" font-size="7" text-anchor="middle">SIGIR: «بزرگ‌ترین هدررفت تاریخ»</text>

