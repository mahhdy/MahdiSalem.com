<!-- Tribal 8% = 48px -->
<rect x="400" y="166" width="90" height="48" rx="2" fill="#9333ea" opacity="0.5"/>
<text x="445" y="194" class="pct-label">۸%</text>
<!-- Other 6% -->
<rect x="400" y="130" width="90" height="36" rx="2" fill="rgba(255,255,255,0.12)"/>

<!-- Trend arrow for Shia national identity -->
<line x1="205" y1="660" x2="445" y2="580" stroke="#3b82f6" stroke-width="2" opacity="0.6" marker-end="url(#arrowBlue)"/>
<text x="340" y="565" class="trend-text" fill="#3b82f6">هویت ملی ▲ ۲۶ واحد</text>
<line x1="205" y1="450" x2="445" y2="355" stroke="#e74c3c" stroke-width="2" opacity="0.4" stroke-dasharray="4,3"/>
<text x="340" y="775" class="trend-text" fill="#e74c3c">هویت مذهبی ▼ ۲۰ واحد</text>

