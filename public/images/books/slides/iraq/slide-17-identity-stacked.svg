<!-- Other 5% = 30px -->
<rect x="160" y="130" width="90" height="30" rx="2" fill="rgba(255,255,255,0.12)"/>

<!-- 2012 Bar — x=280 -->
<text x="325" y="750" class="year-label">۲۰۱۲</text>
