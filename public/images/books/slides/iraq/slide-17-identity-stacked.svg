<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .group-title { fill: #fff; font-size: 18px; font-weight: 800; text-anchor: middle; }
    .year-label { fill: rgba(255,255,255,0.6); font-size: 13px; font-weight: 600; text-anchor: middle; }
    .seg-label { fill: #fff; font-size: 11px; font-weight: 600; text-anchor: middle; }
    .pct-label { fill: rgba(255,255,255,0.9); font-size: 12px; font-weight: 700; text-anchor: middle; }
    .legend-text { fill: rgba(255,255,255,0.75); font-size: 13px; }
    .axis-label { fill: rgba(255,255,255,0.4); font-size: 11px; text-anchor: end; }
    .trend-text { fill: #d4af37; font-size: 12px; font-weight: 600; text-anchor: middle; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">هویت عراقی‌ها: «خود را اول چه می‌دانید؟»</text>
<text x="960" y="68" class="subtitle">تحول هویت اولیه در سه مقطع زمانی — تفکیک شیعه عرب، سنی عرب، و کرد</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- Legend -->
<g transform="translate(480,95)">
  <rect x="0" y="0" width="18" height="14" rx="3" fill="#3b82f6" opacity="0.7"/>
  <text x="24" y="12" class="legend-text">عراقی (هویت ملی)</text>

  <rect x="200" y="0" width="18" height="14" rx="3" fill="#e74c3c" opacity="0.7"/>
  <text x="224" y="12" class="legend-text">مذهبی (شیعه/سنی)</text>

  <rect x="420" y="0" width="18" height="14" rx="3" fill="#ff9800" opacity="0.7"/>
  <text x="444" y="12" class="legend-text">قومی (عرب/کرد)</text>

  <rect x="620" y="0" width="18" height="14" rx="3" fill="#9333ea" opacity="0.6"/>
  <text x="644" y="12" class="legend-text">قبیله‌ای/محلی</text>

  <rect x="810" y="0" width="18" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="834" y="12" class="legend-text">سایر/بدون پاسخ</text>
</g>

<!-- Y-Axis scale (shared) -->
<g transform="translate(0,0)">
  <text x="75" y="733" class="axis-label">۰%</text>
  <text x="75" y="613" class="axis-label">۲۰%</text>
  <text x="75" y="493" class="axis-label">۴۰%</text>
  <text x="75" y="373" class="axis-label">۶۰%</text>
  <text x="75" y="253" class="axis-label">۸۰%</text>
  <text x="75" y="133" class="axis-label">۱۰۰%</text>
  <!-- Grid lines -->
  <line x1="85" y1="730" x2="1850" y2="730" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="85" y1="610" x2="1850" y2="610" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="85" y1="490" x2="1850" y2="490" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="85" y1="370" x2="1850" y2="370" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="85" y1="250" x2="1850" y2="250" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="85" y1="130" x2="1850" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</g>

<!-- ══════════════════════════════════════════ -->
<!-- SECTION 1: SHIA ARAB (x: 100-660)         -->
<!-- Bar height scale: 600px = 100% (130→730)   -->
<!-- Bar width: 90px. Gap between years: 20px   -->
<!-- ══════════════════════════════════════════ -->
<rect x="95" y="115" width="570" height="640" class="glass" filter="url(#sh)"/>
<text x="380" y="148" class="group-title">عرب شیعه</text>

<!-- 2004 Bar — x=160, width=90 -->
<text x="205" y="750" class="year-label">۲۰۰۴</text>
<!-- National 22% = 132px (from 730 up) -->
<rect x="160" y="598" width="90" height="132" rx="2" fill="#3b82f6" opacity="0.7"/>
<text x="205" y="670" class="pct-label">۲۲%</text>
<!-- Religious 48% = 288px -->
<rect x="160" y="310" width="90" height="288" rx="2" fill="#e74c3c" opacity="0.7"/>
