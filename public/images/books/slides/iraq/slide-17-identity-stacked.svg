<!-- BOTTOM INSIGHT BAR                         -->
<!-- ══════════════════════════════════════════ -->
<rect x="60" y="810" width="1800" height="110" rx="10" class="note-box"/>
<text x="960" y="840" fill="#d4af37" font-size="16" font-weight="700" text-anchor="middle">📊 روند کلیدی: هویت ملی عراقی در حال رشد است — به‌ویژه در میان شیعیان عرب</text>
<text x="960" y="865" fill="rgba(255,255,255,0.55)" font-size="12" text-anchor="middle">شیعیان: ۲۲%→۴۸% هویت ملی (+۲۶) | سنی‌ها: ۳۸%→۴۲% (+۴ با افت و بازگشت) | کردها: ۸%→۱۲% (همچنان قومی‌محور)</text>
<text x="960" y="888" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">عامل تغییر: جنبش تشرین ۲۰۱۹ — نسل جوان شعار «نه ایران، نه آمریکا» سر داد = ناسیونالیسم عراقی فرامذهبی</text>
<text x="960" y="908" fill="rgba(255,255,255,0.3)" font-size="11" text-anchor="middle">استثنا: کردها همچنان ۶۵% هویت قومی دارند — اما رفراندوم شکست‌خورده ۲۰۱۷ و بحران اقتصادی KRG = کاهش نسبی</text>

