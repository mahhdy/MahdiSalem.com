<!-- Other 6% = 36px -->
<rect x="280" y="130" width="90" height="36" rx="2" fill="rgba(255,255,255,0.12)"/>

<!-- 2022 Bar — x=400 -->
<text x="445" y="750" class="year-label">۲۰۲۲</text>
<!-- National 48% = 288px ← Significant rise! -->
<rect x="400" y="442" width="90" height="288" rx="2" fill="#3b82f6" opacity="0.8"/>
<text x="445" y="592" class="pct-label" font-size="13">۴۸%</text>
<!-- Religious 28% = 168px -->
<rect x="400" y="274" width="90" height="168" rx="2" fill="#e74c3c" opacity="0.6"/>
