<!-- Key Insights -->
<text x="1455" y="610" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">تحلیل الگوی جغرافیایی</text>

<rect x="1080" y="625" width="360" height="65" rx="8" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>
<text x="1260" y="648" fill="#e74c3c" font-size="13" font-weight="700" text-anchor="middle">«مثلث مرگ»: بغداد–انبار–دیالی</text>
<text x="1260" y="668" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">۵۵% کل تلفات در ۳ استان — خط تماس شیعه/سنی</text>

<rect x="1460" y="625" width="360" height="65" rx="8" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.15)" stroke-width="1"/>
<text x="1640" y="648" fill="#2ecc71" font-size="13" font-weight="700" text-anchor="middle">«پناهگاه نسبی»: کردستان</text>
<text x="1640" y="668" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">فقط ۱% تلفات — خودمختاری = امنیت بیشتر</text>

<rect x="1080" y="700" width="740" height="55" rx="8" fill="rgba(255,152,0,0.06)" stroke="rgba(255,152,0,0.15)" stroke-width="1"/>
<text x="1455" y="722" fill="#ff9800" font-size="13" font-weight="700" text-anchor="middle">موصل ۲۰۱۶–۱۷: آزادسازی شهر = ویرانی ۸۰% بافت قدیم + ≈۱۰,۰۰۰ غیرنظامی</text>
<text x="1455" y="740" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">ائتلاف آمریکا + ارتش عراق بمباران هوایی سنگین — «آزادسازی» به قیمت ویرانی</text>

<!-- Total box -->
<rect x="1080" y="768" width="740" height="60" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.25)" stroke-width="1.5"/>
