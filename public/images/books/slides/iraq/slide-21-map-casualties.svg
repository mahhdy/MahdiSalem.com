<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .prov-name { fill: #fff; font-size: 11px; font-weight: 700; text-anchor: middle; }
    .prov-num { fill: rgba(255,255,255,0.8); font-size: 10px; text-anchor: middle; }
    .legend-label { fill: rgba(255,255,255,0.7); font-size: 11px; }
    .rank-num { fill: #d4af37; font-size: 14px; font-weight: 900; }
    .rank-name { fill: #fff; font-size: 13px; font-weight: 600; }
    .rank-val { fill: rgba(255,255,255,0.6); font-size: 12px; }
    .rank-bar { rx: 3; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="glow-hot">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#e74c3c" flood-opacity="0.4"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-med">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feFlood flood-color="#ff9800" flood-opacity="0.3"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">نقشه تلفات غیرنظامی عراق بر اساس استان</text>
<text x="960" y="68" class="subtitle">مجموع کشته‌های غیرنظامی ۲۰۰۳–۲۰۲۳ — توزیع جغرافیایی خشونت</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ══════════════════════════════════════ -->
<!-- LEFT: STYLIZED MAP OF IRAQ             -->
<!-- Simplified province shapes as polygons -->
<!-- Center of map: ~550, 500               -->
<!-- ══════════════════════════════════════ -->
<rect x="60" y="95" width="960" height="780" class="glass" filter="url(#sh)"/>

<!-- Country outline (simplified) -->
<!-- Iraq rough shape: wider in west, narrowing to south -->
<path d="M 250,160 L 480,140 L 620,150 L 750,180 L 820,250 L 830,350 L 810,450 L 780,550 L 760,650 L 720,720 L 660,760 L 600,780 L 540,800 L 500,810 L 440,790 L 380,750 L 320,680 L 280,580 L 260,480 L 240,380 L 235,280 Z"
  fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

<!-- ═══════════════════ -->
