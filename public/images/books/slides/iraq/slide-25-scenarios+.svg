<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .sc-title { font-size: 20px; font-weight: 900; text-anchor: middle; }
    .sc-prob { font-size: 28px; font-weight: 900; text-anchor: middle; }
    .sc-subtitle { font-size: 12px; text-anchor: middle; }
    .sc-item { fill: rgba(255,255,255,0.7); font-size: 11.5px; }
    .sc-head { fill: rgba(255,255,255,0.4); font-size: 11px; font-weight: 700; }
    .sc-icon { font-size: 36px; text-anchor: middle; }
    .meter-bg { fill: rgba(255,255,255,0.06); rx: 4; }
    .row-label { fill: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-anchor: end; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="glow-r"><feGaussianBlur stdDeviation="8" result="b"/><feFlood flood-color="#e74c3c" flood-opacity="0.2"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-o"><feGaussianBlur stdDeviation="8" result="b"/><feFlood flood-color="#ff9800" flood-opacity="0.2"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-g"><feGaussianBlur stdDeviation="8" result="b"/><feFlood flood-color="#2ecc71" flood-opacity="0.2"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">سه سناریوی آینده عراق: ۲۰۲۴–۲۰۳۵</text>
<text x="960" y="68" class="subtitle">بدبینانه (تجزیه) | واقع‌بینانه (وضع موجود ±) | خوش‌بینانه (فدرالیسم موفق)</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- ══════════════════════════════════════════ -->
<!-- SCENARIO A: PESSIMISTIC (Left Column)      -->
<!-- ══════════════════════════════════════════ -->
<rect x="60" y="95" width="580" height="810" rx="16" fill="rgba(231,76,60,0.04)" stroke="rgba(231,76,60,0.15)" stroke-width="1.5" filter="url(#glow-r)"/>

<text x="350" y="130" class="sc-icon">💀</text>
<text x="350" y="162" class="sc-title" fill="#e74c3c">سناریوی بدبینانه</text>
<text x="350" y="182" class="sc-subtitle" fill="rgba(231,76,60,0.7)">«تجزیه و فروپاشی»</text>

<!-- Probability gauge -->
<text x="350" y="218" class="sc-prob" fill="#e74c3c">۲۰%</text>
<text x="350" y="236" fill="rgba(231,76,60,0.5)" font-size="11" text-anchor="middle">احتمال وقوع</text>
<rect x="200" y="245" width="300" height="8" class="meter-bg"/>
<rect x="200" y="245" width="60" height="8" rx="4" fill="#e74c3c" opacity="0.7"/>

<line x1="100" y1="265" x2="600" y2="265" stroke="rgba(231,76,60,0.1)" stroke-width="1"/>

<!-- Conditions -->
<text x="580" y="288" class="sc-head" fill="#e74c3c" text-anchor="end">شرایط تحقق:</text>
<text x="580" y="308" class="sc-item" text-anchor="end">• فروپاشی دولت مرکزی بغداد</text>
<text x="580" y="328" class="sc-item" text-anchor="end">• استقلال رسمی کردستان</text>
<text x="580" y="348" class="sc-item" text-anchor="end">• جنگ داخلی شیعه-شیعه (صدر vs حشد)</text>
<text x="580" y="368" class="sc-item" text-anchor="end">• بازگشت داعش ۲.۰ در مناطق سنی</text>
<text x="580" y="388" class="sc-item" text-anchor="end">• مداخله مستقیم ایران + ترکیه</text>

<line x1="100" y1="405" x2="600" y2="405" stroke="rgba(231,76,60,0.08)" stroke-width="1"/>

<!-- Outcomes -->
<text x="580" y="428" class="sc-head" fill="#e74c3c" text-anchor="end">پیامدها:</text>
<text x="580" y="448" class="sc-item" text-anchor="end">• تجزیه به ۳ واحد: شیعستان / سنستان / کردستان</text>
<text x="580" y="468" class="sc-item" text-anchor="end">• جنگ بر سر کرکوک + موصل (نفت + آب)</text>
<text x="580" y="488" class="sc-item" text-anchor="end">• ۵+ میلیون آواره جدید</text>
<text x="580" y="508" class="sc-item" text-anchor="end">• GDP سقوط ۶۰%+ → فقر مطلق</text>
<text x="580" y="528" class="sc-item" text-anchor="end">• بی‌ثباتی سرایت‌کننده به کل منطقه</text>

<line x1="100" y1="545" x2="600" y2="545" stroke="rgba(231,76,60,0.08)" stroke-width="1"/>

<!-- Indicators -->
<text x="580" y="568" class="sc-head" fill="#e74c3c" text-anchor="end">نشانه‌های هشدار (قابل رصد):</text>
<text x="580" y="588" class="sc-item" text-anchor="end">⚠️ قطع بودجه کردستان از بغداد</text>
<text x="580" y="608" class="sc-item" text-anchor="end">⚠️ درگیری مسلحانه شیعه-شیعه در بصره</text>
<text x="580" y="628" class="sc-item" text-anchor="end">⚠️ حملات داعش بالای ۱۰۰/ماه</text>
<text x="580" y="648" class="sc-item" text-anchor="end">⚠️ ورود نظامی ترکیه به شمال عراق</text>

<line x1="100" y1="665" x2="600" y2="665" stroke="rgba(231,76,60,0.08)" stroke-width="1"/>

<!-- Historical parallel -->
<rect x="90" y="678" width="520" height="55" rx="8" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.1)" stroke-width="1"/>
<text x="350" y="698" fill="#e74c3c" font-size="12" font-weight="600" text-anchor="middle">مشابه تاریخی: یوگسلاوی ۱۹۹۱–۹۵</text>
<text x="350" y="716" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">دولت فدرال ضعیف + هویت‌های قومی‌مذهبی قوی = تجزیه خونین</text>

<!-- Key actors -->
<text x="580" y="755" class="sc-head" fill="#e74c3c" text-anchor="end">بازیگران کلیدی:</text>
<text x="580" y="775" class="sc-item" text-anchor="end">🇮🇷 ایران: حمایت از شبه‌نظامیان شیعه</text>
<text x="580" y="795" class="sc-item" text-anchor="end">🇹🇷 ترکیه: جلوگیری از استقلال کردستان</text>
<text x="580" y="815" class="sc-item" text-anchor="end">🇸🇦 عربستان: حمایت از سنی‌ها</text>

<!-- Score -->
<rect x="200" y="845" width="300" height="40" rx="8" fill="rgba(231,76,60,0.1)" stroke="#e74c3c" stroke-width="1.5"/>
<text x="350" y="870" fill="#e74c3c" font-size="16" font-weight="900" text-anchor="middle">شاخص ویرانگری: ۹.۵/۱۰</text>

<!-- ══════════════════════════════════════════ -->
<!-- SCENARIO B: REALISTIC (Center Column)      -->
<!-- ══════════════════════════════════════════ -->
<rect x="670" y="95" width="580" height="810" rx="16" fill="rgba(255,152,0,0.04)" stroke="rgba(255,152,0,0.15)" stroke-width="1.5" filter="url(#glow-o)"/>

<text x="960" y="130" class="sc-icon">⚖️</text>
<text x="960" y="162" class="sc-title" fill="#ff9800">سناریوی واقع‌بینانه</text>
<text x="960" y="182" class="sc-subtitle" fill="rgba(255,152,0,0.7)">«وضع موجود با نوسان»</text>

<text x="960" y="218" class="sc-prob" fill="#ff9800">۵۵%</text>
<text x="960" y="236" fill="rgba(255,152,0,0.5)" font-size="11" text-anchor="middle">محتمل‌ترین سناریو</text>
<rect x="810" y="245" width="300" height="8" class="meter-bg"/>
<rect x="810" y="245" width="165" height="8" rx="4" fill="#ff9800" opacity="0.7"/>

<line x1="710" y1="265" x2="1210" y2="265" stroke="rgba(255,152,0,0.1)" stroke-width="1"/>

<text x="1190" y="288" class="sc-head" fill="#ff9800" text-anchor="end">مشخصات:</text>
<text x="1190" y="308" class="sc-item" text-anchor="end">• دولت ضعیف اما سرپا — انتخابات ادامه دارد</text>
<text x="1190" y="328" class="sc-item" text-anchor="end">• محاصصه تعدیل‌شده ولی پابرجا</text>
<text x="1190" y="348" class="sc-item" text-anchor="end">• فساد مزمن اما قابل تحمل ($۵–۱۰B/سال)</text>
<text x="1190" y="368" class="sc-item" text-anchor="end">• نفوذ ایران: ادامه با کاهش تدریجی</text>
<text x="1190" y="388" class="sc-item" text-anchor="end">• داعش: سلول‌های خوابیده، بدون کنترل ارضی</text>

<line x1="710" y1="405" x2="1210" y2="405" stroke="rgba(255,152,0,0.08)" stroke-width="1"/>

<text x="1190" y="428" class="sc-head" fill="#ff9800" text-anchor="end">پیامدها:</text>
<text x="1190" y="448" class="sc-item" text-anchor="end">• GDP رشد ۲–۴% سالانه (وابسته به نفت)</text>
<text x="1190" y="468" class="sc-item" text-anchor="end">• بیکاری جوانان ثابت ۳۰%+</text>
<text x="1190" y="488" class="sc-item" text-anchor="end">• خدمات عمومی: بهبود بسیار کند</text>
<text x="1190" y="508" class="sc-item" text-anchor="end">• اعتراضات دوره‌ای (هر ۲–۳ سال)</text>
<text x="1190" y="528" class="sc-item" text-anchor="end">• مهاجرت مغزها ادامه دارد</text>

<line x1="710" y1="545" x2="1210" y2="545" stroke="rgba(255,152,0,0.08)" stroke-width="1"/>

<text x="1190" y="568" class="sc-head" fill="#ff9800" text-anchor="end">ریسک‌های اصلی:</text>
<text x="1190" y="588" class="sc-item" text-anchor="end">⚡ سقوط قیمت نفت → بحران بودجه فوری</text>
<text x="1190" y="608" class="sc-item" text-anchor="end">⚡ بحران آب (ترکیه + ایران = کاهش دجله/فرات)</text>
<text x="1190" y="628" class="sc-item" text-anchor="end">⚡ تغییر اقلیم: بصره ۵۰°C+ → غیرقابل سکونت</text>
<text x="1190" y="648" class="sc-item" text-anchor="end">⚡ انفجار جمعیتی: ۴۲M → ۶۵M تا ۲۰۴۰</text>

<line x1="710" y1="665" x2="1210" y2="665" stroke="rgba(255,152,0,0.08)" stroke-width="1"/>

<rect x="700" y="678" width="520" height="55" rx="8" fill="rgba(255,152,0,0.06)" stroke="rgba(255,152,0,0.1)" stroke-width="1"/>
<text x="960" y="698" fill="#ff9800" font-size="12" font-weight="600" text-anchor="middle">مشابه تاریخی: لبنان ۱۹۹۰–۲۰۲۰</text>
<text x="960" y="716" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">محاصصه‌ای پایدار اما فرسایشی — تا روزی که سیستم از درون فرو بریزد (انفجار بیروت ۲۰۲۰)</text>

<text x="1190" y="755" class="sc-head" fill="#ff9800" text-anchor="end">شاخص‌های کلیدی رصد:</text>
<text x="1190" y="775" class="sc-item" text-anchor="end">📊 قیمت نفت زیر $۵۰ = بحران</text>
<text x="1190" y="795" class="sc-item" text-anchor="end">📊 بیکاری جوان بالای ۴۰% = انفجار</text>
<text x="1190" y="815" class="sc-item" text-anchor="end">📊 سطح آب دجله/فرات = بحران غذایی</text>

<rect x="810" y="845" width="300" height="40" rx="8" fill="rgba(255,152,0,0.1)" stroke="#ff9800" stroke-width="1.5"/>
<text x="960" y="870" fill="#ff9800" font-size="16" font-weight="900" text-anchor="middle">شاخص رکود: ۶/۱۰</text>

<!-- ══════════════════════════════════════════ -->
<!-- SCENARIO C: OPTIMISTIC (Right Column)      -->
<!-- ══════════════════════════════════════════ -->
<rect x="1280" y="95" width="580" height="810" rx="16" fill="rgba(46,204,113,0.04)" stroke="rgba(46,204,113,0.15)" stroke-width="1.5" filter="url(#glow-g)"/>

<text x="1570" y="130" class="sc-icon">🌱</text>
<text x="1570" y="162" class="sc-title" fill="#2ecc71">سناریوی خوش‌بینانه</text>
<text x="1570" y="182" class="sc-subtitle" fill="rgba(46,204,113,0.7)">«فدرالیسم واقعی + اصلاحات»</text>

<text x="1570" y="218" class="sc-prob" fill="#2ecc71">۲۵%</text>
<text x="1570" y="236" fill="rgba(46,204,113,0.5)" font-size="11" text-anchor="middle">احتمال وقوع</text>
<rect x="1420" y="245" width="300" height="8" class="meter-bg"/>
<rect x="1420" y="245" width="75" height="8" rx="4" fill="#2ecc71" opacity="0.7"/>

<line x1="1320" y1="265" x2="1820" y2="265" stroke="rgba(46,204,113,0.1)" stroke-width="1"/>

<text x="1800" y="288" class="sc-head" fill="#2ecc71" text-anchor="end">پیش‌شرط‌ها:</text>
<text x="1800" y="308" class="sc-item" text-anchor="end">• توافق ملی شیعه-سنی-کرد (قانون اساسی جدید)</text>
<text x="1800" y="328" class="sc-item" text-anchor="end">• حل اختلاف بغداد-اربیل بر سر نفت</text>
<text x="1800" y="348" class="sc-item" text-anchor="end">• مهار حشد شعبی زیر فرماندهی ارتش</text>
<text x="1800" y="368" class="sc-item" text-anchor="end">• قانون نفت فدرال (توزیع عادلانه)</text>
<text x="1800" y="388" class="sc-item" text-anchor="end">• ایجاد صندوق ثروت نسل‌ها</text>

<line x1="1320" y1="405" x2="1820" y2="405" stroke="rgba(46,204,113,0.08)" stroke-width="1"/>

<text x="1800" y="428" class="sc-head" fill="#2ecc71" text-anchor="end">دستاوردهای ممکن:</text>
<text x="1800" y="448" class="sc-item" text-anchor="end">• GDP رشد ۶–۸% (تنوع اقتصادی)</text>
<text x="1800" y="468" class="sc-item" text-anchor="end">• بیکاری جوان ← ۱۵% در ۱۰ سال</text>
<text x="1800" y="488" class="sc-item" text-anchor="end">• برق ۲۴ ساعته تا ۲۰۳۰</text>
<text x="1800" y="508" class="sc-item" text-anchor="end">• بازگشت مغزها (Reverse Brain Drain)</text>
<text x="1800" y="528" class="sc-item" text-anchor="end">• عراق = قطب گردشگری مذهبی جهان</text>

<line x1="1320" y1="545" x2="1820" y2="545" stroke="rgba(46,204,113,0.08)" stroke-width="1"/>

<text x="1800" y="568" class="sc-head" fill="#2ecc71" text-anchor="end">محرک‌های تغییر:</text>
<text x="1800" y="588" class="sc-item" text-anchor="end">✅ نسل تشرین (جوانان فرامذهبی)</text>
<text x="1800" y="608" class="sc-item" text-anchor="end">✅ فشار اقتصادی → اصلاح اجباری</text>
<text x="1800" y="628" class="sc-item" text-anchor="end">✅ کاهش نفوذ ایران (بحران داخلی ایران)</text>
<text x="1800" y="648" class="sc-item" text-anchor="end">✅ الگوی امارات/عربستان = انگیزه رقابت</text>

<line x1="1320" y1="665" x2="1820" y2="665" stroke="rgba(46,204,113,0.08)" stroke-width="1"/>

<rect x="1310" y="678" width="520" height="55" rx="8" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.1)" stroke-width="1"/>
<text x="1570" y="698" fill="#2ecc71" font-size="12" font-weight="600" text-anchor="middle">مشابه تاریخی: مالزی ۱۹۷۰–۲۰۱۰</text>
<text x="1570" y="716" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">جامعه چندقومی + نفت + فساد → اصلاح تدریجی → رشد شگفت‌انگیز</text>

<text x="1800" y="755" class="sc-head" fill="#2ecc71" text-anchor="end">نقاط عطف لازم:</text>
<text x="1800" y="775" class="sc-item" text-anchor="end">🎯 قانون نفت فدرال (۲۰ سال معوق!)</text>
<text x="1800" y="795" class="sc-item" text-anchor="end">🎯 انتخابات بدون محاصصه</text>
<text x="1800" y="815" class="sc-item" text-anchor="end">🎯 ادغام حشد در ارتش ملی</text>

<rect x="1420" y="845" width="300" height="40" rx="8" fill="rgba(46,204,113,0.1)" stroke="#2ecc71" stroke-width="1.5"/>
<text x="1570" y="870" fill="#2ecc71" font-size="16" font-weight="900" text-anchor="middle">شاخص امید: ۸/۱۰</text>

<!-- ══════════════════════════ -->
<!-- BOTTOM INSIGHT BAR         -->
<!-- ══════════════════════════ -->
<rect x="60" y="920" width="1800" height="70" rx="10" class="note-box"/>
<text x="960" y="948" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">📌 محتمل‌ترین آینده: ادامه وضع موجود (۵۵%) — نه تجزیه می‌شود، نه اصلاح. فقط فرسایش تدریجی</text>
<text x="960" y="970" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">متغیر کلیدی: قیمت نفت. بالای $۷۰ = سناریوی B پایدار | زیر $۴۰ = لغزش به سمت A | اصلاحات ساختاری = حرکت به C</text>
<text x="960" y="988" fill="rgba(255,255,255,0.35)" font-size="11" text-anchor="middle">نسل تشرین تنها نیروی تغییر است — اگر سازمان‌یافته شود = سناریوی C | اگر سرکوب شود = تثبیت B یا لغزش به A</text>

<!-- Footer -->
<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 25 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۷: آینده عراق</text>
<text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">منابع: ICG Scenario Analysis, Chatham House Iraq Futures, Brookings, RAND Corp | تحلیل سناریویی نگارنده</text>
</svg>
