  <text x="480" y="14" fill="#00b4d8" font-size="11" font-weight="700" text-anchor="middle">🎖️ سرباز ارتش آمریکا</text>
  <text x="830" y="14" fill="#e74c3c" font-size="11" font-weight="700" text-anchor="middle">💰 پیمانکار خصوصی</text>
  <text x="1200" y="14" fill="#d4af37" font-size="11" font-weight="700" text-anchor="middle">⚖️ نتیجه</text>

