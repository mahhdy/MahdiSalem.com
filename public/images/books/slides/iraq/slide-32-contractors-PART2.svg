  <text x="480" y="40" fill="#00b4d8" font-size="10" text-anchor="middle">$۵۰–$۱۵۰/روز</text>
  <text x="830" y="40" fill="#e74c3c" font-size="10" text-anchor="middle">$۵۰۰–$۱,۵۰۰/روز (۱۰×)</text>
  <text x="1200" y="40" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">بودجه نظامی → جیب شرکت‌ها</text>

  <line x1="0" y1="48" x2="1650" y2="48" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Row 2: Accountability -->
  <text x="160" y="66" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">پاسخگویی قانونی</text>
  <text x="480" y="66" fill="#00b4d8" font-size="10" text-anchor="middle">UCMJ (قانون نظامی)</text>
  <text x="830" y="66" fill="#e74c3c" font-size="10" text-anchor="middle">CPA Order 17: مصونیت کامل!</text>
  <text x="1200" y="66" fill="rgba(231,76,60,0.6)" font-size="10" text-anchor="middle">← بزرگ‌ترین مشکل</text>

  <line x1="0" y1="74" x2="1650" y2="74" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Row 3: Number -->
  <text x="160" y="92" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">تعداد (اوج ۲۰۰۸)</text>
  <text x="480" y="92" fill="#00b4d8" font-size="10" text-anchor="middle">~۱۵۰,۰۰۰ سرباز</text>
  <text x="830" y="92" fill="#e74c3c" font-size="10" text-anchor="middle">~۱۶۰,۰۰۰+ پیمانکار</text>
  <text x="1200" y="92" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">اولین جنگ: پیمانکار > سرباز</text>

  <line x1="0" y1="100" x2="1650" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Row 4: Casualties reporting -->
  <text x="160" y="118" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">گزارش تلفات</text>
  <text x="480" y="118" fill="#00b4d8" font-size="10" text-anchor="middle">رسمی + مراسم + رسانه‌ای</text>
  <text x="830" y="118" fill="#e74c3c" font-size="10" text-anchor="middle">مخفی — در آمار نمی‌آید</text>
  <text x="1200" y="118" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">هزینه سیاسی جنگ کاهش → ادامه جنگ</text>
</g>

