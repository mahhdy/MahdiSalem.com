<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');
    * { font-family: 'Vazirmatn', sans-serif; }
    .bg { fill: #0a0e27; }
    .title { fill: #fff; font-size: 32px; font-weight: 900; text-anchor: middle; }
    .subtitle { fill: #d4af37; font-size: 16px; font-weight: 400; text-anchor: middle; }
    .glass { rx:14; fill:rgba(255,255,255,0.04); stroke:rgba(255,255,255,0.08); stroke-width:1; }
    .note-box { fill: rgba(212,175,55,0.06); stroke: rgba(212,175,55,0.15); stroke-width:1; rx:10; }
    .hub-label { fill: #fff; font-size: 16px; font-weight: 800; text-anchor: middle; }
    .hub-num { fill: #d4af37; font-size: 22px; font-weight: 900; text-anchor: middle; }
    .dest-label { fill: #fff; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .dest-num { fill: rgba(255,255,255,0.7); font-size: 11px; text-anchor: middle; }
    .flow-label { fill: rgba(255,255,255,0.5); font-size: 10px; font-weight: 600; }
    .phase-title { fill: #d4af37; font-size: 14px; font-weight: 700; }
    .phase-desc { fill: rgba(255,255,255,0.6); font-size: 11px; }
    .stat-box { rx: 8; }
  </style>
  <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/></filter>
  <filter id="glow-center">
    <feGaussianBlur stdDeviation="15" result="b"/>
    <feFlood flood-color="#e74c3c" flood-opacity="0.3"/>
    <feComposite in2="b" operator="in"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Arrow markers -->
  <marker id="arrow-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c" opacity="0.6"/>
  </marker>
  <marker id="arrow-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" opacity="0.6"/>
  </marker>
  <marker id="arrow-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#00b4d8" opacity="0.6"/>
  </marker>
  <marker id="arrow-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71" opacity="0.5"/>
  </marker>
  <marker id="arrow-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea" opacity="0.5"/>
  </marker>
  <marker id="arrow-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d4af37" opacity="0.5"/>
  </marker>
</defs>

<rect class="bg" width="1920" height="1080"/>

<!-- Header -->
<text x="960" y="42" class="title">آوارگی عراقی‌ها: ۸.۵ میلیون نفر بی‌خانمان</text>
<text x="960" y="68" class="subtitle">آوارگان داخلی (IDP) + پناهندگان بین‌المللی — مسیرهای مهاجرت اجباری ۲۰۰۳–۲۰۲۳</text>
<line x1="250" y1="84" x2="1670" y2="84" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

<!-- Main container -->
<rect x="60" y="95" width="1800" height="660" class="glass" filter="url(#sh)"/>

<!-- ══════════════════════════════════════ -->
<!-- CENTER HUB: IRAQ                       -->
<!-- ══════════════════════════════════════ -->
<circle cx="700" cy="420" r="100" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="2" filter="url(#glow-center)"/>
<circle cx="700" cy="420" r="70" fill="rgba(231,76,60,0.12)" stroke="rgba(231,76,60,0.3)" stroke-width="1.5"/>
<text x="700" y="395" fill="#e74c3c" font-size="36">🇮🇶</text>
<text x="700" y="425" class="hub-label">عراق</text>
<text x="700" y="450" class="hub-num">۸.۵M</text>
<text x="700" y="468" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">آواره شده</text>

<!-- ══════════════════════════════════════ -->
<!-- INTERNAL DISPLACEMENT (LEFT ARC)       -->
<!-- IDP = 6 million                        -->
<!-- ══════════════════════════════════════ -->

<!-- IDP hub -->
<circle cx="250" cy="300" r="60" fill="rgba(255,152,0,0.1)" stroke="#ff9800" stroke-width="2"/>
<text x="250" y="285" fill="#ff9800" font-size="20">🏚️</text>
<text x="250" y="310" fill="#ff9800" font-size="14" font-weight="800" text-anchor="middle">آواره داخلی</text>
<text x="250" y="332" fill="#ff9800" font-size="20" font-weight="900" text-anchor="middle">۶M</text>
<text x="250" y="348" fill="rgba(255,152,0,0.5)" font-size="10" text-anchor="middle">IDP — اوج: ۲۰۱۴–۱۶</text>

<!-- Flow: Iraq → IDP -->
<path d="M 630,390 C 500,350 350,310 310,305" fill="none" stroke="#ff9800" stroke-width="4" opacity="0.3" marker-end="url(#arrow-o)"/>
<text x="470" y="340" class="flow-label" fill="#ff9800" text-anchor="middle">۷۰% کل آوارگان</text>

<!-- IDP destinations within Iraq -->
<!-- Kurdistan -->
<rect x="100" y="140" width="140" height="55" rx="8" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.2)" stroke-width="1"/>
<text x="170" y="163" fill="#2ecc71" font-size="12" font-weight="700" text-anchor="middle">کردستان عراق</text>
<text x="170" y="180" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">≈۱.۵ میلیون IDP</text>
<path d="M 225,300 C 210,240 195,200 185,195" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.3" marker-end="url(#arrow-g)"/>

<!-- Baghdad suburbs -->
<rect x="100" y="410" width="140" height="55" rx="8" fill="rgba(0,180,216,0.08)" stroke="rgba(0,180,216,0.2)" stroke-width="1"/>
<text x="170" y="433" fill="#00b4d8" font-size="12" font-weight="700" text-anchor="middle">حاشیه بغداد</text>
<text x="170" y="450" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">≈۲ میلیون IDP</text>
<path d="M 230,340 C 210,380 195,410 185,415" fill="none" stroke="#00b4d8" stroke-width="2" opacity="0.3" marker-end="url(#arrow-b)"/>

<!-- Southern Iraq -->
<rect x="100" y="490" width="140" height="55" rx="8" fill="rgba(147,51,234,0.08)" stroke="rgba(147,51,234,0.2)" stroke-width="1"/>
<text x="170" y="513" fill="#9333ea" font-size="12" font-weight="700" text-anchor="middle">جنوب عراق</text>
<text x="170" y="530" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">≈۲.۵ میلیون IDP</text>
<path d="M 240,350 C 220,430 200,480 185,495" fill="none" stroke="#9333ea" stroke-width="2" opacity="0.3" marker-end="url(#arrow-p)"/>

<!-- ══════════════════════════════════════ -->
<!-- INTERNATIONAL REFUGEES (RIGHT ARC)     -->
<!-- Refugees = 2.5 million                 -->
<!-- ══════════════════════════════════════ -->

<!-- Syria: 1,000,000 -->
<rect x="1020" y="150" width="170" height="80" rx="10" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="1.5"/>
<text x="1105" y="178" fill="#e74c3c" font-size="18">🇸🇾</text>
<text x="1105" y="198" class="dest-label" fill="#e74c3c">سوریه</text>
<text x="1105" y="216" class="dest-num" fill="#e74c3c">≈۱,۰۰۰,۰۰۰</text>
<path d="M 770,380 C 850,320 950,250 1020,210" fill="none" stroke="#e74c3c" stroke-width="5" opacity="0.25" marker-end="url(#arrow-r)"/>
<text x="900" y="290" class="flow-label" fill="#e74c3c" text-anchor="middle">اوج: ۲۰۰۶–۰۸</text>

<!-- Jordan: 750,000 -->
<rect x="1020" y="290" width="170" height="80" rx="10" fill="rgba(0,180,216,0.08)" stroke="rgba(0,180,216,0.2)" stroke-width="1.5"/>
<text x="1105" y="318" fill="#00b4d8" font-size="18">🇯🇴</text>
<text x="1105" y="338" class="dest-label" fill="#00b4d8">اردن</text>
<text x="1105" y="356" class="dest-num" fill="#00b4d8">≈۷۵۰,۰۰۰</text>
<path d="M 770,410 C 860,390 960,360 1020,340" fill="none" stroke="#00b4d8" stroke-width="4" opacity="0.25" marker-end="url(#arrow-b)"/>

<!-- Europe (Sweden, Germany, UK): 350,000 -->
<rect x="1020" y="430" width="170" height="80" rx="10" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1.5"/>
<text x="1105" y="458" fill="#3b82f6" font-size="14">🇸🇪🇩🇪🇬🇧</text>
<text x="1105" y="478" class="dest-label" fill="#3b82f6">اروپا</text>
<text x="1105" y="496" class="dest-num" fill="#3b82f6">≈۳۵۰,۰۰۰</text>
<path d="M 770,430 C 870,440 960,460 1020,470" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.25" marker-end="url(#arrow-b)"/>

<!-- USA/Canada/Australia: 200,000 -->
<rect x="1020" y="560" width="170" height="75" rx="10" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.2)" stroke-width="1.5"/>
<text x="1105" y="588" fill="#2ecc71" font-size="14">🇺🇸🇨🇦🇦🇺</text>
<text x="1105" y="607" class="dest-label" fill="#2ecc71">آمریکا/کانادا/استرالیا</text>
<text x="1105" y="625" class="dest-num" fill="#2ecc71">≈۲۰۰,۰۰۰</text>
<path d="M 770,450 C 870,500 970,560 1020,590" fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.2" marker-end="url(#arrow-g)"/>

<!-- Other (Egypt, Iran, Turkey, etc.): 200,000 -->
<rect x="1020" y="660" width="170" height="55" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="1105" y="685" class="dest-label" fill="rgba(255,255,255,0.5)">سایر (مصر، ایران، ترکیه)</text>
<text x="1105" y="703" class="dest-num">≈۲۰۰,۰۰۰</text>
<path d="M 770,470 C 870,550 970,640 1020,680" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" opacity="0.2" marker-end="url(#arrow-gold)"/>

<!-- Refugee total label -->
<rect x="1230" y="380" width="180" height="50" rx="8" fill="rgba(212,175,55,0.08)" stroke="#d4af37" stroke-width="1.5"/>
<text x="1320" y="402" fill="#d4af37" font-size="11" font-weight="600" text-anchor="middle">مجموع پناهندگان بین‌المللی</text>
<text x="1320" y="422" fill="#d4af37" font-size="18" font-weight="900" text-anchor="middle">≈۲.۵ میلیون</text>

<!-- ══════════════════════════════════════ -->
<!-- RIGHT PANEL: Timeline of Displacement  -->
<!-- ══════════════════════════════════════ -->
<rect x="1440" y="95" width="420" height="660" class="glass" filter="url(#sh)"/>
<text x="1650" y="130" fill="#d4af37" font-size="17" font-weight="700" text-anchor="middle">مراحل آوارگی</text>
<line x1="1460" y1="145" x2="1840" y2="145" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Phase 1 -->
<rect x="1460" y="160" width="390" height="95" rx="8" fill="rgba(231,76,60,0.05)" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>
<text x="1840" y="182" class="phase-title" text-anchor="end">موج اول: ۲۰۰۳–۲۰۰۵</text>
<text x="1840" y="200" class="phase-desc" text-anchor="end">سقوط رژیم + هرج‌ومرج → ۱.۵M آواره</text>
<text x="1840" y="218" class="phase-desc" text-anchor="end">بعثیان + مسیحیان + طبقه متوسط = اولین فراریان</text>
<text x="1840" y="236" fill="rgba(231,76,60,0.5)" font-size="10" text-anchor="end">مقصد اصلی: اردن + سوریه</text>

<!-- Phase 2 -->
<rect x="1460" y="268" width="390" height="95" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>
<text x="1840" y="290" class="phase-title" text-anchor="end" fill="#e74c3c">⚠️ موج دوم: ۲۰۰۶–۲۰۰۸ (اوج)</text>
<text x="1840" y="308" class="phase-desc" text-anchor="end">جنگ فرقه‌ای → ۲.۷M آواره جدید در ۲ سال!</text>
<text x="1840" y="326" class="phase-desc" text-anchor="end">پاکسازی قومی محلات بغداد + بمب‌گذاری سامرا</text>
<text x="1840" y="344" fill="rgba(231,76,60,0.6)" font-size="10" text-anchor="end">بدترین بحران آوارگی خاورمیانه تا آن زمان</text>

<!-- Phase 3 -->
<rect x="1460" y="376" width="390" height="80" rx="8" fill="rgba(255,152,0,0.05)" stroke="rgba(255,152,0,0.15)" stroke-width="1"/>
<text x="1840" y="398" class="phase-title" text-anchor="end">موج سوم: ۲۰۱۴–۲۰۱۶ (داعش)</text>
<text x="1840" y="416" class="phase-desc" text-anchor="end">سقوط موصل → ۳.۴M آواره داخلی جدید</text>
<text x="1840" y="434" class="phase-desc" text-anchor="end">نینوا + انبار + صلاح‌الدین تخلیه شدند</text>

<!-- Phase 4 -->
<rect x="1460" y="469" width="390" height="80" rx="8" fill="rgba(46,204,113,0.05)" stroke="rgba(46,204,113,0.15)" stroke-width="1"/>
<text x="1840" y="491" class="phase-title" text-anchor="end" fill="#2ecc71">بازگشت نسبی: ۲۰۱۷–۲۰۲۳</text>
<text x="1840" y="509" class="phase-desc" text-anchor="end">≈۴.۵M بازگشت — اما ۱.۲M هنوز آواره‌اند</text>
<text x="1840" y="527" class="phase-desc" text-anchor="end">بازگشت‌کنندگان: خانه ویران + معدن + بدون شغل</text>

<line x1="1460" y1="565" x2="1840" y2="565" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Key statistics -->
<text x="1650" y="590" fill="#d4af37" font-size="14" font-weight="700" text-anchor="middle">آمار کلیدی</text>

<g transform="translate(1460,605)">
  <rect x="0" y="0" width="185" height="50" rx="6" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.15)" stroke-width="1"/>
  <text x="93" y="20" fill="#e74c3c" font-size="18" font-weight="900" text-anchor="middle">۱.۲M</text>
  <text x="93" y="38" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">هنوز آواره (۲۰۲۳)</text>

  <rect x="195" y="0" width="185" height="50" rx="6" fill="rgba(255,152,0,0.06)" stroke="rgba(255,152,0,0.15)" stroke-width="1"/>
  <text x="288" y="20" fill="#ff9800" font-size="18" font-weight="900" text-anchor="middle">۸۰%</text>
  <text x="288" y="38" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">خانه‌ها ویران/آسیب‌دیده</text>
</g>

<g transform="translate(1460,665)">
  <rect x="0" y="0" width="185" height="50" rx="6" fill="rgba(0,180,216,0.06)" stroke="rgba(0,180,216,0.15)" stroke-width="1"/>
  <text x="93" y="20" fill="#00b4d8" font-size="18" font-weight="900" text-anchor="middle">۳.۲M</text>
  <text x="93" y="38" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">کودک آواره شده</text>

  <rect x="195" y="0" width="185" height="50" rx="6" fill="rgba(147,51,234,0.06)" stroke="rgba(147,51,234,0.15)" stroke-width="1"/>
  <text x="288" y="20" fill="#9333ea" font-size="18" font-weight="900" text-anchor="middle">۱ از ۵</text>
  <text x="288" y="38" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">عراقی‌ها آواره شدند</text>
</g>

<!-- ══════════════════════════ -->
<!-- BOTTOM INSIGHT BAR         -->
<!-- ══════════════════════════ -->
<rect x="60" y="780" width="1800" height="100" rx="10" class="note-box"/>
<text x="960" y="808" fill="#d4af37" font-size="15" font-weight="700" text-anchor="middle">📌 ۱ از هر ۵ عراقی آواره شد — بزرگترین بحران آوارگی خاورمیانه قبل از سوریه</text>
<text x="960" y="832" fill="rgba(255,255,255,0.55)" font-size="12" text-anchor="middle">سوریه ۱ میلیون عراقی را پذیرفت — سپس خودش ۱۲ میلیون آواره شد (۲۰۱۱ به بعد) → عراقی‌ها دوباره بی‌خانمان</text>
<text x="960" y="855" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">مسیحیان عراق: از ۱.۵ میلیون (۲۰۰۳) به ≈۲۰۰,۰۰۰ (۲۰۲۳) — ۸۷% مهاجرت کردند = پاکسازی خاموش</text>
<text x="960" y="875" fill="rgba(255,255,255,0.3)" font-size="11" text-anchor="middle">هزینه بازسازی مناطق آسیب‌دیده: $۸۸ میلیارد (تخمین بانک جهانی ۲۰۱۸) — فقط $۳۰B تأمین شد</text>

<!-- Footer -->
<text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 22 / 60</text>
<text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۶: جغرافیای بحران</text>
<text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">منابع: UNHCR Iraq (2023), IOM DTM Iraq, IDMC, World Bank Damage &amp; Needs Assessment (2018)</text>
</svg>
