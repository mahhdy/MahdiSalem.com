<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" dir="rtl">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&amp;display=swap');

      * {
        font-family: 'Vazirmatn', sans-serif;
      }

      .bg {
        fill: #0a0e27;
      }

      .title {
        fill: #fff;
        font-size: 32px;
        font-weight: 900;
        text-anchor: middle;
      }

      .sub {
        fill: #d4af37;
        font-size: 16px;
        font-weight: 400;
        text-anchor: middle;
      }

      .glass {
        fill: rgba(255, 255, 255, 0.04);
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 1;
      }

      .shia-fill {
        fill: rgba(46, 204, 113, 0.15);
        stroke: #2ecc71;
        stroke-width: 1.5;
      }

      .sunni-fill {
        fill: rgba(255, 152, 0, 0.15);
        stroke: #ff9800;
        stroke-width: 1.5;
      }

      .kurd-fill {
        fill: rgba(0, 180, 216, 0.15);
        stroke: #00b4d8;
        stroke-width: 1.5;
      }

      .sect-title {
        font-size: 22px;
        font-weight: 900;
        text-anchor: middle;
      }

      .sect-pct {
        font-size: 16px;
        font-weight: 500;
        text-anchor: middle;
      }

      .pos-label {
        fill: #fff;
        font-size: 13px;
        font-weight: 700;
        text-anchor: middle;
      }

      .pos-sub {
        fill: rgba(255, 255, 255, 0.55);
        font-size: 10px;
        text-anchor: middle;
      }

      .small-title {
        fill: rgba(255, 255, 255, 0.75);
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
      }

      .tiny {
        fill: rgba(255, 255, 255, 0.45);
        font-size: 10px;
        text-anchor: middle;
      }

      .pie-shia {
        fill: #2ecc71;
      }

      .pie-sunni {
        fill: #ff9800;
      }

      .pie-kurd {
        fill: #00b4d8;
      }

      .pie-other {
        fill: #8b8b8b;
      }

      .danger-title {
        fill: #e74c3c;
        font-size: 13px;
        font-weight: 700;
        text-anchor: middle;
      }

      .danger-sub {
        fill: rgba(255, 255, 255, 0.5);
        font-size: 11px;
        text-anchor: middle;
      }
    </style>

    <filter id="sh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect class="bg" width="1920" height="1080" />

  <!-- Header -->
  <text x="960" y="45" class="title">نظام محاصصه: تقسیم فرقه‌ای قدرت در عراق</text>
  <text x="960" y="72" class="sub">قانون نانوشته‌ای که از ۲۰۰۳ هر منصب را بر اساس فرقه و قومیت توزیع می‌کند</text>
  <line x1="300" y1="88" x2="1620" y2="88" stroke="#d4af37" stroke-width="1" opacity="0.3" />

  <text x="60" y="40" fill="rgba(255,255,255,0.3)" font-size="13">SLIDE 08 / 60</text>
  <text x="1860" y="40" fill="rgba(255,255,255,0.3)" font-size="13" text-anchor="end">فصل ۳: محاصصه و بنبست سیاسی</text>

  <!-- Card: Pie Chart -->
  <rect x="80" y="110" width="360" height="220" rx="16" class="glass" filter="url(#sh)" />
  <text x="260" y="110" class="small-title">ترکیب جمعیتی عراق</text>
  <text x="170" y="170" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="end">تقریب‌های رایج</text>
  <text x="170" y="190" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="end">تدر ادبیات سیاسی</text>


  <g transform="translate(260,205)">
    <!-- pie -->
    <path d="M0,0 L0,-82 A82,82 0 1,1 -71,41 Z" class="pie-shia" opacity="0.85" />
    <path d="M0,0 L-71,41 A82,82 0 0,1 -25,-78 Z" class="pie-sunni" opacity="0.85" />
    <path d="M0,0 L-25,-78 A82,82 0 0,1 25,-78 Z" class="pie-kurd" opacity="0.85" />
    <path d="M0,0 L25,-78 A82,82 0 0,1 0,-82 Z" class="pie-other" opacity="0.85" />

    <circle cx="0" cy="0" r="32" fill="#0a0e27" opacity="0.95" />
    <text x="0" y="-2" fill="#fff" font-size="11" font-weight="700" text-anchor="middle">جمعیت</text>
    <text x="0" y="13" fill="rgba(255,255,255,0.45)" font-size="9" text-anchor="middle">تقریبی</text>
  </g>

  <!-- legend -->
  <g transform="translate(110,300)">
    <circle cx="0" cy="0" r="6" class="pie-shia" />
    <text x="18" y="5" fill="#fff" font-size="12">شیعه — ۶۰٪</text>

    <circle cx="100" cy="0" r="6" class="pie-sunni" />
    <text x="118" y="5" fill="#fff" font-size="12">سنی — ۲۰٪</text>

    <circle cx="200" cy="0" r="6" class="pie-kurd" />
    <text x="218" y="5" fill="#fff" font-size="12">کرد — ۱۵٪</text>

    <circle cx="290" cy="0" r="6" class="pie-other" />
    <text x="308" y="5" fill="#fff" font-size="12">سایر — ۵٪</text>
  </g>

  <!-- Top positions -->
  <text x="960" y="130" fill="rgba(255,255,255,0.5)" font-size="20" text-anchor="middle">
    سه منصب کلیدی — تقسیم نانوشته اما عملاً الزامی
  </text>

  <rect x="520" y="150" width="280" height="110" rx="14" class="shia-fill" filter="url(#sh)" />
  <text x="660" y="185" fill="#2ecc71" font-size="20" font-weight="900" text-anchor="middle">نخست‌وزیر</text>
  <text x="660" y="208" fill="#2ecc71" font-size="14" text-anchor="middle">همیشه شیعه</text>
  <text x="660" y="228" class="pos-sub">قدرت اجرایی اصلی</text>
  <text x="660" y="248" class="pos-sub">مالکی ← عبادی ← عبدالمهدی ← الکاظمی ← السودانی</text>

  <rect x="840" y="150" width="280" height="110" rx="14" class="sunni-fill" filter="url(#sh)" />
  <text x="980" y="185" fill="#ff9800" font-size="20" font-weight="900" text-anchor="middle">رئیس پارلمان</text>
  <text x="980" y="208" fill="#ff9800" font-size="14" text-anchor="middle">همیشه سنی</text>
  <text x="980" y="228" class="pos-sub">قدرت تقنینی</text>
  <text x="980" y="248" class="pos-sub">الحسنی ← النجیفی ← الجبوری ← الحلبوسی</text>

  <rect x="1160" y="150" width="280" height="110" rx="14" class="kurd-fill" filter="url(#sh)" />
  <text x="1300" y="185" fill="#00b4d8" font-size="20" font-weight="900" text-anchor="middle">رئیس‌جمهور</text>
  <text x="1300" y="208" fill="#00b4d8" font-size="14" text-anchor="middle">همیشه کرد</text>
  <text x="1300" y="228" class="pos-sub">تشریفاتی، با وزن سیاسی نمادین</text>
  <text x="1300" y="248" class="pos-sub">طالبانی ← معصوم ← صالح ← رشید</text>

  <!-- Divider -->
  <text x="960" y="300" fill="rgba(255,255,255,0.38)" font-size="18" text-anchor="middle">
    ─────── توزیع وزارت‌ها و نهادهای کلیدی ───────
  </text>

  <!-- 3 centered big columns -->
  <!-- left edge = 140, right edge = 1780 -->
  <!-- widths = 520, gap = 40 -->

  <!-- Shia -->
  <rect x="140" y="320" width="520" height="340" rx="16" class="shia-fill" filter="url(#sh)" />
  <text x="400" y="352" fill="#2ecc71" class="sect-title">🟢 سهم شیعه</text>
  <text x="400" y="378" fill="#2ecc71" class="sect-pct">حدود ۵۵ تا ۶۰٪ مناصب</text>

  <rect x="170" y="398" width="220" height="40" rx="8" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" />
  <text x="280" y="423" class="pos-label">وزارت کشور</text>

  <rect x="410" y="398" width="220" height="40" rx="8" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" />
  <text x="520" y="423" class="pos-label">وزارت نفت</text>

  <rect x="170" y="448" width="220" height="40" rx="8" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" />
  <text x="280" y="473" class="pos-label">وزارت دارایی</text>

  <rect x="410" y="448" width="220" height="40" rx="8" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" />
  <text x="520" y="473" class="pos-label">بانک مرکزی</text>

  <rect x="170" y="498" width="460" height="40" rx="8" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" />
  <text x="400" y="523" class="pos-label">فرماندهی کل نیروهای مسلح + حشد الشعبی</text>

  <rect x="170" y="548" width="460" height="48" rx="8" fill="rgba(46,204,113,0.10)" stroke="rgba(46,204,113,0.25)" />
  <text x="400" y="569" fill="rgba(255,255,255,0.52)" font-size="11" text-anchor="middle">۱۰+ حزب رقیب: دعوه، صدر، حکمت،
    فتح، بدر...</text>
  <text x="400" y="586" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">رقابت داخلی شدید → بن‌بست
    سیاسی مکرر</text>

  <rect x="170" y="606" width="460" height="36" rx="8" fill="rgba(46,204,113,0.08)" />
  <text x="400" y="629" fill="rgba(46,204,113,0.78)" font-size="12" font-weight="600" text-anchor="middle">📌 ایران بر
    بخش مهمی از احزاب شیعه نفوذ دارد</text>

  <!-- Sunni -->
  <rect x="700" y="320" width="520" height="340" rx="16" class="sunni-fill" filter="url(#sh)" />
  <text x="960" y="352" fill="#ff9800" class="sect-title">🟠 سهم سنی</text>
  <text x="960" y="378" fill="#ff9800" class="sect-pct">حدود ۲۵ تا ۳۰٪ مناصب</text>

  <rect x="730" y="398" width="460" height="40" rx="8" fill="rgba(255,152,0,0.2)" stroke="#ff9800" />
  <text x="960" y="423" class="pos-label">وزارت دفاع (سنتاً)</text>

  <rect x="730" y="448" width="460" height="40" rx="8" fill="rgba(255,152,0,0.2)" stroke="#ff9800" />
  <text x="960" y="473" class="pos-label">استانداری‌ها: الانبار، صلاح‌الدین، نینوا</text>

  <rect x="730" y="498" width="460" height="40" rx="8" fill="rgba(255,152,0,0.15)" stroke="rgba(255,152,0,0.3)" />
  <text x="960" y="523" class="pos-label">بخشی از وزارت‌های خدماتی و محلی</text>

  <rect x="730" y="548" width="460" height="48" rx="8" fill="rgba(255,152,0,0.10)" />
  <text x="960" y="569" fill="rgba(255,255,255,0.52)" font-size="11" text-anchor="middle">احساس مداومِ «به‌حاشیه‌رانی»
    پس از ۲۰۰۳</text>
  <text x="960" y="586" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">این حس یکی از زمینه‌های شورش و
    جذب افراطی شد</text>

  <rect x="730" y="606" width="460" height="36" rx="8" fill="rgba(255,152,0,0.08)" />
  <text x="960" y="629" fill="rgba(255,152,0,0.78)" font-size="12" font-weight="600" text-anchor="middle">📌 عربستان و
    ترکیه از بازیگران مؤثر در فضای سنی‌اند</text>

  <!-- Kurd -->
  <rect x="1260" y="320" width="520" height="340" rx="16" class="kurd-fill" filter="url(#sh)" />
  <text x="1520" y="352" fill="#00b4d8" class="sect-title">🔵 سهم کرد</text>
  <text x="1520" y="378" fill="#00b4d8" class="sect-pct">حدود ۱۵ تا ۲۰٪ مناصب + خودمختاری</text>

  <rect x="1290" y="398" width="460" height="40" rx="8" fill="rgba(0,180,216,0.2)" stroke="#00b4d8" />
  <text x="1520" y="423" class="pos-label">وزارت خارجه (سنتاً)</text>

  <rect x="1290" y="448" width="460" height="40" rx="8" fill="rgba(0,180,216,0.2)" stroke="#00b4d8" />
  <text x="1520" y="473" class="pos-label">پیشمرگه و ساختار امنیتی مستقل</text>

  <rect x="1290" y="498" width="460" height="40" rx="8" fill="rgba(0,180,216,0.2)" stroke="#00b4d8" />
  <text x="1520" y="523" class="pos-label">بودجه فدرال + درآمدهای نفتی مورد مناقشه</text>

  <rect x="1290" y="548" width="460" height="48" rx="8" fill="rgba(0,180,216,0.10)" />
  <text x="1520" y="569" fill="rgba(255,255,255,0.52)" font-size="11" text-anchor="middle">عملاً نوعی «دولت درون دولت»
    در اقلیم کردستان</text>
  <text x="1520" y="586" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">رفراندوم استقلال ۲۰۱۷ → تنش
    شدید با بغداد</text>

  <rect x="1290" y="606" width="460" height="36" rx="8" fill="rgba(0,180,216,0.08)" />
  <text x="1520" y="629" fill="rgba(0,180,216,0.78)" font-size="12" font-weight="600" text-anchor="middle">📌 رقابت KDP
    و PUK بر تصمیمات کردی سایه می‌اندازد</text>

  <!-- Analysis row -->
  <rect x="80" y="690" width="1760" height="130" rx="16" class="glass" filter="url(#sh)" />
  <text x="960" y="720" fill="#d4af37" font-size="18" font-weight="700" text-anchor="middle">⚠️ چرا محاصصه مانع توسعه
    است؟</text>

  <g transform="translate(120,740)">
    <rect x="0" y="0" width="400" height="60" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" />
    <text x="200" y="22" class="danger-title">شایسته‌سالاری تقریباً از بین می‌رود</text>
    <text x="200" y="42" class="danger-sub">وزیر نه بر اساس تخصص، بلکه بر اساس سهم فرقه‌ای انتخاب می‌شود</text>

    <rect x="440" y="0" width="400" height="60" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" />
    <text x="640" y="22" class="danger-title">فساد نهادینه می‌شود</text>
    <text x="640" y="42" class="danger-sub">هر حزب وزارتخانه را به‌مثابه غنیمت و منبع توزیع رانت می‌بیند</text>

    <rect x="880" y="0" width="400" height="60" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" />
    <text x="1080" y="22" class="danger-title">بن‌بست سیاسی دائمی</text>
    <text x="1080" y="42" class="danger-sub">تشکیل دولت گاهی ماه‌ها طول می‌کشد: ۲۰۱۰ → ۸ ماه، ۲۰۲۱ → ۱۲ ماه</text>

    <rect x="1320" y="0" width="330" height="60" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" />
    <text x="1485" y="22" class="danger-title">هویت بر شهروندی غلبه می‌کند</text>
    <text x="1485" y="42" class="danger-sub">رأی‌دهی بیشتر بر پایه فرقه است تا برنامه</text>
  </g>

  <!-- Quote -->
  <rect x="80" y="840" width="1760" height="50" rx="8" fill="rgba(212,175,55,0.05)" stroke="rgba(212,175,55,0.15)" />
  <text x="960" y="870" fill="#d4af37" font-size="15" font-weight="500" text-anchor="middle" font-style="italic">
    «محاصصه یعنی هیچ‌کس مسئول نیست و همه سهم می‌خواهند. این دموکراسی نیست؛ بازار سیاه قدرت است.»
  </text>

  <!-- Quick stats -->
  <rect x="80" y="910" width="1760" height="65" rx="14" class="glass" />

  <text x="200" y="940" fill="#ff9800" font-size="28" font-weight="900" text-anchor="middle">رتبه ۱۵۷</text>
  <text x="200" y="962" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">شاخص ادراک فساد (از ۱۸۰)</text>

  <text x="520" y="940" fill="#00b4d8" font-size="28" font-weight="900" text-anchor="middle">۸٪</text>
  <text x="520" y="962" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">اعتماد به احزاب</text>

  <text x="840" y="940" fill="#2ecc71" font-size="28" font-weight="900" text-anchor="middle">۱۸٪</text>
  <text x="840" y="962" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">اعتماد به پارلمان</text>

  <text x="1160" y="940" fill="#d4af37" font-size="28" font-weight="900" text-anchor="middle">۱۲ ماه</text>
  <text x="1160" y="962" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">بن‌بست تشکیل دولت ۲۰۲۱</text>

  <text x="1480" y="940" fill="#e74c3c" font-size="28" font-weight="900" text-anchor="middle">۰٪</text>
  <text x="1480" y="962" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">اصلاحات ساختاری پایدار</text>

  <text x="960" y="1065" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">
    منابع: Iraq Constitution 2005, Haddad 2011, Dodge 2012, Arab Barometer 2022, Transparency International
  </text>
</svg>