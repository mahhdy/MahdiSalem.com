    <!-- Legend -->
    <g class="body" transform="translate(100,980)">
        <text x="400" y="0" text-anchor="end" font-weight="700">راهنما:</text>
        <text x="530" y="0" text-anchor="end" font-size="18">● فعال</text>
        <text x="680" y="0" text-anchor="end" font-size="18">○ محدود</text>
        <text x="830" y="0" text-anchor="end" font-size="18">— ندارد</text>
    </g>

    <!-- Notes about naval propulsion -->
    <g class="small" transform="translate(100,1010)">
        <text x="3340" y="0" text-anchor="end">پیشرانش دریایی: موتور هسته‌ای زیردریایی، ناوهواپیمابر و یخ‌شکن. آمریکا،
            روسیه، فرانسه، بریتانیا، چین و هند دارای ناوگان هسته‌ای هستند.</text>
        <text x="3340" y="22" text-anchor="end">برزیل در حال ساخت نخستین زیردریایی هسته‌ای خود است. استرالیا در چارچوب
            پیمان آکوس (AUKUS) زیردریایی هسته‌ای دریافت خواهد کرد.</text>
    </g>

    <!-- SECTION 2: NUCLEAR ENERGY USES -->
    <text x="3400" y="1320" class="section" text-anchor="end">کاربردهای جامع انرژی و فناوری هسته‌ای</text>
    <rect x="50" y="1350" width="3408" height="1080" rx="18" class="card" />

    <!-- Category Cards -->
    <!-- 1. Electricity -->
    <rect x="80" y="1380" width="800" height="480" rx="14" fill="#F0EDE0" stroke="#D7D1BC" />
    <rect x="80" y="1380" width="800" height="50" rx="14" fill="#162635" />
    <text x="480" y="1412" class="white" fill="#FFF" text-anchor="middle" font-weight="700" font-size="20">⚡ تولید
        برق</text>
    <text x="460" y="1460" class="body" text-anchor="end">
        <tspan x="860" dy="0">• نیروگاه‌های بزرگ (۱۰۰۰+ مگاوات)</tspan>
        <tspan x="860" dy="50">• رآکتورهای کوچک مدولار (SMR)</tspan>
        <tspan x="860" dy="50">• رآکتورهای نسل چهارم</tspan>
        <tspan x="860" dy="50">• ریزرآکتورها برای مناطق دورافتاده</tspan>
        <tspan x="860" dy="55">۴۴۰ رآکتور فعال در ۳۲ کشور</tspan>
        <tspan x="860" dy="40">≈ ۱۰٪ برق جهان</tspan>
        <tspan x="860" dy="40">فرانسه ۷۰٪ — آمریکا ۲۰٪ — ایران ۱٪</tspan>
    </text>

    <!-- 2. Medical -->
    <rect x="910" y="1380" width="800" height="480" rx="14" fill="#F0EDE0" stroke="#D7D1BC" />
    <rect x="910" y="1380" width="800" height="50" rx="14" fill="#162635" />
    <text x="1310" y="1412" class="white" fill="#FFF" text-anchor="middle" font-weight="700" font-size="20">🏥 پزشکی و
        دارویی</text>
    <text x="1690" y="1460" class="body" text-anchor="end">
        <tspan x="1690" dy="0">• تشخیص سرطان (PET، SPECT)</tspan>
        <tspan x="1690" dy="50">• پرتودرمانی و براکی‌تراپی</tspan>
        <tspan x="1690" dy="50">• تولید رادیوداروها (مو‑۹۹، ید‑۱۳۱)</tspan>
        <tspan x="1690" dy="50">• استریلیزاسیون تجهیزات پزشکی</tspan>
        <tspan x="1690" dy="55">سالانه ۵۰+ میلیون پروسه تشخیصی</tspan>
        <tspan x="1690" dy="40">بیش از ۱۰٬۰۰۰ بیمارستان در جهان</tspan>
    </text>

    <!-- 3. Military -->
    <rect x="1740" y="1380" width="800" height="480" rx="14" fill="#F0EDE0" stroke="#D7D1BC" />
    <rect x="1740" y="1380" width="800" height="50" rx="14" fill="#162635" />
    <text x="2140" y="1412" class="white" fill="#FFF" text-anchor="middle" font-weight="700" font-size="20">🎯 نظامی و
        دفاعی</text>
    <text x="2520" y="1460" class="body" text-anchor="end">
        <tspan x="2520" dy="0">• کلاهک‌های راهبردی و تاکتیکی</tspan>
        <tspan x="2520" dy="50">• زیردریایی هسته‌ای (SSBN/SSN)</tspan>
        <tspan x="2520" dy="50">• ناوهواپیمابر هسته‌ای</tspan>
        <tspan x="2520" dy="50">• موشک‌های بالستیک قاره‌پیما</tspan>
        <tspan x="2520" dy="50">• بمب‌افکن‌های راهبردی</tspan>
        <tspan x="2520" dy="55">۹ کشور دارای سلاح هسته‌ای</tspan>
        <tspan x="2520" dy="40">≈ ۱۲٬۱۰۰ کلاهک در جهان</tspan>
    </text>

    <!-- 4. Naval -->
    <rect x="2570" y="1380" width="870" height="480" rx="14" fill="#F0EDE0" stroke="#D7D1BC" />
    <rect x="2570" y="1380" width="870" height="50" rx="14" fill="#162635" />
    <text x="3005" y="1412" class="white" fill="#FFF" text-anchor="middle" font-weight="700" font-size="20">🚢 پیشرانش
        دریایی</text>
    <text x="3420" y="1460" class="body" text-anchor="end">
        <tspan x="3420" dy="0">• زیردریایی‌های حمله و بالستیکی</tspan>
        <tspan x="3420" dy="50">• ناوهواپیمابر (آمریکا، فرانسه)</tspan>
        <tspan x="3420" dy="50">• یخ‌شکن‌های قطبی (روسیه)</tspan>
        <tspan x="3420" dy="50">• ناوشکن و رزمناو آینده</tspan>
        <tspan x="3420" dy="55">۱۶۰+ شناور هسته‌ای فعال</tspan>
        <tspan x="3420" dy="40">۶ کشور دارای ناوگان هسته‌ای</tspan>
    </text>

    <!-- Row 2 of categories -->
    <!-- 5. Industry -->
    <rect x="80" y="1890" width="800" height="460" rx="14" fill="#F0EDE0" stroke="#D7D1BC" />
    <rect x="80" y="1890" width="800" height="50" rx="14" fill="#162635" />
    <text x="480" y="1922" class="white" fill="#FFF" text-anchor="middle" font-weight="700" font-size="20">🏭
        صنعت</text>
    <text x="860" y="1970" class="body" text-anchor="end">
        <tspan x="860" dy="0">• گاماگرافی (بازرسی جوش و لوله)</tspan>
        <tspan x="860" dy="50">• ردیاب‌های رادیواکتیو</tspan>
        <tspan x="860" dy="50">• تولید هیدروژن سبز</tspan>
        <tspan x="860" dy="50">• شیرین‌سازی آب دریا</tspan>
        <tspan x="860" dy="50">• گرمایش منطقه‌ای</tspan>
        <tspan x="860" dy="55">بیش از ۷۰ کشور از کاربرد صنعتی استفاده</tspan>
    </text>

    <!-- 6. Agriculture -->
    <rect x="910" y="1890" width="800" height="460" rx="14" fill="#F0EDE0" stroke="#D7D1BC" />
    <rect x="910" y="1890" width="800" height="50" rx="14" fill="#162635" />
    <text x="1310" y="1922" class="white" fill="#FFF" text-anchor="middle" font-weight="700" font-size="20">🌾 کشاورزی و
        غذا</text>
    <text x="1690" y="1970" class="body" text-anchor="end">
        <tspan x="1690" dy="0">• پرتودهی مواد غذایی (حفظ و نگهداری)</tspan>
        <tspan x="1690" dy="50">• عقیمسازی حشرات (SIT)</tspan>
        <tspan x="1690" dy="50">• اصلاح ژنتیک گیاهان با پرتو</tspan>
        <tspan x="1690" dy="50">• مدیریت منابع آب با ایزوتوپ</tspan>
        <tspan x="1690" dy="55">۳٬۴۰۰+ رقم گیاهی جهش‌یافته</tspan>
        <tspan x="1690" dy="40">از طریق آژانس FAO/IAEA</tspan>
    </text>

    <!-- 7. Research -->
    <rect x="1740" y="1890" width="800" height="460" rx="14" fill="#F0EDE0" stroke="#D7D1BC" />
    <rect x="1740" y="1890" width="800" height="50" rx="14" fill="#162635" />
    <text x="2140" y="1922" class="white" fill="#FFF" text-anchor="middle" font-weight="700" font-size="20">🔬 تحقیقات
        علمی</text>
    <text x="2520" y="1970" class="body" text-anchor="end">
        <tspan x="2520" dy="0">• شتاب‌دهنده‌های ذره‌ای (CERN)</tspan>
        <tspan x="2520" dy="50">• همجوشی هسته‌ای (ITER)</tspan>
        <tspan x="2520" dy="50">• رآکتورهای تحقیقاتی (۲۲۰+ جهان)</tspan>
        <tspan x="2520" dy="50">• آنالیز فعال‌سازی نوترونی</tspan>
        <tspan x="2520" dy="50">• باستان‌سنجی کربن‑۱۴</tspan>
